body:
  text: 青溪漫稿卷二十三明倪嶽撰墓志銘明故湖廣長沙府通判陳君墓志銘成化初豫官翰林時郡人陳君堅逺領南畿鄉薦來謁豫世翰堂癯然若不勝衣而言動不茍溫然君子人也再試春官不偶即挈家京師僦屋隆福橋西蕭然一室兀兀以事問學四方之士多從之遊如是者蓋十餘年卒以不偶有司乃棄去就選銓曹拜黔陽知縣九載秩滿進長沙府通判其弟鏡亦以某知縣為鄖陽通判兩郡相望二難競爽時以為榮未幾豫奉命來典南銓乃聞君丁內艱歸以憂勞致疾遂至不起惜哉葬且有期其孤泝謂豫知君惟素乃奉夏銀臺所述事狀介鄉友郁景章衰絰蹐門泣請為銘豫方期君逺到而遽至此方為悼惜不已其忍執筆銘君墓哉然喧不可辭遂按狀序而銘之君諱鋼字堅逺姓陳氏别號遲宜子其先居考亭宋相秀國升之之第升之仕至昭化軍節度使子澤補京秩以言青苖謫明州子孫遂為鄞人至祖珤國初以名醫徴詣京復有籍應天考諱愷號艾庵醫益有名以君貴贈文林郎黔陽知縣妣張繼盧俱孺人君生而性質清粹族兄都憲濂竒之謂艾庵宜篤意以教因遣從金克明先生授經日有造詣遂占成化乙酉京闈高第積學既久文名益彰辛丑往蒞黔陽邑邇夷俗輕刑喜訟君力諭解之民知所向鞭朴不施公庭寂然乃搆堂曰面山日坐其中若無事者至於置飬濟院使窮者有所歸立社學使䝉士有所教闢山田餘千畝積義倉至萬石使貧無力者饑無食者皆有所濟沅水迫城每春輒泛溢為患君鑿石為隄而患遂息猺獠肆掠每夜輒驚疑為害君堅卧不起而害亦除楚俗居喪多擊鼓為歌而詞甚鄙君取古哀詞梓行邑中以正之使民知送終之禮建寶山書院以祀唐死節張扞宋縣令饒敏學使民知崇德報功之意他如遇歲旱禱雨輒應定賦役公正有法山夷與編民爭田久不服得君一言即决老稚爭肩輿送君其見信異類如此及他善政尤多不可殫述部使者纍以懋異之績聞于朝遂膺推恩之典錫之勑命有撫字有方操修弗懈纍書上最之褒尋亦有長沙之擢矣去任之日民攀泣不忍捨蓋得民之深云及為長沙作來湘賦以自見藹然忠愛之誠殆與賈生吊屈原者相先後善讞疑獄民有寃者皆赴訴於君修嶽麓書院以祠文公南軒作極高明亭以待來學之士奉詔重修親藩府第費億萬計君撙節有法公私不擾王甚重之藩臬亦倚君為用聞母太孺人訃即日奔喪歸哀毁踰節竟以是卒得壽六十有四其生為宣德某年某月某日卒以𢎞治丙辰七月十四日先配周氏贈孺人繼金氏封孺人子男四沂濬皆嗜學淳潮尚幼孫男二時應時閏葬以卒之年某月某日墓在某山原君性孝友少喪母事艾菴盧孺人克盡子職與兄鍾弟鏡處恩誼尤篤平居喜好文事適興山水所蓄法書名畫甚多有適齊紀行㵲溪江臯湖南諸稿若干卷藏于家居官清白始終不渝然留意民事所至有聲使天下郡邑皆得如君其人布列於其間民病其有弗瘳者乎乃至循良如君而又不獲大究厥施如此誠可惜也銘曰清廟之玉曰久在櫝猗蘭之馥泛乎幽谷用之弗足毁折胡速豈弟膏沭郡邑具録青山之麓以瘞賢淑銘焯芳躅百世是告故朝列大夫四川等處承宣布政使司右參議致仕朱公墓志銘𢎞治丁巳正月七日四川布政使司右參議致仕朱公以疾卒于金陵之第其子嗣隆告訃於公館甥湖廣按察司僉事曹君玉且曰葬必有銘然知吾父者莫子若子其狀列事行將奉以干於當代執筆者玉既聞訃而哭已乃述公平生履歷之詳歸于嗣隆於是衰絰踵門謁豫文以銘其幽公為吾鄉先進誼不得辭按狀公諱貞字惟正姓朱氏别號息軒其先揚之泰興人勝國時髙祖某任龕山巡檢慕錢唐山水之勝因往卜居焉曾祖復嵊縣尉祖綝入國朝為大都督府宣使黔寧昭靖王沭公重其學行為請于上延為孰師改授學録始家金陵考皥以家學嗣居師席故黔寧之世克篤忠貞蓋有由也母平氏虎林仲微先生之女有淑行通小學女教諸書尤善教子子四人公其仲也少聰頴異常兒甫十二即辭父母從國子助教張山觀先生授詩經每朔望始一歸省及張去任復從禮部主事謝廷輔卒業授書經補應天郡庠弟子員益力于學景泰癸酉領京闈鄉薦天順丁丑登進士高第擢河南彰德府磁州知州時朝廷遣中官取異魚磁地所産不多民苦逼迫二守以下將引避公不可曰朝廷設官以為民也乃秉誠禱于河異魚湧至且委曲調護民免於擾內閣南陽李公鄧州人聞公政績遂薦為鄧州知州天順壬午歲也公嘗聞鄧州及所屬內鄉新野二縣之人往與本省閿鄉及陜西一帶驛夫更易走遞但彼土著之人素號貪狼故至者輒被抑勒捶辱並施財力俱困歲以為常無所於訴公乃具疏乞各於本土應役庶免斯患遣人以聞報可自是民享其便李公聞之緘詩以賀甲申以公務過磁民具壺漿以迎者數十里時南陽守適與偕行見而嘆曰世之仕者既去而不敢復造其地者有矣君何去思之深也成化丙戌荆襄劉千斤作亂朝廷命將討之兵行所至供億百出稍遲則典守者輒被叱辱且攘奪一空將次鄧州民皆蹙首以俟公乃擇儒學生員有幹局者令各具衣巾分主其事至則叱辱無所施仍極力營辦軍用不乏害弗及民是年冬丁外艱明年丁內艱起復升南京刑部郎中仁恕明允獄以無寃三載考最得賜誥贈考如其官母妻贈封皆宜人尋升四川布政使司右參議奉勑總督松潘等處糧儲松潘地極險逺每歲㑹計邉儲民憚轉輸之艱寧甘拖缺甚者逃去以為常間能運至而前之官此者或厭於煩不以時受坐候既久姦弊滋甚民益苦之邉庾不充率由於此公至勤已恤下凡轉輸至者即與收受不以多寡為限民樂趨焉嘗欲奏請東西二路每於中途設一倉俾得兩次倒運以便民封事已具以與巡撫所議處者不合而止恆以為恨公又以沿邉守哨多以免死罪者充但去家既逺衣食俱乏強者則逃弱者則死公嘆曰此豈立法備邉恤刑之意况舊有量給口糧例乃逹之巡撫旗軍月五斗舍餘月三斗自是至者得安其生無逃亡之患矣松潘地與西畨諸種相鄰不時剽掠為患公撫禦有方不復肆虐惟黑虎一寨獨肆桀驁招懷不服公與總戎者謀密為勦捕闔境以寧事聞賞典將行而公遽以老具疏乞歸矣瀕行軍民攀送不忍舍鎮巡大臣及諸司縉紳皆為詩章歌咏其美盛供張以餞觀者榮之癸卯春抵家躬葺田廬為娛老計郡舉鄉飲必敦請以為介賔勝日則與鄉士夫故老效古人真率㑹以為樂雖年踰七望八而康强若少壯惟以詩酒自適於林泉之下意泊如也性至孝痛親蚤世每歲時祀享未嘗不泣下沾襟保重遺體不棄膚髮慎於交際雖遇童子必以禮以故居鄉居官與物無忤尤樂賙恤親鄰有喪貧不能舉者率為資給有舊識某者稱貸久不能償公召其子以故劵與之去祖塋數里許别擇隙地以葬臧獲之亡者其所存長厚蓋如此自幼工楷法晚變為行書駸駸古人所著有息軒稿若干卷藏于家公既嬰疾度不起即召嗣隆語之曰我揚歷中外不為不顯優遊桑榆不為不夀多福令終幸兼有之兹復何憾惟汝讀書飭行勉圖立身之計吾目瞑矣遂卒距所生永樂辛丑二月一日享年七十又七先是三二年公於壽藏衣衾棺槨之類悉為營建務底堅美肆今無倉卒之慮人益高公之識云配唐氏封宜人燕山右衛千户禮之女側室楊氏子二長即嗣隆應天郡庠生娶王氏錦衣衛指揮俊之女次嗣賢蚤卒女五長適即曹僉事王次梁玉陳裸胡鑑陳節皆京衛指揮孫男一臣忠孫女二皆幼葬以卒之年某月日墓在江寧縣長泰北鄉鷂子山之原銘曰朱氏之先世以儒顯有賢嗣興蘭茁於畹德馨發聞優入時選班資屢升恩命亦腆郡以惠施獄以平讞于蕃于宣素藴畢展倦遊東歸世纍斯遣宦業之承惟後之衍鷂山之墟卜宅非逺焯行著銘百祀其闡中奉大夫江西等處承宣布政使司右布政使致仕秦公墓志銘江西布政使司右布政使致仕秦公既卒之又明年為𢎞治丁巳越闕月闕日其孤鋭始克奉公柩葬于邑惠山聽松菴之南乃具里彥李舜明所述狀伻來請銘昔公之以微恙去官吾黨縉紳之士咸為之惋歎而今則已矣按狀公諱䕫字廷韶姓秦氏别號中齊宋淮海先生少游之裔先生之子湛倅常州乃有籍于常先生初葬髙郵後遷于錫至公六世祖瑞依墓以居遂為錫人既而遷今所居鳯光橋者公曽祖諱彥和諱季升者公之祖以厚德重於鄉以能詩名于時始封兵部主事進武昌知府諱景暘者公之父其配殷封安人贈恭人者公之母也公生數歲以頴敏稱武昌遣從楚府伴讀余季樞遊卒業于東平知州劉超逺之門學有造詣遂領天順己卯京闈鄉薦登庚辰進士第奉詔賜歸明年入朝拜南京兵部武庫主事進職方員外郎再轉武庫郎中成化壬辰出為武昌知府以內艱去服闋轉江西之建昌乙巳擢福建右參政嘗在告者逾三月丁未進江西右布政使遂以疾致仕此公歷官之槩也公始筮仕勤勵弗懈有志事功其在武庫即奏革𨽻卒之冗者以杜請托迄今民受其惠其在武昌地大政繁且藩臬所蒞事恆掣肘公至首除奸惡植良善興學課農積榖緩刑創飬濟院定均徭法一意愛民如恐不及巡撫都御史繁昌吳公永新劉公前後至皆禮重公仍下其均徭法於列郡行之嘗祀神至江滸見一婦反按投沙中氣將絶頃之少蘇扣之則曰妾杭人栁氏隨夫商於外為盜劫殺將汚妾拒不從因投于此公即收置屏處蹤跡得盜置之法歸婦于其家優人李昆寓長沙見陸氏女美而多資乃百計求得之其族兄來赴秋試具訴於公公按正其罪女還陸氏由是巡撫巡按及藩臬之長交章疏公治行為湖南第一旌擢將行而公以憂去先是郡中百需皆取辦諸市久不酬直民用怨咨公乃閲帑藏之以贓罰名者為銀若干兩即散給市民歡動閭巷或曰公且去宜私其餘公怒斥之悉籍其數置故處乃歸民至攀轅不忍捨有役均訟平之謡其在建昌民尤健訟公治之如武昌始皆懾服廣昌有何姓者與令有隙他民將訟令令疑之乃陰令人首何罪惡密捕得之論以極典何族訴於公公疑焉詢之人曰寃也乃逮首者詰之曰爾胡得厚誣平人吾固知非爾心也第以情言之否且得罪其人流涕吐實何遂免死吉水彭伍二大姓相奏詰逮者百餘人歲久不决憲臬以屬公擇曠地人相距數丈則立一木繫之使不得相耳語乃次第鞫之語或矛盾輒加考掠不旬月盡得其情獄成民伏辜聞者快焉其治瑞州獄亦然此公政績之著也公自幼嗜學於書無所不讀為文章下筆纍數百言滔㴞無滯詩清麗有唐人風書法趙松雪景仰先哲所至考求遺跡修舉廢墜如武昌新張乖崖祠葺黃鶴樓建昌復李泰伯曽南豐祠皆措置有法役弗及民遇山川佳勝處登臨懷古形之賦詠尤多性剛直善善惡惡無所茍故平生所交遊必清介有文之士待寮友一以信義處鄉黨遇族姻和而有禮平居簡約未嘗輕涉公府此公學行之優也性孝友以殷恭人沒弗及奉含斂每言及輒慟事武昌敬愛備至在金陵建昌皆迎就養及致政歸尚無恙乃作五峯草堂天全亭於九龍山下建隆壽堂於所居之坎隅日與二弟旦奭奉武昌遊衍其間武昌喜談詩好登山臨水為樂每遇勝日必延致騷人墨客親奉杖屨以從鄉人榮之如是者數年及卒公哀毁踰節疾復作瀕殆乃執二弟手索筆為書惟以弗克躬襄大事為恨言不及他此公孝友之實也其卒以𢎞治乙卯十二月十二日距生則宣德癸丑五月三日得壽六十有三所著中齊集若干卷藏於家配沈氏封安人進恭人子男一即鋭攻舉進士業為邑庠生女五皆適儒族初公既得吉壤茂林修竹秀蔚而深窈心且樂之將營壽藏而未果至是鋭乃即其地營建塋域具如法式蓋踰年而後成遂以葬焉惟公卓犖之才清粹之行勳名炳炳方將追軼古人而弗及大施遽以疾沮豈造物者亦有意於其間乎否耶嗚呼惜哉銘曰惟貌之癯惟德之腴揚于天衢焯乎令譽其進也徐雄藩載居公望未踰公才有餘忽然懸車公體之愈若彼龍駒扼於馳驅孰不欷歔公心則娛山水盤紆以為親愈九龍之墟爰有幽廬擅美一隅惟公所須我其銘諸百世弗渝故味菜居士沈翁墓志銘𢎞治丁巳九月五日金陵沈翁文實卒於家其孤武昌同知景聞訃奔喪歸卜以十二月十八日奉公柩葬之安德鄉大山之原啓厥配芮孺人之竁合窆焉復奉同庠鄧秋官存德所述事行介俞大尹黼衰絰謁豫泣請為銘以掩諸幽豫於翁有里姻之舊因憶丙辰春景以述職之京嘗干豫言歸為翁八十之壽遽忍銘翁墓哉按狀翁諱誠姓沈氏文實其字别號味菜居士世家浙之錢唐國初徙閭右實京師始有籍于應天之江寧祖某生二子長德字本道次貴本道生二子長容次即翁容隨貴執役北京以卒遺翁父子煢然獨存翁幼聰慧嗜學蚤有知識父母鍾愛焉甫七歲選補京庠弟子員未幾而本道甫遽卒奉母徐以居孤孱相倚克自樹立服闋尚垂髫內理家政外供公役日不暇給遂無意進取日以侍親治家為務攻苦茹淡艱辛備嘗既長授室淑德協相竭力營養徐安其孝翁天性淳朴酷嗜淡泊不為侈靡習勤儉自律拓産日裕然臨財施豫不少吝蚤事儒業晚乃究心佛老之典留心課誦若有所得自幼不嗜肉味蔬食菜羹意泊如也間喜繪事興到落筆自成一家幼嘗有言祿命者謂其數厄四九翁憂之乃默叩於天曰某不幸九歲喪父母方三十撫育有成母子二人更相為命無他兄弟備養脫如數言母將安歸願天少假數年畢志終養得朝掩母壙夕死無憾矣卒之既奉母終復享遐夀人皆謂翁孝誠所感也居常無所事遇佳時勝日集子孫於前引觴小酌聊以自娛或歌道情或誦古人嘉言善行以暢懷抱且以示庭訓焉興有所感輒形賦咏不求工緻適意而已手録為編題曰居家日記其教子者有曰休負男兒七尺身乾坤道合始成人龍豬分别由勤惰切莫蹉跎競寸陰其自詠味菜有曰每日三餐把甚嘗家園挑菜作羮湯肥甘適口雖云好曽似根頭滋味長語意真切不事繩削率類此嘗諭諸子曰吾父沒時屬吾母曰汝守此子宜令讀書為善人時伶仃孤寡窘迫無奈每思遺言痛恨入骨爾曹其務進修以成先志乃吾願也翁之配芮氏有淑行先翁卒生子五升昱旻景杲升旻杲蚤世今存者昱克事幹蠱以世其業景資聰敏翁教之亦篤遂以明經領成化辛卯鄉薦擢廣東潮州府同知起內艱改武昌所至有氷蘗聲女二孫男三泰和雍曽孫男一女一翁生於永樂丁酉十月十日享年八十有一初江寧尹劉傳知翁髙年篤行請為鄉飲饌賔翁辭不獲自是在賔席者二十年後以輸粟賑邉得奉恩詔有冠帶之榮然景歷佐二郡政績著聞貤封可跋而翁不待也惜哉銘曰菜根可咬信民之言味菜以老終謝囂喧失怙胡蚤曷雪煩寃孤孱僅保竟沮髙騫家聲再造孰為之援天錫壽考亦有雛鵷世澤如潦克濬其源山水環抱大山之原我銘墓道百世弗諼封南京戶部福建清吏司主事曹公墓志銘南京户部福建清吏司署郎中事員外郎曹君祥聞其父以能公訃號痛欲絶已乃匍匐歸襄大事屬其僚友浙江司郎中胡君璟狀公事行詣豫乞銘以葬按狀公諱祖才姓曹氏以能其字世家徽州婺源高祖英芝始遷徽城南市遂為歙人英芝生彥忠彥忠生永卿又遷歙之南雄川生忠仁壽九十餘恩詔授以冠帶娶張氏生子四長即公也自幼賦性淳朴強毅有為甫冠即能代父綜家政克亢厥宗既壯客遊于外上下江湘京邑間所至親賢取友人亦敬愛焉積資日裕一毫不以自私弟觀為郡庠生資給周至俾得一意于學遂領成化辛卯鄉薦人多公之力居嘗闢田園廣第宅墾山數百畝植以嘉木今賴其用自奉儉約歲時伏臘祀先待賔必極豐潔與人處鯁直不茍同鄉人有不平者多就質公為譬解之罔不信服遇宗黨有禮撫臧獲有恩其教子姪則嚴祥以禮經領薦京闈遂登成化甲辰進士姪禎䄎前後領薦而起皆出公訓祥既授南京戶部福建司主事𢎞治辛亥之歲以績最得推恩於公授承德郎迎養官邸適壽七十同官者嘉其榮壽相率繪圖賦詩以賀時人榮之未幾歸歙悉付家事於子孫日與故人賔客放浪山水間步履輕捷不異少壯襟度坦夷雖遇童子語溫而氣和鄉人重其雅量焉衆方期其夀考殆過於父不意以微恙遽卒實𢎞治丁巳十一月二十一日也享年七十有六距生則永樂壬寅閏十二月十八日娶陳氏有淑德先公卒贈安人子二長即祥次祺女五孫男五漢海澄深瀅孫女三曽孫男女各一葬以卒之來年某月某日墓在某山之陽銘曰植木於原克培厥根雨露所滋以茂以蕃孫枝挺出匠石旁授梁棟榱桷其用則繁猗翁種德式大其門嘉樹在兹髙誼弗諼世澤敷遺以裕後昆我銘其藏不朽者存大明勑封孺人亡妻盧氏墓志銘嗚呼吾尚忍銘君之墓哉痛惟先考太子少保文僖府君在宣德初與今浙江布政司右參政盧公雍同以垂髫之年遊京校相好也雖兩家祖若父亦交愛重之不啻親子弟居嘗戲相謂曰他日授室生子必講姻好既而果然嗚呼孰虞斯好之不終也哀哉君諱允貞字德恆别號恆菴其先本吳人國朝徙閭右實京師籍于江寧參政公其父封兵部主事諱清其祖也母封安人顧氏廣東按察僉事諱儼其舅淇學諭贈監察御史諱敬其外祖也君本宦家産稍有知即熟聞諸大人詩書之訓五六嵗時輒能動遵禮則不妄踰戶閾言笑斬斬知自貴重內外族稱愛為竒女公在學宫不時歸安人晝視膳夜事紡績君率能佐其勞安人恆苦疾至不解帶以侍湯藥如老成人讀書攻女紅皆如素習不煩姆訓天順丁丑公登進士明年君隨親上京師又明年先君為怨家所搆下獄君聞之隱痛成疾甲申豫忝進士君年十有八公以歸豫時先君尚在謫君朝夕北望不忘修饋未幾有詔賜歸君執婦道惟謹先君喜謂公曰吾兒婦殆女中狀元也又數數謂人如謂公者成化丙戌先君自禮部侍郎休致南還己丑豫乞省覲君在行歸杭展墓亦請偕往明年家值回祿居業蕩然先君弗懌豫圖所以慰釋其意者甚切而未得計君謂豫曰吾舅甫脫憂患豈可重擾其心君雖初仕甚貧然非有以安之不可也吾盡斥簮珥屬或可資費其先置屋數楹奉居之而急就職藉祿以飬何如豫曰然明日即携以出市大屋三楹建之故基規制𢎞敞先君大悅乃還任得請祿以歸於親嘗念豫未得嗣屢召媒妁多為之置妾曰以廣後也且厚撫之曰吾固惡夫妬者然非懷之以惠亦烏能安其心有識皆以為難恆以不及逮事姑又違逺先君之養日往來于中每誕日輒先期製袍服以獻必自已作極精乃已四時之祭躬視烹芼以豐以潔丙申先君賀萬壽留京一月君竭力侍養親致甘軟以夜繼日不知為勞因益重其孝明年疾解尚書政豫亟圖歸侍君復謂豫曰君侍經帷講明春春坊進學君或預選則未可言私幸早圖之遂以季冬拜疏以行既歸豫日以迎醫問藥為事朝夕起居之宜衣飲之節君獨任之如是者逾年醫禱無效易簀之夕惟豫與君侍側襲斂服用多自君手將殯君病未能興大慟曰天乎胡不佑吾使吾病弗獲協相夫子以襄大事終天之恨奈何發引日力疾強扶以出攀號欲絶悲動行路及反哭則宿恙灑然去體矣亦君孝誠所致也庚子春君病飲食嘔逆醫診之曰此孕脉也不月愈豫心異之自兹體履康和大勝疇昔秋八月二十又二日君産得男頃之君遽卒兩族環視一七莫施嗚呼痛哉始豫嘗謂君曰君久乃字殆天授也其亦先人在天之靈有以陰相其後然歟豈謂其遽至是也嗚呼痛哉君頴異慈淑孝友之行清純之質本於天賦自幼為大父母父母所偏愛而君能心其心公無嗣實厚藉君而君委曲承順亦至公參閩藩君始與親違夢寐其側靡一夕間壬辰公來朝感疾幾殆君露禱北辰刲股和糜以進疾乃愈迄不令公知公歸閩安人殁先是君夢不祥甚憂之卒以訃聞驚絶久乃蘇蓋其一念之篤恆相通也君之待姊妯和而以恩處宗黨慎而有禮御羣下周悉而無失制行有常終始無二雖有負其德者亦不為變親禮賢淑如嗜飲食避逺醜惡至不欲視仁聲義烈著于壼彛族姻戚疏莫不法式平居把卷執䇿不異儒生每考論疑義及古人賢否事善惡成敗亹亹不倦家有國朝重編列女傳視舊書為詳君日翻閲不暫去手恆取賢母貞婦事圖置座隅曰此吾無言之師也善吟咏而不時作謂非閨闥所宜遇㑹意處每有佳句多棄不録及卒搜其書篋得數紙焉其於星歷醫卜亦留意嘗訂正圖書手自校讎恆市善藥以已姻識者之病善繪事而不屑拈弄粉墨至所臨寫若杏園璿璣九歌諸圖專門者稱賞其精組紉刺繡之藝少搆思即出人意表雖至巧者莫能及見事超捷胸中大有衡尺族衆以時見遇事可否是與非必就質君得一言帖帖信服雖豫亦得以咨决所疑供職暇可肆力問學無家政之擾者蓋君贊成於內多矣一旦失此良佐顧何以為情也哉君未卒之前三日通江何生為豫占得豫之上六曰孕生男未祥也卒之日君謂豫曰吾夢登山見泉竇焉其流甚微旁有人曰將發卒開濬其流始大且有後福有頃而海神者邀吾燕供張甚盛也至是追占二象曰雷出地奮陽出於陰生男也冥豫有渝樂極而變災咎至也水陰類其流之微不通逹也海神之召去而仙逰也嗚呼其告之矣君嘗因豫任編修滿三載得賜勑封為孺人距其生則正統丁卯正月十有六日得年三十有四而已君之子彌月見於祠堂名之曰孝孫亦曰應麟因朝奠以告君以是歲十二月庚申葬君于江寧縣新亭鄉祖塋之次去先君先夫人之封二武銘曰維質之清維行之貞天聿成只夀不孚德匪君宜得天或瞢只遺親於獨禍我亦酷孰司平只命服在躬舅姑之從于新塋只我揚君休向傳其收抑稱情只天錫爾後君尚篤祐永厥承只承後其延維千萬年徴茲銘只金母王氏墓志銘金陵有以嬰醫世其家者曰金氏至某尤精其業著聲於時諸子亦讀書秉禮克敦士行余以里姻故獲交其父子間恆羡金氏之多賢也豈其先人之積之教有以成之如此哉乃成化庚子十一月闕某之母卒明日命其子琮持狀謁豫泣請為銘以掩諸幽豫受而讀之而後知其世德之深長慈訓之篤至也母姓王氏諱妙智考德名妣樂氏先故杭族永樂初隨親徙京師家於金陵金於王有同里之好母生而柔淑其親為擇佳配得金氏之良曰彥端者歸之歸僅旬月舅剛中府君以御醫隨文皇北狩彥端侍行即解簮珥以佐行費姑太安人張性至嚴母事之不違其心無忤於色躬事紡績以致井腝安人安之剛中卒于官彥端歸骸骨貧不能葬母益出嫁資以左右之彥端兄彥聲亦以御醫侍仁皇北京留諒宏二子金陵母撫之不異所出與某同就學歸必督課所習寒暑衣飲先彼後已諒後纍官太醫院使雖老不倦母訓焉舅姑相繼沒歲時祭奠必躬必潔嘗置婢婢思其親而病憫而還之度已費所直竟不復取孝義之行蓋出天性云彥端喜吟咏晚號杏莊日與騷人墨客優遊山水間以意其適無纎芥內顧憂人益多其壼相之力也彥端既沒綜理家政教其子撫諸孫攻醫業儒斬斬有法蓋又若干年夀八十有九而卒其生則洪武壬申五月闕子男曰銘即某甫曰鑄早卒女四適嚴繼周澄時讓周鍾孫男四玭琦琮璿曽孫三城山谷女二𤣥孫男一卣以卒之年十二月辛酉啓彥端之竁附葬於安德鄉李家山之原琮之言曰吾大母相夫以禮起家以勤奉身以儉律己以嚴孝於舅姑和於妯娌仁於臧獲慈於子孫幾期令終可謂難矣嗚呼不有賢母烏能成其子若孫之賢哉是則可銘也已銘曰孰揭揭以遺後之賢乎而孰悠悠以歸其全乎而猗嗟夀母亶食報於天乎而亡妹兵部司務楊君孺人墓志銘嗚呼吾妹之喪殯于寢堂逾一載矣因良人奉符使關中始得輿歸葬于長安縣鳯棲原先塋之次實𢎞治甲寅月日也嗚呼定君處父母家凡為子之道歸于夫家凡為妻為婦之道咸有可稱者而亦惟豫知之悉也乃志于石而銘焉以掩諸幽以示于後固以紓豫永訣之思而亦其良人之志也嗚呼定君諱淑靜定君其字也倪氏之族上世自杭徙南京有籍上元曽大父大父府君皆授誥贈官南京禮部尚書妣皆夫人先公南京禮部尚書贈太子少保諡文僖府君登正統已未進士及第入翰林始請命歸舉親迎之禮而先妣夫人姚氏乃歸先公偕入京師生不肖子女六人夭者四存者二則不肖與吾妹耳定君以正統戊辰六月二日生生而先夫人以産致疾越又明年庚午先夫人棄背定君才三歲幼且久病目賴外祖妣王夫人撫視有成先公及先繼妣夫人郭氏愛惜逾諸子定君生有異質眉目秀麗性識端邃莊重自能言未嘗妄嬉笑不與同類遊戲日侍二親側孝和恭惠順適其意習女紅不煩姆教烹飪調齊若出於素天順己卯禍變陡發先公逺徙于宣定君哀隱于中憂形于色人不能堪外祖妣夫人遂挈之北行涉歷顛躓心則甘焉維時太子少保户部尚書關西莊敏楊公實與先公同年及第入官契誼惟篤太夫人武城李氏亦夙于先妣夫人善仲子時敷資禀純懿謂可作配媾言既諧嘉禮斯講及歸于楊貞順自將忿忌弗形肅焉秉禮婉焉效德躬佐講習勞以待旦平居必敬必親克致舅姑之養必慎必睦不失妯娌之歡姻族歸賢率由是也成化甲午時敷領薦京闈益勤勸相兾于大成己亥莊敏公歸休奉侍彌謹殫誠竭力起居賴之婦職之修閨閫鮮及公卒時敷廬于墓者三載共養益至太夫人安焉終喪哀勞形色為瘁及侍太夫人京師復與豫㑹而時敷亦以久困場屋出就選格為兵部司務顯融有漸歡聚不時而定君日以疾告矣醫禱兼至迄不可療竟以是卒時𢎞治壬子十月九日也得年四十又五而已生子若女七人皆賦質娟秀皎如玉雪不幸相繼夭沒久或逾歲近則彌月保抱撫視艱辛萬端是可痛哉今有子一曰伊瀛愛養無間人莫知其所自出益賢之嗚呼定君早罹憂患中逺骨肉百念縈鬱未及一遂良人甫躋宦途而遽焉長往德厚而壽弗延勞多而報乃嗇其命之薄耶亦數則然耶孰謂天可問也耶遂抆泪以書俾刻而葬焉銘曰金陵倪宗既遷于杭逮我先公復升朝行生此賢淑克嫓于良夀弗符德是則可傷􅀈幃于邁于彼咸陽南北東西茫茫四方魂無不之何必故鄉惟後有徴以識其藏明故資政大夫南京禮部尚書致仕贈太子少保童公墓志銘弘治丁巳秋南京禮部尚書童公秩滿三載以疾弗任朝謁具疏懇乞休致上不許至冬復以為請詞益加切乃許之特賜誥追贈其先明年二月十又九日以疾卒于所居之第訃聞上悼惜贈太子少保賜祭于家者再命工部啓其配陳夫人之竁合葬焉公既卒越四月季夏之望遺腹生子以公治命名曰紫芝葬且有期稽勳陳郎中鎬於公世通家乃告豫必得豫銘公墓而後葬惟天順癸未豫忝科第公實司考校顧以鄉後進在門生之列其敢以不文辭乃取通政夏參議崇文所述狀序次之按狀公諱軒字士昻姓童氏世為鄱陽文北鄉樟潭里人曽祖元愷妣孫氏祖金友妣章氏考碧瑄號玊壺妣章氏陶氏自祖以下皆以公貴贈資政大夫南京禮部尚書妣皆夫人童本儒族至玊壺以精天官學永樂初召充欽天監天文生尋命入文淵閣纂修天文諸書三子皆留鄱後家南京秦淮之西生公幼頴敏異常兒讀書過目成誦玊壺乃召其仲子惠來繼役而一意教公俾攻進士業博學篤行文譽日著選充應天學生領正統丁卯鄉薦登景泰辛未進士拜南京吏科給事中公思舉諌職深居簡出不妄與物接嘗上疏言省冗員公考察倡武勇擇師儒杜幸進恤京民又言南京糴貴民多死請命官賑貸俾御史體察多見採納乙亥秩滿三載得賜勑贈封其父母妻如制時詔南京守備採辦翠毛魚魫諸物以萬計公極言止之及英廟復辟覽公所奏嘉其敢言尋上疏言弭盜安民數事尤切時弊天順戊寅冬劾户部張尚書鳯下獄有詔宥之明年丁嫡母章夫人憂辛巳服闋改戶科給事中癸未同考禮部㑹試精於校閲時稱得人甲申憲廟踐阼公首上疏言帝王之治在先本而後末隆聖德用賢才納忠諌愛小民謹邉備之謂本而簿書刑名其末也願時引儒臣講求祖宗謨範及古帝王修身用人之㫖著為大明一經推而行之則聖德隆命在廷三品大臣歲舉堪任方靣一人且嚴連坐之法進用大臣亦召三品大臣於便殿各舉一人以對俾科道紏其非則賢才用臺諌之言賞其直貸其過則忠諌納養民之政在户部凡奏報災傷即加優恤則小民愛多方求將歷試所長文武有犯輸粟于邉則邉備謹上優詔答曰朕覽童某所言有理修德用人納諫朕當自勉餘令諸司舉行公又言漕河為官舟所阻請命大臣一人總其事仍乞省貢舟而嚴禁之未幾四川盜作廷議招撫之䇿謂公才識足任其事乃命公偕刑部朱司務貴奉勑以往公星馳至蜀遍歷賊巢宣布朝廷恩威諭以禍福賊首王應高等後先迎迓凶㷔可畏聞公言皆羅拜乞生公召與同飲食示以至誠賊出降者益衆皆慰遣之夏六月進都給事中得便宜行事時賊首趙鐸等尤驍悍不聽撫諭遂復叛去公偕鎮巡三司議分兵勦捕躬冒矢石斬獲無算奏功還朝蜀人為班師圖以紀之公復言安盜賊有五去貪官均科差蠲逋負革總部省邉運而盜自息明年夏四川巡撫奏賊猖獗遂歸咎于公致公重辟公曰某出萬死平賊况有鎮巡三司奏功疏在盍取驗之一言不合甘心東市之誅時議出師公曰賊已平奚用出師不數日捷奏至矣果然猶坐公免官賴上聖明調浙之夀昌知縣己丑述職來朝上疏自理廷議咸以為寃於是大宗伯姚公舉公學行宜董學政乃擢公雲南按察僉事提調雲貴學校公務敦教本精於考校隨才造就士風一變鎮守貴臣咸敬憚焉公復上言考察庶官宜廣詢公論作養賢材宜優待學校於是巡按者交章薦公請加旌擢甲午秋召拜太常寺少卿掌欽天監事公嚴考天文陰陽諸生旁搜博訪以為用公僚屬之薦省歷紙之費夙弊一清纍以疾辭不許丁酉冬三載秩滿賜誥賜封其考妣及妻如制己亥夏進太常寺卿仍掌監事教諭余正已奏言歷法之差上命公與之考論不合公上言歲差置閏其傳已久我朝考歷制象尤為精密雖日月薄蝕不無先後晷刻之殊分秒多寡之異則以土有南北高下之别耳正已乃謂天地有自然之冬至以至朔望置閏皆非人力可為是不知古人以數求天之術顧以小智亂成式宜下之吏以正其妄從之復正天下陰陽官納粟免考之非制壬寅冬三載秩滿賜誥有學行端潔之褒贈封其祖考考祖妣妣及妻皆如制癸卯春以疾乞休許之及歸南京蕭然一室不異布衣時有所餽遺非知舊不輕接納縉紳聞而重之𢎞治改元戊申㑹欽天監官以不職罷去衆復以公薦命公仍掌監事夏六月日有食之公言日食紀元之初當盛夏火旺之候宜正心修身以為取人之本格物窮理以為燭姦之要進君子退小人以謹天戒尋辭掌天文舉吳昊張紳高鍾者以自代是年冬復以僉舉進都察院右副都御史奉勑提督松潘軍務兼理巡撫時蜀歲荒公至開倉賑貸設粥以食饑餒給糧以歸流移平訟以决久禁先是逾月不雨公至而雨亦沾足公乃為禁令三十餘事皆安邉保民之政次第舉行復以南路鎮畨一帶苦於蠻夷出沒歲减軍糧以備犒賞軍多逃亡公奏以四川官帑銀布代之兵食以足公復以其地險逺蠻夷雜處疏言松茂威疊戍守甚艱而疊溪一路尤甚宜調兵設衛令一都指揮守之四處要路各設一倉以便轉輸令一闕督察之復言沿邉衛所州縣皆在萬山中與蠻夷共之關堡之設有害而無利宜捐松茂之中羊腸一徑之路則關堡倉廪可省兵無逺戍之勞民免艱運之苦蠻夷有坐困之機凡八害三利畫一以聞事下所司議不果行嘗創兵器給諸關堡以為禦敵之具薦雲南按察使林俊可任都憲復上章請老不許辛亥春召還未至擢南京吏部右侍郎癸丑冬疏言臣年六十有九入仕四十年禮宜致仕不許甲寅夏進南京禮部尚書二年三疏懇求致仕皆不許且有操履清慎方切委任之諭公感上知遇前後力陳數千言皆軍國之務其言朝廷大政事闕門一時之議不足以决是非宜如古者公卿大夫各得獻其所議以俟上裁此最近古而格於近制亦不果行丙辰冬夫人陳氏卒時淑人授封者例無葬祭公以為請詔禮部賜祭于家工部為塋兆域蓋特恩也及公卒工部復請如公今官之制遣官為之增修云公生以洪熙乙巳月日享年七十有四配夫人陳氏無子側室李氏生女一曰靜娥適錦衣舍人黃璋蔡氏生子一即紫芝葬以卒之明年月日墓在都城南鳯臺岡之原嗚呼天之賦公質清氣粹平居癯然若不勝衣而強學好問至老不倦蓋公少有竒志讀書為文淵博雄麗詩有唐人體裁足以名家書學之精晚亦遒徑為時所重性篤孝友既入仕二親已沒事嫡母夫人克盡子職分祿以養兄嫂撫其姪霛以及諸孫應禎輩皆有恩故舊貧乏均為資給未嘗有闕然於物一介不茍取至其自奉蔬食飲水泊如也廉勤慎密無愧古人而今不可作矣惜哉所著有清風亭稿枕肱集海嶽涓埃諭蜀稿籌邉録夢徴録各若干卷藏於家銘曰先生之生川嶽鍾秀沒為列宿先生之仕卓乎兩京于蜀再行先生之學盛唐之宗渢乎清風先生之操貞女之潔始終一節猗歟先生屢疏屢留皇眷之優天不憖遺溘焉上征吁嗟先生恤典之頒逾于常制九原之賁焯行著辭以識其藏鳯臺之岡明故鎮守雲南總兵官征南將軍太子太傅黔國公贈特進光祿大夫右柱國太師諡武僖沐公墓志銘𢎞治丙辰九月七日鎮守雲南總兵官征南將軍太子太傅黔國沐公以疾卒于鎮是夜有大星自東北墜于西光芒亘天人皆見之殆非偶然也公無子既卒合鎮文武軍耆之屬相向而哭者皆失聲已乃胥相告曰雲南非沐氏不能守遂合辭請以故右參將錦衣都指揮誠之子崑為公後鎮巡重臣具以公訃及合羣情以聞上震悼輟視朝一日贈特進光祿大夫右柱國太師賜諡武僖命禮部諭祭者十六東宮諸王皆賜以祭給驛歸其喪工部營墳以葬復以雲南重鎮遂從所請命崑就鎮嗣封黔國公爵充總兵官佩征南將軍印繼守其地嗣公既受命始獲遣官奉公之喪歸葬南京江寧之祖塋且具巡撫雲南副都御史張公汝欽所述事狀緘書走幣請豫為銘以志其藏按狀公諱琮字廷芳姓沐氏别號益菴又號東山居士其先鳯陽定逺人曽大父英開國輔運推誠宣力武臣特進榮祿大夫柱國西平侯追封黔寧王諡昭靖大父晟顯忠輔運推誠宣力武臣特進榮祿大夫右柱國太傅追封定逺王諡忠敬父斌總兵官黔國公諡榮康母梅氏贈黔國太夫人公生之日百鳥翔集人以為異未晬失怙從兄璘號繼軒有文武才由都指揮升右都督充總兵官佩征南將軍印繼鎮雲南撫公友愛篤至四五歲時常抱置膝上教以詩書八歲就學不數月即能了涉孝經論語小學諸書大義善屬對應答如響未幾璘卒朝廷以公尚幼復命璘弟瓚嗣兄職為都督同知繼鎮雲南仍授公冠帶食祿之半以俟公日與縉紳士夫逰揖讓進退有老成風嗜學不怠詞翰兼美人咸器之成化乙酉入朝嗣黔國爵憲廟寵眷有加丙戌春奉勑往河南主行鄭靖王喪禮有白金文綺之賜丁亥三月命還鎮雲南如祖宗故事勑㫖諄切錫賚優渥仍俾兄瓉協同贊理公沉毅有為不妄言笑勤於為政公退不入私室冠帶終日寒暑無間精究簿書事無壅滯凡白事者雖僕𨽻走卒亦引見於庭上下之情無復壅遏每遇修貢或拜進表文必焚香遣使不遑寧處聖壽歲節行禮敬肅如在上前朔望謁孔子廟退坐明倫堂使諸生執經進講誘掖奬勸無所不至作興學校完飭禮器給學田展解額設宴禮以興起後進惠養鰥寡驅除貪暴物害既去人隱畢宣嘗奉勑督理軍儲留意屯田修治水利慎簡羣僚分任其事不數年間田無惰農庾有餘積矣或雨暘愆期有禱輒應民謳歌之農暇修邉壘飭驛傳因時訓練振掦威武道路險要之處增建哨堡置兵守之是以盜賊銷弭疆圉晏然每邉夷執贄來見一無所受賞以酒肉幣帛諭以朝廷恩威而遣之威德逺被諸夷敬服甲午安南國王遣陪臣何瑄至邉以假道為名窺覘虛實公逆知其情拒不許詐不得騁則侵老撾以啓釁公具以聞請勑切責復命各夷酋長整搠軍馬慎固封守以防不虞交人知我有備不敢肆侮遣使詣闕謝罪云戊戌尋甸府土官知府安晟卒弟倘謀殺其子瑄欲爭襲兄職公遣官兵擒倘以聞明正典刑廣西府土官知府昻貴殘暴虐民抗拒官司其千百夫長龍判龍闕各逞夷情動輒讐殺委官審勘擒捕及昻貴死遺子不許承襲二府皆奏請革去土官銓流官以治之開設學校教之禮義百姓安焉其馬隆麗江劍川順寧羅雄等處蠻夷弗率皆量遣官軍以次掃定既而臨安府石屏州昌明里強賊畨撒聚衆搶虜附近村寨勢漸猖獗命三司都指揮吳瑢等調漢土官軍及民兵往征之格殺畨撒斬賊級百餘殘孽潰散民免於擾己亥鐵闕箐赤石崖等處羅羅尅習嘯聚山林流劫大理等府公奏調楚雄等府衛漢土馬步官軍民兵命三司都指揮周佐等授以成算督率分守指揮馬鉉等分道進兵攻散其衆斬獲尅習俘男婦百餘賊平復請添設大羅衛兵川州以為保障從之朝廷嘉其功賜勑奬諭尋遣使賜以盔甲壬寅奉勑偕都御史程公琮往撫孟密所過州縣秋毫無擾時有以平孟密方略獻者公斥之曰自征麓川以來軍民凋弊極矣我寧被不善控禦之名不忍復事窮兵黷武之禍聞者韙之癸卯橋甸賊首師五聚衆為亂張旗幟稱總管剽掠鄉村焚毁廨宇支解軍民敵殺官軍安寧鎮南廣通祿豐易門十數州縣咸被其害乃與鎮巡重臣合議命三司都指揮趙晟等調漢土官軍民兵分道進攻斬首千餘級俘男女數百人生擒師伍暨其妻孥境內始安具録將校首功以聞朝廷特賜勑歷叙公在鎮功績加授太子太傅以嘉奬之乙巳南窩蒲賊莽丘負固距險搔擾永昌等處地方行旅不通民多殺傷復命晟等率兵以往且諭之曰山路險阻難於攻圍宜以計取至則果如公命生擒莽丘及同惡渠魁以歸宥其脅從一境悉平𢎞治改元戊申今上即位之初念公久鎮外藩特遣使賜以白金文綺己酉賞平橋甸功將校升秩有差復遣使賜公白金文綺公生長勳貴頴敏過人端勤有守苞苴不敢及門精究武經諸家兵法及陰符竒門諸書知用兵之要每命將出師算無遺䇿所向有功平居孳孳嗜學手不釋卷至於陰陽卜筮星命之術靡不究心善草書自成一家歌詩樂府富麗可觀性孝友自痛早孤事母竭盡子職及卒哀毁喪葬以禮待族黨咸有恩意御下寬而有制不事嚴刻雅量汪洋喜怒不形勢位已極戒滿思危兢兢業業未嘗有過衆方以逺大期之而遽止於斯惜哉其生為景泰庚午閏正月十又三日春秋四十有七而已配王氏成山侯某女繼王氏金吾左衛指揮同知某女皆封黔國夫人葬以己未三月某日銘曰大明天開神聖有作猗歟昭靖從龍奮躍撫馭滇南疆土恢拓勳賢世繼德業並焯爰有武僖蚤嗣穹爵克繩祖武丕闡戎略雄藩載寧亂賊屢縛蟊螣畢驅氛祲以廓隱然長城萬里之託聲望日隆寵賚亦渥胡積之厚而夀之約星芒宵沉遐邇駭愕恤典渙頒永慰冥漠隆隆者封如舟在壑我銘以藏庶亦無怍青溪漫稿卷二十三
