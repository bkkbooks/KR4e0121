body:
  text: 青谿漫稿目録别集類六明巻一賦辭樂府巻二七言古詩巻三五言律詩五言長律六言律詩巻四七言律詩巻五七言律詩巻六七言律詩巻七七言律詩巻八七言律詩七言長律巻九五言絶句七言絶句詩餘致語巻十經筵講章巻十一奏議巻十二奏議巻十三奏議巻十四奏議巻十五頌表贊箴銘巻十六記巻十七序巻十八序巻十九序巻二十書説題跋策問巻二十一碑神道碑巻二十二墓表墓誌銘巻二十三墓誌銘巻二十四傳哀辭誄祭文臣等謹案青谿漫稿二十四巻明倪岳撰岳字舜咨由錢唐徙上元中天順甲申進士歴官吏部尚書贈少保諡文毅事蹟具明史本傳岳父謙官至南京禮部尚書明代父子入翰林俱有文集傳世者自謙岳始岳敏而好學居官不徇名譽銓政平允與王恕彭韶等俱為孝宗時名臣史稱其為禮部長貳時禮文制度率待岳而決論事未嘗茍同前後陳請百餘事軍國弊政剔抉無遺疏出人多傳録之今集中疏議共五十九篇與所謂百餘事者不合疑刋集時已有所刪擇然如正祀典陳災異及論西北用兵諸奏皆建白之最大者已具在其中所言簡切明達得告君之體頗有北宋諸賢奏議遺風他文亦浩瀚流轉而不屑為追章琢句之習蓋當時正人在位為明治極盛之時故岳雖不以文名而乘時發抒類皆經世有本之言如布帛菽粟之能切於日用亦可知文章之闗乎氣運矣乾隆四十三年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:c8e17d51e4867cf83db3cee50094f16cbf27fb91b639d643d2a45425d6117dad
