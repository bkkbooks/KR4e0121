body:
  text: 青溪漫稿卷十五明倪嶽撰頌瑞麥頌有序康年頌瑞麥也古者農事有成必形之歌詠以頌若大田良耜之什皆此類也成化乙未維春之莫天子閔農嵗麥大熟自郊徂畿翕然同豐大有之書于今則宜稱之曰瑞固不然哉敢作頌詞嗣史克焉頌曰康年既同大田既豐我隰我畛迄彼南東其康伊何曰於來牟穫之濟濟積之浮浮比勤于耕嵗或不熟奄觀其成先此百穀豈曰好異異畝同穎眷此大康塍有遺秉億秭其崇室家之充胡往而閟侈今之通舂揄簸蹂載淅載炊以薦以享我祀孔時既速我公亦荒我有猗年之康伊民之阜宵旰其勤上帝昭假我頌康年于天之下豐年頌粵昔有周之制巡野觀稼以年之上下均萬民之食則司稼掌之順祝年祝則大祝掌之皆所以重民食謹嵗事也比者水旱不登民有菜色聖心憂之撫貸再三乃成化甲午之秋則惟有年近而幾甸逺比齊魯豐穰之穫莫或間焉民飽聖德洋洋頌聲臣謹採托其詞百拜以獻惟食惟天惟民之原振古則然赫赫湯湯稼穡之妨施于四方民曰饑阻載罹寒暑惟此遐土遐土既同于帝之聰夙夜于中以振以旬于此下民惟德之仁曰極而通奄觀其豐銍艾蓬蓬我黍我稷惟京其積以萬以億我田既成我室既盈惟民斯寧我輸于公言私其充惟今之逢自郊徂圻民之熙熙祀養以時天眷聖皇迄用降康為休為光休光焞焞其繹以均靡逺弗臻天畀繁祉於萬千祀歸于天子表定西侯蔣驥謝恩表伏以乾元正乎五位時逢聖治之新離照燭於萬方恩錫戎階之舊敢謂建功之有自遂叨傳爵於無窮仰戴寵休俯增戰栗欽惟皇帝陛下聖智日懋睿德天成恭默邁髙宗思道之誠繼述纘武王尊親之孝顧草木庶品方均霑賚豫之施而螻蟻微生亦首荷嗣襲之命蓋惟靖難之日粗效樹勳爰及定西之封始名采邑越祖孫之兩世總師旅於三朝已幸先臣大啓涇國之號豈期後葉載蒙梁國之褒重自揣於庸材乃荐膺乎異數珥貂蟬之貴誓攄葵藿之忠竭犬馬之勞期致涓埃之報伏願乾坤並永九重衍萬壽之洪圖夷夏同歸四海樂重熙之景運臣無任襄城伯李黼襲封謝表伏以聖神御極廣推遍覆之仁天地垂慈首錫繼承之命爵仍同於五等恩實異乎一時瞻丹扆以拜嘉捧瑤函而悚息欽惟皇帝陛下道傳精一學懋緝熙德配祖宗率典章而由舊功光社稷煥政令以維新遂令行陳之臣不墜簮纓之業念自燕山而授秩爰及襄城之肇封職武事于六朝承寵任者三世逮先臣之有幸再成征伐之勳際盛治之無虞屢躋保傅之位乃至草茅之末遽聮奎壁之華仰荷生成敢忘報塞聞詩聞禮將依絃誦之門墻允武允文期習干戈於爼豆少需後效用嗣前休伏願虎拜陳詞祝萬年之永壽龍飛啓運溥四海以咸寧臣無任贊婦翁浙省右參政保竹先生像贊清介之操剛直之氣曰和而莊亦强以毅忠孝之行敏逹之才一志惟堅百試不摧甲第顯躋兵曹荐厯籍然聲聞凜乎氷蘖輦金北犒克慰窮邊提兵西征式副宸淵進秉武銓宿蠧斯擲政譽用張寵命有赫擢佐閩省繼遷浙藩德敷旬宣惠洽黎元兩以家艱施政不久惟民慕懷恆頌于口惟公之忠事上不欺夙夜其勤少壯靡移輯亂于閩捍海于浙公功實崇公力亦竭惟公之孝事親以誠生養其志沒盡其情烏馴芝茁于墓之道恩詔來旌桓桓雙表象服煌煌虬髯蒼蒼豈弟君子壽考無疆惟我先公實公契友公女來歸相我箕帚我承公教知德惟深頌公大者永矢徽音劉司成先生紹和紫塞論兵小像贊道備文武說本仁義先生之學孔孟之懿夷夏內外冠履尊卑先生之識春秋之推王師戒嚴烽烟未戢言言塞墉孰建偉績轅門咨度得此巨儒侃侃髙論顯顯嘉謨以戰以守有竒有正戎辟聿修邊圉底定濟時之略敵愾之心作範千古永矢徽音盛都御史顒朝服像贊峩冠振珮華然在躬垂紳正笏儼乎其恭蚤厯郡邑之勞晚陟臺省之崇出則底撫定之績入則竭獻納之忠式瞻其外允懷厥中豈非所謂遑恤我私夙夜在公者耶太宰耿文恪公像贊修髯廣頤正學雅望隱然清惠之風邈矣巨鹿之望其詘也安於民社之卑其伸也揚於廟堂之上峩冠委佩而夙夜惟公垂紳正笏而寅畏是尚豈非朝著視為表儀君德資其弼亮者歟少司徒劉東山像贊通博端方恬靜簡重志與道合才濟世用贊戎稱乎職方導河遵夫禹貢憲臺登觸邪之豸民曹下瑞時之鳳豫方藉同年畏友之資固當為聖朝賢臣之頌也針銘言針事物之至日變於前應對問辨不能無言言出自心當防玷失白圭可磨駟馬莫及發必以理本必以誠爾或不慎惡乎為人力行惟難宜訒以訥君子監止欽哉毋忒紙銘維紙之作剡溪之藤雪瑩粉膩雲薄砥平創製之初竹簡是代載道垂訓萬世永賴效勞文房厥功懋哉勿妄夭閼用枉其才櫛銘繄爾之德曰疏而通肅容于外擲垢于中毋棼毋汚毋忒我儀以慎爾終世慶堂銘有序熊氏之先本南昌寧邑之望厯宋元來世有顯者元季兵擾攜家纍北徙樂徐風土因留居之有諱繼安者永樂初從征安南纍樹竒功有司將奏授以官辭不受曰我固儒家也卒以隱終子有常克承先志處鄉黨剛毅不阿人敬憚之性樂施豫有婚葬不能舉者周給惟恐後景泰壬申嵗饑民缺食首率父老白諸當道請發廪以賑賴以全活者衆由是鄉人稱其長者生子四練經緯純咸克樹立讀書好禮弗忝其先純復以尚義輸粟膺章服之榮孫遊學郡庠將奮于時衆因嘉其世澤之所鍾愈逺而愈盛如此乃即其所居顔之曰世慶之堂夫祖孫相承之謂世福善所積之謂慶惟其善之所承者非一人故夫慶之所積者非一日若熊氏者豈一朝一夕之故哉繼自今如水之流日濬日深如木之生日培日茂慶之所鍾其可世計也邪從弟宗岱自徐來請示一言以為兹堂之華既為敘次其堂之所以名乃復系之銘俾識不忘云惟家之興善述善繼父子相承用延于世其承如何惟善是從為善不匱百慶所鍾猗惟熊氏在江之右其世既逺厥積亦厚勝國之季來居于徐樂其風土敦我詩書粵纘武功髙爵可待拒而不受為善靡解一德是承于兹三傳天鑒孔昭慶斯篤焉惟慶之遺自我戩穀捐資貸荒有華章服諸子森森如芝如蘭以及孫曽瓊玉琅玕慶源深長如水之濬膏腴所溉逺邇交潤我則銘之世慶之堂尚䔍其守百世弗忘青溪漫稿卷十五
