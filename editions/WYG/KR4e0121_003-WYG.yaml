body:
  text: 青谿漫稿巻三明倪岳撰五言律詩贈李都閫士章玊帳坐生風將軍冠世雄雕弓控明月寶劍撫晴空笳鼓軍容肅旌旗敵陣空清朝有麟閣行見紀元功中秋明日重會呉鼎儀宅分得光字昨已中秋過如何更舉觴謾勞頻會合未許太踈狂宦路憐同宦鄉心感異鄉明年今夜月誰復共清光曉發女兒寺帆開天欲曙星斗尚招揺漸覺村居遠方驚客路遥不禁風獵獵相送水迢迢夜泊知何䖏晴雲隔暮潮晩泊新口飲章太僕舟中落日下新口遠帆時見收應判同秉燭相與更移舟海内經時别天涯一醉留遲明各分袂去住兩悠悠過奉新復與章太僕會遂邀飲驛中觀壁間日本碧照野釋所題有作驛舍在河滸拂衣聊與登獨憐身似燕共醉酒如澠好客金閨彦能詩碧海僧相看成一笑聚散亦難憑過髙郵湖晴湖三十里杳渺絶雲天漁艇浪中出客帆風外懸經逰非偶爾飄泊正依然極目東南道孤村起暮烟沙河遇便風遂至龍江關已擬沙渚泊忽來風雨聲人皆催早發我亦厭孤征浪駭千峯出舟憐一葉輕此時雖甚㨗猶是險中行挽太僕沈少卿珤宦路憐騰踏都來十四年有親驚白髪無子負青氊客夣成蕉鹿鄉心逐紙鳶淮隂舊遊處門巷總依然三月晩泊和合驛戊戌二月晩投和合驛地近久知名茅屋孤村斷烟波一棹輕氷痕沙半折春色栁初榮自信儒官冷無勞候吏迎送陳師召侍講陞南京太常少卿載酒都門道春風花滿園永懐别後事須憶醉中言求友長憐子居官屢得孫何時尋舊約聨佩掖西垣九關辭曉仗匹馬逐春帆暫解詞垣直榮題禮寺衘龍江天縹緲鳳嶺雨巉巖到處供吟眺何時寄一緘詞垣二十載友道託深知閩海來䨇鳳秦淮見一夔聖皇元重禮士子待談詩明日河橋别停雲有所思行歌動驪駒畨直别金馬啣杯復踟蹰把袂此傾瀉交情固同陳文采豈殊賈容臺藉增重江南慕風雅九日遊陳氏西園即席次鏡川楊學士韻左掖候朝囘西谿共客來陶翁思對菊杜老慰登臺山近秋屏列池清晩鏡開似忘紅日墮猶欲盡餘杯紅葉明孤嶼黄金媚一川山童供午餉野老刈秋田歸鳥髙還下閒雲往復旋試看村社日扶醉説豐年穿巖結疏屋接隴布秋菑出郭路非遠還家心自遲最宜春雨後又近夕陽時彷彿青谿曲悠然千里思酣餘步遠塍暮景自清澄籬菊未堪摘谿魚猶可罾竹間挑晚稻荷底拾秋菱欲盡登髙興攀崖更一層草庭都尉西涯學士兩以正月四日同復命奉天殿有詩紀之輒賦一首南北馳驅異東西奏對同翻思三載上又是五更中好事傳青瑣新編出綵筒如聞䨇鳳語翽翽在梧桐寄和屠元勲都憲廵邊再用韻之作建節風霜地驚心塞草秋弓刀深警戍鼓角遠鳴樓詩為籌邊得名因制敵留長城今有託髙爵會須酬荒凉臨絶塞揺落値髙秋古鎮山當壘孤城樹映樓戍兵深可念驛騎暫須留却憶勞行役清吟誰與酬五言長律送陳直夫赴南臺理刑玊署初開講青衿舊執經深林嗟豹隱空谷見蘭馨詞俊驚翻峡名成訝震霆聲華金貴重丰采玊晶瑩戎幕分繁政親闈慰晚齡天曹俄捧檄秋水遽揚舲柱下榮周史臺端典漢刑東山沾惠雨南斗煥文星遥望天邊鵠相看水上萍分携猶繾綣惜别重丁寧椿府移歸棹霜堦盡落蓂乆違憐寂寞獨立歎伶俜目斷遠山隔淚俱清露零平安煩兎穎椷識託鴻㝠落日沙頭酒西風驛外亭有懐渾不盡翹首暮雲停謁孝陵有作用子美昭陵韻烽烟從盪滌華夏愜依歸海岳趨戎馬星辰上袞衣舜文千載治湯武一時威運撫乾坤永明揚日月輝山陵今窅漠寢殿故霏微螻蟻空瞻拜神龍仰奮飛臘月二日諸同年會飲予家因作圖以紀終會云憶歸鰲禁直愛説杏園圖時因舉三楊諸先生杏園雅集圖以為之倡諸老留遺事中朝仰盛謨文章臻道妙勲烈應時須允矣推先達因之啓後塗傾心瞻斗嶽拭目見眉鬚曠邈宜重續招邀不再呼會當清燕合身及太平娯髙節偏怡晩深期直過晡香山藉居易洛社重寛夫江右來三俊明仲曰川敷五皆江右人呉中得二儒亨父鼎儀皆呉人𤣥暉才更逸鳴治原甫志非迂尚質獨貢荆山璞賔之連收閩海珠師召汝賢皆閩人洋洋懐泌水孟陽落落恥齊竽調律䕫音協封山舜業符是會凡十二人竒逢如有待雅集幸無渝詩話呈新草歌詞據槁梧永懐蘭在室盡醉酒盈壺㸃染爭毫末觀瞻動座隅丹青差可託巻帙自應俱翠竹鸞儀整蒼松鶴骨癯何勞問工拙聊足記形模異産關河隔同升雨露濡論交千古尚投分寸誠孚藝苑聨珂入經帷接佩趨冰銜今豈遠天路昔非殊禮法從容地才猷次第攄正縁師孔孟端合謝軒虞張弛遵前軌荒凉愧此區流傳從竹帛想念在桑榆厚意知堪信蕪言恐未愚南京大司冦周荘懿公挽詩蒼姬初肇姓陽曲始分支簪紱家聲遠松筠骨相竒泮宫虬在蟄鄉榜鳳來儀宦跡驚鵬徙文名憶駿馳遂聨青瑣籍眞授白雲司被賜逢康伯無寃付釋之平反用輕典推鞫盡單詞執法何曾刻存仁豈但慈聖皇更化日司冦拜官時殊擢由公論孤忠結主知老成符大用謹厚見優為懇款惟謀國辛勤復賑饑栢臺厪簡命斧扆慰疇咨公庾豐新積留都肅舊規三遷權益重八座位偏宜總憲平如水持衡信若蓍貫城星采淡嘉石露華滋惠澤人皆洽雄才世共推勲庸端可紀度量詎能窺縱獄追唐史封山陋漢祠乞休雖屢屢倚注正孜孜裕後非他術承休並美姿庭堦茁蘭桂伯仲協塤箎身向清朝健心於暮景怡抗章還自切解組未為遲北覲終吾事南歸遂所期潁中歐相逸洛下潞公嬉大嚼仍加飯微疴忽問醫謝安纔夣酉傅説竟騎箕未滿羣生望徒傷一老遺䘏隆天府詔訃動士林悲白壁終成瘞青山不費貲孤卿傳顯諡太史樹穹碑夙荷通家愛長懐共里私賔筵三爵又客路片帆隨後進深䝉誨前修素願師幾年嗟遠别終夕繫遐思太息音容隔無從涕泗垂不堪千古恨聊託五言詩何日經佳兆臨風酹一巵六言律詩題江景便靣客舟欲渡未渡僧鐘似聞不聞北固羣山遠隔南零一水中分和鏡川楊先生齋居之作十里春流繞户半輪晴月當簷齋閣獨眠小榻書忩髙捲踈簾自笑宦情淡泊還驚詩律清嚴試問謝家草色東風已動柔尖瀛洲舊會承鄭東園邀飲神樂道觀即席次韻二首瀛洲舊約始會神樂福地重來最愛乘風琳館何妨步月瑶臺杏園芳躅可繼鳳城雅倡宜裁却羡斯文風味不負翰苑情懐南國新看合袂北門舊憶垂紳自是交遊誼重更看傾倒情真便判詩酒娯我莫遣風花笑人囘首玊堂天上江湖未遠嚴宸青谿漫稿巻三
