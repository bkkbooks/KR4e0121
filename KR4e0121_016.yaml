body:
  text: 青谿漫稿巻十六明倪岳撰記文丞相祠重脩記人得天地之正氣以生本自浩然失養故餒故必帥之以志養之以直則至大至剛富貴不能淫貧賤不能移威武不能屈充塞乎天地而無間矣觀故宋信國文丞相之見危致命大義昭㫼非其志之正氣之直能然乎公以妙年對策剴切時務理宗擢寘第一遂至為相其在官之日正國勢陵夷之時慨然自任以興復之事竭力殫心扶顛持危雖有京口真楊燕獄之困而氣不挫被似道夢炎庭芝輩之嫉之疑而氣不屈間關海島間出萬死得一生而氣愈厲惜乎天不祚宋興復之志不遂而身已被害矣夫國存而存國亡而亡存亡之大節屹然河嶽之髙大炳然日星之昭明軒掲宇宙而不可磨也故公獄中作正氣之歌有是氣所旁薄凜冽萬古存當其貫日月生死安足論之句觀公之言迹公之行何莫而非正氣之所發哉三百年之宋忠義之士固不為少然處於人所難處之時而能行人所難行之事者惟公一人而已於戯盛哉公卒於燕市乃今順天府教忠坊之里國朝洪武九年北平按察副使劉崧即其地建公祠至永樂六年詔定祀典始有春秋之祭以府尹主其事今之尹某侯以其久而敝也命工新之徵予言以紀其嵗月侯亦仰公之烈而興起焉者是祠之脩豈惟足以妥公之靈寔足以為天下後世忠義之勸也夫豈小補云哉侯之用心亦勤矣祠為堂凡若干楹地之廣袤仍其舊云翠玉樓記昔蘇子瞻在宋才髙一世片言隻字流落人間咸知寳之三四百年來泰和隱君子尹公勲重者復愛其詩所謂山為翠浪湧水作玉虹流之句以名其樓古之人有神交者使子瞻地下聞之寧不以為知已耶且古之為詩者徃徃苦心以求工他人讀之未必知也惟夫境與心悟而後有以見其工乃知古人之詩非茍作者尹氏之樓所以獨有取於翠玉者殆以此歟尹氏世居泰和雲亭鄉之逢原自宋進士天長主簿絳以來世以詩書禮義為邑之望勳重之曽大父存信仕元閩縣主簿先君子濂溪處士豪邁豁達為鄉耆俊生勳重兄弟七人咸能紹纉先業讀書尚義時人稱之嘗構樓數十楹一夕燬于火成化壬辰嵗復與諸弟謀鼎新其居為㕔為堂為正寢炳焉煥焉𢎞于舊規中為樓餘二十楹髙明爽塏誠一偉觀也樓之東則為匡峰鳳嶺龍岩之山南則為三顧西平鵝鼻之山西北則為城頭砦應三嶺之山浮嵐擁黛環列軒楹之外樓之前則為洪溪之水縈帶如練浮映几席之間或捲簾而拄笏或憑闌而眺逺則見夫起伏奔駛圍斯樓而湧翠者匪江湖而浪也蜿蜒委蛇沿斯樓而流玉者非雲霓而虹也而樓之有取於翠玉者盖盡得之山水之間者矣子瞻殆若先我而登覽於斯樓者故其形容之玅發於嬉笑怒罵之餘者至於如此而又獨於勳重之心有夙契焉宜斯樓之名所以為稱情也夫以地而觀則斯境為勝矣以境而觀則斯樓為勝矣然而當夫兄弟具在少長咸集壺觴旅陳塤篪迭和歌斯干之首章賡之以常棣之遺音藹然手足之情天倫之樂也則斯樓又惟斯人之為勝矣此則子瞻之所未道者而翠玉亦果足以盡之哉勳重嘗寓書於其族姪學士正言先生㑭需言以誌嵗月猥以見属遂為記之擬重脩太學記昔我太祖髙皇帝肇造區夏定鼎金陵首建太學鷄鳴山陽偃武功振文德以為天下先迨太宗文皇帝遷鼎于茲即北平府學為北京國子監以居天下之士作興既久未稱上旨英宗睿皇帝臨御以來既罷北京之號大撤而新之左廟右學規制以備皇上嗣大厯服之元年將議視學之典謂兹太學嵗久弗葺恐滋敝撓無以妥明靈之居掲誠敬之實而作新天下之士况陟降在庭講肄在堂有一弗治瞻視曷賴乃詔有司率属從事於是冬官胥勤工師駿奔相度既同脩治靡間抉泐剔腐剜刓鏺穢欹者以安黯者以明悉置於新弗加其舊舊廟之中為大成之殿其前為大成靈星之門東廡西廡東序西序神厨神庫井亭牲亭為樂器祭器之庫持敬之門致齋之所皆麗於廟者也學之中為彛倫堂其左右為六堂䋲愆博士二㕔為㑹饌之堂退省之房髙明載道藏用之所廣儲廣居集賢之門號庾湢厠之室皆麗於學者也凡作若干日工以完告不亟不遺百用具興髙廣靚深炳煒崇嚴而廟學之制益大以成矣乃以春三月丁巳皇上躬釋奠于先師退御正堂命祭酒臣恂司業臣業進講如儀於是卿相大夫與百執事以至㳺學之彦侍衛之良四夷朝貢之使環拱觀聴者動以萬計既而有司請紀其成以示後世詔如故事惟昔堯舜禹湯文武皆以聖神之資任君師之責至于孔子其道大成故雖不得其位以君天下而其師表萬世者莫之有加焉我朝聖聖相承尊崇表章益久益盛建學立師範圍大儀皆所以敦治教之本隆君師之道以丕紹烈聖之統者也夫士之沐浴治教之休涵育文明之化者為日久矣豈必專於廟學之飾儀文之備而後為至哉然而所以舉尊崇之曠典正以運感化之微機而繼徃開來之功亦於是乎為大也今之有嚴有翼既完既美聖天子又躬行於上以相之矣則士之㳺於斯者覩締構之精而謹夫植立之行仰繕葺之費而勉於克治之功使之德日益以新道日益以修洋洋在上可以質之籩豆對越之時濟濟在列無所愧乎冠冕周旋之際于以痛革其隘陋頺靡之風而亟趣乎廣大髙明之域則夫因觀物之學而致其反身之誠者何如哉他日弼成我國家億萬年治教之功者盖亦有賴焉否或昧於振厲造就之指而規規乎進取淹速之計則非所以望於為士者敢以此與多士共勉焉瑞梓記梓以瑞名志孝也夫孝大足以動天地感鬼神小之格鳥獸孚草木古則然矣然究之天地鬼神以其誠鳥獸以其情或可以一致至於草木無知之物於是乎有難言者矣然筍可萌栢可以枯則根著於土生生之理固在也若夫不根之物斧斤斬伐之餘其不至於朽腐擯弃者鮮矣而或者發生意於既死續華滋於已絶則古所未有而今僅見之其人之孝之所感何如哉宜興之荆溪有著姓曰蹇氏其子律以景泰甲戌喪厥妣塟祭一秉用家禮斤斤然稱孝於其鄉之賢者嘗因塟師言削梓木為簡㭬之墓兆之隙盖習於鎮安八風以妥其神之說雖不經見而孝子之不忍其親者恒勉强行之既塟嵗且旱他草木多槁死獨二梓者忽焉復生鬱然競榮以交䕃乎新塋觀者駭於聲聞者動於情律之孝亦誠矣哉鄉之人異之目之為瑞而請記於余因詢之其友戸部主事邵文敬者益信不誣遂為之書嗚呼無知者可感也况有知者哉已絶者可續也况蕃者哉由是而知蹇氏之世著孝義於一鄉延門祚於弗替皆於是梓乎占矣文敬以為如何重脩鄭州儒學厯年貢士題名記國朝紀元成化之八年嵗在壬辰新安洪君寛改知河南之鄭州厲已以脩職懋志以興事悉取州廢墜之典而舉之顧學宫傾圯施教弗稱遂以為首務思一新之於是鳩工度材謹飭百費規制煥然役弗及民而明倫有堂肄業有齋門墻􅑖嶪足以聳㳺觀館舍邃嚴足以樂藏息小大咸稱無所茍焉且以學校養士之地嵗嘗舉其賢能貢于王朝者衆矣是不可以無紀爰伐巨石題其氏名以示後之人将使州人士有所勸焉夫興學造士賢守令之所為重者君克舉之亦賢矣哉間走書幣京師干予記其上因告之曰人材之成由乎教道明教道之明由乎學校脩故學校不脩則無以為成材之地以教之無從而施也昔周之盛時學校之政徧天下然其所以為教初非寄之言語文字間者故以鄉三物教萬民惟曰德行道藝而已及興其賢能亦惟曰攷其德行察其道藝何如耳今之有司以嵗貢其學校成材之士於朝即所謂鄉大夫羣吏致賢能於王之意也今之試之而使之卒業太學布列庶位即所謂論定而官之意也盖可以想見古昔養士之制者惟於是乎存焉豈直以進士科為重如後世之所云者乎矧鄭為河南名郡汴宋文物之故區而漸被國家文明之化益久以深故士之膺其鄉大夫之貢而出者内焉百執事外焉羣有司徃徃以賢能名初不在諸進士之下亦可謂得其人矣然賴以考見其所本者寔繫斯石焉繼自今為師為弟子者樂有賢太守聿新兹學雍雍渠渠日聚處於斯考德飭行誦詩讀書以講求夫得於心而為德則天理民彛之則在焉體於身而為行則孝友忠信之道存焉見於事而為藝則詩書禮樂之懿具焉於是悉心盡瘁以修以習以求至乎其極以務成乎賢能之材至於其暇又因其所題諸士之名耿耿不可泯如此将舉其賢否之實而申其議擬之公盖後先相視同軌一轍耳顧其心有不惕然以動者乎其志有不奮然以勉者乎夫然故他日繼是以出者推其所得於學校之教而見之為政其名有不燁然以傳者乎奚翅増重斯石已也則賢太守作興之素心示勸之盛典盖兩得之而兹學得人之盛當不一再書而止也越六年丁酉月日記巻菴記京口有世醫曰錢宗甫氏以巻名菴而請記于予予告之曰道無小而不入故巻之方寸而不足然亦無大而不包故舒之六合而有餘盖小大之體存乎道而巻舒之用因乎時也故易之進無咎與括囊無咎者猶吾夫子之微服于宋而攝相于魯之意也是皆因時而處之而巻之義斯得矣夫鼓之以雷霆潤之以風雨日月運行一寒一暑天之道舒矣然歛其神功於無聲無臭之表者其巻乎經綸天下之大經立天下之大本參天地之化育聖人之道舒矣然歛其妙用於不識不知之地其巻乎中天下而立定四海之民賢者之道亦舒矣然其藏若虛其貌若愚又其巻者乎故知進而不知退知存而不知亡知得而不知喪者舒而不能巻者也沮溺之耕楚狂之歌巻而不能舒者也其於道槩乎未之有得也而况於時乎矧夫退之無可巻則進之亦無可舒者矣故曰用之則行舍之則藏聖賢之學固然也又曰聖希天賢希聖士希賢宗甫亦果有意於斯乎雖然余竊有疑之醫之為道起瘡痍於藥石回夭閼於生全之域天下之人司命於醫久矣茍巻其道而不舒則生人之望絶矣其可乎是則宗甫之所以自名者亦左矣嗚呼予既已知之矣宗甫承累世之學有聲於時而其心盖歉然未敢以為足也故将退而處於金山銕甕之墟取其所傳之書若神農岐伯伊尹及秦越人張仲景之所授受以至近代張元素李明之王好古朱彦修輩之所紹述者探賾索隱旁狩逺獵巻而藏之方寸之間由是因時而施隨其所遇以行其道然後累世之業可以大成而非其可巻而不可舒之謂也然則宗甫其亦善於巻者乎宗甫起謝曰是誠有志焉請遂書以為之記松石軒記錦衣主人居青溪之濱鳳泉之南有年矣讀書好禮樂交接賢士夫嘗搆一軒於居之隙疊石種松以擬山林之勝毎自公而退恒處其中左圖右史手不釋巻客至則一觴一詠暢敘幽情盖自以為真得所樂者回視一時際遇之光榮功名之烜赫泊如也間者瀛洲仙客訪主人於松石軒中顧而疑焉乃諗之曰君以武胄之賢承世勳之業厲剛特之操而聳挺拔之標負磊落之資而抱堅確之德以此馳聲於時久矣孰不謂其将以培養徂徠之材儲為明堂清廟之用者乎又孰不謂其将以磨礲燕然之刻建為驃姚貳師之勳者乎胡為退處兹軒友山中之松石逺世外之紛葩於君之計固得矣寧不孤其平日之所養者乎主人起謝曰誠如子言是亦盖嘗有志焉而力莫能與也矧夫時齟齬于遐鶩嵗荏冉以衰颯盖亦自知夫蒲栁之弱不可以語良材碔砆之頑不可以語美璞於是乎以恬淡為髙以幽隱為賢即吾方寸有餘之地竭吾尋常未盡之力種松於斯始於拱把而日至於條達枝葉之蕃碩者庶㡬焉疊石於斯始於一拳而日積於髙大宗家之鞏固者庶㡬焉此予之所以甘於近而不敢有他慕者也若夫素志之不可以直遂古道之不可以茍容則吾之超然此軒之中其亦自足矣夫若是何如客聞之喜其有不屈之節有固守之志誠無忝於松石者也乃擊節而為之謌曰種青松兮軒之前本之既良兮護視專嵗月㡬何兮鬱而參天傲氷霜兮節操堅本枝茂兮蔓亦延睠奕葉兮清風灑然疊白石兮軒之隂致之孔艱兮植立深嵗月㡬何兮積而為岑望之巖巖兮即之嶔嶔風雨不動兮斧斤不侵嗟磐石兮惟後之欽樂松石兮嵗月優㳺澹無營兮軒冕林丘嗟榮名兮雲之浮松之清兮石之幽可逸吾老兮慰吾憂伊美人兮孰與儔功成身退兮遺安是謀歌已呼酒三酌遂次第其語於軒之壁主人謂誰錦衣戸侯秦廷輝瑛客則翰林侍讀倪舜咨岳也山東東昌府重修廟學記禮凡始立學必釋奠于先聖先師及行事必以幣故今郡縣學皆得祀孔子而廟學之制遂通乎天下譬諸天地之大無所不覆幬日月之明無所不照臨而四海六合之内固未有能外孔子之道以為家國天下者也夫然故則比乎京畿之巨藩交乎齊魯之名郡於此又可後乎山東東昌府學在郡治之東盖洪武初自都監故治徙建於此不啻百有餘年久且傾圮廢缺特甚前太守沈君譓来蒞郡事祗謁廟下顧瞻興嘆思圖修復乃相基度地審役擬費輦材于林伐石于山陶甓于冶咸適其用諏日而作不亟不徐百姓樂趍羣工効藝於是庳者崇之隘者拓之危昃者正之晦􅀈者飭之剔舊置新規畫惟素後太守吉君慶繼焉益勤勸相務底完美及今太守楊君倫始上督厲益切乃獲卒工盖經始於成化甲午紀成於甲辰凡厯三政閱十寒暑而畢宜其周慎堅緻足垂永久者也廟為大成殿七楹承以崇臺翼以危檻圭衮邃嚴金碧輝煥左右為兩廡前為㦸門為靈星門其西為宰牲亭學則為明倫堂左右為四齋為學舍五十楹為饌堂堂之後有隙地廣袤十丈許築土為臺建尊經閣於上聚書其中以便講習其他廨宇倉庾庖庫之屬靡一弗備至於垣墉繚護松栢環列巍然宫墻數仭之盛聳易觀視多矣是舉也費雖穰而不匱於公役雖久而弗困於民而釋奠之宫足以掲䖍而妥靈講學之堂足以儲材而養德諸君其亦知所先務者哉職教是學者教授戴昂訓導某咸謂礲石琢辭以紀嵗月兹不可緩請之楊君具事本末走書幣介敖太史山來請予言於戯我國家尊崇孔子之道以化成天下故學校養士一惟導之以是其所以厚之以廪餼董之以憲臣作興誘掖之至者固冀其出而佐理丕熙庶績以成天下之治而已其所以望於天下之士如此其重矣乎然學校之廢興由守令之賢否而賢才之盛衰繫焉非偶然也諸君之繼守兹郡者皆能體國家之意以興學為先可謂賢矣繼自今士之㳺歌兹學者可不體諸君之意夙夜孳孳服膺孔子之道以淑其身以成其德他日効用於時推其所學輔成一代文明之化足以表見斯學養士得人之盛不亦韙歟斯固國家建學與諸君興學之心也故因記其成併書以為諸士勵焉廣平府同知王君治水記廣平為畿内名郡肘翼太行以建治所其西南成安廣平肥鄉邯鄲之地則漳滏二水所經其西北永年雞澤之地則洺沙二水所經下流皆與洺合勢浸以大迺成化壬寅六月二十又二日天大雷雨窮日夕弗止明日益甚四水暴漲漫漶以流而滏水素受漳流性尤駛去郡城一舍而近遂入護城隄衝决賈葛潭横潰莫制環城百二十里匯為巨浸城将敗居人争出避水事殆不測時同知府事陜右王君原常下車之初署郡章甫三日奮然起曰事急矣不可以不力即冐雨至北門遍諭居人曰吾在此以身任一郡生靈之命水必不能為害毋驚擾徒取胥溺之患無益也乃擇官屬分堵以守且捍且築惟東門卑下患尤劇遂自當之迨夜水入城者四尺人大恐君躬操畚鍤督里甲兼拘僧徒之强有力者以事築塞天未曙卒障水以出君復以其餘力按視他所撫論而安輯之過家不入凡三晝夜不休水稍定乃増築西隄水屯二岸遏水北流民獲安堵是役也所全廨宇廟學民居萬有竒倉糧萬七千有竒民免墊没者萬二千有竒出民之阻於水者百五十有竒瘞民之溺於水者五十有竒復禁民乘時剽畧悉加賑貸焉既而郡以地勢本下而賈葛之潭延袤八里相傳有神龍居之滏水既决則衆流奔注渟窪弗洩日益為患淪敗民田害及郡城不可以不治乃檄邯鄲永年二縣令若丞鄭維新者四人分率夫役八百餘以塞决口導河流厥既踰嵗工弗克就民乃相率赴愬於部使者乞君治之君遂不避塗潦相度形勢尋究源流督屬飭工諏日事事且謂水勢不可以不殺於是旁開退水河於决口之下長八百六十步深三尺闊倍之其流既分其勢自緩可排而出者則導之退水河可引而入者則歸之滏陽河滏河之道既從退水之口隨塞舟楫無阻行者便焉復謂水患不可以不防於是建為經久之圖以虞决溢之至増築舊决潭口髙深三十丈廣袤二百一十步新築障水隄二一長七百八十步一長千二百六步而故道之以淤而壅者起賈葛口至大寺橋凡一十里有竒咸濬其淤而深之俾無留患焉是役也所費為椿者大小之木若干為梱者荆藁秸若干為絙者麻若干土若石不計其筭就役者凡若干人相勸以趍如忘其勞經始于癸卯三月六日畢工於三月二十有六日君乃散役告成乘舟以歸老稚遮道驩迎者以萬計始焉潭口塞而水勢殺民之鮮食者資焉日操網罟以漁者有所濟終焉河流平而水患除民之粒食者亦資焉日操耒耜以耕者有所成於是永年雞澤之民瀋陽之兵凡為戸千六百有竒其田五千九百七十頃有竒皆出沮洳而事作乂是秋之穫豆稌雜粟餘百萬石焉復以餘材搆龍王祠三楹於潭上以便祝嘏作輿梁二以利徒涉建集場於大隄之上分畫布井招來居民三百餘家以事懋遷興利袪患之政細大畢舉君亦可謂善於其職者矣維時郡之人以夙罹昏墊之害而今底平康之樂者皆君之功也不可不託文字以示永久適威邑令王君政奏績來京乃介光祿張君積之請言于予予聞古之善治水者以為治水一也有疏有濬有塞必如是而後可以無患築堤一也有剏有修有補必如是而後可以有防也迹君之所行亦畧備矣非其學明體用才勝劇要曷克臻兹哉雖然君之尊翁大司馬休菴先生在景泰間以雄才直節為都御史總漕淮南建塞沙灣之策則君之宦學相承固有所本歟先生於先公文僖府君為同年友故余知之為詳聞君之政有成績喜為執筆以書君名經原常其字領景泰丙子鄉薦居今官廉公有為所踐厯盖未艾云緦山三亭記翰林侍講黄巖謝先生鳴治既拜大司成之命将赴南雍手一巻抵予俾記其所謂三亭者且告之曰僕故居桃谿之上有緦山山之中有㑹緦菴曽祖孝子府君墓在焉菴之外有方巖書院書院之南百步許為亭曰望海亭其西面方巖者為仰髙亭菴之北則為采藻亭亭下有池池外環以竹寔太守叔父之所作西涯學士既與諸公賦詩以記其勝積而成巻復為題之曰三亭雜詠子其為我記之考之圖志緦山方巖皆不經見觀諸君之所為詠歌之者盖天台雁蕩間最勝處使非因先生以發則與榛莽同閟奚以名于時天下佳山水以不遇其人而湮泯無聞者何限竊以嘆夫賢才之生一則軒豁天地一則擯棄丘壑亦所遭之幸不幸耳緦山方巖繼是其有聞矣乎惟昔先生自成化庚子居憂于家即與其叔寳慶太守公㳺讀書講學無日不在緦山方巖之間三亭豈皆是時所作者歟黄巖地瀕海風濤雪浪日在眉睫而亭以望名何居豈亦見道逺大惟日不足悠然而興望洋之嘆者歟詩復有之髙山仰止景行行止其意亦猶是歟至於藻取其潔故古人以之供祭祀詩詠采蘋是已亭亦因㑹緦而名歟然非忠信誠篤則東隣殺牛猶無取焉爾而况澗溪沼沚之㣲者歟於是而知三亭之所以名皆非偶然而已也嗟夫君子之學有本有文孝弟忠信其本也詩書禮樂其文也茍本之不足其如文何哉夫五服之制極於緦九族之親盡於緦緦山所㑹無不在焉尊祖合族於是乎有之而又先之以誠信守之以嚴敬油然興其孝弟之心者何如耶則夫三亭之作必於緦山者固先生之心惓惓於㑹緦也惇本之意至矣於乎此先生之所學者歟茍曰亭榭之侈登望游歌之樂則巻中之文富矣以是而語先生亦末已乎請記斯言于壁使後之人知三亭之所以作翰林同年㑹圖記昔在成化丁酉之嵗傅君曰川肇為續㑹以敘同年之好客有出杏園雅集圖于座以觀者衆因嘆仰三楊二王諸先逹之髙致邈不可及而今猶可想見其彷彿或者以有兹圖在也時予輩同年之士之在翰林者離合之餘始獲萃處京師而予復将有歸省之舉聞滇南髙司訓雅善繪事乃於是嵗十二月二日謹治具予家折柬以速諸君次第畢至即席請如故事命髙為諸君寫小像為圖各賦詩于其後巻成而予歸歸未㡬時而存亡去住之感交錯于前者多矣原稿今為曰川藏去予在南都時嘗命工以東絹臨摹一本裝潢為巻置之巾笥以自隨時一展觀恍然如與諸君笑談一堂之上於乎豈可復得也哉圖紀在㑹者十有二人其中據案執筆而書者羅璟明仲坐而觀者二人左則謝鐸鳴治右則陳音師召也其左坐而鼓琴者李東陽賓之坐而聴者三人右則傅瀚曰川次右則呉希賢汝賢左則為予也步而前來者三人其一為張泰亨父次則焦芳孟昜又次則劉淳尚質也其後聨坐展巻以觀者二人左則彭教敷五右則陸釴鼎儀也童子侍側者十人亦當時所嘗執事者所謂得其彷彿而已者耳工拙固不暇計也予惟十二人者自甲申登第入翰林明年始為㑹㑹凡十人厯三年為十㑹於是以展省去以憂去者相尋也越十年而曰川亨父復為㑹以續盖周十二年為十二㑹而予以兹㑹終焉如嵗有閏而嵗成㑹有圖而㑹止自是而㑹不可復續矣今鳴治以南京祭酒休致而歸而敷五終于侍講亨父終于脩撰鼎儀終于太常少卿兼侍讀汝賢終于南京侍讀學士尚質終于漢中知府又皆為古人不可作矣惟明仲由福建副憲進南京國子祭酒師召為南京太常卿孟昜亦由湖廣副憲改南京通政賓之太常少卿兼侍講學士曰川自太常卿兼侍讀學士遷禮部侍郎然或南北之懸隔或公私之倥偬求如昔日之笑歌為樂又豈可得哉齋居之隙偶取巻閱之不覺為之永嘆因追録十二人者之出處敬識于巻之首俾後有考云若夫交㳺之情規正之誼諸作備矣兹得而畧焉汀洲府儒學重修記𢎞治丁巳夏四月之吉福建汀洲府重修儒學成知府金陵呉君文度率僚屬師生落之於是教授陳鵬作而言曰惟兹汀之郡黌廟自大成殿而下皆吾呉守數年之所脩葺美輪美奐莫之與京而學自明倫堂而下又吾呉守今日之所作新工鉅費穰不可殫述匪託之金石何以傳逺示後乎謂予嘗職太史得執筆紀載其事乃專使介具書幣述顛末來請一言以記按學在郡治之東拜相山峙于前卧龍山拱其後鄞江之水環繞於其間誠山川竒秀之地宋紹興中郡守鄭强始創于兹國朝洪武初重為營建越嵗滋久日就傾圮成化初前郡守李桓嘗事脩飭材惡工濫旋至頽壞呉君自南臺御史簡任而來下車之初祗謁學宫首以興復為己任且曰政必久而後成吾其審圖之是以不亟不徐以計以度若大成殿若東西廡若靈星之門省牲之所咸正欹剔朽完漏補敝塗甃堅好繪飭精潔復作儀門建書舍廣庖廪締構之盛悉増舊規惟是明倫之堂講學之齋猶未即工乃𢎞治丙辰冬十月方農隙之時治理亦暇復檄長汀簿呉俊伐材于林陶甓于冶礲石于山裒工之良諏日之吉以從事焉因其舊基廣以新制建重樓于齋之端以便肄習植石檻于門之外以限徃來益庳為崇拓隘為𢎞髙亢有容多士來宗而汀之學宫至是而大成矣予惟汀之為郡在甌閩山谷斗絶之地其民氣習剛愎而好鬬故為之長者恒思䋲之以法用圖綏靖呉君之蒞于汀迹其所以為政則不然盖謂夫君子學道則愛人小人學道則易使也故學校之設教化之所自出不獨成德逹材足以養君子亦且移風善俗可以化小人是以廟學聿新雖未嘗役民之力而耳目所及自有以感民之心故呉君治汀且将九載政績之懋遂首八閩薦剡日騰推擢伊邇初不係乎任法之嚴實本於以道使民之所致也繼自今衣冠濟濟絃誦洋洋學校之政日盛月新而臨汀之民夕無桴鼔之警嵗樂耕桑之業是皆呉君德惠之所敷遺也於乎休哉故予記學之成特於呉君興學之盛心為政之美意表而出之以為汀人告焉是為記新建督儲北館記洪惟我太祖髙皇帝之經理南都凡軍衞必有營營必有倉所以安軍伍便支給甚盛心也但京城廣邈倉散布其間逺邇非一故自鼔樓而北若府軍左諸衛為倉一十有八其去公署之地近者㡬十里逺且倍之戸部曹屬之任監收者朝徃夕返勞勩殊甚毎值雨雪之期率假宿老佛之宫以為常閱嵗滋久莫有加之意者迺者奉勅總督南京糧儲都察院右副都御史李公時雍蒞事之初興利刓弊審知其故慨然以為分建公館于城之北俾各監收者挈家徃居釐務節勞庶適其便乃謀之戸部尚書秦公世纓侍郎鄭公廷綱而恊遂具疏以請許之於是勾稽相度擇曹屬之有幹局者若貟外郎王彦竒俾專其役總廵郎中朱愷恊而相之購隙地于鼔樓之北之西廣袤若干畝為前門三楹東向為儀門為前堂各三楹俱南向後為穿堂為寢室為庖湢之舍環之以墻以限外内此則為總督之居東西為崇垣垣外為夾道闢二門以通出入道之左右畫為四區區有前後廰各三楹南向各為門東西向以逹于道庖廏之室左者右之右者左之崇庳廣狹其制一揆此則任監收者所居也儀門之外為旁室以居司門之役外為周垣為丈一百二十有竒後有池廣袤若干尺通為屋六十有二楹前門之外表以綽禊尤為偉麗凡木石工食之費為緡錢九百有竒皆部運官吏贖罪所入貯之公帑者一毫弗以及民盖經始于𢎞治丁巳之春三月越六月工以完告為費省而成功速有如此者維時守備及曹院諸公卿咸徃落之已而秦鄭二公以為李公斯舉實非常事不可不書以示永久不鄙欲予一言以記予惟政無大小便人者為善政故夫南都諸倉初皆各衛自為出内法久而敝至正統初朝廷用建議者之言始改用曹屬以任監收則其奔走徃來之勞盖六十餘年于兹矣一旦李公力為之倡而規畫經理復得其人以董于成位置嚴正輪奐完美遂使一代無前之曠典焯為百世可久之善政不亦韙歟然則監收諸君舍勞即安移逺為近誠非徒一己之為便所謂閔民力之易匱念官賦之難給悉意審覈出内惟允于以佐公家之萬一顧居此者可不慎乎此寔李公之所以深致望者因具書以紀嵗月而併以告焉是為記溧陽縣學進士題名記溧陽為應天屬邑地大民夥政理亦繁新喻符君觀以名進士來為之尹身任教養之責民樂豈弟之化下車未㡬一邑以治尤且聴政之隙留意學校盖以興學勸士寔為首務於是鑿泮池新講堂廓靈星門作名宦祠刓敝補廢罔不周悉復念邑自宋元以來咸攝大郡及入國朝遂名京畿上邑士生其間沾被文明之化崛起首善之地登名甲科布列顯位者比比而然而題名之石缺而弗作非有司之責歟乃購堅珉需良工悉取先後諸科進士姓字大書深刻樹之學宫盖表章先進以興起後學其用心亦勤矣間以伻來請予一言以記惟進士之有題名其所由來久矣盖自唐神龍間杏園宴罷皆題名於慈恩寺塔至宋熙寧以來聞喜宴罷即立題名石刻元復因之遂為永制國朝進士釋褐之初賜恩榮宴于禮部立題名石于太學禮意之隆超越前古由是天下郡邑之制有良有司者仰承德意作興斯文復有郡邑題名之刻良以建之京師者無以及于天下而得之傳聞者不若存之於目之為切近著明也夫物之久者莫金石若以其姓字刻之于石石之存名之存也始之登髙科中之躋膴仕終之建偉績流芳聲以與兹石並傳於無窮顧不韙歟然其中君子小人賢不肖之相逺以貽羞於甲科以取玷於兹石其名亦不可磨也可不畏哉是則一石之刻其為勸亦逺矣夫然故作於前者固當謹身飭行陳力就列以保兹名而不失繼於後者尤必觀感而起擇善為師以紹兹名於可久由是天地之生賢為有用而有司興賢之心斯無憾焉雖然溧陽之為邑古矣山川靈秀所鍾甲於他郡故顯惠之勳業重於戚里貞烈之行義表諸閨闥上下二千年間式克至于今日休而史氏之彦登名兹石者遂亦獨盛於他族然則地靈人傑不亦有由然者歟予於是乎重有感焉因併書以記外祖妣王孺人遺像記外祖妣姚母孺人王氏諱妙緣其先本杭人洪武中遷於應天孺人生而豐厚沉黙端淑莊慎父母擇所宜歸得外祖考友直處士盖時之聞人也既生子愷及先妣夫人而處士殁家饒於貲而愷方幼弱孺人綜理有法外内斬斬先是處士之弟友聞喪其妻遺子恒方月餘孺人即抱養之乳育之勤厚於己出如是者十有三年恒卒以京庠髙選取薦于鄉人固多孺人之慈教也先妣夫人生有異質素為父母所鍾愛正統己未以歸於家君遂偕上京師孺人慈愛不能忍乃以明年來視官邸先妣孝性天至懇留養焉時宦况貧約先妣躬勤以相之至捐簮珥之属以佐不時之需然孺人出自豐裕之族乃能安之而所以贊導先妣者居多先妣生不肖兄弟凡六人懐保煦育孺人無所惜其力不幸夭閼不遂不肖及女弟淑静僅存焉嵗己巳先妣有疾孺人因攜之南歸時國家多事而家君復逺使外國益以驚憂遂至不起景泰庚午後正月五日卒于南京棺殮衣衾一遵禮典悉出孺人之手不肖生僅七年女弟甫三嵗尤多疾疢呱呱仰哺誠可哀憐孺人乃遣不肖同其諸孫讀書鄉社而日抱視女弟盡鬻衣服首飾以供費暨家君歸省始克塟先妣以嵗辛未同先繼妣郭夫人及不肖北來孺人念女弟病目經嵗不可暫捨愷及諸孫留養之切遂攜女弟居於家嵗壬申女弟疾稍平則又問道而北辛苦萬狀送之京師至則繼妣所以奉之者不異其親而孺人之愛之亦不異其子故復勉留焉繼妣生子三人亦僅存阜皋二弟而丙子之嵗疾復作矣阜生方五年皋甫周嵗撫養勤惓視不肖輩有加皋病目病瘡延綿嵗月孺人躬擇乳嫗晝夜顧覆至忘寢食嵗丁丑春家君奉使荆湖而繼妣以五月六日卒于家不肖孱弱未立無所倚仗幸賴孺人以舉喪禮及家君使歸歸柩以塟而諸幼子則悉仰之孺人矣天順庚辰家君為權姦所構得罪逺謫家衆無所依孺人營護周密得無失所有小人乘勢欲謀奪居室者孺人面折其過竟逐去之卒不敢肆其姦乃攜不肖輩過宣備厯險阻不少憚嵗壬午秋家君徃遊雲中不肖赴試京闈皆不在側而孺人乃以七月二十三日忽感風疾又明日遂卒于宣之寓舍距其生洪武庚午五月二十九日春秋七十有三嗚呼悲哉不肖嘗惟孺人慈淑之行為宗黨鄉閭之所羡慕者迄今炳炳不泯獨痛孺人之棄其子若孫㫖甘之奉以一女之愛不惜徃返數千里之地來處于斯盖所以安養其身者無㡬而憂累其心者屢及若夫舉我二母之喪罔有遺缺撫視不肖子女四人者皆底有成至於憂患之中竭力保全無所顧避竟致隕命於邊陲之下雖垂絶之際猶念幼弟皋呼不絶口畧不及其家其所以為倪氏之心可謂終始不少渝者矣苐以卧病之日家君以及不肖皆弗及躬視湯藥棺殮以少荅其平日之恩為可痛恨及家君入關而南屢拜恩命不肖亦幸以科第入官忝有祿位女弟今歸名族為太學生關西楊時敷之妻阜亦獲遊太學需用有日而孺人竟不獲一暏光榮以快其心毎南望歔欷豈勝感悼也孺人之櫬歸塟于南京牛首山姚氏祖塋之次久矣而不肖之心追慕恩德痛恨無已焉迺託諸圖像庶㡬春秋奠獻永瞻音容少展如在之忱以塞遺恨之萬一倪氏子孫尚保之哉青谿漫稿巻十六
