body:
  text: 青溪漫稿目録别集類六明卷一賦辭樂府卷二七言古詩卷三五言律詩五言長律六言律詩卷四七言律詩卷五七言律詩卷六七言律詩卷七七言律詩卷八七言律詩七言長律卷九五言絶句七言絶句詩餘致語卷十經筵講章卷十一奏議卷十二奏議卷十三奏議卷十四奏議卷十五頌表贊針銘卷十六記卷十七序卷十八序卷十九序卷二十書説題跋策問卷二十一碑神道碑卷二十二墓表墓志銘卷二十三墓志銘卷二十四傳哀辭誄祭文臣等謹案青溪漫稿二十四卷明倪嶽撰嶽字舜咨由錢唐徙上元中天順甲申進士歷官吏部尚書贈少保諡文毅事迹具明史本傳嶽父謙官至南京禮部尚書明代父子入翰林俱有文集傳世者自謙嶽始嶽敏而好學居官不徇名譽銓政平允與王恕彭韶等俱為孝宗時名臣史稱其為禮部長二時禮文制度率待嶽而決論事未嘗茍同前後陳請百餘事軍國弊政剔抉無遺疏出人多傳録之今集中疏議共五十九篇與所謂百餘事者不合疑刋集時已有所刪擇然如正祀典陳災異及論西北用兵諸奏皆建白之最大者已具在其中所言簡切明達得告君之體頗有北宋諸賢奏議遺風他文亦浩瀚流轉而不屑為追章琢句之習蓋當時正人在位為明治極盛之時故嶽雖不以文名而乘時發抒類皆經世有本之言如布帛菽粟之能切於日用亦可知文章之關乎氣運矣乾隆四十三年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:e96666ac0e780b5fe1c5de93a54be66b2b97d9251c79596c5cd1912ad83e5d21
