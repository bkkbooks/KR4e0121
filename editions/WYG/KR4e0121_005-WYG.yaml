body:
  text: 青谿漫稿巻五明倪岳撰七言律詩甲午齋居答明仲用韻見憶之作暖風一夜入新年聚散頻驚嵗月遷無分可陪三日話有懐空亂五更眠西壇寂寞春盤共東閣稀踈曉佩聯忽接郵筒知寄我故人髙興正連篇送李立之復任南京太常少卿舊遊何許慰揚舲二月江南栁半青䨇鳳暫勞辭魏闕一䕫元合在虞廷尋春謾過長干寺擇勝重開晚節亭天路囘翔知不遠便依北斗待文星李舊在南寺有亭號晚節廷試執事和程克勤詩韻春城過雨曉隂屯聖主臨軒禮數尊龍見在田文正顯鳳飛近日語偏温宫壺疉賜來東閣内鏹分頒下北門何幸非才陪盛典深慚無補亦沾恩掄才有詔屬儒林浩蕩恩光仰照臨坐近殿門天不遠歸迂輦道日將沉羣公奏巻瞻宸翰多士登名悦聖心明日衣冠同入賀擬從仙仗候鑾音送别沈仲威鄉友赴南京兵部沈約才華錦繡胷宦遊此去樂從容珠還合浦元歸蚌劒落延津已化龍客路鶯花憐共别家山松菊慰相逢鄉心欲與征帆速把手臨岐意萬重春日書懐東風一夜送微暄春意先應入故園歸夢遠經桃葉渡賞心長憶杏花村中宵步月空搔首髙閣看雲欲斷魂乆竊微官無寸補十年徒爾負晨昏雨中夜坐有感兀兀西齋夜不眠秋聲如雨到忩前兩京地逈逾千里一别心愁已六年報國才踈空自愧還家夢遠更誰憐髙堂未卜供調膳誤却青谿負郭田秋風秋雨晩來多便覺新凉次第過淅淅未堪欺檻竹蕭蕭更與上池荷空階不逐蛩聲斷孤枕其如客夢何我亦有懐成獨坐為誰呼酒一髙歌次鳴治卧病不赴齋居之作方澤圓丘祀禮兼十年侍從幸同瞻屬車晝下䨇飛鳳前纛春題五色籖天上徐聞韶九奏日髙重報鼓三嚴詞臣誰獻相如賦獨有池塘草色添駕部張員外汝弼以寒不及出餞賦詩見誚遂用韻二首一以贈沈一以答張月落盧溝客渡河狐裘驄馬曉寒多重來會接郎官舄此去應留刺史鞾酌别情深渾不醉紀行詩好更須哦河汾舊地餘桃李一道春風定若何時仲律提調學政休文一别隔關河况復城東路不多興到肯廻髙士棹醉歸懶脱謫仙鞾空勞折簡逢人寄不及揮毫對客哦獨擁寒爐成底事定從􅁅裡撥隂何時雪始霽故汝弼有可憐東郭先生履不及西清學士鞾之句一時和章甚富亦一竒也贈寧國重興住持宗上人寂寂孤園著老僧無塵心境已如氷何須同社招元亮却恐前身是惠能到處林泉堪卓錫一時衣鉢可傳燈問渠玊版師如健容我來㕘最上乘觀新修運河贈總戎平江陳公成化丙申六月總戎平江陳公䟽導城東運河將畢工爰諏吉日大發運舟上抵京庾京師之人聞而驚喜奔走聚觀者以億萬計誠一時之盛舉而國家無窮之利也昔人有言今世之舉事者雖其甚小而欲成之者常不過數人欲壊之者常不可勝數可成之功常難形不可成之狀常先見古之人有犯其至難而圖其至遠者彼獨何術也若斯河者自勝國時郭太史疏鑿之後幾二百年其流不涸其迹具存特以乆不行舟稍稍壅塞不治而已方大司徒關西先生建議之初有識稱快而喜為異議者紛然以起牢不可破殊不知其為力非難而為利甚遠者則莫或能思何也今日之舉先生建議如此之堅總戎奏功如此之速則皆本乎聖明不惑羣言委任而責成之之所致也噫天下之事若此者衆矣議論多而成功少者何限夫安得皆若斯河之底績乎於是忭躍之餘謹成小詩二章迎勞河滸以致區區之意云百里官河一棹通力排羣議仰宸衷關西夫子能謀國閫外將軍特奏功役籍豈勞都水監旌書須下大明宫題詩聊志儒生喜紀載還歸太史公漕河勲望説恭襄赫赫諸孫更有光岸鑿舊堤青障闊水通新牐玊虹長一時浮議嗟方定千載榮名信不忘昨日城東人似堵爭看萬斛上龍驤運舟以十五日抵大通橋明日遣大臣錫賚焉輓宣府錢永義國初歸附從征甚有功號大黄旗先鋒然不及一官而卒少年百戰起從龍李廣功髙惜未封青鏡可憐驚客鬢黄旗猶見記軍容荒原雲冷埋秋劍古塞風寒泣暮松總慰諸孫忠義在家聲端不愧先鋒賓之用去嵗齋居詩韻見寄和答一首塵事紛紛日夕兼芝眉經嵗失清瞻病懐已喜春囘律詩興渾忘夜轉籖敵壘無才常自屈騷壇有令為誰嚴畫蛇剛被旁人笑蹇拙何須足屢添時予因賔之病中以詩戒其作詩果月餘不舉筆聞齋居􅆳和乃破戒作此有詩戒十分嚴之句故答詩亦云篁墩為程克勤賦新安之程世居篁墩黄巢之亂改為黄墩以避禍至克勤乃考諸譜誌復舊名云十畝新篁翠色屯依然還是舊家墩浮名豈惜隨時改直節元知自古存一代清風重有主千年遺澤又生孫已除蕪穢供遊樂不異晴洲斷石村晴洲其父司馬公别號斷石其所居之地也送陸武儀南還分韻得端字鼎儀之兄千里作客非所難十年相逢懐舊歡君家兄弟聨趙璧吾輩交遊紉楚蘭五更河渚舟楫逈六月都門風雨寒鴒原何許憶囘首季方髙步青雲端賀陳師召得孫二首次聨句韻可是居官長子孫相逢一笑對琴樽新題不厭長題壁熟客何妨屢過門豈待一占知跨竈更期三索遇為閽人生樂事無過此細向君家醉裏論海東喬木見根芽葉葉清風滿故家千載未須論玊樹一枝端合比璚花遠懐頭角時時變盛德衣冠字字誇白日龍蛇行素壁風流先説李西涯聨句賔之大書于壁送劉珂副史再任閩臬直指東南慰一方重來猶是舊劉郎隨車久説三山雨攬轡新驚五夜霜流水遶谿榕葉暗瘴烟分嶺桂花香都門秋晩相望遠憲節飄飄逐雁行寓齋為畫士陳啓先賦丹青隨處寫烟霞旅泊蕭然閲嵗華日月有天因可附乾坤無地不為家計如鳩拙愁鳴鵲身似籐延恥繫瓜自信去留非定着擬從星渚借靈槎留别院中諸同年先生惆悵摶沙思不勝人間聚散信無憑論心久説三生石繫日空懐百尺繩會裡新編詩酒債榜中舊業弟兄稱江東雲樹知相憶為報春澌早破冰戊戌元日早朝和蕭黄門文明詩韻雪霽天髙列宿稀重城春色漸霏微珮聲多在蒼龍闕仗影徐分綵鳳旂漢輦初移迎日上虞韶迭奏遏雲飛侍臣誰擅揚雄賦驚見新詞出瑣闈二月二日與諸親友别後道中偶成時上丁齋戒送者皆不携酒故得早發云都門風色漸柔和祖道紛然散玊珂祗為清齋忘劇飲不禁離思發髙歌乾坤此日君恩重江海長年客夣多去住有懐憐共切臨岐心緒復如何泊河西務與楊郎中克敬同年夜話荒村疎栁帯斜陽纔入河西感異鄉觱栗聲中心激烈舳艫影裏夢飛揚十年客路嗟重到千里家山耿不忘賴有故人楊水部燈前相對話行藏天津阻雪飛雲撇空若奔馬廻風掀河成急湍天低已驚晝欲暝雪落陡覺春猶寒舟人簑笠正懐栁覊客鞭鐙仍憐韓推篷翹首騁遐矚萬里瓊瑶真壯觀風雪泊滄洲州守張縉己丑所取士留酌乆之鯨川雲暗雨霏霏又見寒風捲雪飛尊酒重勞留客住樓船直解阻人歸使君情話燈前乆游子鄉書雁後稀北闕天髙南國遠倚篷一望兩依依過濟寧有懐舊游己丑歸省嘗與畢水部遊南樓有作憶上髙樓醉玊缾十年重此晝揚舲人間空説詩為聖天上真傳酒有星黄祖尚憎鸚鵡賦玊環宜愧牡丹亭南遷不死非無幸留得才名滿汗青新草新草如茵散不收緑楊隂裏大堤頭村村早食争挑菜處處春耕樂飯牛刺眼尚看荆棘茂多情偏憶蕙蘭幽可憐此夜池塘夣一寸心藏萬種愁清明之夕泊舟夾溝驛風雨大作達旦不寐有作蕭然客路過清明四野隂雲白晝生五夜雷霆聲霹靂半天風雹勢縱横狂濤倒捲黿鼉泣髙栁平摧鸛雀驚舟楫無慿鄉夣遠可憐欹枕待雞鳴九月朔卞廟謁祭因有豫作登髙之約歸次偶成時雨至暮始霽一門忠孝古難全節義如公史有編浮議不妨輕瓦石流風自足重山川碑銘細刻三千字塋兆新捐十萬錢仰止遺容堪再拜精英何許尚森然風雨秋凉欲滿城廟門簫鼓達羣情不忘後舉千年祀兼許先酬九日盟山色正髙宜對菊蠏螯初美試持觥因逢佳景懐遺烈可勝尋常載酒行道院因山占此丘孤亭元屬晉西州悠然自古多遐思偶爾于今得勝遊雲暗卞祠松葉老雨香陶徑菊花秋憑闌不盡登臨興目盡長江萬里流己亥齋居日越在南都有懐院中諸先生玊署清齋夜似年紫薇冠珮集羣仙歸鴻欲墮孤飛翼鳴鳳誰傳五噫篇嵗月愁多霜鬢短江湖身遠寸心懸不堪風雪青谿上一棹天涯興渺然送冡宰錢先生致仕歸淞東殿傳經蚤有聲南曹解組晩猶榮翰林舊學推諸老吏部新銜冠列卿恩錫龍函歸興好名留鰲禁宦游成髙風直並呉淞水長得餘波及後生哭内八首恒菴之亡忽逾旬朔豈徒失此佳相寔則隕我良友撫事興悲曷云已已爰累遺行總為八詩言止於斯情其有極時一諷詠少紓哀悰㝠漠有知庶鑒微臆耳結髪相從二十年懐君遺行轉凄然孝輕刲股心元切壬辰外父卧病京邸危甚君刲股療之義重持身志獨堅君自幼不輕出閨門始終如一不移素守樛木乆推閨壼化君撫衆妾極有恩義夭桃常誦室家賢君睦族宜家心慕古哲傷心太史渾無奈珍重銘文手自編長憶書齋把巻時每聆清論解人頤予每坐書室君嘗在側考問疑義多所辯論少君已有推髙行淑女應無愧此詩畫紙餘情仍對局君善奕揮毫佳興正臨池君好書于今夜雨青燈外無限窮愁秪自知怪底年來遠别離不堪南北動遐思燈前空墮無窮淚篋裡猶存絶妙詞去嵗予奏計至京為别者四月方罹大故後家費已罄君支持極勞每抆淚作書寄余道其所以乞米但教㕑有粥時每有在陳之厄君隠忍以充家衆之食檢方非為市無醫君苦心成疾獨檢方市藥以自療因予不在卒不令醫診視其簡重如此安貧忍病嗟誰及一任時人死後疑人不知者至死猶疑其有厚蓄不能散云鶴骨清癯可奈何半生嵗月病中過君肌體素弱且多病淚珠緣别傷心乆去嵗别後久病甚自驚危頭雪因愁入眼多兩年偶生白髪數莖曉閣青鸞悲掩鏡天機紫鳳憶停梭繡帷寂寞秋風老驚見薫香舊綺羅長恨孤踪客帝州歸來心事轉多愁君念予乆未得嗣心甚懸切珠生老蚌元難料君忽自有孕喜出望外劒化神龍豈易留春色已隨萱草暮晩香空對菊花秋懐中掌上惟珍䕶他日劬勞或可酬瀛海仙遊擁翠軒可憐夣斷已無言君卒之日夢海神邀燕及暮而卒不及一言痛哉三年飽歴今生苦君從余二十年惟今歸省送終理家甚苦心力千古難明此日寃夜壑移舟空自恨煖田生玊共誰論凄凉一掬傷心淚不及狂歌對鼓盆髙城寒漏正迢迢太息吟䰟黯欲銷海上龍孫空有夣君比年頻夣為海龍王第三子每邀其去不果人間鳳侣故難招東風枉報春消息苦雨生憎夜寂寥千載誰憐生死别手携稚子却還朝恨壓䨇眉百感增生平偕老竟無憑圖書空對春風筆書篋中君手書尚多簾幙深愁夜雨燈落落金瓶沉翠綆泠泠瑶瑟斷朱繩嗟予命蹇憐君薄永訣心知兩不勝得楊氏妹書問訊亡妻計發書時没已四日矣感之復成二律天地無情不可呼乾坤此日倍愁吾衣分金剪秋初冷卒之前一日猶手分寒衣與諸妾燈盡銀釭夜已徂卒之夕漏下一鼓矣千里誰憐予妹遠與吾妹友愛甚篤思念無間然百年空恨汝親孤外父六旬止生一女那知故篋詩題在猶説中林返哺烏君遺詩中多思親之作可從王母簉仙班寂寂深閨盡日閑禱疾每懐瞻北斗先君疾君每禱北辰以請命祈年長記祝南山每先君壽旦恒茹齋以祈壽算志酬終養應無愧長為予言此歸得少盡力送終事不為徒行也心慰全歸竟不還欲候佩聲明月裏爭知天上與人間和汝行敏登雨花臺韻醉遊同步雨花臺笑口何妨對酒開天地無窮人易老江山如此我須來聞經不療維摩病得句終慚杜甫才紅日滿山歸路晩文星早已燭三台和景章登臺韻絶頂憑虚試一登夕陽風景闕增髙宜太史占雲地遠勝文王避雨陵十里好花春擁座半空明月夜燃燈悠然遐眺悲陳迹渺渺江流宛似澠登雨花臺千山暮色漸熹微臺草如茵尚可依落日下從江水浴斷霞真共塞鴻飛登髙望遠且為樂弄月吟風甘息機北望嚴城無十步殷勤幽鳥莫催歸同遊嘉福道院松筠深䕶萬重山不道仙源亦易攀丹已成霜呼犬試劍初驅雨化龍還飛來白鶴仍開地養得青羊欲度關今日相過真偶爾幾時蕪逕可重刪登兠率岩走筆次沈僉憲仲律韻秪今誰似孟韓豪西華能登此未勞十里松筠蒼雪亂半空鐘磬白雲髙來游客似乘鰲背入定僧如坐鳥巢我有一尊君可醉臨池清影若為搔重九日泊舟廣陵蕭然孤悶有懐阜弟因次其贈别詩韻二首以寄天涯離思正逢秋一别生增兩地愁極目松楸懐故國傷心風雨坐孤舟家聲如此深相託世路茫然尚可憂今日登髙誰與共相思惟有泪交流幾年奔走愧功名猶悔蹉跎百未成滿望鴒原承世業早從鳳嶺樂餘生清秋對雨難為别白晝看雲倍愴情寄與卯君宜更勉頻傳書札慰坡兄青谿漫稿巻五
