body:
  text: 青溪漫稿卷六明倪嶽撰七言律詩樂清軒十律為鄉友沙士清沁遠從知地自偏美人池館故悠然須煩能畫王摩詰更著耽詩李謫仙門近市㕓堪買酒屋臨溪水正通船間居適興逰仍樂却羡年來事事便獨把行蹤混草萊年年圖得見花開髙山流水從調弄明月清風共往來一箇長松三徑菊幾竿修竹半忩梅尋幽只合詩人到愛聽清吟對酒杯垂肩短髮晚蕭蕭惟有琴樽伴寂寥隱君舊愛子午谷詩客今居丁卯橋山中白屋真成趣天上青雲不可招髙卧日長非為懶出門十步即塵囂晚嵗襟懷何所憑一廛聊自老金陵柴門斜對青山疉茅屋平連緑樹層釣艇漁竿忘世客薰爐茗碗在家僧却憐塵海炎炎者應笑吾廬冷似冰風流長憶鹿門龎窈窕丘園俯翠淙鶴唳九臯松滿徑鳳翔千仭竹當忩鄴侯家富牙籖萬亞父謀踈玉斗雙懷古不勝仍對酒醉歌聊使壯心降移來安樂舊行窩長日寧容俗客過自有尊罍娛北海可無詞賦繼東坡虹光夜拂青萍劍藻思時翻白雪歌落盡碧桃春不管滿庭芳草意如何潦倒何煩禮法拘蕭然山澤可勝癯半稜新月明琪樹一假寒冰貯玉壺詩社有人時送草縣門無吏不催租床頭酒熟知誰共若箇鄰翁不費呼環堵無營寂似禪百年髙興付新編謝公可解龎公樂博望其如魯望賢聲色抵須汙耳目功名端合讓林泉君看白首為郎者猶自殷勤事草玄笑彈長鋏看吳鈎醉裏都忘嵗月流野馬隔忩空滚滾海鷗近席自悠悠夢魂不到蒼龍闕杖屨長過白鷺洲間向楸枰論勝負從教一局便封侯廊廟江湖兩不關休休聊博此生間花繁東閣迎風折竹過西墻帶雨刪塵夢不飛應似水吟肩孤聳好如山一官我愧匡時術回首因君幾厚顔次郁景章韻時同遊牛首山老僧方丈本蕭條地占東南景自饒天際孤巖藏暮靄雲間雙塔倚晴霄石潭過雨魚龍躍松徑經春燕雀驕盡日流連忘却醉東風送晚酒初銷讀史有感夕陽渡口覔同舟老大誰懷漆室憂千載豢龍仍得計一時屠狗竟封侯自緣有欲因能致可信無功亦見收却恨衰遲愁把卷長江西望水悠悠挽汪庶子伯諧父母其父澄任御史閩冦事發坐纍被刑束却青氊出泮林一鞭驄馬氣駸駸潢池誰遣驚濤起閩海真成瘴霧深武穆有寃皆切齒王裒無淚不傷心神遊只在風雲表時聽中天彩鳳吟一喪移天三十春心驚家難止清貧囊中自幸無珠玉膝下真憐有鳳麟長憶萱庭稱壽斚重看楓陛豫恩綸白頭已遂同歸願十里湖山隴樹新送閣老商先生休致歸嚴補作聖主恩深太宰還親承優詔下天關重來正作三朝相蚤退仍登一品班鼎和鹽梅元濟世雲成霖雨却歸山丈夫出處應如此不在嚴陵一釣間錢鏞中書父受封還杭西湖老人湖上來九重入覲天光回鳳雛九苞日邊翥龍文五色雲中開承恩已慰沾浩蕩覽勝自許凌崔嵬西湖酒香歸去旱昨日河船笳鼓催西湖圖卷為宣府范元博題十里春波十里堤緑楊紅杏望中迷酒船常作西湖醉詩卷新從上谷攜水靣樓臺朝起蜃橋邊村落夜聞雞天涯回首方如夢贏得逢人一品題分韻得分字送丁鳳儀秋官南還兼柬沈仲律官燭踈簾坐校文力完趙璧始憐君乾坤信有三生合江漢真成兩地分南省持平人似玉東城贈别騎如雲宦遊兼得家山樂孤鳳翩然百鳥羣故人何許惜離羣望盡天涯隔暮雲秋晚風帆隨路便夜寒霜潦入江分京華塵土仍憐客鄉國衣冠却羡君獨有秦淮橋上月清光長憶沈休文會餞蔣宗誼侍御赴南臺即席次留别韻嘗為杭州推官故云兩袖天香出帝都又看新緑上春蕪晴雲古道青驄遠曉日髙岡彩鳳孤北海才名重南國東坡政譽滿西湖老成不負臺端選晝錦如君更有無文明蕭黃門謫貴州有詩寄京中諸友因次韻以復地比長沙知更僻萬山深處晝長昏憐君遠道傳詩句愧我臨岐失贈言夷險不妨身總健乾坤無負道猶存官間尚有囊中粟感激寧同一飯恩恭祀獻裕二陵和答明仲贈别詩韻齋廬坐久柝聲稀百辟趨蹌謁寢幃祀典敻非千古並儒臣已是八年違四山雲氣長依樹五夜霜華欲滿衣共指昌平認歸路寒城燈火望中微甲辰出宿神樂月華星彩滿瑶壇雪後風微夜不寒十里旌旗千帳列兩街燈火萬人看回廊有徑齋廬遠大地無塵輦路寬二十年來瞻盛禮始從簮紱候鳴鑾初以學士陪祀丙午陪祀南郊星分虎帳護行宫煙合龍香燭上穹九奏簫韶燈影下三嚴鐘鼓月明中精禋夜格諸壇肅和氣春回四海融共仰祝釐昭聖德擬從周雅頌年豐丁未慶成侍燕五胙筵開仰聖顔從臣叨列殿東班雲開黼扆韶音動雪映鑾墀扇影間醉浥流霞傾北海歌傳湛露祝南山掖垣散步東風裏携得天香兩袖還楊忞醫士貯春卷白玉橋東逈絶塵小軒深貯十分春藥闌雨足參苓茂花徑風恬杞菊新刁約未歸仍有塢蘇耽如在豈無鄰滿懷拍拍皆生意何用懸壺寄此身送沙縣訓導邵驥福建副使宏譽先生之姪閩南憲節舊冰銜宦路相仍見阿咸鶚薦幾時驚捧檄鵬摶今日快揚帆一氊風味元無改三禮家聲逈不凡歌罷菁莪人已遠劍津何處隱龍函芳池春水英國張公家園八景之一芳池一曲接銀河分得天家雨露多新漲受風牽翠縠好山隨月墮青螺百年蘋藻沾餘澤三月魚龍湧漫波猶記臨流泛春酌倚闌同和濯纓歌次賓之韻賀遷新居緑槐庭院晝渠渠總謂新堂勝舊廬素壁初留王宰畫華籖久貯鄴侯書古人一室有真樂老我三年無定居苦欲從君仍憚遠夕陽門巷早將車和經故居乾坤何處兩芒屩萍梗此身雙鬢華水西草堂故無恙城南主人重有家往日過門還駐馬新年買地别栽花去住相忘即為樂蘭亭元自右軍誇賀羅明仲得家報生孫家書夜到急張燈喜報蘭芽一葉增偶爾竟煩詩紀夢嶄然終擬壽為朋人間鶴骨真無價天上鵷雛信有憑已辦含飴娛綵服鄉心遙轉轆轤繩送李應禎中舍赴南京車駕分得朝字城東送别馬蕭蕭楊栁春風白玉橋離合不堪仍此地隂晴何必問明朝江南宦業將家近薊北交情入夢遙萬里碧雲孤鳳翥翩然欲去敻難招五月二十又二日蒙賜鮮品自是時魚梅笋之類皆叨預焉感激有作中使傳呼賜豫仍小臣何幸亦親承潤分異果皆沾露寒沁嘉魚尚帶冰擎出九天從玉署貢來千里自金陵深懷兩世遭逢地圖報非才感愧增先公任學士日亦嘗蒙賜癸卯七月望前二日謁陵道中喜晴一首馬嘶秋苑燕飛輕遠道忘疲客思清苦潦狂塵非舊路好風佳日正新晴四山紫霧千尋合萬頃黃雲一望平天意已酬憂國願豐年禾黍屬西成宿昌平劉諫議新祠下馬來尋諫議祠一龕初自學東移英風合並乾坤久義舉宜令遠近知興廢有因憐舊事往來無補費新詩臨風再誦匡時䇿古道何人繼色絲再題陳氏西園卷秋山黯淡樹髙低知有人家在水西翠竹繞門斜帶郭緑楊匝徑暗通溪乾坤不礙間中樂風月全歸醉後題燒筍烹魚堪大嚼一尊時復待君攜孟冬時享齋宿院中和韻答克勤賔之二同年天街霜露感秋冬齋署衣冠候鼓鐘觀闕珠旗紅日擁廟宫翠箔彩雲重隊分壁壘疑無象舞協簫韶信有容同向班行陪盛禮敢忘衰薄慶遭逢玉署沉沉隱畫墻柳隂深覆御溝傍鈎陳天近通三接奎壁星明共一堂地迥自驚塵土隔雲深翻覺路岐長叨參此會元非偶二十年餘白鷺行甲辰正元奉命南郊看牲漏轉重城夜不扃兩街髙炬燭青冥影連貔虎塵隨路香拂犧牲月滿庭已信卜郊嗤魯史却看在滌重周經明朝復命紅雲殿鵠立金門候曙星戚畹雪亭孫揮使祖塋八景其一曰鶴唳長松求題限韻一首雙巢白鶴萬松青點染真堪入畫屏聲落九臯驚宿露夢回三島拂晨星徂徠地近應無恙琥珀年深更有靈怪底仙禽棲息穩佳城剛占鳳凰形五月十一日王世賞侍講西園晚酌即席限韻一首花底清颸醒醉顔城頭落照尚忘還便須觴詠從今日未必林泉勝此間緑醑浮春傾北海翠屏宜晚對西山心驚遠道青驄騎夢入中垣白鷺班雨中獨坐有感寄內叔盧廷弼感舊懷鄉共寂寥天涯歸思欲飄飄猶憐建業橋頭路曾赴長干寺裏招尊酒有時仍夜雨扁舟何日正春潮相逢肯惜通宵話明月遲遲玉漏遙送沈時昜少參赴閩藩專理礦事旬宣一路惜分携天路霜風送馬蹄過浙有山皆置冶入閩無水不通溪梅花香冷吟情健榕葉隂濃望眼迷聞説征徭應到骨好施霖雨向羣黎嵗暮禱雪致齋柬李西涯學士幾年齋署隔西東三宿重憐此地同寒逼寢屏新館靜塵籠詩壁舊堂空鶴棲珠樹驚秋露鳳翥丹山下晚風却愧蒹葭成倚玉一緘猶自往來通初同年齋室聨句在壁間且二十年矣比皆宿西朝房今以進秩學士始復同宿院署冬至謁陵和吳原博韻五首行龍迤邐下紅門勝槩真稱地勢坤白日塵沙行處少紫垣星斗望中尊千年古木疑無路百里平疇别有村西接太行東到海羣峯羅列萬牛奔翼翼顛崖接斷岡山城風景倍荒涼露根宿麥猶無雪帶葉生柴尚有霜坐畏擁爐冬正暖困便欹枕夜初長學宫闕頻來客門外青襟立雁行沙河氷合石橋危並轡憐豫一騎追思陟畏途還自重恐尋覆轍漫成嗤傅巖舟楫寧非地鄭國輿梁定是誰回首丹青方炫爛路人指點梵王祠潑紙雲煙掃不開齋房稠疉見詩來豐年正擬稱多黍盛世真堪詠有萊短草夜深羸馬齧髙柯月上乳烏哀行囊剩有珠璣在錯落人驚出蚌胎路繞溪湍定幾灣坦夷才過即孱顔一時直欲乘風去五夜應須戴月還寒玉亂鳴溪下水晚屏斜對畫中山一年兩度歌行役誰道間官盡日間祀歸限韻二首殘月初髙霜滿林熹微曙色散輕隂城留拒馬風雲壯廟隱棲烏嵗月深令尹官間民十里廣文齋冷樹千尋自憐此地經行熟冉冉流光感寸心歸途風日總熙然聯騎仍逢閬苑仙陵祀有嚴分祭嵗山呼無計預朝天葭灰已應初陽律雲氣應占大有年却憶西人懷拯濟匡時何䇿繼唐賢謁劉諫議祠再用元博韻二首欲將忠義動君門一語回乾更轉坤志在生前真大屈道於身後却長尊山中好惜甘棠樹河上誰憐獨栁村宦海悠悠渺無際頽波千里尚狂奔泮宫西畔野城灣一拜高風一厚顔砥柱不隨流水去浮名真作片雲還當時多士驚鳴鳳此日斯文仰太山何物斯文澌盡久芳祠長對夕陽間謁狄公祠一首城西親拜狄公祠袍笏森然仰令儀此地孤雲心尚在中天落日手曾支平生事業存唐史一代文章託范碑聞道邑民能報德春風香火重追思嵗暮失子應麟孤悶中和時敷妹丈除夕韻以自慰云孤悶仍驚值嵗除却憐時敘強為娛麒麟自信非凡種鸑鷟終期得俊雛漫憶功名垂竹帛且看歡笑貼桃符壯懷落落知何似百事無成一老夫愁懷聊藉酒驅除潦倒翻成一笑娛正惜年光蛇赴壑漸看春思燕將雛山中猿鶴非無意夢裡熊羆會有符自恨一身遭兩誤聰明何必勝愚夫孟春奉陪廟享紀事而作祠殿森嚴楯陛重雍歌初徹燎煙濃虞周典禮千年合文武衣冠百辟從日影漸移髙閣漏露華猶拂御街松却瞻天仗東風裏冉冉霓旌導六龍經筵講退和侍講焦孟陽韻時講春秋慶雲流彩日曈曈經幄重開禮亦隆師相雁行紆帶白詞臣鵠立擁袍紅縱橫已勝三千字褒貶先歸十二公却羡伯強真侍講每攄忠懇動宸聰分獻四瀆禮成有作丙午正月金榜髙懸白石宫巍巍遙占地南東祠分聖主壇壝外禮合諸侯玉帛中源出名山流自獨潤沾新雨澤皆同小臣祼獻慚無補擬竭微誠祝嵗豐十月十九日蒙恩授禮部右侍郎具疏辭以晚不及達明日陛謝又明日視事于南宫有作寄諸同年恩綍煌煌下紫宸濫竽何幸及儒臣回瞻東閣星辰逈遙接南宫雨露新自信官階叨此地敢忘家學繼前人非才每慶遭逢久猶是龍飛第一春二十三年厠玉堂執經曾忝侍明光新銜又逐青雲伴舊侣深懷白鷺行豈謂長嘶思故櫪却看遠翥在高岡可能麗澤仍相及得遂寅清答聖皇青溪漫稿卷六
