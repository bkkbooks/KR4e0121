body:
  text: 青谿漫稿巻八明倪岳撰七言律詩癸丑春闈忝知貢舉試事將畢寄柬李陸二學士翼翼重門晝不開兩簾懸隔斷嫌猜珠璣照夜寧非寳桃李經春總是材奉詔每期精簡抜論文真欲細敲推薦賢報主吾儒事得見英髦衮衮来黙黙春宵坐不眠心期為國重求賢人間盛事寧過此天上文光亦爛然瑞世鳳麟須在網應時奎壁正當躔聖明臨御真儒出永弼皇圖億萬年廷試執事和馬司馬吳狀元韻龍馭臨軒紫殿髙鵷行彚進總英髦玉音飛墜先承寵丹悃敷陳肯憚勞映日瑞雲方似綺濟時甘雨定如膏遭逢共仰今堯舜報塞寧忘後禹皐巍巍阿閣帝城隂争聴雝雝鳳鳥音聖主載頒咨治䇿羣公交盡薦賢心平生忠孝相期逺一代經綸屬望深明日天門初放榜姓名從此重如金六月二十九日拜命進位尚書適與體齋傅先生年兄同升比承詩示次韻奉復兼柬西涯學士紫宸朝下聴鳴鑾鳳詔徐頒逺近看並命恩隆良可慶同年志合更相安禮曹重叙新僚友經幄原隨舊講官獨有故人情不忘幾番回首五雲端甲寅正月四日受誓戒恭陪廟祀和李學士西涯韻春祠將事廟街東郊戒先聞出帝宫大禮疊行當此日羣工一徳對休風仍於尊爼停酬酢應向天人見感通試看城南新雪盡無塵輦道徃来中時以方始郊齋詔罷飲福受胙之禮丁巳正月郊祀齋居和鄭廷綱少司徒二首長憶郊齋傍紫垣禁城春色正氛氲龍輿欲下千官肅鳳纛徐移萬騎奔銀漢雲收㣲有影瑤臺月轉淡無痕留都散局今叨竊不及嚴趨向帝閽奉引長時下掖垣御街瑞靄自氤氲六師環衛看如翼萬姓遙瞻喜欲以下闕東莊行樂東莊小隔渝水東縈紆仄徑遙相通春雨初過亂松碧曉日欲上浮雲紅耕餘閒步引孤鶴睡起行吟攜短笻回首蕭然忽陳迹長林瑟瑟生悲風送蕭文明僉事致仕號海釣拜表来朝便拂衣闗山如故決然歸諫垣忠鯁驚先擢宦路炎蒸喜暫違白首無機鷗鳥狎青雲有繼鳳雛飛袖中為惜經綸在海上聊尋舊釣磯户部李尚書輓詩有紫雲書院早從藩岳陟都臺司馬仍推佐武才地卜紫雲思獨徃詔承丹鳳見重来功如劉宴存南國位比張華歴上台徳業總看青史在蒼生懐恵不勝哀幾載班行接令儀雄才真足輔明時任隆八座經綸地恩荷三朝際遇時奏計頻繁傳䘏典發潛輝赫著豐碑迢迢欲致生芻意極目嵩髙有所思和傅體齋李西涯二年兄屏風燈詩韻兼致謝意小屏燈燭夜熒煌錦帳圍春在一堂剪刻無痕渾類織品題有幸復成章寄来迢逓三千里粧就分明十二方但擬長年供雅玩肯辭奕世為深藏雲錦分張自一機座中人訝眼中稀風前仙侣開珠幌月裏孀娥按羽衣畫比白縑元異品詩於金雀可同歸開緘急為燃藜讀從此蓬門爛有輝奉次屠都憲韻賀篁墩學士領教翰林兼柬西涯學士二首巍巍聖徳仰如天學士承恩重養賢虎榜舊名金作字鳳樓新製玉為椽道根伊洛從今盛教本蘇湖自古傳二妙正當天下選最宜霄漢領群仙桃李春風二月天栽培深倚濟時賢講筵宻勿逾三接大厦優容必萬椽一代文章從指授兩行衿佩望心傳業成不日看髙步同是鰲峯頂上仙題衍聖公東莊巻郡城西接泮池頭别墅新成望野樓登罷有山還小魯遷餘無地可存周牕迎曉日人初起座擁春風客自留不獨課農知稼穡浴沂歸詠亦優游會賀五宫保于部堂用屠都憲韻霄漢人瞻五鳳来東堂今始為公開絲綸烜赫先同拜簮紱從容此共陪豈樂任傾千日醖光儀如接九英梅斯文盛會元非偶一醉何妨踏月回題瘦竹巻骨立稜稜玉一枝玉河人自渭川移休文閒賦郊居日子美孤吟飯顆時饞守雖貧還易得俗夫非病亦難醫首陽絶粒于今逺猶似癯然力不支乙卯郊祀分獻北海禮成有作北海分祠曲徑西瑤壇第一費攀躋天中星斗應相近宇内山川孰可齊已信朝宗歸漭沆還期流潤徧町畦禮成欲獻祈年頌擬候重城報曉雞送九江潘同知赴任工部郎中傑之子二親在堂水部潘翁老聖朝却看雛鳳起冲霄一官髙占人中選二守尊居郡上僚地接江東民最樸水通湖口路非遙榮親志遂堪迎養百斛方舟穏趂潮盆梅一本二榦開紅白花雙榦分開二色花孤山晴雪絢朝霞有竒有偶自人作為李為桃從客誇亞父鴻門撞玉斗葛翁勾漏鍊丹砂移根換骨非難事兩種元来是一家謝餞行諸門生二首以下皆南行五月八日癸卯京闈所取士之仕于京者若給事中于瑁屈伸御史張綸張天衢郭鏞户部歐信錢敬張舉張定鄭洪刑部熊祥周東光祿趙竤方鼒中書李棨郭旵行人王雄南京刑部張賛進士張彧翁玉聶瑄何俊合二十二人會餞于城東茶菴之新祠因賦二詩以謝且致望焉長憶京闈抜俊英喜看先後步雲程求賢報主應無愧列職分曹更有名總謂鳳麟呈世瑞豈殊桃李擅春榮臨期一語仍相勉永竭忠貞答聖明叨典南銓荷帝宣一帆初上潞河船方驚逺道三千里却憶髙科十五年雲路蜚騰元濟濟天涯離合正懸懸青尊緑酒城東館無限深情對别筵寄阜弟惆悵鴒原話别難河西風雨曉猶寒扁舟欲發仍留纜疋馬將行屢據鞍客邸有懐惟夢逺征途無恙且心寛平生家學君須記祇把清忠守一官道傍栁樹多為風雨所抜横仆水濵無復理者見之憮然隄栁何因厄閏年坐驚摧折動逾千空憐翠色猶横水不見清隂可拂天自昔氷霜非爾耐于今風雨為誰顛前人久費栽培力可向樵蘇惜棄捐直沽道中有感暑雨南行已見霜扁舟来徃為人忙河流渺渺今俱淺栁色青青忽漸黄有幸尚看氷未合無眠真覺夜偏長宦途風味渾如此却笑今年始備甞承西涯閣老以銅雀硯見恵且謂驗其真贋舟中試筆知為故物無疑乃用前所贈韻復成二首以寄銅雀臺髙倚鄴城欲從歌舞樂餘生侵吳兵老終先破禪漢謀深卒未行物古人憐陳迹在基危天遣霸圖傾千年瓦礫漳河底太息空勞用力成一槖蕭然出鳳城硯磚分恵眼猶生當年可為笙歌溷此日聊隨楮墨行藻飾如存新製改波頽不復舊臺傾明忩浄几閒揮拂弔古文從感慨成途中復見新月有感隄栁經霜葉半凋客途風景夜蕭條不堪亂柝驚孤枕擬借輕帆送短橈玉宇髙寒心豈逺金陵佳麗夢還遙推篷見月増離思可信深閨共此宵雨後過甲馬營時隂雲未解南風方急云細雨輕雲不放晴南風應阻客孤征秋髙槐栁隨霜落水逆魚龍鼓浪行厭聴舟人吹野調喜從津吏問郵程帝京回首逾千里今日方經甲馬營過濟寧有作孤城忽見濟寧州今日重驚得順流飄泊未須論斷梗别離何許謝行舟醉鄉方憶金龜酒月夜仍懐紫綺裘一曲棹歌天已暮憑誰喚起謫仙遊至淮安候李都憲不至詩以寄意畫舸乘風夜渡淮孤吟聊遣客中懐行臺玉節應難候賔館金尊不易偕愧我匆匆還故里看君衮衮歴崇階須知國計通融地天上恩波想未涯十月既望又二日夜渡寳應諸湖適謝水部中流見訪湖光晃漾水波平夜半舟人静不驚霜斾近於天上轉風帆遙向月中行一泓清淺魚龍隠兩岸空寒鸛鶴鳴猶勝坡翁雪堂夢相逢有客未知名龍潭驛小憩背負層巒面俯江水光山色動軒忩遷移自昔知逾幾建置如今信少雙岸近也應便北渡地雄端可殿南邦遙思来徃皇華節能賦何人筆似杠觀燈有作鍾阜山髙王氣増元宵景象稱豐登萬家門巷銀河繞九陌樓臺火樹層天上鳳韶乘月動人間鰲駕遶雲騰舊遊何許今如夢二十年前記所曽宗家燈火帝城西閩海親勞客逺攜五色雲霞籠薄霧兩輪日月貫晴霓魚龍照眼春猶蟄燕雀迎人夜不棲一笑相逢成四美興来聊與醉分題是夕宗人彦和家賞鎮東燈遊牛首山將至佛窟寺有作野寺尋僧客到稀馬頭時見小蟲飛十分深處初聞磬百尺髙臺好振衣山聳兩尖牛礪角江横匹練鳳停機欲窮徃牒探竒勝千載稱雄拱帝畿不及登兠率巖因寄同逰諸公兠率巖髙紫翠層酒酣無力倦重登探竒騁望君方始涉險留題我已曽弔古謾尋前代寺逢人頻問舊時僧山林城市俱成幻千刼維摩總浪稱和梁少宰韻上元春滿鳳凰城争似山居况味清一徑欲迷行處險羣峯如伏望中平未論竹院逢僧話且愛松忩聴鳥聲却笑諸公總吟癖驚人佳句一時成和鄭司徒韻山繞春城水繞谿暖烟如抹樹如迷虚疑古塔凌空小最愛長松出磵齊晴色撲簾知日近輕隂過檻覺雲低老僧方丈清如許不見危梁落燕泥和董宗伯韻牛頭山在帝城西古道登登去不迷挺秀總看松作徑憑虚全藉石為梯休驚白日淹駒隙且勝紅塵没馬蹄指㸃六朝遺跡遠欲從何處問梁齊寄傅體齋鴻雁南來不見書故人天上遂忘予雷陳膠漆知何似韓孟雲龍恐未疎猶憶三同存舊巻方憐一榻寄新居皇恩如海容樗散自幸優閒已嵗餘趙淮江東轉運判官死于賊二妾綵雲翠蓮抱焚尸于缶投水死因附于祠轉運江東更典兵矢心不與賊俱生絶憐䨇節從夫志無愧孤忠抱主名雲散任教風力勁蓮枯終見水波平須知抱缶沉身意合𦵏深淵見此情醉後重題玉亭一首拂石從容認舊題玉亭幽逈鳳常棲雨餘最愛青如洗烟暝渾疑翠欲齊倚醉儘堪留筆札乘閒還可駐輪蹄瀛洲不隔三山路明日重來酒賸攜郊祀分獻星辰二壇有作西列瑶堦第二班禜星壇逈費躋攀心通􅆄蠁三台上耳接聲歌九奏間象緯漸看天外轉鑾儀仍候月中還禮成總慰繁禧集喜動臣工仰聖顔奉次西涯閣老分獻韻禮重南郊聳萬方禜壇清切紫微傍銀河影隔珠簾影壁月光分寶炬光已擬年登歌大有却看春早報殊祥五星順軌天心協昭假精誠仰聖王慶成宴再用前韻縹緲韶鈞動尚方羣工分候紫微傍伶官舞戲魚龍隊力士班聨劍佩光氣協乾坤知應感瑞呈麟鳳待呈祥擬從既醉歌周雅萬國承恩奉一王十年叨侍殿中班坐候羣公幸始攀八佾舞傳千古上九歌聲落五雲間早看鳳厯頒春罷徐候龍輿捧日還天語親承三賜爵恩沾夷夏總懽顔七言長律承李士常進士以所和與李賓之内翰潘時用秀才冬夜聯句之作見示用韻以答風度書帷月度忩蕭然相對倒秋缸寒聲屢報重城柝孤影頻揺客舍缸共惜離懐傷舊約却聨長句托新腔潘郎遠裔騷人一䝉叟諸甥國士䨇乆向文名知俊逸更於交誼見淳龎情如元酒真堪酌音出黄鐘不在撞總慰詩壇傳檄定自驚敵壘豎旗降錦囊遺學寧慚賀綵筆雄才豈亞江量隘五湖憐浩渺口翻三峽訝琤淙好殫儒術禆元化聖主隆文理萬邦昨者候問嘗以不作詩奉戒歸途欲聨数語馳上未果也明日使來復辱和章豈謬言不足信耶抑興到落筆自不為勞耳輒復借韻一首以終致鄙意先生晏卧讀書忩孤負新醅發舊缸寒極不禁揮健筆夜深猶為擁清釭聊將巻帙銷餘悶却任歌詞疉故腔藥裹欲勞丹竈一詩筒空報玉盤䨇心旌漾漾還增劇愁緒紛紛亦轉龎最愛虚簷明月上慣聞高閣暮鐘撞長時病榻憑誰遣今日詩壇擬自降瘦骨秪憐頭戴笠渴懐終慰夢吞江氣鍾嶽麓山靈閟派出長沙水勢淙一代才華煩鄭重少年功業在經邦送致仕袁太守士瑩訪舊南歸結屋深依鐵甕城可堪鄉思忽然生逢人便與留詩别為客何妨載酒行薊北交遊仍在望淮南父老正相迎永懐五馬聲華遠爭羡孤鴻羽翼輕六月長途真耐暑七旬暮景豈干名乆知宦味如雲薄却笑吟身似鶴清白日到門淹杖屨清風滿座倒瓶罌猶驚明發還分手四十年來故舊情青谿漫稿巻八
