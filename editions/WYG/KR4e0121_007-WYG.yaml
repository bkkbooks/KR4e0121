body:
  text: 青谿漫稿巻七明倪岳撰七言律詩京師十景圖詩誰築髙臺勢半傾昔人猶慕好賢名天於白日自今古士與黄金隨重輕返照又兼飛鳥沒殘霞時傍斷虹明蕭蕭易水知何地登眺惟深感慨情金臺夕照移得三山小朶峰春深長見暖雲封勢慿天闕無髙下影落人寰有淡濃崒嵂一拳疑踞虎繽紛五色想從龍湏知嵗歲為霖雨四海神功自九重瓊島春雲舊雨年來已罷飛新春深緑䕶林霏千家遠樹連民塢十里重門接帝畿佳氣凌空疑縹緲輕雲籠日正熹微紛紛車馬朝天路芳潤猶驚暗濕衣薊門烟樹池頭新漲湧盤渦宿雨初增太液波明月有時沉寶鏡好山終夕蘸青螺自緣江漢朝宗近恠得魚龍變化多萬頃汪洋涵帝澤不須天上挽銀河太液晴波曾探山罅汲深清一曲泉流玉色明偃蹇虹霓雲外影琤琮環佩月中聲飛空疑欲成朝雨漾日從教報晩晴東接天潢知不遠萬年長繞鳳凰城玉泉垂虹都城王氣接居庸晴黛氤氲入望濃峭壁倚雲籠翡翠顛厓過雨出芙蓉爭竒突起三千尺設險平凌百二重北盡龍沙東到海祗應萬里屬提封居庸疉翠琪花入夜舞纎纎曉日西山萬象兼晃漾不分瓊島路參差微露玉峯尖虚疑凍合芙蓉殿便覺寒生翡翠簾何處可人閒拄笏乾坤一色動遐瞻西山霽雪桑乾洶湧到蘆溝分得黄河一派流波影疑從天上落曙光應傍月中浮千山玉蝀晴初見五夜銀蟾曉未收人語雞聲迷遠近帝城西畔古橋頭蘆溝曉月周郊一望大田東布穀聲中雨滿空宿霧未收方杳緲隂雲漸合轉溟濛乾坤不惜栽培力畎畝全資潤澤功為想秋成登萬寶壤歌隨處樂年豐東郊時雨百里崇墉四面開朱門曾覩翠華來秋聲捲海千林肅晩吹飛塵萬騎廻瑟瑟黄蘆迷雁泊蕭蕭紅葉墮鷹臺吾皇恭儉廵逰少輦路春深長緑苔南囿秋風蕭黄門文明出判海定賀正來朝詩以告别因次其韻虎豹關嚴隔帝京蠻荒地僻壯君行平生肯負當言職天下應傳敢諫名落月有時曾入夣停雲何處不牽情那堪又作春城别把酒燒燈坐待明時元宵日也易洞為京口丁無咎賦中書璣之父鐵甕城西小洞迂碧忩深閴稱吾儒心從天地窮三畫道向羲文究兩圖㸃罷尚驚秋露滴讀殘真愛晩風呼丁寛舊學今誰繼剛見臨池鳳有雛學士四榮為丘先生仲深賦史館進書五夜奎光正燭空君王初御大明宫書從石室編摩後人在瑶階拜舞中内帑頒來仍進秩宫壺宴罷屢酬功詞臣制作追班馬得見斯文寵數隆經筵進講經幄𢎞開聖學新文華東殿更宜春緋袍肅侍依丹扆黄案徐移接翠茵鎬宴載瞻周禮樂虞謨偏感舜臣隣詞垣地切遭逢盛啓沃能忘答帝仁奉天侍宴九重春宴擁蓬山恩露親沾玉殿間天近南郊方對越地臨北極重躋攀三傳載荷君王命四品俱隨學士班為慶清時居禁宻早瞻喜色動天顔謹身讀巻纔開禁鼓已聞鐘内殿深嚴隔九重昨日聖躬親次第早時賢儁盡登庸藍袍新睹朝儀盛黄榜初頒御墨濃引領班行催入賀佩聲迢逓下鰲峰晩晴雨脚霏微斷復連小忩起坐思悠然猶聞流水長橋外驚見踈雲落照邊方訝隂晴隨地變更堪寒暑與時遷星槎咫尺銀河上我欲乘之一問天偶書六月八日暑氣微終宵積雨到斜暉老天翻覆亦如此舉世炎凉何所譏但願羣生隨意足休嗟萬事轉頭非年時誰種城東栁早見青青向十圍二十九日夜祀以病不預枕上用韻一首虎豹關嚴隔内朝門官引入暗相招鼓鍾聲動星初轉松檜隂連露未消前導公侯分兩隊後陪文武肅諸僚自緣齋祓心如惕卧聽鳴珂散九霄用篁墩宫諭韻賀樊駙馬大振總禁兵宿衛星光夜照羽林軍都尉承宣自不羣九陛崇班依日月兩朝嘉會際風雲龍蟠鞞䩬千金直鳳擁兠鍪五色文明日慶成聞錫宴宫花宫醖送微醺以侍衛不與坐宴别有頒賜云齋宫候駕次西崕學士韻銀河如璧䕶重關翠輦初臨大祀壇映日牙旗環禁旅連空甲騎擁祠官風雲已覺爭春麗雨雪先驚入夜寒禮罷天門重整珮歡騰萬國正廻鑾是日大雨雪六月九日西涯壽旦其日生子以詩志喜次韻賀之聞道君家喜有餘掌珠光彩動軒除老天自是知人意此子還能讀父書占夢固應非偶爾先一月在東閣晝寢夢人送子至至是果驗故云試啼聊復問何如醉來却憶山翁語徑作高門待汝車絲綸閣下暑雨餘春信忽傳來玉除時方在東閣得家報云翁當紱麟正張宴客喜弄麞爭致書知君於此萬已足愧我而今百不如太丘盛德老愈健會遣長文從後車西涯尊翁先生壽七十矣顯靈陳真人邀賞靜觀亭芍藥至則僅餘白者三數朶殊覺敗興乃諉之昨來風雨之厄或者未然乎即席次王世賞太史韻一首琳宫亭館曲䦨東零落全驚昨夜風羽士最宜珠樹白謫仙難覔錦袍紅依稀玉局懸孤黍縹緲霓裳墮半空舊日蕪城尤寂寞翻階春色有無中蜡月晦前三日齊宿禮部有懐館閣諸先生南宫還似玉堂寒氷雪崚層嵗向闌松露未零瑶鶴噤槐雲已老翠虬蟠笑談何地追羣彦獻納非才愧此官猶有獨眠齋閣夜時時飛夣繞金鑾和于京兆景瞻金山八詩帆引春風趂曉晴日華浮動四山明望窮東海䨇眸豁行過中泠一掌平蔬筍且便僧舍樂軒纓頓减宦途情祇緣正近趨朝路王事匆匆自有程右春日遊金山時景泰庚午也自是寰瀛第一洲凌虚長日許誰遊須知佛界波心立絶勝仙槎海上浮留客帆檣三月裏惱人風雨五更頭四難二美原非易極目江天不盡愁右重遊金山阻雨不果乘興思登江上臺天風吹送片帆來青山十里無多地白浪千層絶㸃埃樓觀真從雲裏出畫圖疑是鏡中開何如得謝樊籠去判取吟身混草萊客船小泊亦多時風雨㝠㝠有所思新賞已孤三日醉舊題聊續一聨詩夣中泉石俱空界眼底江山此色絲夙願可償君莫忘悠悠嵗月尚無涯右擬賦重逰金山舊遊何處覔行蹤勝會茫然百念空長羡上方歸衲子好分佳景付詩翁山形㧞地真成險海口吞江欲逞雄儗住窮顛携白鶴不妨見夜月開籠青山雄鎮大江流四靣江聲春復秋已信有人留勝槩也知無地著閒愁題詩尚憶當年到載酒重期此日遊艤櫂不堪佳興阻掀空風浪幾時休右約友人重遊金山阻風不果青螺臨鏡綰朝烟白首重登感少年訪舊逢僧仍莞爾賞心對酒已陶然呼黿洞口雲垂地棲鶻峰前水拍天為惜勝遊歸去晩清時未羡獨醒賢嵗華如逝抵湏愁三十年餘兩度遊離合有期諸客在去來無定此生浮寺從兠率巖中鑿江繞盤陀石畔流欲向山僧分半席驚鷗飛起斷磯頭右重遊金山則成化癸卯矣送于京兆奏績南還用其留别詩韻鳴珮來朝自舊京承恩南下暑風輕雲中遠樹連瓜歩江外危樓繞石城去去檣烏猶在望翩翩竹馬正相迎漢廷不久徵黄霸記取吟壇此日盟𢎞治紀元戊申二月十三日侍從親耕藉田用程學士韻一首懐不能已復綴短韻一章南郊晴旭晃鑾儀天路無塵進輦遲京兆青箱依耒耜教坊花鼓應旌旗明禋早致先農享粒食仍歌后稷詩聖主重民親稼穡此生何幸際昌期貔貅萬竈繞城坳禮重親耕指近郊豐稔早占穜稑種泰和端叶地天爻弄田何足論鈎盾勞燕真看出大庖詔許三農瞻日表不須前纛擁蒲梢時有詔庶民終畝者許拜謁廷下二十二日奉制命往祀天壽山之神二十五日禮成而還香幣遥從曉殿頒小臣承命謁橋山千年王氣蟠龍虎五夜祠官擁珮環草木潤囘新雨後壇壝髙出亂雲間禮成正及曈曨曙携得天風兩袖還長陵北上寶山東仄徑縈廻萬壑中鳥道泥新初過雨虎籠雲暗欲生風禮嚴牲幣三酬獻誠協人神一感通歸路却驚甘澤遍夐無塵土自春融壽程詹事母夫人籬菊堂萱雨露濃深秋嘉慶喜重逢孝隆學士三牲養恩並尚書八座封酒熟芳筵開玳瑁香凝畫閣擁芙蓉青鸞忽報仙桃至春色紅酣映壽容除夕有感流光冉冉嵗華窮不盡煩憂感慨中千里將家思有託兩朝叨禄愧無功文章早幸歸詞苑禮樂何能輔秩宗四十五年如夣裏明朝依舊對東風謁文惠祠仙李根危葉漸微乾坤滿眼事全非癡姨自謂能忘世此老真思為解圍折翼固應心已悟褫魂應遣夣先飛白雲紅日依然在燈火嚴祠幾夕暉題鏡川楊先生園亭宴客詩巻短籬曲徑水之湄靣靣春光日日宜入座雨香芳草合開簾風軟落花遲長懐廊廟匡時學猶見園亭宴客詩宦業自髙心自樂平生佳興許誰知哭同年陸靜逸鼎儀仕終太常少卿兼侍讀聊因多病解朝衣聖主恩深特賜歸屈指方憐經嵗别傷心竟與此生違秋風髙塚應臨海春雨空堂自落暉忽見賢郎增哽咽語闌唯有淚頻揮去嵗始以病解經筵日講而歸未期嵗遽卒與其子爰道之益慟云春雨其所居堂名贈南京禮部尚書諡恭毅章公大經輓詩遠佐南銓更秩宗兩朝清宦聖恩同歸來已遂閒居樂老去猶存直諫風景泰間上疏乞復儲位下獄幾死詔贈新銜傳美諡史編舊疏表遺忠時修憲廟實録有詔令編舊所上疏於其中晩生方切通家誼無限深情感慨中公與先公同年進士且同官南京禮部云宣府朱用輔秀才輓章寄其弟用吉落日孤雲隔塞垣因君堪恨不堪言寒齋瘦骨那禁病遠道悲歌更慘魂無復姓名登虎榜空餘涕淚滿鴒原蕭蕭宿草城西路目斷跑沙十里村跑沙葬地謝方石乃叔寶慶太守采藻亭次韻有㑹緦堂皆在墓所采采長憐澗有芳是誰沾濕弄淋浪才宜補衮身先退禮重維筐志不忘百代功緦從會合一時伏臘許相將草池竹徑情何限猶自悽然向曉霜送侣都憲大器廵撫江南次韻别時衆以劉宴文襄致望故云䨇旌直下大江東五夜清霜動曉風赤縣正依瞻望表蒼生全藉撫摩中覆盆鬱抑能無白充庾因陳漸有紅今代文襄古劉宴臨岐一語已歸公贈台人王古直次韻古直復遊京師吴匏菴庶子贈之以詩因次其韻嘗於謝方石所聞其醉歌清裂可愛也旅食京華三十年風流應出杜陵前重來却喜成詩巻老去何須覔釣船野鶴不覊非漫爾浮雲無定本悠然相逢最是聞歌日醉裏渾疑樂在縣大司馬王公公度輓詩河隴歸休二十年勲名真羡始終全孤忠報主今誰及大手摧姦世所賢功在東南資國計令行西北付兵權經綸未盡身先老千古髙風自凛然送唐黄門使兩廣其先有仕廣者遺廟存焉且得便道還常省母云三月都門半落花却看䨥節送皇華鳳毛天遠辭青瑣鶴髪春明擁翠珈遺廟瞻依初過嶺髙堂拜舞正還家壽筵一為歌來諗此樂知君未有涯送同年梁都憲廵撫四川二首幾載湖湘政有成重持霜節劒南行忠臣舊識王尊志亷吏今推趙抃名望裏雪山從此重到時錦水向人清稜稜風度臺端栢先見嘉陵老稚迎分陜初看出帝京隴雲江樹幾馳情還家又作三年别鎮蜀重驚萬里行從古賢勞多注倚祗今離合太交并丈夫事業相期遠休問陽關第幾聲宿大勝寺敬次壁間詩韻薄暮風濤正滿林禪房真慰入幽深迎門老衲知人意懸壁華箋感客心誰信百年存舊跡獨憐三歎有遺音人生會晤元非偶又復斯文此盍簮三月九日聖駕幸學先是阻雨改卜適際晴和侍從觀禮喜而有作聖主崇文幸辟雍駿奔百職訝雲從方驚風雨終宵靜自慶衣冠此日逢詔下青衿增感激禮成黄幄倍從容談經却羡師儒地獻納能忘答九重雨餘春意滿賢關咫尺天臨侍從班曠典正逢三月裏清光近仰一堂間新加牲幣過唐宋遠紹雲仍及孟顔十里旌旄紅日擁鑾輿徐馭六龍還三月十二日肇開經筵岳以翰林舊僚叨侍講讀荐䝉燕賚感而有作講殿春開第一筵師臣敷對更精專龍飛五位文明盛鵠立羣工禮度䖍早奉王言頒玉勅初聞帝典啓瑶編非才素愧匡時學重荷恩休倍悚然載瞻經幄侍文華天語親聆寵數加燕錫大官當禁闥恩頒内帑到儒家逢時有幸應知感稽古無功詎足誇誓竭涓埃裨海嶽祗今文運正亨嘉嵗暮祫祭大禮肇行駿奔之餘喜而有作天晴除日凍初銷聖主乘春下九霄合祀始崇周典禮分班仍集漢官寮寢宫簾影依龍袞輦路鑾音協鳳韶至孝夐超千古上遺經曾見紀宗堯廷試供事次屠都憲朝宗韻二首聖主臨軒第一春諸生敷對意俱新風雲早際明時會民物同歸大造仁時制䇿以西銘民胞物與為問却羡俊髦髙擢第端期忠孝重書紳非才沾被今三度分得恩波下紫宸羣公同挹廟堂春多士均沾雨露新明日藍袍承帝命一時丹悃答皇仁騰懽早見傳衢路稱賀還期擁佩紳華葢天髙瞻淡墨遥聽宫漏候嚴宸大司馬馬公廷試志喜有作次韻二首董賈賢良初獻䇿唐虞敷納正求才一言共喜龍顔合五位遥瞻雉尾開奎壁光芒動霄漢衣冠遭際極公台茹茅已協乾坤泰願上君王萬壽杯南宫喜占非常選東觀期收不世才忽報彩雲隨日上却驚黄榜自天開恩榮便擬霑需宴宦達終看列鼎台一路春風桃李外大官催賜曲江盃十二月朔旦聖駕視牲南郊先是風寒特甚至日天日晴和遠邇忻戴大司馬馬公詩以志喜遂次其韻成二章云昨日風寒今日晴天知聖主視郊牲鮮颷不動旌旗影協氣潛諧鼓吹聲入臘便驚春意早向陽仍愛暖雲輕太平有象人心悦昭格惟應在一誠深冬風雪轉新晴車駕親臨大祀牲節近土牛春有信令嚴鐵騎夜無聲龍樓日射金鋪麗鳳纛雲移翠羽輕須信格天非異術吾皇端拱久存誠青谿漫稿巻七
