body:
  text: 青谿漫稿巻四明倪岳撰七言律詩甲申元日奉天殿早朝漏咽銅龍斗已横儀鸞仗簇近朱甍九光燈下千官影五鳳樓前萬嵗聲浩浩君恩沾海宇熈熈王氣擁神京微臣何幸瞻天表願結丹心答聖明藥園幽趣為四明醫士馮半軒狂客芳園何處尋半軒東去莫雲深雨餘修竹春多瀝月到零榆夜有隂昌歜盆池森緑玊菊花籬落爛黄金眼前藥物皆成趣却笑廬山只杏林遊西山詩答謝鳴治鳴冶以無騎不果行詩以送别因賦以答與時雍同居故詩及之玊堂深幸一官閒曾許山行並錦鞍禹錫自應先致約𤣥暉何事惜追歡地靈無恙重遊易宦路多岐一會難試問匆匆百年内好山能得幾同看出城太平時節好閒行侵曉聨鑣出帝城凉露拂衣雞唱早香塵擁靣馬蹄輕佳山秀水如迎客烟栁鶯花儘弄晴勝地不常人易老莫教碌碌過平生遊玊泉華嚴寺門外寒流浸碧虛玊泉山上老僧居芙蓉雲瑣前朝殿耶律詩存古洞書曲澗正當虹飲處好山相對雨晴初笑攀石磴臨髙頂浩蕩天風襲翠裾晩囘登臨興倦欲忘還歸到重城半掩關仰見明星環北極囘看爽氣滿西山空過白日應何補老向紅塵總是閒我遂清遊皆帝力願將丹悃謝天顔和鳴治别後有懐韻春山窈窕帯春城公暇追遊逐伴行幽壑雨晴泉響近隔林風細鳥飛輕經過不盡山中寺歸去空題石上名獨羡謝家芳草句鏘然猶自向人鳴奚元啓復中乙榜詩以慰之鏡裏流年四十過獨憐猶自困儒科功名有分嗟塗漆嵗月無情感逝波天上風雲初志在眼中朱紫故人多臨岐莫苦傷懐抱梁灝名成鬢已皤雨結愁雲曉未收仲宣乘醉强登樓天涯又作三年别客裏那禁兩鬢秋宦迹真成蕉下鹿鄉心應逐海中鷗相逢莫笑儒官冷絶勝青衫汗漫遊送董壽卿吉士赴南京戸部清髙自是玊堂仙拜命驚看去日邊身屬地曹官六十心違天陛路三千半山亭館閒春雨六代臺城瑣暮烟同宦更逢摩詰在思鄉懐古共依然送程熈同知汀州拜命榮看佐一州平沙南去路悠悠蠻烟曉入鄞江合瘴雨晴分贑水流五馬秩崇新貳守專城任重古諸侯郡齋正對䨇清閣雪月霜風謾倡酬郡有䨇清閣丁亥元宵前三日宿院中分得金字四海昇平逢令節百寮休暇荷綸音畫橋遊客看行馬玊署閒官笑盍簮花滿樓臺春簇簇月明燈火夜沉沉不眠更盡今宵話共惜流光抵萬金元宵會鳴治宅大雪得催字玊堂風雪坐崔嵬欵叚衝寒入夜囘鯨海有塵飛弱絮鰲峰無地着踈梅雲深不礙燒燈去春早何煩擊鼓催却笑儒官貧到骨也來相對一銜盃新春感事烽火邊城鼓角悲黄沙漠漠北風吹關山遠隔雲中戍車馬新屯㶚上師賈誼有才思報國杜陵多病尚憂時侍臣誰有如椽筆擬撰燕然第二碑賞李景信東軒瑞香花次韻淡抹輕粧弄晩晴花開簇簇影亭亭天培仙骨呈清瑞風吐龍涎出素馨碧笋攢雲初破蕋紫茸含露正當庭怪來詩思清如水吟倚䦨干醉眼醒臨到開時日正陽倚風渾似舞霓裳十年不見江南種三月驚看薊北芳穠艷未容誇國色髙標應許占春光日長相對如佳客絶勝紅粧詠海棠曲䦨日上影玲瓏香氣薫人亦自融滿室春風囘綺席一簾晴霧散雕櫳花攅淡白團圞宻葉簇輕青㸃綴工好是羽衣歌舞罷天仙清倚廣寒宫送周德源南還兼柬沈仲律相看未久還相别把袂臨岐不可留正是驪駒驚客思更禁燕子説鄉愁雲開潞水青㝠杳雨過鍾山紫翠浮到處定應逢沈約春城無事好同遊錦袍著處帶春暉家住南都信有依鄉里更無同榜在衣冠獨與故人違天涯已作三年别江上徒聞一棹歸報國無能親舍遠送君空有夢魂飛四月八日遊西山道中有作呈奚元啓匹馬行春到郭西遠山無數暮烟迷林間已覺飛花少風外還看落絮低宿麥帶黄應半熟新蒲抽緑未全齊舊遊又是三年别此日重來取次題醉歸漫成二章遠尋幽境過湖西入眼雲烟萬樹迷水到中流驚地㢠山臨絶頂覺天低殘花㸃徑紅猶在新竹過墻翠欲齊醉裏已忘身是客興來那惜一分題相携同出鳳城西沉醉歸來路欲迷馬蹴香塵風轉急鳥啼深樹日初低耳邊已覺泉聲遠眼底空憐草色齊分手殷勤重寄語明朝還擬續新題端午會孟陽宅分得石榴五月薫風送晚凉海榴成子日初長參差半向花間出錯落偏宜葉底藏紅玊暈肌空賦色驪珠充腹半含漿遥知嵗暮重來賞醉裡須分一顆嘗同寅章德懋黄仲昭荘孔昜以言事去職為之太息書此自示不寄三人悠悠往事不堪論黙黙窮愁淚暗吞敢向明時傷遠謫獨憐壯志付空言楚人但識湘閭去漢室誰知汲黯存愧我同官未同事端居真已負君恩戊子新春日寄上谷諸舊遊故人底事乆無書塞徼天髙雁影踈寂歴氷霜驚嵗晚芳菲風日又春初幾廻常見百年内千里相思一夢餘却憶舊時詩社客于今􅆳倡復何如雪中憶張亨父次賓之韻復用韻寫懐坐看初雪轉霏微已覺尖寒到客衣嵗事半於愁裡過鄉心全在夣中歸經秋寥落慵開巻長日蕭條靜掩扉却怪故人音信絶海天空闊雁來稀曉色侵人已細微早寒真欲詠無衣蕭蕭病葉驚風墮冉冉昏鴉帶雪歸卓筆且從臨草韻提壺誰為款柴扉故人多在經年别嵗晩方嗟聚晤稀聞㨗後值雪喜而有作二首用韻柬賓之西征烽火照金微東望兵戈動鐵衣一道渠魁皆手縳三邊酋長定心歸馬肥塞草空鳴柝犬卧山村不掩扉從此軍中知小范平胡歌頌未容稀近猶簌簌遠全微半欲隨風半㸃衣沴氣定從今日去凱歌偏與一時歸朝囘客舍初分火睡起隣家尚擁扉可信春來農事早豐年三白故應稀曉發張家灣以下歸省之作一别家園二十秋寧親今日始歸舟笳聲半欲衝風起帆影遥應逐浪浮官裏故人情眷眷天涯游子夢悠悠鍾山何許三千里望入白雲天際頭晚泊天津望海有作船忩南望路漫漫一曲滄洲俯碧湍水國雲深帆影斷海門天濶雁聲寒離憂未信江湖遠醉眼全驚島嶼寛囘首帝京三百里不勝清夢繞長安過南旺湖望䝉嶧諸山十里青湖一棹通夾堤榆栁受東風漁人出没菰蒲裏客子謳吟烟雨中東望龜䝉餘魯甸西來鳬繹閟秦宫寒忩寂寂空懐古此日經遊嘆轉篷過淮隂寥落城西謁舊祠王孫踪跡正堪悲功名過眼應誰惜籌䇿驚人秪自疑走狗雖亡秦鹿在牝雞未死漢雛危傷心欲問淮隂水隴樹蕭蕭沒斷碑至龍江關望京一江晴漲風烟合萬里春山紫翠浮虎踞龍蟠皆舊跡雨香雲淡足新遊扁舟且為留行色尊酒憑將洗别愁二十年前曾着眼不知猶識舊吾不謁先母夫人墓青山鬱鬱隱佳城一上新亭百感生口澤荒凉空在眼淚痕零落正吞聲斑衣竟失當年飬錦誥虚違此日榮再拜松楸心寸折不勝遺恨負生成送陳員外致仕歸呉已喜相逢在帝鄉忽聞相别意凄凉彈冠早負心如水解組才驚鬢未霜千里有懐憐去住百年無計感行藏秪須預卜林間地聊與重開見一堂呉中風月曾遊地江上衣冠正别時一曲離愁尊酒劇五更歸夣片帆遲輞川佳興新成畫工部生涯舊有詩執手臨岐空慰藉北山芳草動遐思遊無錫小嵩山僧寺山寺閒遊未許違雪晴臺殿望中微歸田學士元能賦入定髙僧乆息機塵外烟霞行漸近林間車馬到應稀我來不盡登臨興把酒長歌對落暉次錢學士先生韻嵩阜雲深日下遲登臨隨處一支頤樓臺乆占山中勝松竹偏呈雪後竒欲上鼇峰猶駐足忽聞蓮社已攅眉相逢莫道勞塵鞅有約來尋玊版師右山行之作僧房深靜絶浮埃今日山靈笑獨來天際羣峰擎雪重林間一徑倚雲開孤吟愧我非佳句清倡憐君總俊才忽聽笳聲驚日暮天風吹送馬蹄囘右次東園楊守倫韻余自杭省墓囘道過錫峰磚橋錢氏諸昆玊邀遊嵩山禪刹此刹建置未百年而林木蓊鬱山水縈帶真一佳境諸縉紳游者皆有佳製主僧輯而成帙出以見示因遂掇拾一二以復時同遊沂州貳守王敏行瓊山司訓盛仲規士人楊守倫呉與平錢氏孟津孟溥孟潤洎其賢子姓云成化己丑十二月二十三日登濟寧太白樓樓在城南門上五月既望余歸省還朝適會劉地官世美于濟寧畢水部廷珍所以舊同寅之故拉遊城南太白樓瞻拜遺容不勝企仰因成一律徧呈同遊諸君子聊紀勝遊非敢為作者道也一上孤城意已秋謫仙狂客舊風流雅宜庾亮三更月不獨元龍百尺樓天影漸看雲影逼山光長共水光浮何如喚起文章伯相與􅆳酬一醉留贈奚元啓二首用賓之韻元啓病中失走問何處尋君一叩關春風談笑正忘還客邊已是經年别病後渾非此日閒老去宦情依北斗晩來吟趣對西山也應莫怪經過少尊酒相逢足解顔門巷蕭條晝不關故園迢逓夢中還一年風景又如此百嵗光隂皆等閒愧我春愁濃似酒憐君詩骨瘦如山微官乆負匡時術飽食能無獨厚顔壬辰齋居和程克勤韻氷雪蕭蕭接禁城髙寒偏稱玊堂清烏啼别院驚風色樹影空堦碎月明吟倚青氊憐獨倦坐燒紅燭笑頻更夜闌已及南郊罷忽報銅龍第四聲送錢塘徐子久南還鄉進士時用之子以乃祖尚書恩將入太學南州孺子西湖客雛鳳曾驚五色竒今日雲霄仍解后九天風露獨葳㽔壯遊已逐飛鵬遠歸路翻嫌去鷁遲後夜錢唐江上月蕭然何處照相思送惠州陳教授海南初夜見文星瘴雨蠻烟亦謾經十載宦途䨇鬢白半肩行李一氊青龍門水落鄉心遠虎阜雲歸客夣醒却喜坡仙行樂地松風長滿舊時亭輓呆齋閣老先生玊堂黄閣掖垣東三十年來宦業同拜相己憐君實病談經猶憶鄭𤣥工乾坤闔闢圖書在日月昭明奏䟽通囘首門墻成悵望椒漿欲奠恨無窮送張狀元昇謁告還南城一夜西風吹客衣朝來忽報狀元歸香浮秋水青蓴老影落寒江白雁飛去路帆檣移暮雨到家橋梓聳晴暉詞垣故舊應相憶早擬囘翔上帝畿八月十四風雨之夕病中望舍弟消息不至悵然有懐西風門巷掩深幽一卧兼旬倦出遊江上行舟猶渺渺忩前落葉更悠悠新寒未慰相如病舊雨仍增宋玊愁明日隂晴知未卜有無詩酒對中秋晴洲為程司馬題松蘿山名練湖玊几峯皆旁地也主人結屋依晴洲松蘿深處林塘幽練湖水落石齒齒玊峯雨過雲悠悠清潭白沙遠相帶浴鷺飛鳬還自由君恩未許却歸去空向夢中懐舊遊遊西山圓靜寺皛菴限韻一首半山晴雪䕶禪菴門外長堤到水南隔嵗踈篁猶个个倚雲危磴自三三清風送我來璚島垂栁隨人墮碧潭莫笑躋攀凌絶頂登臨髙興固能堪遊玊泉洞限韻一首壁間有詩云洞口桃花春不管山中芳草夜如何之句乃金人之作誰鑿青山一竅空春寒深瑣夕陽中平臨北極無塵到近接西湖有路通窟底雲雷生白日忩間松柏下清風舊題磨滅猶堪認芳草桃花沒斷蓬登功德寺新閣限韻一首憑虚髙閣不勝寒乘醉來登更倚䦨十里湖光通几席八囱雲影上衣冠荒臺漫惜千金業羸馬聊陪一日歡極目天南馳遠眺催歸無那夕陽殘玊泉限韻一首西山深處俯流淙亂石清泉自擊撞鐵馬嘶風驚客枕玊虹拖雨過禪忩臨谿正愛紅亭一逆浪時看白鳥䨇萬斛塵襟渾似洗酒酣應使寸心降西湖限韻一首望盡西山十里湖平洲縹緲水縈紆潜腥乆識魚龍近倒影長憐島嶼孤落日微風吹白浪深春細雨出青蒲經過幾度懐遺跡百尺荒臺草半蕪新喻易乾剛自遼陽歸傅曰川求詩贈之凉入京塵暑氣微樓船南下客初歸栁條不受離情綰詩巻猶煩急手揮遼海雲開孤鶴起楚江霜落片鴻飛故人無限雲霄意尊酒相看又夕暉送徐禮知保安州西北山城䕶一州使君出守羡才猷玊關人去風初泠紫塞書囘雁已秋村塢蒼茫禾黍合邊烽寂寞鼓鼙收詩成翻怪多離思極目雞鳴感舊遊送韓府楊敎授學士尹先生表弟王國才名起薦書鄒陽年少拜新除談經自信非調瑟擁佩還聞勝曵裾江路樓船楓葉老都門尊酒菊花踈詞林學士題詩别明日看雲思有餘奉命進學内館和李賔之詩韻二首久看清秩重周行總慰羣英萃一堂跡厠詞林元瑣瑣行迷學海尚茫茫唐人已勒中興頌漢史仍傳急就章豈有雄才陪載筆聞宣常近殿東廊簉羽深憐白鷺行迂踈如我亦升堂清臨華葢真叨竊近接瀛洲豈杳茫擬向圖書探月窟却驚奎壁煥天章儲才更荷君恩重早見綸音下廟廊青谿漫稿巻四
