body:
  text: 青谿漫稿巻一明倪岳撰賦楨陵雪霽賦天順辛巳楨陵之為地乃宣平之故疆居帝京之北鄙當朔漠之中央為十九衛之都會羌百萬姓之保障池之深兮削數仭之峻岸城之堅兮連萬雉於髙岡實國家之藩屏邊陲之禁防者也予親罹患遠謫於斯嵗月云邁裘葛兩移逝冉冉其秋候届烈烈之冬期顓帝主令元㝠布威日雖可愛寒則已祁惟十月之載廿正小雪之應時訝滕神之一駕俄濃雲之四垂風聲颯兮凛冽日色慘兮蔽虧天地復混沌之始乾坤張醖釀之機犬吠於户雞栖于塒是則天時之向暮而雪意之先施者也頃之雲既同風始息一白呈祥六花如席玊龍敗而飛鱗鹽虎卧而留跡光揺揺兮撲簾而下聲簌簌兮縁堦以積萬里飛璚頃刻盈尺予方擁布裯以髙眠覺天地之為窄既而鐘聲遠度雲影漸開驚譙角之一奏俄旭日之東來既晴景之可愛仍吟興之滿懐於是登鎮朔之樓俯凌雲之檻驚萬物之不緇縱六合于一覽以言其遠也則洋河東逝白虹逶迤燕然南峙玊㦸參差望飛狐之口兮眇琳瑯之委籍顧長城之壘兮積琬琰之崔嵬雲中居其西兮皎白雲之縹緲龍門居其東兮粲素練之離披以言其近也則粉堞櫛比而有耀鴛瓦鱗次而生妍銀為城兮闢重門以若璧玊為道兮夾萬井而如弦是以三農鼓舞於窮櫩之下莫不占其為大有之年也嗚呼是胡為乎然哉葢是雪之降既當小雪之節且値臘前之候后土以之而潤澤宿麥因之而暢茂蝗種滅兮誅遺育於泉壤民疫蠲兮獲生全于宇宙衣食遂于飽暖田疇易于耕耨則夫是雪以時而降得非佳瑞自天而授者乎然而撫玩既乆寒威轉惡盻旅舍以來歸慨朔風之如割遂呼肴命酒舉觴獨酌圍紅爐擁厚貉俯仰無拘襟懐恢廓睹豐年之有徵心烏得而不樂哉酒既酣乃捧腹而為之歌曰楨陵兮邊城羽檄停兮時昇平豐年呈瑞兮達旦而晴諒聖德之所致兮非一言之可名耕藉田賦二月十六日内閣試題臣聞籍者蹈籍也人君躬蹈于田也或曰藉者借也借人力以終之者也葢人君事神明勸農務禮之不可缺者焉粤昉于周有典有則然弄于漢昭廢于晉恵禮其紊矣開元肆赦端拱錫爵禮其瀆矣爰稽舊章夫何足取之肆惟聖皇以即位之明年改元成化採春分之令辰舉耕藉之大禮誠有以超往古而軼成周者也臣叨職明時躬逢盛美望朱紘之光聽鑾輅之音雖無雅頌之才以繼載芟良耜之作然宣鴻勛推明效竊有志焉謹拜手稽首而獻賦賦曰欽惟皇明受天休命我髙祖乃御神龍而奮飛感民心之丕應揮天戈而九鼎歸一戎衣而四海定於是創制立法叙禮和樂廼輯民生廼求民瘼式命耆宿朝以望朔天顔俯臨誨諭諄恪念無逸稼穡之囏考周禮天官之制而耕藉之禮所由以作也欽若太宗宣光重離拯頽綱以復振撫皇運以雍熈穡事惟重憲章是稽昭皇章皇善繼于茲英宗當天務農不遺亦有事于千畆嘗輟勤于萬幾迨我聖皇紹統率舊不愆鴻恩滲漉海隅覃延大明重熈成化紀元王正之吉禮崇祀天乃追五朝之著令開千畝之藉田維時仲春土膏脉起東作方興宜事疆理帝乃御前殿頒睿㫖將順時以勸耕舉先農之祀禮先朝致齋省心潔己於是冬官撰播殖之器則維耒維耜其製孔嘉維朱其柄維金其牙烜赫巧麗流耀生華錦衣列鹵簿之駕則越象重寶宛馬玊輅羽旄連空旌旗拂露飛蓋方圓執戈上下肆繽紛而雜㳫備乘輿之服御維彼圉官耕犢謹飼角端領厚首巨形魁飽以芻粒絡以青絲俟當舉趾驅焉以隨若乃師旅列衛都門戒嚴萬騎駢駐兵矛利銛京師警肅聳乎具瞻是日也雞鳴告晨尚衣盛服免視朝于百辟迎扶桑之朝旭帝乃出宫時暄景淑於是駕蒼龍遵皇衢士女快覩臣工奔趨貔貅雷動而方駟驊騮魚麗而前驅和鸞鏘鳴劍佩陸離亦曰至止維田之墟駐皇轡以歴覽睠畎畆之有制溝洫决乎四同疆埸連乎無際町塍棊布原隰鱗次甫縱觀之方周俄陳滌之已備觀夫巍巍青壇築之東方奠祼既列執事雁行帝乃御袞冕鏗珩璜秉圭璧將幣筐以享以祀維牛維羊精誠通乎㝠㝠雅樂奏乎洋洋兾先農之歆格祈我田之既臧神曰不留雍徹以退帝降靈壇乃撫御耒紺轅既駕黄縚斯委青原俶載沃壤維融司農陳青箱内宰奉稑穜民耆相犁以先邁司徒執筞而後從乃舉玊趾乃披䝉茸澤澤其耕南畝之中我疆我理必親必躬展盛禮于三推效勞役于九農雖禮官之告止羌千畝之願終載登于門于焉以憇侏儒効能乃陳百戲同斯樂于臣民召至和于天地爾其三公肅事九卿駿奔庶士御事進趨惟勤而五推九推之禮於是乎行焉庶民子來喜色忻忻樂于趨事荷鍤成雲而終畆之績於是乎成焉羣臣輟耕帝心垂眷乃臨齊宫勞之以宴良醖瀉乎黄封大官供乎玊膳陳振鷺之萬舞奏鈞天之九變歌在鎬之豈樂申既醉之祝願禮成宴罷鳳駕囘鑾彌文闊典千古幸瞻其盛德大業實所以立生民之命而騰萬姓之歡者也若乃黍稷彧彧豐年穰穰是割是穫乃積乃倉精糳于以供粢盛芻藁于以餉犧牛或奉天地之獻享或備宗廟之烝嘗肆昭假于上下惟降福之皇皇綿子孫于不替延聖壽于無疆臣嘗聞之周之立國本之於農后稷粒生民以開基公劉篤前烈而纘功文王九一行於岐豐武王有藉諸侯朝宗成康繼立越在幼冲方作詩以深勅重嗟嗟于臣工駿發爾私噫嘻勉終四夷賓服海内時雍藹泰和之盛治致比屋之可封於惟聖朝與周方駕列聖相傳一德流化帝初嗣服首務躬稼抑工商之末業興農作於䆉稏於戲盛矣哉嗟夫五禮之事惟祭為大用已力於勤勞薦神明以馣馤固有以昭孝誠致明賚矣然而萬民以勸稼穯是親棄末反本法于一人則田無閒曠之地國無遊惰之民帛戔戔以在笥粟陳陳而相因由是衣食之計足亷恥之心生風俗由之而歸厚禮義于焉而聿興會極歸極蕩蕩平平民日懐於遠法治益臻于措刑若乃叶氣融液蒸為休祥景星耀而泰階平玊燭調而卿雲光麒麟遊于郊藪阿閣巢乎鳳凰器車在山醴泉可觴則億萬斯年臣有以知皇圖之固如日升而月恒帝歴之綿同地久而天長者矣復系之以辭曰帝乘六龍以御天兮協風囘春農祥躔兮瞻彼南郊開藉田兮順動法豫時行應乾兮青壇致祀舉趾長阡兮耒耜云釋廻旌郊廛兮粢盛有備致孝䖍兮穡事用勸作黎元兮春生八荒大有年兮化行民勤力本專兮俗用丕變道平平兮載芟作頌播詩篇兮巍巍赫赫百世其傳兮炎暑賦内閣試作噩之嵗六月既望余退自公朝假憇玊堂有客從余而登焉余乃喟然歎曰皇天平分四時兮夏隆赫而當陽時生育以長養將既阜而既昌羌振威以肆虐物胥焉而用傷揆薫熇之所由知孰司其崇綱炎帝降兮乘離紛巍巍兮執衡前燭龍使先驅兮後熒惑使從行叶羲和攬轡以雜進兮驂囘禄與畢方火旗獵獵以當空兮傘熖熖以髙張獨丹烏彌節而後殿兮白日之彌長使豐隆𤣥𠖇屏氣而不得伸兮何飛亷之顛狂飛塵隘土井泉竭縮鱗巻鬛蛟龍藏沙石兮銷鑠草木兮枯黄山延燌焚以凝烟兮水洶湧其如湯盡六合以為爐兮豈獨炎乎崑岡委藉乎殷紫兼蕪穢之紅芳詬絺綌以為重兮豈天時而不當揮霜紈而脱余腕兮何仁風之可揚緬河朔之嘉會兮思解釋乎冠裳拊煩襟而太息兮汗汨汨以翻漿晝既蒸炊之如甑兮夜復蚊蚋之在房顧何以寧吾軀兮謇余熱乎中腸吾將東浮于滄海兮棹溟渤而擊空明叶嗟扶桑為日之出兮更酷烈而無所藏吾將登崑崙之絶頂兮窮天上之銀潢折玊井之蓮葉以為舟兮駕清風于一航恨不得假羽翰於兩腋倐忽舉身而西翔顧南溟之可泛兮又瘴毒之匪常鳶跕跕以下視兮援溘死以流亡吾聞隂山積氷之可鑿兮步余馬於北荒何地皮㬠烈凍䑕渴鬼方暍死空邊疆東西南北皆不可以往兮禹方之廣徒茫茫夫維木天之爽塏兮寔冠絶乎帝鄉崇垣繚以􅟭屼兮長河繞以汪洋比萬乘之武庫兮靣萬雉之宫墻花雜樹之百卉兮槐周植以千章布佳䕃于館閣兮含笑語之微凉亶炎暑之去避兮豈康娯而自忘曲肱枕以髙卧兮渺夢揖乎羲皇顧此之可樂兮又何必遠遁而奔忙快矣哉客之適兮又孰知余樂之未央客起而正色曰是非余之所知也夫陽極而暑炎矣皇天道之孔昭故曰萬物並生於天地豈余身之獨遭任寒暑之自然兮成嵗功而不勞歐陽公暑賦而子亦物耳胡病此而呶呶且天下食力者衆豈盡閒逸如吾曹彼菑畬之田父兮冒烈日之熬熬挽泉流以下灌兮聲密連乎桔橰手耒耜而戴笠兮肆藨蓘以立苗幾垂氣而不蘇兮又奚啻爆熇而灼􅀢或牽牛以服賈兮睠征途之迢迢既􅮐壤之若燎兮又逆旅之無聊方駕言以行邁兮曾不計夫銷骨而流膏若乃邊關戍卒稱干立旄夕枕藉乎金革兮朝並驅乎兩峱想敵夫王之愾兮而擬絶乎天驕日擾擾而不得息兮徒哀鳴以謷謷嗟露處之鬱蒸兮益心曲之如燒彼秉忠以圖報兮雖炎暑其亦何逃予徒食禄亦何補兮重清職之逍遥舍民困之弗恤兮而欲據此以自豪余肅然而興愕然而駭顧無詞于復客乃作歌以自解歌曰維時長夏兮極炎暑人之靡寧兮汗如雨嗟余鬱鬱兮困不蘇仰捫皇天兮獨號呼南薫一奏兮發幽韻阜民之財兮解民愠天心聿昭兮聖躬勞四輔弼成兮勤爕調亢陽隠伏兮鮮颷鼓清音均溥兮遍寰宇功及物兮祥氛清隂陽循環兮以常行余竊職以何為兮惟詠歌乎昇平辭望雪辭内閣試題夫何𤣥𠖇雨雪之愆期兮羌有失於天職雲何為兮不同霰何為兮不集悵仰天而馳望極余懐之鬱悒風不凛兮凄其氣不嚴兮烈栗何顓頊之不亷兮奪彼陽春之煦日煦日兮融融念匪春兮伊冬睠連雲兮宿麥及在地之遺螽茍一雪兮有靳曷由致兮年豐年不順成兮曷怙札瘥多兮沴氣布步璿衡以推測求蒼天之何故天漠漠兮莽無垠目渺渺兮徒傷神嗟三農之渴想何滕六之不仁冬之日兮苦短節序邁兮非緩恨不得起逝波于銀潢煩此天孫之一剪天與民兮情自符德潛感兮非我誣况嵗臘兮尚遠更聖皇之馭圖將天心兮上格驅豐隆兮命風伯霏繽紛兮素英大雪降兮三白跂予兮望之盡六合兮登春熈承上天之嘉惠皆吾皇之恩私白雲辭寅友謝先生鳴治謂余曰鄉人趙廷時讀書好古善吟咏居樂清海濱其地曰花塢花塢之山自雁山延迤而至海岸東行杳然如入無人之境因扁其居曰白雲深處且稱其頗好知音非草草者要余為白雲之辭以發其山中之趣遂為之作短辭三疉填其巻尾云白雲兮英英渺雁山兮深谷顧縈紆兮芳林忽舒徐兮前麓聊棲遲兮終嵗何高軒兮華屋列圖書兮壺觴日吟嘯兮相屬謇山中兮樂只望羙人兮幽獨白雲兮悠悠睠花塢兮少留時逍遥兮採芝羌窈窕兮經丘獨行無友兮吾將安求出與雲俱兮歸與雲游鳥交交兮鹿呦呦原可田兮水可以舟謇山中兮樂只望羙人兮獨幽白雲兮翩翩海之湄兮山之巔煑溪中兮白石酌屋上兮清泉嗟清時兮嘉遯信夫君兮獨賢紛華俗兮超忽維白雲兮周旋謇山中兮樂只望羙人兮悠然忠愛廟迎送神曲福汀忠愛廟在郡東龍山之麓祀故推官謝侯汀以正統己巳有冦賊之擾侯極力捍禦又原其脅從者縱遣之因卒于軍中民思其德為請于朝立廟祀之其子翰林學士大韶求詩以祀為作迎送神曲南風來兮汀水波蒼龍伏兮鬱嵯峨簫鼓喧兮廟門啓伺吾侯兮山之阿孔葢張兮振翠珂旌斾遝兮軒從都侯治汀兮政不頗犴狴清兮布陽和汀民擾兮侯荷戈活汀民兮侯功多報功有祀兮頌德有歌願終惠兮永矢弗他青山隠兮龍欲翔汀谿澄兮南風凉幸侯至兮設侯床蕙殽蒸兮薦椒漿侯神遊兮横八荒民德侯兮何時忘侯之生兮嶽降祥享汀祀兮紛洋洋侯有子兮步玊堂握文魁兮挾天章侯之來兮時雨暘侯之去兮降福穰雲軿遠兮不可望願終惠兮傳無疆瀛洲别意送賓之賓之既得請南歸諸友咸出祖東郊而惜别之意形之詩聲者甚富余不揣聊述短詞歌以侑觴深愧其辭之拙也春風起兮潞水瀰瀰蘭棹發兮揚桂旗悵羙人兮懐歸往送之兮水之湄雲娟娟兮連延栁嫋嫋兮蔫綿望羙人兮髙翔䇿余馬兮空還君山兮青青下中流兮泝洞庭君歸來兮故國撫楸梧兮嬰情我思君兮悠悠閶闔開兮倚清秋承后皇兮嘉惠君之來兮不可以淹留樂府中秋大雨無月作嫦娥怨時會陳師召宅憶自奔歸月宫裏來往東西若流水崖前丹桂千度花海底魚龍幾囘死年年獨守廣寒宫玊殿瓊樓相映空羙人悠悠懐永夕孤影眇眇臨悲風泣血號天目欲瞽豐隆磔雲送寒雨净洗鉛華入素秋始覺孀居心轉苦瑣忩聽雨度寒宵擬藉芳樽酬寂寥空慚偷得長生藥此日清魂誰為招元宵會呉鼎儀宅分得將進酒將進酒黄金盃東風揺蕩春葳㽔清宵對此燈燭輝明月皎皎當中閨將進酒夜未央日月逝矣嗟流光年時感此雨雪狂羙景不及今晨良將進酒一再行醉來爾汝俱忘形交分藹若弟與兄豈直傾葢論平生將進酒伐木詩倚歌而和心孔夷我雖不飲强倒巵永懐白首同襟期將進酒君莫辭五言古詩題竹石湘江不可渡披圖開我心萬玊倚晴碧彷彿湘山隂清商聳毛髪蒼雪何蕭森霜寒白石瘦林逈青烟深危梢拂層巘遠黛迷孤岑泠泠發天籟悠悠引鸞音幽貞良足娯宻䕃還相臨懐哉氷雪沍挺挺紛難侵佳境渺在望何當遂招尋臨風意無限因之感微吟晴簷鬪鵲晴日煦而麗脩簷下輕風維鵲肆摶擊上下虚庭中奮然各賈勇喧啾若爭雄一或寂垂翅奔敗潛無踪一或奮翼起氣勢摩蒼穹得失果何在角力徒自憃微物尚知競人心將焉窮覽之增餘悲囘首雲天空題蘭四首寄浦城故人潘醫學廷瑞猗蘭在空谷蕭蕭汎幽香白石與偕處翠篠時在傍寂寞意不失塵俗已相忘但惜無人知徒然負孤芳猗蘭在空谷幽人時採之采之結為佩將以遺所思楚水有餘波湘纍有深辭孤貞諒自保白首以為期猗蘭在空谷托根窅以深羣然伍衆草水石自蕭森宣尼既云遠千載無知音臨風發長嘯聊以動微吟猗蘭在空谷葳㽔粲玊芳對此懐故人𦕈然天一方安得遠相過擊枻下沅湘嵗寒結深契遺余䨇鳴璫上巳會尚質宅時雨雪交集得日字四時有更謝逝者一已疾冉冉暮春至和風轉陽律感子共寮寀歡會聊暇日宿雨朝未休途潦莽四溢躊躇立前庭恐茲節序失駕言䇿駑馬西瞻子雲室髙樓厰雲漢良朋三與七逍遥綜壺奕談笑散書帙勝負誰為謀詼諧不可詰舉爵長簷下移榻更促膝酒酣氣益䧺凴闌撫吟筆西山涵暮景峰嶂眇􅍶卒東園桃李花繁華互䝉宻四顧盪心胸黙黙意已悉山隂極清賞遠駕亦超軼幽鳥林外歸新月雲間出頽然忽復醉觴咏信非一携手各辭去娯樂難具述顧兹交分情豈云甘縱逸朝陽倚桐樹可以成琴瑟茍無樸斵勞終為負嘉質人生俯仰間飄忽等郵馹緬懐用世心劬勞那足恤但惜千載前古道有彀率壯志共相勉老矣徒唧唧題鮮于囦學士遺墨皇頡久不作史籕亦已塵古學既凋喪古制遂沉湮文繁世愈降作者日維新春蛇復秋蚓萎薾何足珍有羙囦學士運筆如有神翰墨盈海内聲華重儒紳悠悠百年後繼之更何人開巻撫遺跡黯然忽悲辛商敦與周鼎此器誰為陳圖書道如在會見風俗淳冬至會彭敷五宅詠史分得余忠宣米田將北轅元祚日以衰豺虎忽遘患江淮遂紛披偉哉青陽公毅然振蕃維孤城扼勍敵白日蔽旌麾小大數百戰征袍血淋漓豈論天道還矢死志靡移援絶城亦陷長號赴清漪妻子及賓客矢心相追隨亦有帳下士隕首甘如飴憶昔勤武備猶能事文詞轅門罷攻守朝夕談書詩遂使忠義心不以喪亂移江水嗚咽流幽魂渺何之至今舒州城獨有忠節祠答李賔之見寄結客少年塲詡詡日追逐如何伐木詩雅韻竟難續緬懐金石交仰止聖賢躅直諒資麗澤燕辟承恥辱所以善道之詎云惜忠告吾生已壯齒沉𠖇尚幽谷譬之百疾攻良藥久未服端居發深省愴然抱慚恧昨感吾子言一一道衷曲豈同心背負甘為手翻覆膏肓托砭箴茅塞藉鉏劚願言堅此盟吾志當共朂愚軒為髙都憲時沈侍御來致意客從江南來遺我愚公書盛德每韜晦深藏匪中虚知巧紛以屏直行恥乖紆永懐心齋人雅志遵聖途黙識諒亦早允踐乃良圖願起九原下執鞭與為徒寥寥千古意此道今何如輓楊茂都閫神劒出歐冶勁利久超羣葳㽔百寶裝錯落七星文倚天發寒采鳴匣袪妖氛一動蛟龍驚再鼓霄漢分往隨明主用纍纍建竒勛一朝隨變化髙飛入青雲遂令千載下獨有名相聞長歌撫遺迹佇立悲斜曛神物渺何許嗟哉楊將軍效古意一首與王遜之秀才謝答誨言兼致别意故人北方來贈我錦繡段繚繞芝蘭光㽔葳華采爛豈獨佩服佳亦足奉娯玩我欲裁為裳衣冠並煇煥踟蹰下刀尺割裂畏譏彈藉以紫雲綃置之青玊案珍重不敢狎日夕起深憚感此無以報執别倚增歎高情託金石雅誼薄雲漢所以十年心不假一詞賛征車難久留摶沙聚而散忠告日已疏叢責詎能逭及時期努力敢以汙清貫臨岐意無窮引領令人惋警菴聖警日以新賢警日以省動警泛應時靜警獨知境好惡警沉溺取予警偏秉言行警而飭衣冠警斯整人生貴警厲弗警欲易逞詎云警其外能警心廼靖惟修知警者箴警心耿耿我勒警菴銘朝夕眎為警送劉都閫景昌西征桓桓羆虎羣見此劉將軍敢戰衆莫敵勇力時所聞從征二十載巍然樹髙勲腰間千金劒手中七星文摩挲氷雪寒揮攉曰月昏携之向西極願言靜妖氛遠渉青海波近躡玊關雲壯遊方在兹破敵何足云古意一首送曲阜三氏學録公璜赴任客從孔林來遺我楷木杖雲文紆欲騰虬髯迄相向重是聖門物操執不敢放平生藉扶持履險若夷曠我聞植根地枝葉紛以暢磅礡千載餘挺抜層霄上小用豈其宜斤斧來俗匠疇能事栽培但恐日凋喪成材古云難珍䕶夙所尚懐哉孔公璜道遠不及訪微言願有託臨風重怊悵和傅曰川止酒止酒之章深愜鄙懐不獨仰知吾兄自重之意而愚子亦得以奉為明戒其益非淺淺矣苐恐不能以卒止其亦止其太甚可乎用是次韻二章一以導吾兄之飲一以戒不肖之飲髙明諒之淵明性嗜酒未必因詩止傳君病痰熱乃在深冬裏酒豈為君患自責固君子昨過髙坡寓已報勿藥喜東風暢春和正及病新起巻冊未忘倦尊罍尚可理茍非沉湎失數酌亦由已醒然坐終日於君亦迂矣朝下北門直竚望西江涘客中且為樂誰能閲千祀流水本無窮遇坎亦須止人非江海量獨事深桮裏昨奉止酒詩雅意謝吾子麗澤久相資新惠尤可喜麯蘖豈佳味百疾所由起調攝偶違和累匕未能理君懲覆車餘惓惓惟悔已我感同心言箴戒亦明矣無為嗜觴酌泛濫無涯涘酒經有明訓百拜惟賓祀雲松髙隠圖為清江鄒彦和賦青松鬱成林上與浮雲連雲來松漠漠雲去松娟娟苓珀下深固雨露通重𤣥兩意忽有合相託成千年不謂雲松交轉增丘壑妍清江有幽士志隱躭林泉巢雲卧松頂手拂青山巔芳隂日已遠雅操日已堅空對髙隱圖載賦雲松篇題鮑栗之同知江山無際巻渺渺天東南中與一線侔上出岷峨根下合瀛海流乾坤幾今古日月爭沉浮沆漭巫峽春汨没匡廬秋金山有遺刹漢陽多髙樓平生丈夫志雅慕子長遊披圖興無際擬泝青谿舟遲囘不可往望望雙飛鷗蘇武牧羊圖為劉閣老祐之子卿重遠使武皇侈邊功如何常勝徒竊搆單于中身拘志弗移抱節甘長終牧羝豈望乳聊以安其窮迢迢北海上終見南飛鴻廿年歸絶域千古憐孤忠麒麟耿遺像丹青照旻穹翻嗟茂陵樹落日生悲風讀晦翁詩有感輒次其韻六月十日晨興盥櫛之暇忽憶人言走筆述志疾讀一過為之快然不知識者以為何如耳望望逋仙梅眷眷陶令菊空懐杞人憂寧論賈生哭寸心能幾何百事日相觸遯迹豈不嘉靦顔良自辱君恩浩難酬身計老始足青雲謝榮途白駒賦空谷乾坤遂容與軒冕脱覊束乃知江漢遠亦有𠖇鴻獨洗垢從索瘢疑璞任嗤玊長歌歸去辭詹尹何勞卜尼山春曉圖為衍聖公題尼山鬱嵯峨孕靈慨千古深根起西周䧺鎮自東魯方春生意敷潤澤囘厚土朝陽麗層巔烟霞互吞吐林姿日萬變竒秀不可數豈獨泰岱宗聳特出寰宇雲孫國上公雅志紹遐武攬勝入圖畫埜色在庭户羮墻有至念仰止亦堪覩乘間如一登羣峯固應俯溧陽史侯廟詩杜陵重戚里壯侯挺人傑溧陽推始封建武仰雄烈嘗聞冀青政夐與龔黄埒就國奉新命出治遵舊轍功德本寛大勲名益昭揭雲仍遠相承簮組遂不絶㞯山既喬聳洮水亦澄澈尸祝啓祠宇躬袞嚴象設顯惠神有靈報祀禮無闕迢迢千載餘紀成在碑碣侯名榮漢外戚之賢封溧陽侯廟號顯惠子孫在溧陽者甚盛上巳出遊甕山分得處字宻勿金閨籍逍遥玊堂署承平荷君恩倐忽感時叙夙約猶未忘遠遊孰為拒晴日散微暄晨景及初曙共出西郭門相尋舊行處物生遂敷榮民居樂繁庶望望出林麓迢迢轉湖溆草色迷斷岸山光接孤嶼輕風吹客衣閒雲擘晴絮冠裳驚雜遝鷗鳥忽軒翥羸馬行復嘶野花粲如語前途不可詰幽寺渺何許逢人試借問攬轡重延佇隔林見僮僕展席具尊俎懸崖費躋攀佳境足依據午橋晉公莊輞川右丞墅烟嵐宿軒忩風雲入毫楮覽眺豁心目推敲失盃箸歡呼非放曠觴詠亦容與詎云禮法踈聊得江山助清賞殊未酣歸興一已遽白日不可留青春漸將去懐哉望三益憮然增百慮豈不惜燕樂神交媿雞黍願言結同心勉旃永終譽擬上乞休之疏復疊前韻伏伺恩命未下益用悚然疏稿既成遂復著筆用識鄙懐而已穠華逞桃李孤芳笑蘭菊剖心誰與明刖足空自哭愁夢積雨驚望眼浮雲觸已判百念冷寧遣一身辱媚時非所能守已聊亦足行藏固由天進退詎云谷薄田猶可畊大帶那須束遐哉謝交㳺允矣樂幽獨絶絃韜我琴韞櫝全吾玊擬辦季鷹舟豈待巫咸卜答玊署交情四首體齋東山西涯三同年以舊日同預吉士之選交誼深篤乃各賦古詩四章以贈題曰玊署交情遣人逓于舟中予感其意亦賦四章以復遂因阜弟别歸以寄時五月望日雨中也青雲三十年追隨鵷鷺行葭玊夙相倚永記金蘭芳知心志自合同道非殊方獨愧頑鈍質幸不忝冠裳家學不可負友誼不可忘黽勉效時用直道古所臧讀書貴知道處公必忘私茍焉惟身圖君子恒賤之居然廊廟尊榮禄復如斯豈不念瓦合媕婀將奚為夙承切磋益日夕事箴規植已茍無媿去住亦隨時迢迢城東餞孤亭臨水雲知心二三友惆悵惜離羣詩長不忍讀酒美難成醺念兹交已久感兹意何勤麗澤日已遠誨言寧復聞繼今尚有贈吾方望諸君朝霞結浮隂輕風送踈雨扁舟泝安流颯爽不知暑推篷坐清曉展轉思延佇夙荷聖皇恩㝠鴻遂高舉渺然江湖心耿耿方自許懐哉眷念情因之寄斯語喜雨和沈司空時昜二十韻時方約出遊以禱雨而止故詩云然經春苦炎旱終日厭埃壒林幽空啼鳩池涸絶吠蛤連簷勢如焚曲突計欲㷈羣趨舞雩禱三謁𤣥元榻天心始肸蠁雲影互開闔精誠諒無間惠澤欣有答初為細雨霏漸作濃隂合亷纎徧長原淅瀝鳴虚閤潤色囘柱礎爽思動巾匼詩興已謝沈酒狂尚輸葢擬續郊野遊稍遠城市雜平蕪翳荒臺蓊木䕃孤塔農畝生意敷僧舍清香匝飄洒惜新巻沾濕愧破衲芳茵坐堪藉落英行可踏古井暗泉沸髙榭輕風颯樂事豈汗漫詞華方馺遝將車夙所期折簡明須拉駐景亟揮戈秉燭頻銷蠟往聞桃李園應費謫仙榼銅瓶行和答少司空沈時昜谿臨千文流下有百尺泥銅瓶偶墜此至寶中道遺思之弗能置朝夕顰䨇眉洗濯忽在手把玩不忍離汲深固有用履險真如夷神物豈終失笑歌欲忘飢行當薦清廟永結千載期青谿漫稿巻一
