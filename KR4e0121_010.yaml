body:
  text: 青溪漫稿卷十明倪嶽撰大學講章古之欲明明德於天下者先治其國欲治其國者先齊其家欲齊其家者先修其身欲修其身者先正其心欲正其心者先誠其意欲誠其意者先致其知致知在格物這是大學經文孔子說大人之學其明德新民工夫都有箇先後次第孔子意思說明德是人心同得於天的道理自古大人既自明其明德又要使天下之人都有以明其明德不為私欲昏蔽這箇工夫却先從治國起蓋天下之本在於一國國便似今京都地方一般天下人所視效處必先使一國的人明其明德方可由近而逺以及天下所以說欲明明德於天下者先治其國一國之本在於一家家是家庭之內又一國所視效處若要使一國的人都明其明德必先將一家親屬教訓他明其明德方可由親而疏以及一國所以說欲治其國者先齊其家一家之本又在於身若要整齊一家必須先從己身上做工夫使一身所行無一件不合理方才做得一家凖則而家可齊所以說欲齊其家者先修其身一身之主又在於心若要修飭一身必須先從己心上做工夫使一心所存無一毫不端正方才做得一身的主宰而身可修所以說欲修其身者先正其心心上念頭發動處便是意誠是真實不欺若要正心必先從心上動念處用工夫好善如好好色惡惡如惡惡臭好惡都是真實無一毫虛假如此念頭方才不差則心可得而正所以說欲正其心者先誠其意心中虛靈知覺處便是知致是推到那極處若要誠意必先從心中知覺用工夫將那自家心上知覺處務推到至極無一件道理不通貫透徹如此知識方才不雜則意可得而誠所以說欲誠其意者先致其知然致知的工夫却又全在格物上格是至物是事物天下事事物物都有箇當然的道理這道理務要窮究到那至極處方才自家的知識無有不盡所以說致知在格物大抵格物致知誠意正心修身五件是明明德的條目齊家治國平天下三件是新民的條目聖賢相傳為學次第莫備於此故孔子於大學之首言之臣嘗論這八條目皆以正心為主從天下國家推到修身上無不統於一心從誠意推到致知格物上無不由於一心而帝王之治天下尤以正心為急心正則衆欲不能攻天下可得而治漢儒董仲舒嘗說人君正心以正朝廷正朝廷以正百官正百官以正萬民而四方逺近莫敢不一於正即此意也伏惟皇上懋隆聖賢之學講明正心之功日就月將純一不已則理無不明身無不修由是以睦九族以和萬邦而治平之效端可以比隆於古帝王矣宗社臣民不勝幸甚所謂誠其意者毋自欺也如惡惡臭如好好色此之謂自謙故君子必慎其獨也這是大學第六章曽子解孔子經文中誠意的道理誠是實意是心上所發的念頭毋是禁止之辭曽子說孔子經文中所言誠意這兩字如何做工夫蓋人的常性莫不有善而無惡故其本心莫不好善而惡惡只因被這私欲把心來蒙蔽了雖知善而不肯著實為善雖知惡而不肯著實去惡這便是欺瞞了自家的心所以誠意工夫只要禁止了這自欺之弊務使心上念頭發出來好善惡惡無一毫不著實才能盡修身頭一件工夫故曰所謂誠其意者毋自欺也慊是快足的意思曽子又說臭穢的東西是人人著實憎惡的人若惡惡之心由中及外無一毫之不惡便如惡這惡臭一般務要决去了他美好的顔色是人人著實喜好的人若好善之心由中及外無一毫之不好便如好這好色一般務要必得於已這等呵好善惡惡方才都著實為已不是虛假為人私欲盡淨天理俱存心中豈不快然滿足故曰如惡惡臭如好好色此之謂自慊慎是謹慎獨是己所獨知的去處指心上說曽子又說這好善惡惡的心實與不實他人如何得知只是自家心裏知道所以君子於這心上念頭發動處務要仔細審察若是惡惡便要著實惡决定去了這惡若是好善便要著實好必求得了這善這等用工才是不自欺才到得誠意地位所以又說故君子必慎其獨也臣嘗考之大學八條目中誠意是第一件切要的事蓋意誠則心可正身可修由是推之家齊國治而天下平矣所以唐虞三代之君修己治人都從這誠意上來如克勤克儉者處已之誠惟和惟一者用人之誠好問好察者聽言之誠惟欽惟恤者用刑之誠凡此一念之發表裏如一一事之行始終無間其意之誠如此所以治隆俗美而臻於雍熙泰和之盛也降及後世如漢武帝之施仁義而怒汲黯之對唐太宗之喜諫諍而悔魏徴之言皆其意有不誠所以推之天下卒不能比隆上古之治然則誠意之功實萬世帝王為治之本伏惟聖明留意論語講章子曰大哉堯之為君也巍巍乎惟天為大惟堯則之蕩蕩乎民無能名焉巍巍乎其有成功也煥乎其有文章這是論語中記孔子贊帝堯聖德與其治功如天的意思巍巍是髙大之貌則是凖則比並的意思蕩蕩是廣逺之貌無能名是不能指言稱贊的意思孔子欲贊帝堯之為君而首以大哉為言以見自古人君惟堯之德至大而無以加有非其他聖人所能及如何見得帝堯之德至大處蓋天之為天巍巍髙大無物可以比並惟有帝堯與之為凖正以帝堯之德巍巍髙大與天一般即史臣說其仁如天是也天之大能使萬物各遂其生然其蕩蕩廣逺處萬物不能以言語而形容之帝堯之德能使萬民各得其所然其蕩蕩廣逺處也與天一般萬民不能以言語而稱贊之即史臣說帝力何有於我是也天之大如此堯德之大也如此故說惟天為大惟堯則之蕩蕩乎民無能名焉成功是已成的事業煥是光明之貌文章是政績中有文采可見的指禮樂法度而言孔子又說堯之大德如天固人所難名而堯之治功如天乃人所共見故指其功業而言如九族既睦便是他齊家的成功百姓昭明便是他治國的成功黎民於變時雍便是他平天下的成功堯之成功巍然髙大如此可見與天之髙大一般指其文章而言如制器尚象而天道以正頒厯授時而人事以修垂衣裳作咸池而禮樂以備堯之文章煥然光明如此又可見與日月星辰之光明一般蓋天之德不可得而窺即其四時生成之功日月星辰之文而天德亦可得而窺矣聖人之德不可得而名即其成功之髙大文章之光明而聖德亦可得而名矣此帝堯之聖所以與天為一而孔子尊稱之辭至於如此也臣惟自古帝王之德莫盛於堯而孔子贊堯之辭莫大於此且又切切以天為言蓋天以至仁之德發育乎萬物堯以至仁之德覆被乎萬民天與帝堯吻合而無間而萬世人君繼天出治者皆當取以為法也仰惟皇上嗣祖宗之尊位繼帝堯之大統蓋必德協上天心潛往聖誦堯之言而使發號施令罔有不臧行堯之行而使出入起居罔有不敬聖德既與堯而為一則治功亦與天而無二將見雍熙之治端有在於今日而帝典所書不得専美於前古矣臣等不勝顒望之至顔淵問仁子曰克己復禮為仁一日克己復禮天下歸仁焉為仁由已而由仁乎哉顔淵曰請問其目子曰非禮勿視非禮勿聽非禮勿言非禮勿動顔淵曰回雖不敏請事斯語矣這是論語第十二篇孔子答顔淵問仁的事顔淵是孔子的弟子名回一日以為仁之道問於孔子孔子答他說克己復禮為仁一日克己復禮天下歸仁焉為仁由已而由人乎哉克字解做勝字已是己身的私欲復字解做還字禮是天理之節文仁是本心的全德仁義禮智都是本心之德惟仁却包得義禮智故仁為本心全德孔子說人心本都有這全德只為私欲昏蔽故有時喪失了若能克去己身的私欲使所行的事件件合乎天理則本心之德復全於我這便是克己復禮為仁是說為仁的工夫歸是稱許的意思孔子又說人能一日之間克去己身私欲所行的事都合乎天理則天下的人便都稱許其仁蓋天下人心都有這仁的道理有能全得這仁的道理便合得天下的人心所以天下之人一時都稱許其仁如仁莫大於孝我能事奉父母天下人便都許我能孝親仁莫切於弟我能恭敬兄長天下人便都許我能弟長這便是一日克己復禮天下歸仁焉是說為仁的效驗孔子又說這為仁的機括都只在自已不在他人克己是自家能克復禮是自家能復如事奉父母須是自家事奉恭敬兄長須是自家恭敬别人如何替得以見為仁之功在已當盡如此故曰為仁由已而由人乎哉顔淵一聞孔子之言便見得天理人欲分明故無所疑問就請問克己復禮先從何處用工夫孔子答他說克己復禮的工夫只要禁止那不合禮的勾當凡人有目不能不視若非禮的顔色便禁止了不要看他人有耳不能不聽若非禮的聲音便禁止了不要聽他人有口不能不言若非禮的言語便禁止了不要妄說人有體不能不動若非禮的事務便禁止了不要妄動這等的則視聽言動都不徇私日用之間一身之事莫非天理為仁之功豈有加於此哉於是顔淵深達孔子之意就謙辭說我顔回資質雖不聰敏請服行夫子今日教我的言語此乃顔淵真能克己勝私所以進於聖人地位也臣嘗考之此章乃孔門傳授心法切要的言語不止為學者事自古帝王皆從這裏做工夫蓋非禮勿視即是視逺惟明的意思若視而非禮則為美色所亂凡事見得不明而淺近易蔽矣非禮勿聽即是聽德惟聰的意思若聽而非禮則為淫聲所溺凡事聽得不聰而邪佞易惑矣非禮勿言即是發號施令罔有不臧的意思蓋一言非禮則出乎身而加乎民者不能無召禍之憂非禮勿動即是出入起居罔有不欽的意思蓋一動非禮則發乎邇而見乎逺者不能無致災之咎是則人君之於視聽言動其可以不謹哉由此而推可見上古聖賢修身是這道理齊家也是這道理治國平天下也只是這道理所以孔子之言有功於萬世者正謂此爾伏惟聖明留意子曰無為而治者其舜也與夫何為哉恭己正南面而已矣這是論語第十五篇孔子稱贊帝舜的言語無為是無所作為治是天下平治人君君臨天下一日二日萬幾必須兢兢業業有所作為如何却說無為而治孔子的意思蓋說聖人德極其盛足以感動人心天下的百姓自然人人向化所以不待有所作為而天下自無不治譬如天以一元之氣默運於上自然四時流行萬物發生天何嘗有一毫安排布置來這便是無為而治自古三皇五帝都是聖人惟舜繼帝堯之位以有天下堯是大德的聖人舜也是大德的聖人以聖繼聖自然不見他有為的形迹而帝舜又能任用那許多賢才如大禹平水土后稷播百榖把土榖的事都付託與大禹后稷這兩箇人臯陶明刑契敷五教把刑教的事都付託與臯陶契這兩箇人至於伯夷典禮后夔典樂益典山澤垂典百工龍作納言與那天下的方嶽侯伯都付託得人舜但考察賢否舉行黜陟之典一一推心委任要其成功所以當時庶績咸熙萬邦咸寧全不見他有為之迹這便可見無為而治者惟舜為然爾恭己是敬德的容貌南面是人君聽治之位人君嚮明而治故稱南面孔子又說帝舜無為而治人既不見其有為之迹所可見的不過只是聖人敬德的容貌觀其端冕凝旒處九重之上垂衣拱手居五位之尊身心內外恭敬謹嚴一毫邪僻之事不干於中一時惰慢之氣不形於外這便是恭己正南面的氣象謂之而已矣者竭盡無餘之辭蓋言帝舜恭己正南面之外别無所為所以贊其德極盛治極隆而非其他帝王可比也臣嘗考之舜典所載帝舜之時朝覲巡狩封山濬川舉元凱誅四凶皆在攝位二十八載之間固不可謂之無為及其一踐天子之位不過只是命九官咨十二牧而已真可謂無為而天下自治矣然其所以能成無為之治者實本於任賢而其所以能知賢才而任之者又本於敬德皆非偶然之所致也後之人君欲敬德者必絶耳目之玩而游佃土木之役不興禁侈靡之習而珍竒詭異之物不御出入起居之必時發號施令之惟一如此則心有所主是非易明所用必賢非賢不用又必逺邪佞之徒使正人不至於間沮斥讒譛之說俾君子不至於動搖如此則事有所託政務修舉君德流行民心感化而天下之大不待有為而自治矣然則欲法帝舜之無為當以任賢為本欲法帝舜之任賢當以敬德為先誠於德無不敬賢無不任則天下自理治化自隆帝舜無為之盛不在有虞而又在今日矣伏惟聖明留意寬則得衆信則民任焉敏則有功公則說這是論語第二十篇孔子論帝王為治的道理如何是寬則得衆寬是寬容衆是衆人孔子說人君統御四海務要度量寬洪但凡事物都在所包含如天之無所不覆如地之無所不載這等呵天下的人自然心恱誠服樂於歸向故說寬則得衆如何是信則民任焉信是誠信任是倚仗孔子說人君主宰天下務要誠實不欺但凡言動都有箇准信如出一令不易如四時行一政不變如金石這等呵天下的人自然有所遵守都倚靠替他做主故說信則民任焉如何是敏則有功敏是勤敏功是事的成效孔子說人君一身萬事的根本但凡政事務要行之以勤不可隳廢如天行至健無一時止息這等呵工夫日進積少成多功業所就自然極其髙大矣如何是公則說公是公道說是人心喜恱孔子說人君一身天下的父母但凡政事務要體之以公不可偏向如天道至公無一毫間雜這等呵公道服人私議自息人心喜恱莫不極其親愛矣故說敏則有功公則說臣謹考之孔子於論語終篇歷敘堯舜湯武之言與其施諸政事者以明萬世帝王相傳之道如此然始之以允執其中終之以公則說之二言蓋帝王治天下之道合乎中者無有不公不合乎中未有不出於私者也故寬而失中則如有罪者當刑或私於嬖幸而故縱無功者不賞或私於親愛而濫施此寬之非公也信而失中則如虐民之政當革或緣私請而尚存病國之人當去或因私昵而不逐此信之非公也勤而失中或肆為異端聲色之事而講學聽政則怠騁乎犬馬土木之役而任賢聽言則倦此又勤之非公也如此則人心怨尤灾害駢至天下何由而治所以自古帝王一德相傳惟中惟公不用他道而我朝列聖相承所以為萬世子孫之法者率皆遵行此道也仰惟皇上逺承帝王之統近守祖宗之業蓋必執此中以立政事之體秉此公以服天下之心則治道之隆可與古帝王為一而綿太平之休於萬萬年矣臣等不勝惓惓顒望之至中庸講章舜其大知也與舜好問而好察邇言隱惡而揚善執其兩端用其中於民其斯以為舜乎這是中庸第六章子思引孔子論帝舜之知以明道所由行的意思如何是舜其大知也與知是人的知識帝舜聖人於天下道理無不周知然不自滿足又取天下人的知識以為一已的知識所以其知廣大人莫能及這一句是孔子首先稱贊之如此下文好問好察擇善用中便是大知的實事問是詢問察是審察邇言是淺近的言語善與惡是這言語中有說得好的有說得不好的孔子說凡人小有聰明的多訑然自足不肯問人惟舜以為一已聰明有限天下道理無窮豈可便自滿足還要孜孜問人使人有所知的都來與他說庶幾得聞天下之善也凡人聞言語淺近的多忽略厭煩不肯審察惟舜以為人的言語雖是淺近也有至理存焉豈可便不審察還要切切講求他說的道理之所在庶乎不遺天下之善也舜又以為凡人之言未必皆合道理其中有說得不好的若不與他遮掩則使人皆羞愧誰肯再來說因此將那不好的言語與他遮掩不肯阻了人來說的心這可見舜之心廣大能容也人言有說得好的若不播揚於衆則人無所感發誰肯喜歡來說因此又將那好的言語與他播揚務要作起人敢言的心這可見舜之心光明不蔽也故曰舜好問而好察邇言隱惡而揚善兩端是衆論不同之極處如小大厚薄之類中是合中的道理舜於人言雖是好的却又有不同處於是執其小大厚薄之兩端而量度以取中譬如賞有功之人或說當厚些或說當薄些便要度量看理上當厚便厚當薄便薄又如刑有罪之人或說當輕些或說當重些便也要度量看理上當輕便輕當重便重凡事都如此度量也無過也無不及只合乎中道的便依著行所以行之無弊也故曰執其兩端用其中於民蓋舜之所以能此者由其見理明白故心胸廣大而光明權度精切而不差凡所行皆能合乎中庸之道故曰其斯以為舜乎以見舜之大知如此非他人之所能及也大抵中庸之道如通衢大路人所共由豈有不明不行之理只因人有知愚賢不肖之分故於道有過與不及之弊所以子思歷言知仁勇三達德為入道之門而於此首引孔子之言以帝舜之知明之然其言帝舜之知又不在乎他惟在聽言一事其垂訓後世之意可謂切矣臣嘗因是而論之自古聖賢之君以行道為己任者莫不以聽言為急誠以人君深居九重之上日覽萬幾之繁在外之事豈能周知在下之情豈能盡達故必廣詢衆論博採群言以來天下之善然又慮阿諛順㫖之言常易入激切逆耳之言常難受故不以人之緘默而謂無言之可聽不以人之狂直而謂其言不足聽每賞直言以銷諂佞之風宥妄言以開忠讜之路是以當時鰥寡無告寃抑獲伸上下之情意相通逺近之視聽不蔽人君無失德朝廷無失政生民無失所中庸之道常行天下之治極盛為此故也洪惟我朝太祖髙皇帝法古為治首開言路設六科十三道以為言官而五府六部內外諸司皆許實封言事猶且延訪大臣以求闕失引見耆民以詢疾苦列聖相承率循是道此即帝舜好問好察隱惡揚善之盛心也仰惟皇上聰明天縱聖學日新臨御以來勤於求言而不遺乎淺近樂於聞諫而不厭其煩瀆是以政之所行無過與不及之差令之所出得大中至正之理于以隆祖宗列聖之基業繼唐虞三代之道統端在於今日斯世斯民不勝慶幸武王周公其達孝矣乎夫孝者善繼人之志善述人之事者也這是中庸第十九章子思引孔子所言武王周公之孝在於善繼善述的意思達是通達孝是事奉父母的道理孔子說這孝的道理本是衆人能知能行的但衆人有之而不能盡惟有武王周公能盡這道理所以通天下人都稱贊他孝而無異辭這便是達孝故曰武王周公其達孝矣乎如何又見得他達孝實事處即下文善繼善述是也繼是繼續志是心之意嚮述是遵守事是事業這兩箇人字都指祖宗而言孔子又說這孝的道理不在乎他只是為人子孫的當以祖宗之心為心祖宗心志有欲為的好勾當當時不曽為得為子孫的即當繼其心志務要黽勉成就了這便是善繼人之志祖宗在時有已為的好事業後世可以為法為子孫的即當遵守而行不要廢墜變更了這便是善述人之事如武王繼其祖考太王王季文王的統緒伐罪救民以有天下尊為天子富有四海宗廟饗之子孫保之這是武王善繼善述處所以武王謂之達孝周公輔佐成王靖安天下推廣文王武王不暇為與不及為之志追王太王王季上祀先公以天子之禮又制為禮法以及天下使後世為子孫的皆盡奉先之孝敬這是周公善繼善述處所以周公也謂之達孝大抵衆人之孝不能盡繼述之大天下人安得通稱之惟武王纘前緒以定天下周公成先德以定禮制其所繼述事功極盛有非衆人所能及所以天下之大人人稱贊其孝無有異辭此非達孝而何子思於此引之以見武王周公能合乎中庸之道其垂世立教之意切矣臣嘗因是論之武王之孝莫大乎定天下然拜丹書之戒而不忽細行納旅獒之諫而不寶逺物訪洪範之書而不忘聖學所以修於己者無不至故功成而孝益顯周公之孝莫大乎定祀禮然執圭幣以事上帝則思竭其誠奠盞斚以奉祖宗則思致其敬頒制度以行天下則思推其仁所以示諸人者無不周故禮行而孝益著武王周公之孝上足以光乎祖宗下足以傳之後世如此及成王營建洛邑欲如武王之意康王報誥諸侯用宣文武之業又可見他的子孫也能盡繼述之孝所以周家綿八百年靈長之祚有由然也蓋自古帝王創業垂統必有功德及天下必有法制遺子孫由其得之艱難故慮之深逺慮之深逺故行之周密雖其一言一行之微皆足以為後世子孫法惟在繼體守成之君當盡奉行遵守之責固不可有我所變更亦不可使之廢墜則國家之政事常修祖宗之基業可保而繼述之孝亦無加於此矣洪惟我朝太祖髙皇帝恢復華夏之土宇掃蕩冦盜之縱橫治邁百王功髙萬古然精神之運則具存乎祖訓之條政令之懿則悉載于國史之筆創業垂統於斯為盛太宗文皇帝奠安萬姓肅清四方凡所施行務遵成憲故詔誥臣民諄諄以申明舊章為言榜諭天下惓惓以紊亂舊制為戒蓋與武王周公之孝後先一揆所以貽謀宏逺垂法無窮列聖相承益隆繼述式克至于今日休豈偶然哉恭惟皇上以至聖之資嗣大寶之位德由天縱孝與日新逺鑒武周之心近守祖宗之法每延訪三事裁决萬幾必率循祖訓考求故實是以庶政惟和萬邦咸服于以衍祖宗太平之厯于以紹帝王中庸之傳而區區成康守成之賢有不足言矣臣等何幸躬際其盛孟子講章居惡在仁是也路惡在義是也居仁由義大人之事備矣這是孟子盡心篇說人之所存所行都要在仁義上的意思居是人的住居惡字解做何字仁者謂心之德愛之理也路是人行的道路義者謂心之制事之宜也這居字是以居處而言由謂由行大人是公卿大夫有大德的人孟子因齊王子墊問他士何事推言至此乃自設為問答之詞說道人所當處的住居在於何處即這箇仁便是蓋仁的道理有箇天理自然的安樂無那人欲陷溺的危殆便如髙堂大厦一所好房屋一般人當常居其中而不可離所以說居惡在仁是也人所當行的道路在於何處即這箇義便是蓋義的道理乃天理之當行無人欲的邪曲便如通衢廣陌一條好道路一般人當常行其上而不可違所以說路惡在義是也人若果能心純乎理愛周於物只在這仁中居著一時也不離了這才是能居天下廣居的人蓋見得這仁是箇安而可處的所以不到那卑汚險僻的地上去了人若果能心有所制事必合宜只在這義上行著一步也不達了這才是能行天下正路的人蓋見得這義是箇正而可遵的所以不到那旁岐曲徑的路上去了居於仁則存諸內者有本而大人之體立由於義則應乎外者有制而大人之用行體用兩全內外一致士雖未得夫公卿大夫之位而公卿大夫之事尚何所不備哉孟子以是告王子蟄其開示之意明且切矣臣嘗考之孟子生當戰國之時以救時行道為己任故凡開口論事便以仁義為言非但於此舉以答王子墊如欲人君躬行仁義以率臣下則曰未有仁而遺其親者也未有義而後其君者也如欲人臣以仁義佐君上則曰君仁莫不仁君義莫不義誠以仁義二者乃天地間一箇大道理其本原於一心其用則周乎萬事故天下之安危國之治亂家之興衰身之賢愚都只在仁與不仁義與不義兩端上若古昔堯舜禹湯文武之為君臯陶伊傅周召之為臣所以治隆俗美垂萬世之法者良由其施仁惇義故耳及乎夏桀商紂之為君蜚亷惡來之為臣所以失身亡國而為後世之戒者亦由其賊仁戕義故耳孟子之言豈無所稽哉伏惟皇上聖由天縱德與日新嗣位以來仁以育萬民舉世遂飽食暖衣之願義以正萬民普天興遵道慕義之風然猶望之若未至行之以至誠每簡居仁由義之賢益修漸仁摩義之政于以紹二帝三王休聲於既往于以隆一祖四宗洪緒於無疆天下臣民不勝慶幸人皆有所不忍達之於其所忍仁也人皆有所不為達之於其所為義也這是孟子盡心篇說人當推行仁義的意思不忍是惻隱而有所不忍的心即仁的道理發見處不為是羞惡而有所不為的心即義的道理發見處達是推行的意思孟子說人有此身便具有天地生物之理所以慈愛萬物的心人人都有若見了可傷可痛的事如孺子入井之類便都心中惕然驚動不能忍他這是仁的道理在心上所以發見出來如此但人有禀得氣質偏的又被私欲遮蔽將這惻隱的本心昏昧了遇著殘忍害人的事便可傷痛也都忍得這便是不仁所以人要因這不忍之心一有發見時便推廣行將去直到那忍得的事都能不忍並不做一毫殘忍害人的事這等呵此心所發方才都是仁的道理故說人皆有所不忍達之於其所忍仁也孟子又說人心至靈故能分别是非所以憎惡不善的心人人也都有若遇著可羞可耻的事如穿窬為盜之類便都心中怫然憎惡不肯去做這是義的道理在心上所以發見出來如此但人有禀得氣質偏的又被私欲牽引將這羞惡的本心昏昧了遇著不合道理的事便可羞耻也都去做這便是不義所以人要因這不為之心一有發見時便推廣行將去直到那所為的事都要合宜並不做一件不合道理的事這等呵此心所發方才都是義的道理故說人皆有所不為達之於其所為義也這一章書重在達之一字上要人察識這不忍不為之心有時發見便用力推行如有一星之火引之使其燎於原如有一勺之泉導之使其流於海務使仁義之心沛然行乎天下這才是達的意思孟子開示於人可謂至明切矣臣嘗因是而論之孟子一書専言仁義然仁義之心雖人所同有而推行之功則於人君為甚大何也人君一身為天下之主必當推一心以行天下之政故其他章論王天下之道亦曰古之人所以大過人者無他焉善推其所為而已矣如推行不忍之心便省刑罰而不忍嚴刑峻罰以傷民生薄稅斂而不忍暴征橫斂以窮民命節財用而不忍濫賞妄費以竭民財卑宫室而不忍勤興土木以勞民力使天下百姓無一而不安於仁即所謂先王有不忍人之心斯有不忍人之政也如推行不為之心便兢業萬幾而不為逸樂之娛緝熙一德而不為聲色之好親近正人而不為狎昵群小務行民義而不為諂瀆鬼神使國家政事無一而不由於義即所謂人有不為也而後可以有為如此則政事得宜百姓得所天命佑助人心歸嚮海宇乂安蠻民懾服天下無不太平矣蓋仁義之效廣大無窮故古昔帝王與我祖宗列聖皆以推行不忍不為之心以成治平之休豈徒然哉恭惟聖明體念孟子之言推行仁義之道以丕隆祖宗列聖之洪圖以逺紹古昔帝王之盛治天下臣民不勝至願周易講章君子學以聚之問以辨之寬以居之仁以行之這是周易乾卦九二爻的文言乃孔子所作發明聖人進德修業的意思君子是指九二聖人說九二聖人於出潛離隱之時當進德修業以養成君德蓋德乃人所稟於天固有之理然散見於萬事萬物之間無有窮盡故雖聖人亦必學而後知之今日窮一理明日窮一理日日窮之無少間斷然後有以會萃衆理於心這便是學以聚之物理既會於心若不取正於有道的人則是非邪正未免有差故必咨問於先知先覺以審其所學何者是天理所當從何者是人欲所當去然後是非邪正瞭然明白不至於紊亂這便是問以辨之這兩句是說聖人進德的工夫學問既進若度量淺狹易至滿足則不能包容萬善故又當寬廣此心擴充此量使所學所問之理皆涵養於中不至遺失這便是寬以居之寬以居萬善而或持守不固則必奪於私欲故又當以天理為主措之行事自日用彞倫之間以至齊家治國平天下之道皆本乎一心之德則所行莫非天理之正這便是仁以行之這兩句是說聖人修業的工夫君子學問之功至是可謂無餘藴矣臣謹論之孔子於此既以學問之功為言下文又引爻象而斷之曰君德也誠以人君之身所繫尤重故必養成大人之德而居大人之位則可以乘龍德正中之時以建天下文明之治若帝舜當𤣥德升聞之初大禹在祗承于帝之後惓惓乎允執厥中之相傳惟精惟一之相授學問之功莫切於是是以君德既隆治化益盛雍熙泰和萬世莫及宋儒程頥之傳此章亦曰進居其位者舜禹也正謂此耳伏惟皇上育德於舊學之時體道於臨御之日契羲文作經之㫖成舜禹致治之功是以仁義之澤覃及于萬方文明之化光被乎四表天下臣民不勝慶幸尚書講章戒爾卿士功崇惟志業廣惟勤惟克果斷乃罔後艱這是周書周官篇成王申戒卿士的言語戒是戒勑卿即是前面說的六卿士是六卿的屬官功是百官的功績崇是髙也業是百官的職業上文成王既已訓迪百官了至此又申戒卿士說爾等各官尊則為六卿卑則為六卿的屬官雖有尊卑莫不各有當成的功績然要這功績崇髙惟在於立志蓋必専心向這職事上留意務要期於有成不可有一毫因循茍且之失如此則功可得而崇故曰功崇惟志職雖有大小莫不各有當務的職業然要這職業廣大惟在於能勤蓋必竭力向這職事上用功務要進而不已不可有一毫懶惰怠慢之失如此則業可得而廣故曰業廣惟勤克是能果斷是勇於决斷的意思後艱是後日艱難成王又說功雖以志而崇業雖以勤而廣然當事幾之來又要以勇而斷毅然剖决不可疑慮然後事皆有成不貽後患茍或優游不斷狐疑不决則志雖髙大而為之不勇虛用其志勤雖勉勵而事不能成虛用其勤又何以望其功崇業廣而無後艱乎故曰惟克果斷乃罔後艱成王戒勑卿士而以是為言可謂精切而著明矣臣嘗考之虞周君臣更相責難之際必惓惓曰志曰勤曰斷這三者伯益告帝舜曰疑謀勿成百志惟熙召公告武王曰志以道寧又曰夙夜罔或不勤其與成王之言如出一律虞周之治所以為盛後世如漢唐宋季世之主不能立志心無所主或為聲色犬馬所誘或為土木禱祠所惑勤所不當勤斷所不當斷治功廢弛事業卑陋後艱之患有不能免由是而觀則此三言者豈獨卿士之所當盡哉仰惟皇上嗣大厯服有年于兹道遵帝王法守祖宗而大厲有為之志御講有常臨朝無倦而恆持不息之勤日照月臨風飛雷厲而獨秉剛明之斷是以百僚承式四海嚮風功業所就巍乎其盛虞周泰和復見於今日區區漢唐宋不足言矣天下幸甚萬世幸甚春秋講章四年春正月公狩于郎這是春秋責魯君不當逺出田獵的意思四年是魯桓公即位之四年春正月是周時建子之月即今之十一月公是指桓公說狩是冬月田獵之名郎是邑名在魯疆埸之間非常狩之所古者天子諸侯當國家無事之時不敢忘了武備故每嵗必行田獵之事用民力以訓習軍旅示之以武以威天下取品物以供祭宗廟示之以孝以順天下由是兵戎祭祀這兩件國家的大事無不講矣然田獵必有其時不可妨了農業又必有其地不可傷了物命如仲春二月教民振旅於內遂搜取鳥獸之不孕育的故其田獵之名曰搜仲夏五月教民茇舍於野遂除去鳥獸之害苗的故其田獵之名曰苗仲秋八月教民治兵於外遂順天氣嚴肅以殺鳥獸故其田獵之名曰獮仲冬十一月教民大閲軍實遂守取鳥獸無所揀擇故其田獵之名曰狩這便是有其時但凡田獵之所皆擇山林翳密地土間曠去處如魯的大野鄭國的原圃秦國的具囿皆不出郊甸之內這便是有其地魯桓公即位未久不知古人田獵講武之意乃於十一月逺狩于郎其時雖是可狩之時其地則非常狩之地肆其驕侈逺出田獵過用民力而不知大傷物命而不恤孔子修春秋以為先王之世田獵之舉必於農隙之時而不傷於農必於間曠之地而不傷於物故當時之民見其田獵莫不欣然喜色有愛戴之心茍惟以習於田獵為賢騁其馳逐為能用民非所教取物非所用或非其時或非其地則民見其田獵莫不疾首蹙額而有愁怨之意一田獵之微而政治得失民心向背有如此而桓公不知也故書曰四年春正月公狩于郎所以譏其怠棄國政荒於逰田之失其垂戒之意逺矣臣嘗因是而考之田獵之事一則教民習軍旅一則取物供祭祀誠為國家的急務但不可過過則為淫故周公作無逸之書以告成王有曰文王不敢盤于遊田以庶邦惟正之供蓋以逰田國有常制文王不敢盤逰無度上無濫費則下無橫取而能以庶邦惟正之供又曰嗣王則其無淫于觀于逸于遊于田以萬民惟正之供無皇曰今日耽樂乃非民攸訓非天攸若則以人君奉天子民當法祖德戒逰田蠲橫斂兢兢業業非禮勿動然後足以正國而治人一或從事耽樂下則非民之所法上則非天之所順非細故也成王謹守周公之訓為守成令主用延八百年之祚蓋有由矣桓公乃周公伯禽之後反不能遵其先訓勞民動衆逺事田獵大失為君之道春秋特筆書之明有天下國家者必當循禮遵法以桓公為監戒也伏惟皇上臨御以來逺宗聖賢之訓近守祖宗之法垂拱穆清動循禮度所以比隆成周之盛治而益綿太平之丕圖者端有望於今日宗社臣民不勝慶幸五月癸丑公會晉侯齊侯宋公蔡侯鄭伯衛子莒子盟于踐土這是魯僖公二十八年晉文公率諸侯攘楚以尊周的事公是魯僖公晉侯是晉文公齊侯是齊昭公宋公是宋成公蔡侯是蔡莊公鄭伯是鄭文公衛子是衛叔武莒子是莒世子踐土是鄭地當時楚以荆蠻之國恃其强橫侵陵諸夏滅黃而伯主不能恤敗徐而諸大夫不能救執宋公而諸侯不敢與之爭以至戍榖逼齊合兵圍宋戰勝中國威動天下其勢如水橫流無人止遏於是晉文公奮然以攘夷狄安中國為心率諸侯之兵敗楚師于城濮乃還兵踐土致周襄王下勞其功文公於是作王宫以獻楚俘襄王加之以䇿命之榮命之為諸侯之長賜以大輅戎輅彤弓彤矢盧弓盧矢秬鬯之酒虎賁之士且勉其敬服王命以安中國文公拜受天子之命會諸國之君盟于王庭戮力同心以奬王室無相侵害一時諸侯翕然信從不敢有二於此可以見晉文公有攘夷狄尊王室之功矣然文公之為是盟初不能率諸侯以朝王而獻俘乃致天子屈尊而下勞則非禮矣故春秋削而不書所以正名責實以見天子無下勞諸侯之禮諸侯無上致天子之道此孔子筆削深意也臣嘗考之孔子曰天下有道則禮樂征伐自天子出天下無道則禮樂征伐自諸侯出周自東遷王綱不振夷狄侵陵諸侯强橫故荆楚有猾夏之罪既不能如采薇之遣戍役以禦之諸侯有攘夷之功又不能如出車之勞還率以美之蓋因文武之政不修以致冠屨之勢倒置以天子之尊而下勞諸侯其於君道父道也謂何以諸侯之卑而上致天子其於臣道子道也謂何所謂上無道揆則下無法守矣後世人主失統御之權人臣挾跋扈之勢以至興不當興之兵行不必行之賞啓釁召禍往往有之未必不昉於此孔子修春秋斟酌王法損益時宜以明尊卑大分以正君臣大倫於城濮略文公勝楚之功於踐土削襄王勞晉之實於是名實不至於俱喪禮制由之而永存其為天下萬世慮豈淺淺哉伏惟聖明留意通鑑綱目講章劉備以龎統為治中從事這是通鑑綱目紀漢先主能用賢才的事龎統字士元是襄陽人治中是刺史以下官初先主至襄陽訪求賢士於司馬徽司馬徽說此間自有伏龍鳳雛先主問是誰徽對說諸葛亮為伏龍龎士元為鳳雛先主既領荆州牧乃以龎統守耒陽縣令統在縣不治事遂罷其官吳將魯肅聞之作書遺先主說龎士元非百里才使處以治中别駕之任始當展其驥足耳諸葛亮亦言之於是先主召與談論大加器重遂拜統為治中親待亞於諸葛亮時法正隂勸先主取益州先主疑慮未决龎統勸先主說今荆州荒殘人物殫盡東有孫權北有曹操難以得志益州户口百萬土沃財富誠得此地以為資則大業可成先主初未然其言統又說亂離之時固非一道所能定且兼弱攻昧古人所貴今日不取終為他人之利先主遂從其計乃留諸葛亮關雲長守荆州自將步卒數萬而西遂取益州凡劉璋所用及姻親之人皆處以顯任盡其才能故有志之士無不競勸益州之民由是大和先主尋即大位以成天下三分之勢者皆由龎統之一言宋儒朱熹修通鑑綱目特書其事以見先主之能用才而龎統果能不負所用也臣謹論之人臣才能各有不同要在知之明用之當則人無棄材而官無廢事唐虞之時三德而為大夫六德而為諸侯故當時有九德咸事之效成周之世選士用為鄉遂之吏進士命為朝廷之官故得人有濟濟之盛降及後世便如漢髙帝之用三傑其知之無不明而處之無不當亦倣佛乎帝王用人之意矣先主當間關用人之際咨詢訪察不拘一途及得其人乃能隨材器而使之諸葛亮以伊吕之儔而為相龎統以謀議之才而為治中從事其卒成大業以紹漢祚四十年之久不亦宜哉仰惟皇上以至聖之德居大寶之位稽前古用人之典而立賢無方遵祖宗黜陟之公而用才有制是以人才效用天下治平大業鴻休真足以垂萬代而無替矣臣民何幸躬逢其盛青溪漫稿卷十
