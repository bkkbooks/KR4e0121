body:
  text: 青谿漫稿巻十四明倪岳撰奏議㑹議一為災異陳言事先准禮部咨開𢎞治十一年十月二十日題内開貴州安南等處失火燒燬軍民房屋共一千八百餘家延燔城樓公廨等屋共六十餘間燒死官軍舍餘人等計一百餘名口直𨽻壽州并河南府等處風雨氷雹傾倒房屋鋪舍共三百餘間渰倒軍人屋宇三十餘家及垜口二處計三百餘丈鄉村苖麥孳畜江上大小船隻多為斃壞或地震不次而廬舍為之動搖或天皷連響而人心為之危懼而蘇杭等處潮河池泖諸水寂無風潮而翻騰沸湧甚者雍府新創迅雷震之清寧宫為太皇太后祗受天福之所為陛下隆極孝養之地乃今燒燬殆盡尤為切近之災要行兩京文武羣臣洗心滌慮思過省愆務盡交修之誠以罄應天之實等因奉聖㫖是欽此續准禮部咨𢎞治十一年十月二十五日欽奉勅諭文武羣臣朕惟天道人事相為流通感應之機捷於影響甚可畏也邇者上天示戒災異頻仍乃𢎞治十一年十月十五日清寧宫災中夜逹旦朕心驚懼寢食靡寧慮有愆違上干和氣循省數日莫究所由兹特齋心竭誠遣官祭告天地太廟社稷山川爾文武羣臣有官守言責皆與朕共天職者宜各省躬思咎去垢滌汙殫心効力毋得因循怠玩若罔聞知凡百司弊政姦貪顯跡及一應軍民利病皆直切指陳無有所隱以助朕勵精之治答上天仁愛之心綿國家億萬載隆長之祚欽哉故諭欽此謄黃齎捧前來於本年十一月十八日接至南京禮部通行各衙門欽遵外臣等聞命戰兢罔知攸措仰惟聖明臨御兢業萬㡬日御講筵精求理道誠宜和氣丕應嘉瑞畢臻夫何比年以來災異頻繁聞見驚駭及兹清寧之災尤為非常之變自逺聞之已倍驚皇况惟聖心誠孝方隆奉養之禮當此變生倉猝寧免震驚之虞此臣等悚懼之心夙夜為之靡寧者也復念臣等猥以菲才謬當重任不能勉脩職業以仰答恩休徒爾坐糜廩祿以召致罪戾上干天意職此之由汗靦倍増伏俟罷黜過承恩詔但令脩省除已望闕謝恩省躬思咎痛加湔滌外竊惟聖諭所云天道人事相為流通感應之機捷於影響甚可畏也於此誠足以仰窺聖明深逹天人之理克究災異之端者矣然猶屈已求言使得指陳利病此盖古帝王不自滿假詢于芻蕘之盛心也夫欲思有以回天意必當有以順民心欲思有以順民心必當有以寛民力是以營繕頻興民力所由以困征斂横出民力所由以竭賞罰冗濫則無功者錄民何視以勸用舍顛倒則不肖者進民何藉以安盖民心嗟怨之日深則天意譴告之必至以此厯推致災之由庶其可盡弭災之實臣等各攄膚譾之見少効㳙埃之益凡二十八事畫一上聞此皆職守所司耳目所及伏惟聖明俯垂矜納其於時政或有少補犬馬惓惓之私不勝至願縁係災異陳言事理開坐㑹本專差辦事官羅憲齎捧謹題請㫖一推行聖學近者伏聞聖上勤御經筵日講不輟講明聖賢之格言圖惟治平之要道緝熙之功啓沃之益於是為大三代之治端在今日宗社之幸生民之幸也臣等竊惟朝廷日講之制必以宋儒真德秀所著大學衍義次第進講書云知之非艱行之惟艱徒讀其書而不求其意亦無益也考之衍義所載首言格物致知之要必以帝王知人之事為先其於辯人材之論尤惓惓焉盖任賢圖治乃人君之職故所任之得失賢否則天下之治亂安危係之非細故也伏望聖明因夫今日所講之書驗之古人已行之事獨運於聖心之微以謹夫用人之道於凡内外文武之臣左右前後之職其間果有忠實不欺淳謹可託特立而不為黨與之私勤敏而足為治理之助者俯推委任之誠而不輕為搖奪曲施保全之恩而不易為間沮其有立心私邪制行姦詭執左道以變亂倡異端以熒惑以土木營繕為奉承以禱祠祈禳為忠愛費財而不顧勞民而不恤以至依阿循黙以茍容而不知竊位之恥奔競冐昧以希進而不知枉已之辱若是者皆足以僨事而害政違天而虐民所宜迸逐而不留拒絶而逺去庶朝廷為之永清天意為之昭格災害可弭政務可脩而太平之治必在此矣一豫節親藩竊惟自古藩國之設主於屏翰天朝强本固宗之道也太祖髙皇帝福徳髙厚本支衆多當時慈愛均一是以恩禮交隆列聖繼統天潢繁衍封建之盛殆遍天下但比年以來衡州建昌等處疊遭雷震變異非常此必藩國營繕太盛天誡昭然示警以至於今災生壼掖事理相關誠非偶然夫天下之人民皆朝廷之赤子也親王之國車船人夫之費分所當得未敢盡言柰何承奉等官不知仰體朝廷親親之意一離通州便作威福尅害夫役凌虐有司經過地方勢同刦奪甚者方面官貟痛遭笞辱不豫有以節制之則徃過來續積弊益甚民將不堪將來必大有仰厪聖慮者矣天下之田土皆朝廷之租稅也親王治國宫室祿米之設已有定制經費有餘柰何承奉等官不知仰體朝廷親親之意一至本國遂起貪心占民房屋奪民田土輒奏朝廷誤蒙准賜甚者侵越市鎮强取稅錢不豫有以節制之則田土有限藩府日増國賦日削將來必大有仰厪聖慮者矣夫言之於無事之日不足信言之於有事之後不及行是故進言之道自古難之伏願皇上明勅承奉等官務要輔王以正仍逐一開示條件嚴加禁防之國之際不許生事擾人在國之時不許輒行奏討如有違越者悉如近該欽奉聖㫖事意許巡撫巡按官員指陳實跡叅提首事之人明正其罪更置官属庶㡬宗固本强民安物妥而天意可回矣一懲究欺蔽臣等竊惟人臣事君以不欺為本况履霜堅氷其來有漸為臣之職誠不可忽其漸而涉於欺也且明者見於亂之未形知者察於㡬之未動豈可於所已形已動之事而圖為掩匿營䕶以茍目前之安乎比年以來相習成風如雲南之木邦貴州之清匀江西之南贑以至東西二廣之域西北三邊之地南北兩畿之間侵犯者不為剋復之計盜竊者不聞捕勦之策甚者殺良民以為賊假敗績以為功捷奏率為虛聲掩護遂為良筭任其事者展轉退託以俟遷官為其民者流離虐害無所於愬夫隄防以障水小有罅隙亟宜築塞及其横潰為力難矣唐宋之季率因姦欺之臣迷誤國事馴致禍亂不可不慮也今大江南北嵗豐而盜作糴賤而民貧武備空虛災異稠疊有識於此不無寒心伏望皇上彰離照之明奮乾剛之斷特勅該部查勘前項各處如是地方未靖而言已遂平定夷酋未服而言已聴撫安盗賊隠而不聞匿而不捕聲息蔽而不舉言而不實虛呈功捷冒請陞賞者一一從公究理以懲欺蔽庶㡬將來人知所警早為徙薪之謀不貽噬臍之悔矣一甦息貧窮竊惟事有因革理貴變通庶弊蠧可以祛除而貧窮有所甦息也照得南京官軍騎操馬匹常年倒死數多俱照在京事例出辦樁錢并朋合錢預備買補倒死馬匹隊伍固所宜然不曾倒死馬匹何為一槩出辦後該兵部議處量將收到草塲地畝銀兩毎匹補助三兩但買補之際多被勢要之人故將老病馬匹加意餧養乘機貨賣以致舊者買補不前新者倒死相繼負累管操官員住支俸給養贍猶且不周戰守何由可望及照南京各衛快船先年不曾定為則例均勻派撥有一衛五七隻十數隻者多至三四十隻者甚者全無一隻以致船隻多寡不一所以衛分勞逸不均及其敝壞打造之際初年料物俱係工部出辦近年奏定官出六分自備四分官出者不以時給打造不前自備者負累軍餘出辦貧苦百端交收在官又被衛所官員侵欺花費及用造船毫釐無措以致船隻無由完備軍餘辦價不已似此事理之弊蠧不為變通則官軍之貧窮何由甦息伏望皇上念祖宗根本之地憫官軍貧窮之苦特勅該部不為常例通行南京兵部各委公正廉能官一員查勘各營倒死馬匹自𢎞治十一年以前應該買補共若干匹各營收貯出辦樁錢朋合錢共若干兩毎匹該銀十兩止該買補若干匹其無價買補者尚有若干匹就將兵部毎年原收馬草塲等項地畝銀兩照數支給通將二項銀兩轉解兵部發付太僕寺收貯於南京太僕寺俵過該送太僕寺備用馬匹照數關領官軍騎操仍行管操官員不時㸃查務要用心餧養不致瘦損以後遇有倒死樁錢朋合錢積至五兩兵部草場銀補助五兩悉照前例解納兌領馬匹騎操庶得軍免買補之苦民免解送之勞實為兩便其管操官員該住俸粮之日乞照屯田事例止住一半但少存其養廉之具庶可責其敵愾之心及查勘各衛打造脩理未完快船共若干隻見領料辦價打造者若干隻已領杉篙等料花費無存者若干隻已辦價花費無存者若干隻人船俱無下落者若干隻毎船通計該用銀若干兩各以料價二項分數多寡計筭見有而不足者應該補足花費而無存者應該全給通將侵欺官員查出拿送法司照例從重問罪監追前價其不足之數亦將兵部毎年原收馬草場等項地畝銀兩照數那借支給應用并行南京工部即將該給物料作急支給除人船俱無下落者開豁不必打造外其餘船隻督併打造完備通將各衛原造文冊查勘各衛軍餘數目船隻多寡除十隻以下及人船相應者不動外其二十隻以下者減去二分二十隻以上者減去三分均派無船及人多船少衛分撑駕仍行管船官員不時㸃閘務要用心愛護依時修艌以後仍照例十五年以外不堪撑駕者官給全料十年以裏損壞者責與本船夫甲備料修理如此庶貧窮可以甦息差役亦得均停人心和悅而天意可回矣一修復常平竊惟農無常稔之年國有備荒之政求之古人之所已行盖惟常平獨為盡善是以成化初年南京守備官員因見嵗凶民饑莫能拯救乃倣古常平之意奏將沒官房屋改為倉厫名曰常平銓官置吏以司出納毎嵗將蘇松等處運到粮米免其上倉將各衛官軍三箇月俸粮臨船兌支省出加耗脚價毎嵗約有十萬餘石運赴常平倉交納遇嵗凶米貴減價糶賣銀錢收貯官庫嵗豐米賤增價糴買粮米收貯本倉良法美意與古寔同後因本倉積米數多南京户部奏將作正支放常平之法遂廢倉厫雖存傾圮過半當時費用財力即今棄之可惜况京師之大畧無備荒之儲豈宜然也且徃年米價翔貴至八九錢一石民皆缺食盗竊紛起若使官倉有米能糶數十萬於市則米不湧貴民饑可療矣如今年米價極賤至二三錢一石民賣輕賫虧損至極若使官庫有銀能糴數十萬於倉則米不狼藉農力可蘇矣柰何坐視米價貴賤之機莫救農末交病之苦豈宜然也如蒙乞勅該部查照先年奏設常平事例再為斟酌倉厫損壞量行修理仍自𢎞治十二年為始浙江等布政司蘇松等府該運南京粮米照例三箇月臨船兊支將所省耗米脚價或一年者或二年者運赴本倉上納以為常平之本行令該管官員隨時米價貴賤依擬糶糴若本倉粮米積至四五十萬石恐至陳浥不堪方准作正放支就將本年臨船兊支所省粮米照依前數運納以為常平之本務使新舊相更貴賤相濟倉有餘粮嵗荒無缺食之憂市有平價年豐無傷農之慮寔為便益一類解文册竊惟政以静為善令以簡為良則下人易於遵行臨事免於費擾也照得南京各衛所軍伍俱自永樂年間分調所存者十無三四人少多差乃倍於舊且如一年之間該造文册無慮二十餘起攅寫之勞裒斂之費所不可言近雖稍減而勞人費事尚有存者如毎嵗春季各衛將舊年已支錢粮數目攅造文册名為嵗用及至冬季又將次年該支錢粮數目攅造文册名為嵗支俱要差官赴京送繳戸部南京共該五十餘衛毎衛一年差官二次約計一百餘員造册之際費擾可知至於往回路給皆從槩衛貼辦侵漁科斂日益嵗増衛所憊困何由甦息况所支用錢粮俱係南京戸部管理造册查對理所宜然繳送戸部無大關係如蒙乞勅該部將前項文册行令各衛依時攅造毎年二次通送南京戸部查對明白待有本部公差官員通齎類繳户部庶軍官免跋涉之勞衛所省科斂之弊亦省事便人之一端也一併省重複竊惟恤民莫大於惜財惜財莫先於省事盖事多則費廣財費則民窮乃理之必然者也照得南京内府各庫先因管庫官員作弊偷盗官物年久一旦以火遮飾不惟罪得茍免又且勞費盖造今復奏行工部毎年春秋二季用工修理任從該庫破調損壞滲漏去處動用物料人匠其費不貲仰惟朝廷於凡宫殿宗廟社稷等處事體最為重大俱無一年二季修理之例何獨南京各庫重複勞費無有窮已再照成化年間欽差内官二員前來南京督理織造開局置機勞民動衆拘役之艱難供億之騷擾月益日增民不堪命𢎞治初年已蒙聖明特詔停止内官取回中外臣民不勝慶幸近年又復差遣内官二員前來仍前織造縁所織造紵絲紗羅果係上供九重内奉三宫之用雖官司竭營辦之勤百姓極科裒之重分所宜然不敢辭免但所織造不過用􅂶内外官員不時賞賜而已其各布政司南直𨽻各府嵗織造内酌量改造進用亦無不可臣等已於𢎞治十年四月内因遇災異陳言㑹議奏請乞暫取回未蒙俞允忽於今年十月又復蒙差南京内官監太監鄭山亦於前項織造去處管理織造縁係挨輪年分接續幹辦所理既無别事委任何必人多况逐日供給之費各項役使之人陡増一倍民實不堪似此事關一體差至三人重複勞費無有窮已如蒙伏望聖明俯恤民隠大惜財用事干重複少賜併省特勅該部通行南京工部將内府各庫一年二季修理事例暫且停止果有滲漏損壞之日聴令照例具奏計勘明白方許興工其新添織造内官乞賜革罷所織段疋等項併於先差内官管理如此庶事稍省而民心可安民少安則天意可回矣一減省供應照得南京光祿寺逓年醃臘活鹿一百五十一隻天鵝四百六十三隻俱係直𨽻安慶等府廣西湖廣等布政司地方採捕解納有起自三四千里路來者有起自一二千里路來者俱候小雪節解到係是山澤之性沿途餧養艱難多致瘦損到此之日依期宰腌用鹽太少天熱生蟲用鹽太多苦醎無味又要打造木櫃裝盛起撥馬快船隻運送及至到京不堪供應及本寺做造菜薹俱於毎年二月分起手採取晒晾做造毎三日一换厨役餘丁一百名動經四五十日方纔完備起撥馬快船隻差撥經手官厨解送在途遷延日久停放過時多有變味不堪供應竊照活鹿天鵝菜臺北方所産處處有之非比别項時鮮北方所無者依時上進豈敢缺悞况做造不法進用過時以致味變不堪供應而小民之採納艱難道路之應付騷擾有費無益莫此為甚如蒙乞勅該部議擬合無毎鹿一隻徵價二兩天鵝一隻徵價五錢行令各司府照數煎銷成錠差人解部轉發光祿寺收貯凡遇缺用天鵝活鹿照依時價收買供應其做造菜臺暫且停止實為便益一署掌印信竊惟體統正則下有法守委任定則事易遵行照得南京六部都察院通政司大理寺堂上官近年雖設正佐貳員偶遇事故或有正佐官兩缺之時堂上印信不免暫委予部郎中等官署掌縁委官與各属官分係同僚不相統攝凡諸行事誰肯聴從體統不正事難辦理又况各官賢否不一錢粮刑名等件出入議擬之間乘此間隙而輕重其心髙下其手者未敢保其必無廢務妨公大率由此欲照在京事例奏請差官署掌又徃來動經數月愈至悞事合無今後遇有前項衙門缺官掌印之時行移南京吏部如吏戸禮兵工各部通政司有缺就於各衙門堂上官内輪流署掌三法司有缺就於三法司堂上官内輪流署掌如此則體統不紊上下相安公道行而衆務舉矣一稽核名實竊惟天下之人才其養也皆以學校其進也皆以科貢入官之後考績幽明之說雖同循名稽實之法獨異今州縣之官發身進士者或三年四年有旌擢内遷之典而非出進士者則寥寥無聞夫十室之邑必有忠信天之降才未必爾殊其間豈無立志操心奉公守法思欲與科第齊者惟是激勸之典既無及已而考績之法又復頻仍不免於計日謀身雖妨政害民亦不暇恤其出進士者固多顧惜名器然其間亦豈無肆志妄為者惟是已之地位既殊人之相待又異雖有瘝官曠職妨政病民者人亦防其後逹曲賜優容夫作人之道全在鼔舞變化而考績之說同一黜陟幽明今鼔舞之法既獨行於進士一科而考績之法又獨嚴於發身舉人嵗貢者遂使有志者變為無志欲効者不獲自效狥名失實莫此為甚如蒙乞勅該部今後州縣親民之官不必專論其出身惟當稽核其名實其奉公守法者雖非科目亦加旌擢肆志妄為者雖出科目亦不茍容公其一視之仁使人皆知自奮恃其考察之令使人皆得自効凡廵撫廵按監臨等官具掲帖報賢否者不得以奉承之能否而輕為髙下操予奪黜陟之柄者不得狥一言之先入而遂廢諮詢如欲薦一人必使如虞廷所謂載采采退人必使如明詔所謂有指陳務俾賢者得久任以自効不賢者不徼倖以茍容將見公道大昭名實不紊而人皆蒙其惠矣一均平銓選竊惟自古建官惟能立賢無方初無内外逺近親疎之别果賢能邪雖外而踈逺在所必取果不肖邪雖内而親近在所必棄我太祖髙皇帝定鼎金陵稽古建官著為定制自後肇建北京改為南京然而諸司之建置不移各官之職任如故誠立萬年不拔之良法也柰何近年以來兩京官職出身既同除授不異及其遷轉之際乃相懸絶且如在京科道部属官員在外則陞僉事叅議知府副使叅政在内則陞太僕大理寺少卿寺丞通政司叅議今南京科道部屬官員止陞僉事知府亦且淹至七八年之久而原闕附選之期南之視北乃差至一年之久雖稱南北人數多寡不同亦不宜懸絶至是合無今後南監監生厯事三月考勤之後一照在京事例聴從南京吏部先將名籍奏行吏部附選仍舊照例厯滿一年聴候挨次取用庶事體得以歸一而人財可免淹滯矣一湔滌過名竊惟天地生成之徳不以逺近而殊則朝廷造就之恩亦不以逺近而異况南北皆謂之京師大小均謂之京職而祖宗根本之地尤所當厚者乎伏睹毎嵗十二月内節該欽奉勅諭禮部三法司兹者春陽肇序萬物咸亨在京文武羣臣除贓罪外有犯公私過名紀錄在官者悉與湔除俾圖自新欽此除欽遵外夫人非聖賢孰能無過一蒙恩詔咸得自新去瑕滌穢不致廢棄孰不感激奮發争圖報効惟獨南京各衙門大小官員授職皆同釐務無異或有纎芥之過不蒙湔滌之恩其間一考稱職官員無由請封六年署職官員無由授實九年通考遂礙敘遷仕途有此躭悞中心未免拂欝近該禮部題十月二十五日欽奉勅諭文武羣臣欽此欽遵謄黄賫送在京文武衙門欽遵外今照南京係祖宗根本重地其文武衙門與在京事體相同合無謄黃轉行兵部差官馳驛賫捧前去各該衙門一體欽遵知㑹等因奉聖㫖是欽此伏惟日月之明容光必照雨露之施無逺弗及綸綍之恩豈有間於逺近者哉伏望聖明體孔子赦小過之言念武王不忘逺之意特勅禮部如遇年終降勅湔除罪名之日乞令照依前例謄黄差人賫捧前來南京各衙門有過官員一體湔除俾圖自新庶得恩典均沾人心感發實為便益一疏通欝滯竊惟和氣致祥乖氣召異自然之理也昔匹婦含寃三年亢旱匹夫結憤六月飛霜天人之理相為流通則夫人有欝憤之情寧不有以傷和氣而召災變乎照得近嵗以來文職官員多有縁事調降或以陳言或因小過或為豪右之排斥或被誣奏而陷害吹毛以求其疵洗垢而索其瘢于其迹雖若可罪原其心亦無非欲攄誠悃少圖萬一之報爾然一蒙謫降久未收復則其欝滯豈直匹夫匹婦之比也伏望聖恩憫人才之有用念過失之可原乞勅吏部通將𢎞治六年以後欽蒙降調官員查照原擬應該復職者仍令復職以沛曠蕩之恩以全公平之體如此則凡在臣工豈不倍増感激之私圖盡報稱之力欝氣消而和氣臻矣一寛免違限查得見行事例舉人告入監并監生願就教職考不中復監者俱除水程四十五日外仍除一箇月若患病有堪信文憑仍除三箇月過期者送問除遵行外夫謂之舉人入監者指新中未入監者而言若舊中已經坐監者不在其數謂之監生復監者指舊貢已入監者而言若新貢未曽入監者不在其數今告入監舉人不分舊中已曽坐監及願就教職考不中復監監生不分新貢未曽入監但有過期一槩送問似與前例不合及查得除授官員赴任過違憑限半年之上方送問罪其舉人監生止許四月未免過嚴况各生違限到監坐班月日虛曠本監自與查算不得出身比與官員赴任不同而各生多係貧難逺方之人所帶盤纒有限一經送問贖罪價銀無從措辦尤為窘迫如蒙乞勅禮部議䖏合無今後新舊舉人并嵗貢監生不分入監復監者過違限期但有患病等項堪信文憑俱免送問仍行該監嚴查虛曠月日務要應該撥厯之日方准撥厯出身如無患病等項堪信文憑者止照官員赴任過限半年之上事例方與送問如此則法令適中賢才得所一慎用將官竊惟將者兵之司命國之安危係焉將官之設其不輕而重也較然矣臣等近聞大同總兵官神英副總兵官趙昶各以私忿互相攻訐煩凟聖聰差官體勘未蒙定奪及宣府總兵官阮興又蒙取回别用且大同宣府乃朝廷之北門而將官實司北門之鎻鑰者也方今邊圉未輯災異屢形而將官之重未盡得人如此萬一酋長聞風乘機侵犯為害非細有識寒心固宜早為區處不可視為泛常且聞各邊將官有缺多在京營選補但此等官員初到地方夷情不逹邊務未諳一遇有警手足無措又安敢望其克敵制勝者乎乞勅該部通將各年各官公舉將材照例㑹同五府各部都察院大理寺堂上官并掌科道官從公逐一評議原舉堪任主副將官其間或精通武藝或練逹戎務或弓馬熟閑或韜畧諳曉或智謀過人或勇敢出衆宜用於北者北邊宣府大同遼東陜西等處地方有缺挨次奏補宜用於南者南方雲貴兩廣四川湖廣等處地方有缺以近就近挨次奏補其有不協公議及夤縁請託者俱令革退其有未經公舉及已舉未經評議者無得舉用至於京營將官未經行陳止可存留拱衛京師如此則南北將官可冀於得人而各邊地方可保於無虞矣一減省差遣照得針工巾㡌二局毎年奏差内臣四員前來南京取用麂皮等項物料經年動嵗方纔回京毎員取撥六百料馬船二隻暫座共用船八隻毎船一月索取貼帮銀五兩一年之間約取銀四百八十餘兩及至起程毎船又要脫幇銀五兩夫甲貧難辦納不前百般辱打隨船什物因而强搬怨嗟之聲聞者不忍誠使減此官則減此船減此船則無此害况南京針工局逓年常有起運物料如蒙乞勅各衙門今後取用前項麂皮等項料物免差在京内臣就行守備太監督令南京針工并巾㡌局依數造辦選差的當官一員起運管送仍照例㑹官裝扛務要十分滿載不許多占船隻及將夫甲非理凌虐索取財物如有故違許科道并兵部委官指實具奏究治庶民害可除事亦不廢一禁約取索照得馬快船專備裝載官物之用近年以來差使浩繁駕船夫甲橫被管運内外人員索詐艱苦不可名狀姑以為害最甚者言之如南京内官監年例該運黑沙洲等處蘆柴計把不啻千萬占差六百料馬船共一十六隻隨船水夫約五六百人毎年蘆柴就派水夫各自砍斫裝載管押官毎船一隻要銀二三十兩水夫貧難多將月粮賣輳方免捶楚及交柴之際管塲官又行索取毎柴一束要錢一文柴滿千萬則錢亦千萬錢不敷者百般刁難及照南京内官監等四衙門裝運蕪湖抽分厰板枋用馬船三十餘隻南京中軍都督府裝運爛泥洲等處蘆柴用馬船十隻管押人員往往效尤逼迫人夫因而逃竄數多船隻廢壞職此之由如蒙乞勅兵部查例嚴加禁約今後管押等官敢有仍前索詐許令廵江御史密切訪察叅奏拿問以示警戒被害之人亦許指實陳告其蘆柴毎年照數砍裝交納就行管理抽分御史臨場驗收如此則夫船不累裝運無悞一慎重刑獄竊惟刑以輔治自古帝王之治天下未有不本諸此而為治者易曰君子以明慎用刑而不留獄書曰欽哉欽哉惟刑之恤哉是刑不可以不慎也然則司刑獄者當存心以仁恕持法以公平庶㡬刑不至於寃濫矣臣等嘗見兩京法司推問輕重罪囚悉發大理寺審錄情罪相當者評允施行情不當罪者駁回再問如此可謂慎用刑矣而尚有稱寃不服罪囚其在外諸司問理刑獄秉公持正而刑罰得中者固有其人中間有等矯情干譽之徒不能體皇上重愛民命之意以苛暴為能事以刻剥為盡職讞獄之際視人命如草芥煅煉成獄問擬斬絞罪名監候呈詳或有詞未明或稱寃不服恐其反異不便及未成獄囚犯一槩輙令獄卒多方致死殊不知古人用刑罪疑惟輕之意寃枉所係誠可哀憐上干和氣致生災變未有不由於此及法司奏行差官前去各處審錄重囚往往圖得便道過家不及致詳刑獄雖有審録之名實為虛應故事如蒙伏望聖明擴天地好生之徳體日月照察之明特勅法司凡遇差官審録弗狥私情務要南方刑獄擬差北方官員北方刑獄擬差南方官員其於審録之際仍要留心詳審勿拘成案情真罪當者監候奏請處决其間情有可矜罪有可疑及情法不相當者具𦂳關畧節招由奏請區處其原問官員果有故出入人罪者依律坐以故出故入之罪如是失出入人罪者坐以失出失入之罪如此庶使在外問刑官員少知慎刑之意不行慘刻之科而刑獄亦得以清寃抑亦得以雪人心和恱而災異消弭矣一查明禁例竊惟道之以政齊之以刑謂法制禁令即今之律例是也然非政有定體何以刑得其平當此萬國同文之時豈有兩京異政之理南京祖宗根本重地山陵宫闕具存而曲禁周防乃政務所當急者如南京内官監於皇城四門守衛官軍内毎門日撥軍一百名看守打掃及南京司苑局日撥金吾後衛府軍後衛上直官軍一百名在東西二園栽種又孝陵神宫監太監等官燒用柴薪俱是給與軍人票帖前去攔牲門外拾取又以免差使為名歛收軍人銅錢以此旗軍人等効力公所者數少乘機私役者過多及至事發法司問理為因近年在京皇城各門并長陵等陵一切禁例多不行移南京衙門知㑹以致各該監局查報之時往往援引逺年事例加内官監則曰宣徳年間奏奉額設司苑局則曰洪武及宣徳年間差撥存留孝陵神宫監所燒柴薪則曰本監與南京浣衣局内官享堂官長隨内使先年舊例俱在本山手扳脚踼拾取燒用所斂軍錢則曰買辦薑種及進用蒜頭山藥芋苖用盡此等體例俱無的確年月亦無原奉㫖意全文有無虛實無所考証夤縁影射為弊日滋以致山陵之嚴宫闕之禁失之太疎而防微杜漸之計漫不知警於兹災異之臻若復無所省究豈宜然哉况在京皇城各門并長陵等陵事體既與南京相同則夫凡百禁例亦當與南京無異理須歸一人易遵守如蒙乞勅法司通查在京近年奏准見行事例比與南京山陵門禁相同者備行南京法司一體遵行仍乞勅南京内外守備叅贊官并南京兵部轉行南京各該監局軍衛務查前項原奉洪武永樂宣徳等年間欽依及奏行事例的確全文俱從兵部法司將與在京見行禁例通併叅詳若係出於一時權宜自當遵依近例為當明白奏請著為成法頒行南京如有違犯據憑論斷其有仍將逺年不明事例朦朧搪塞者宜從法司徑自叅究施行如此則兩京無異政衆心有定守而陵闕益尊嚴矣一申明舊例照得先該南京總督粮儲右都御史周瑄奏稱南京無籍軍民人等稱為跟子名色迎接納粮人等跟送歇家哄誘銀兩買嘱官攅人等通同作弊犯該滿貫徒罪以上就於該倉塲前枷號三箇月滿日照包攬坑陷納户事例發邊逺充軍等因具奏該戸部㑹議得前件跟子歇家滿貫徒流以上枷號一箇月常例發落節該奉憲宗皇帝聖㫖禁革誆騙這件還准他毎說欽此欽遵通行外後該欽奉詔書已將前項新行條例革罷近該南京總督粮儲右副都御史王軾具奏申明戸部擬議前項跟子歇家滿貫徒罪以上仍照前例枷號三箇月連當房家小發邊逺充軍職官有犯奏請定奪奉聖㫖是欽此欽遵通行外臣等看得事體貴合人情法令在得中道各司府州縣納戸初到南京不能熟知道路未免尋人指引别無官房住歇未免尋討歇家此人情所不能無者查得見行事例攬納之人坑陷納戸及打攪倉塲虚出通關者止問充軍不曽枷號今跟子歇家止是曬晾駞載糴買等項多取工錢價直比之攬納作弊輕重不同既枷號三月又發遣充軍法令似乎過中以致近年納戸往往倉前露卧人家不容安歇一入歇家輒被恐嚇受害多端近該法司問擬又皆拘執前例或連引情輕人犯俱問枷號充軍逺近稱寃有傷和氣合無今後南京法司如遇跟子歇家有犯指稱官吏名色誆騙財物滿貫與坑陷納戸限外不完及通同官攅虛出通關者俱照原擬事例問罪充軍免其枷號若止因曬晾駞載糴買等項多取工錢價直財物至滿貫者枷號一箇月與不滿貫者俱依律問罪照依常例發落如此則刑罰平而和氣應矣一減造軍器竊惟軍器所以禦戎固不可不預為成造而財力費於無用尤不可不量為區處查得南京兵仗局前厰逓年成造盔甲鎗刀弓箭撒袋圓牌等項軍器共㭍萬玖千陸拾餘件收貯南京戊字庫聽候應用誠國家思患預防脩武備禦賊冦萬世之長策也但承平日久軍器少用未免法出弊生今計該局嵗用生熟鐵一十一萬七千九百餘斤木炭木柴四十餘萬生水牛黄牛白硝麂雜等皮三千三百餘張翎毛觔角箭竹雜木約二十七八萬其餘銅錫銀硃靛青油漆魚線水膠綿苧布絲絹紙劄等料動以千百計軍民人匠班匠共六百五十五名外雇工銀二千八百五十餘兩然所造前項軍器大抵多被尅減工料成造不堪雖有該部及科道委官按季盤驗亦不過大畧看過不能一一周悉况南方地勢卑濕收貯三五年後箭翎弓張多已脫落朽壞鎗刀衣甲亦各繡爛誠恐一時行軍卒要應用有名無實誤事非細查得本庫自洪武永樂等年到今陸續收貯見在軍器共有四百五十餘萬件頗勾應用及查得先該工部議擬天下軍衛有司嵗造軍器數多積久恐不堪用題奉欽依俱自𢎞治二年為始減半成造誠為得宜乞勅該部計議合無將本局嵗造軍器暫且停止仍將戊字庫原收軍器委官盤驗見數其間堪中者如法安置晒晾不堪者挨定年分逐漸修理有當添補物料止於各庫㑹有量支應用待修理完日仍照減半事例成造如此則財力不至妄費軍器皆為有用矣一量停造作竊惟上之供用有缺固不得不徵取於下下之財力有限亦不得不赴愬於上盖下有餘力則上無不足之患而上或過取則下有不勝之憂此皆國用之所急民情之所切者皆不可不詳思而慎處之也查得本部先於𢎞治十年十一月内該南京内官監掲帖一件為欽依起運急缺供用物件事該太監李廣奏取生漆桐油肥皁各二十萬斤銀硃各三萬斤分派應天等府辦納續行本部成造裝盛箱桶瓦罈雨罩共一萬九千八百箇隻鐵鎻九千二百把单榜紙三萬一千陸百張黄䗶白麵桐油等項共一千六百餘斤又於本月内准本監掲帖一件欽依成造急缺供用物件事亦該太監李廣奏取硃紅漆戧金雲龍黄銅火罩等件共四萬五千六百五十副箇除該監通行南京丁字庫等衙門將㑹有銀硃黄熟銅生漆金箔木炭等料共六十萬五十二斤塊徑行外將㑹無生漆銀二硃等料共二十一萬九千五百餘斤根塊亦行應天府鋪行估計支給天財庫錢鈔買辦及行本部成造裝盛箱桶木匣鎻鑰黄氊黄紅綿布綿花套桐油木扛雨罩等項共六千八百九十餘件黄单榜黄白中夾紙四萬八百五十張至𢎞治十一年八月准南京兵仗局掲帖一件上用供用物件并軍器等項事該署兵仗局事内官監太監楊穆等奏奉欽依成造上用象牙鵓鴿頭弰彈弓等件八百件供用竹竿綿紥魚义等件共一萬五千八百四十件該局料計見有生銅等料一萬五千七百六斤南京甲字庫關支闊白綿布等料共二十九萬八千七百七十七疋斤龍江瓦屑壩二抽分竹木局關支煤炭木炭等料共六百五十八萬四千七百四十斤塊應天府支給天財庫錢鈔買辦青紵絲絨線象牙銅鐵油漆等料共七十萬一千四百四十二疋塊本月内又准工部咨為成造神器事該署兵仗局事内官監太監楊穆等題奉欽依成造各銅將等件共二萬二千六百九十箇把坐派蘇松等府買辦水黄牛等皮九千五百三十張應天府支給官錢買辦魚線膠紅熟銅油灰黄丹黄麻等料共一十四萬五千四百餘斤等因節行到部除欽遵坐派成造外臣等切詳各監局成造上用供用器皿物件誠為浩繁然天下司府州縣嵗辦皮張油漆銅鐵銀二硃等料亦為不少必須量入為出以次成造方可使國用不缺民力不困今一年數月之間各起坐派前項物料動輙數十百萬非惟府庫錢粮支給不敷且使小民出辦何以能堪况應天府係南京根本重地而蘇松等府尤百萬京儲仰給之處又兼連年災傷薄收公私俱困豈得恝然不加撫恤其鋪行買辦名雖關支内庫錢鈔給還但納料關價出入各門禁及該庫俱要財物打㸃使用及至關出錢鈔又多爛鈔低錢不堪行使以此往往破家蕩産賣男鬻女不能陪償又如各府州縣大戸解納生漆銅油銀二硃紙劄等料俱有原裝盛箱桶等項却又尅下另行本部重造尤為煩費似此假公營私傷財害民誠有傷國體上干和氣之甚者如蒙乞勅該部通將前項原坐派供應物料器皿等件逐項查審將𦂳急缺用者再行奏請行下催䟎成造先行解納其可緩者暫且停止今後在京各監局若有奏行成造器皿等項工部務要查看先後酌量緩急另行奏請行下無得併於一年一月之間致使所司倉猝無措仍行南京成造監局衙門該用物料務要㑹同該部及科道官嚴督各作匠役人等從公估計如某器皿合用某物料若干及將造完要行裝盛亦要估計某物若干用某様箱桶并鎻鑰扛索氊片各若干通估明白相應方許將㑹有者行各庫局關支㑹無者行有司買辦不許各該衙門止憑作頭人等朦朧多估輒行關支買辦其解戸納料鋪行關支錢鈔亦要科道部官從公隨即收放不許刁難掯要財物及各司府州縣解納油漆銀硃等料若有原來箱桶等件不許另行重造致費工料如此庶上之供應可以不缺下之財力亦無妄費而民困或得少蘇矣一遵復舊制照得山東臨清州直𨽻淮安揚州蘇州府浙江杭州府江西九江府等處俱係客商船隻輻輳之處祖宗舊制各設有鈔關收受商稅俱委各本府通判等官管理行之百年雖不能無弊然課鈔亦未見其虧折客商船隻亦未見其留難盖通判等官職卑責重上受廵撫廵按分廵分守等官節制少有不才隨加罪黜故非極妄無知之人則不敢在關生事動擾客商近年以來改委户部官員出理課鈔其間賢否不齊往往以増課為能事以嚴刻為風烈籌筭至骨不遺錙銖常法之外又行巧立名色肆意誅求船隻徃返過期者指為罪狀輙加科罰客商資本稍多者稱為殷富又行勸借有本課該銀十兩科罰勸借至二十兩者少有不從輕則痛行笞責重則坐以他事連船拆毁客商船户號哭水次見者興憐夫増課為國雖稱聚歛猶是有名其科罰勸借者或倚稱修理公廨或倚稱打造坐船率皆借名入已無可查盤况此等官員既出部委各處廵撫官視為賓客廵按官待以頡頏是以肆無忌憚莫敢誰何以致近年客商懼怕征求多至賣船棄業此豈祖宗設關通商足國裕民之初意哉伏願聖明俯察民隱特勅該部停止新例遵復舊制仍勅鎮廵等官時常糾察各府委官如法奉行務要公私兩便商民不虧庶㡬人心快悅怨聲銷弭而天意可回矣一裁抑侵尅竊惟抑末固為政之理而通商亦富國之術茍使官司肆為侵尅遂致道路漸成愁怨傷和致沴豈王政之所宜哉照得舊制天下商賈輳集之處各設稅課司衙門立法抽稅具有成法惟南京龍江大勝港原設抽分竹木局抽分竹木柴炭等項有三分取一有十分取二有三十分取二者取之至輕用之有節逺近輻輳上下便益近年工部奏准於浙江杭州府湖廣荆州府直𨽻蕪湖縣設置抽分衙門遣差部官管理不惟地方接連重復抽稅而其人賢否不齊寛嚴異法但知増課以逞已能不恤侵尅以為民病甚者器皿貨物不該抽分之物一槩任意勸借留難所得財物無可稽考因而侵漁入已難保必無及照龍江大勝港抽分例有内官兼管比因洪武永樂年間許令就於抽分内取鈔三十貫以為茶菓食用今乃借此為名百法巧取如杉楠板毎塊籌二根取銀二錢四分杉條五根籌一根取銀一錢二分柴炭百斤籌一根取銀三分四分計籌取錢漫無紀極通計春夏有水船多時月毎人約得銀六七百兩秋冬水落之時亦不下一二百兩因此抽分重大遂致客商阻絶及至各工所關領竹木等料又被索取起籌出厰等錢展轉刁難不肯從公放支月益嵗増為害無已如蒙乞勅工部轉行各處抽分官員務要奉公守法律已便人不必以尅下奉上為能但當以稱物平施為務其曽經抽分去處給與執照不許重復抽分仍乞勅南京守備太監今後差撥抽分内官止照舊數無得過多仍要嚴加禁約不許似前計籌取索財物及縱容家人伴當在彼生事其各工所關支物料明文至日即便放支不許刁難若踵前弊無所悛改悉聽管理抽分監察御史等官徑自叅奏究問施行如此則侵尅之弊可以少除而愁怨之聲可以少弭矣一防革宿弊照得禮部所收惟藥材及厯日紙劄二件藥材係湖廣江西福建等布政司所属并應天府所屬州縣解納厯日紙劄係浙江布政司所屬并直𨽻府州縣解納逓年解到本部俱發太醫院并欽天監上納今訪得各院監堂上并屬官少肯守法毎收各項藥材紙劄多般刁難或本堪中而揑作不堪或不收本色而掯收折色或以一倍而收數倍甚至通同攬納之人多取價利指以修理為名罰要銀兩以致經旬累月不得完納解人受害合無今後遇有解到前項藥材紙劄聴本部委官前去公同監院官員陸續監收但驗堪中不拘土産即便照數收受不許刁難折納及取罰等項完日就出實收付解人繳照如委官扶同容縱不行舉正者本部叅究庶前弊少革解戸可甦一袪除民病切惟方今民病非止一端臣等不能周知姑舉耳目所聞見為民病之大者言之如均徭下戸先年存留不編差役本為優恤小民近年州縣官員不體此心徃徃槩追銀兩毎粮一石人一丁有追銀一兩者若粮至千石丁至百口則追至千百兩以一州一縣二年三年計之不知通追丁粮銀該㡬千萬兩如囚犯紙劄先年官司問囚有罪之人方追紙劄以備公用今則不分有罪無罪或批狀老人亭亦照名數追徵且不收本色俱追價銀一狀有十名則追紙價十分有百名則追紙價百分以一月一嵗千人萬人計之不知通追紙價銀該㡬百千兩及先年犯法之人只是依律問斷今之官司既問本等罪名又法外加刑濫罰少者三五十兩多者一二百兩若罰至百人千人又不知其數㡬何及其盗取各項銀兩或名為輳辦科差或指為預備賑濟或花為修理造作之類殊不知俱係虛作之數其實侵欺入已其間亦有被人告發者因無巻案簿籍可查以致上司難於考究况聞逺近一律倣效成風夫寛一分則民受一分之惠今貪官百計誅求若此民何以堪乞勅該衙門計議合無通行天下廵撫廵按官嚴加禁約司府州縣官員今後有均徭去處照舊優恤下户不許追徵銀兩若編剰户内果有頗過之家亦要儘其一年輳編不許遺留以啓貪官侵尅其有罪囚犯止許官司追徵本等紙劄除公用外按季類解本管上司支銷不許將無罪之人及老人亭槩追紙價及犯法之人官司一依律例問斷亦不許法外加刑濫罰銀兩敢有故違似前或追下戸剰戸銀兩或追紙價銀兩或罰犯人銀兩事發俱以贓論縱不入已亦當從重問革庶貪官知懼良民獲安一懲戒姦貪竊惟十羊九牧則必生紛擾之患羣狼牧羊又曷逃㗖噬之逼故姦貪之害不少為祛除則瘡痍之民殆未易甦息也照得浙江等布政司直𨽻府州運納南京粮米及一應客商軍民人等船隻率皆經由龍江關進入本關設有内官守把及各布政司府州解納一應錢粮俱送南京内府承運等庫收貯各庫亦設有内官兼管但近年為因守備官員奏討内官前來數多以致添撥各處管事者亦多各官不思朝廷錢粮為重人民艱難可憫所在之處多帶家人伴當勢如狼虎船隻徃來者不分竹木柴炭粮食雜貨甚至裝載灰糞之微亦要過關財物必充所欲方容船隻出入錢粮進納者雖經戸工二部各司掌印官員辯驗堪中印封送庫亦且百方刁難不肯收受各照數目需索銀兩至將解戸吊綁墩鎻苦害不堪重而布絹錢鈔輕而絲茶蜜蠟無物不然必滿所欲方與㑹官收受及照東安西安二門守門内外官軍人等乘機為害毎遇錢粮進入輙便攔當或將解戸趕逐或將脚子趕打遲留一日二日有之為害千方百計不已以致解戸負累掲借錢物累年不得完結及得批单回家債主又復逼取傾家蕩産苦害無辜此皆姦貪顯迹所宜量為懲戒如蒙乞勅南京守備太監將守關管庫内官中間果有淳謹守法不肯生事者止照舊額存留近年新添冗員及生事害人者盡行革去仍要嚴加禁約不許似前害人其守門官軍有犯或被害之人告發宜從監收科道官員徑自叅究施行如此則關津無阻輸納易完人心和暢而天意昭格矣青谿漫稿巻十四
