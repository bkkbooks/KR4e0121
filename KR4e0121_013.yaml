body:
  text: 青溪漫稿卷十三明倪嶽撰奏議朝覲三一為傳奉事𢎞治八年七月二十日該司禮監太監鄧敏傳奉聖㫖聖祖母聖慈仁夀太皇太后年髙念叔崇王欲得一見便寫勑差官取來該衙門知道欽此欽遵外中外臣民伏聞詔㫖皆有以知太皇太后慈愛之至情皇帝陛下順承之大孝雖大舜文王無以加矣但一時人心竊以朝廷舉事必須上揆天心下察人事務出萬全庶幾可動臣等節於𢎞治二等年月不等會同中軍都督府等衙門掌府事太傅兼太子太師英國公張懋等太子太保吏部尚書王恕等纍經會議崇王來朝揆之天時人事俱有未便緣由奏蒙聖恩俯垂俞允俱免王來然以今日論之事有未便者三焉又非前議之所及者蓋近來傳聞黃河泛漲水髙於岸平日波流湍急舟行已難加以泛漲其為洶湧必異常時王欲來朝乃舟楫必經之地則夫震驚之患所不能無保護之責誰敢當之此其未便者一也兼聞河南彰德衛輝二府自春徂夏一雨不霑寸草不生赤地千里人民流動殆三之二其為艱窘不言可知王欲來朝乃車馬必經之地不獨供億之費無所仰給萬一賊盜乘時竊發則夫震驚之患所不能無保護之責誰敢當之此其未便者二也况二年之間三王之國近自京師之軍民逺而所過之郡縣百倍供需十分騷擾官無所措手民不能聊生言之可為寒心見者欲為流涕今若加以崇王來朝先聲所及人必驚疑送往迎來勞費增倍瘡殘之民何以當此此其未便者三也此皆切於今日之急務於理不可不豫為之慮者伏惟皇上欲以仰承聖祖母慈愛之情尤必先念祖宗社稷生靈之重委曲奏請暫免來朝此則天下之公義而非可以一時母子之常情論也且親王來朝固有舊制然自洪熙宣德年間已鮮舉行英廟辟之初一詔襄王來朝固以篤親親之誼實以慰嫌疑之心由今而言己非常例况今天下奏報災異驚駭見聞禍變之生誠未可測正宜上下交相修省用回天意親王與國同休尤當慎守封疆以固藩屏豈可輕動重貽憂虞伏惟皇上至孝通天誠敬篤至是以聖慈仁夀太皇太后享天下之養萬夀無極崇王親愛所托恩禮隆重亦無以加今纍奉命來朝雖少遂一時欲見之心然欲别則難免眷戀不捨之情既去必倍增憂思不忘之念他日上厪聖慮所未敢言雖欲悔之殆無及矣所有崇王來朝事體重大關係非輕臣等茍有所見不敢緘默伏望皇上追寢成命請命太皇太后暫免來朝别遣親信內臣厚齎賞賚往視以慰其心庶於公義私恩可以兩盡臣等冒瀆天威不勝悚懼俟命之至未敢擅便謹題請㫖𢎞治八年七月二十二日具題本日奉聖㫖卿等說的是但朕承順聖祖母之意已有㫖取王來了罷欽此後復奉㫖免王來止夷貢一一為走報海洋船隻事主客清吏司案呈奉本部送內府并禮科抄出欽差鎮守巡撫兩廣等處太監等官韋眷等題稱賽瑪爾堪地面阿哈瑪特王差使臣罕扎呼遜等齎送獅子等件從海道滿剌加國前來進貢除將獅子鸚鵡行屬支給官錢買辦餵養及差委的當官員同來番使人等管送赴京外具本先差舍人干鐸親齎題知該本部官於奉天門欽奉聖㫖該部知道欽此欽遵抄出到部送司查得成化二十年本地面差人從陜西赴京進貢獅子駝馬本部查照舊例議擬題准特賜番王阿哈瑪特并伊妻男各色紵絲紗羅絹布一百九十餘匹賜獅子駝馬價彩段共六十八表裏給賜加賜使臣帕爾滿瑪哈穆特等彩段七十三表裏銀一百七十五兩衣服絹匹數又不資似此從厚賞賚各夷猶且心無厭足節次奏擾不已又蒙欽賜路費銀兩後各夷領賞事完要從海道回還䝉憲宗皇帝特㫖准從海道回去今該前因案呈到部看得賽瑪爾堪所進獅子乃夷狄之野獸非中國之所宜蓄留之於內既非殿庭之美觀置之於外亦非軍伍之可用日逐餵飼之費及所賜前項銀幣等件俱係府帑之財帛百姓之供億兼且獅子真僞皆未可辨借使是真不免以彼無用之物易此有用之財倘或非真豈不受逺人之欺貽天下之笑且以啓夷人窺伺之心以為中國好尚之所在殆非所以發揚聖德之光輝補益治平之實效也臣等竊為朝廷惜之蓋因各夷先次得利而去以此今次繼踵復米今若不為處置則今次既去後次復來一處既然各處倣效以朝廷柔懷之仁固不計此小費其如夷醜姦黠貪得無厭何哉臣等嘗聞聖帝明王不寶逺物故周武王時西旅貢獒召公致戒漢文帝時有獻千里馬者下詔却之載之經史傳美萬世而我憲宗皇帝成化初年亦嘗降勑諭止朝鮮白鵲海青之獻皇上踐祚之初首頒明詔禁止各處鎮守等官進貢騷擾之弊既而放禽鳥縱鷹犬旬日之間屏逐無遺𢎞治元年四月內因迤西夷人進貢玉石等物却令帶回本年七月內又因雲南鎮守太監王舉欲進寶石等物嚴申禁絶善政善教逺近稱頌以為聖德恭儉蓋與成湯之不殖貨利同符而一致由是而終始惟一雖堯舜之聖何以過此今未及三年而廣東鎮巡官員義將賽瑪爾堪所進獅子要行起送赴京臣等仰窺聖心必不納此無益之物以為聖德之纍但恐有以先年事例為言容其到京則經過道途騷擾必多賞賜犒勞須從舊例况本處進貢使臣例該於陜西甘肅驗放起送即今見一起哈瑪爾丹等一十八名到京為因後起使臣未到未及題賞其經從海道雖有先朝特㫖止是准令回還不曽許從入貢今若聽從海道前來則後次倘有附近本地浮海商夷詭稱本處差來入貢則既無勘合又無印信何由知其真僞就使的係本處差來使臣則既從陜西又從海道濫冒差人糜費財幣終無窮已且又令其習知海道啓意外之虞即今各處地方水旱相仍人民窮困却乃疲中國以供逺夷費有用而易無用臣等愚見深為未便伏望皇上念生民財力之艱難察夷人詭冒之姦計斷自宸衷阻其使臣盡却所貢仍差的當行人一員馳驛前去沿途跟訪隨其所在會同巡撫或巡按及合干司府官就於所在官司支給官錢量為宴勞仍依例給與廩給腳力送回廣東量與賞賜嘉答其意將原來船隻官為修理著令撑駕回還仍請勑一道曉諭阿哈瑪特王謂爾忠敬之心朝廷具知但差人進貢只宜照依常例量備駝馬從陜西陸路赴京為當其獅子鸚鵡不係常有之物不必逺涉海道來進如此則逺方夷醜知明天子之所為有非彼之所能測然後益崇俊良益修政治使家給人足禮樂興行邉域無警萬邦賔服如此則雖四靈畢至未足以增光盛治矧一狰獰夷獸亦何足以為明時之輕重哉再照鎮巡等官太監韋眷都御史秦綋安逺侯栁景俱係內外重臣均受朝廷重寄明知海南諸番國惟占城真臘暹羅滿剌加國瓜哇等處入貢有勘合者例該於廣東布政司比對起送赴京其餘不許起送係是定例今賽瑪爾堪差來進貢既該委官千户孫祥等呈報各官自合遣人諭以朝廷事例并詔㫖事理阻回為當如果夷性執拗不肯依從亦合以理阻留在彼差人星馳具奏候請明命以為進止可也却乃即便差人起送似此故違亦合參究伏乞聖裁緣係遵奉詔㫖阻却貢獻及參究鎮巡官員并奉欽依禮部知道事理未敢擅便𢎞治二年十一月十一日題次日奉聖㫖是珍禽竒獸朕不受獻况番使姦詐又不由正路來便差官阻回去廣東鎮巡官違例起送本當治罪且都饒他這遭還行文與他每知道欽此止番僧一一為傳奉事𢎞治六年九月初八日該司禮監太監韋泰傳奉聖㫖四川光相寺國師琳沁珠克取來大慈恩寺住坐禮部知道欽此傳奉到部送司除欽遵補本覆奏送科備照外查得成化二十三年九月內該禮科掌科事給事中韓重等及廣西等道監察御史陳轂等俱題為糾劾事內開法王琳沁珠克等俱以西番化外之徒汚我中華禮義之教錦衣玉食糜費錢糧前擁後訶擅作威福獻頂骨數珠進骷髏法碗以穢汚之物冒升賞之榮名曰祝延實為妄誕罪惡深重法所難容伏望皇上獨斷乾剛大彰天討將法王琳沁珠克等拏送法司明正典刑等因本部議擬覆奏節該奉聖㫖是這番僧及漢人習番教的冒濫升賞蠧耗錢糧年久數多本當究治但遇革饒他都依擬降革職事追奪纍次誥勑印信儀仗并該還官物件便發遣去欽此欽遵續據大慈恩等寺住坐番僧琳沁班珠爾等各告係四川陜西等處光相等寺管事番僧有本寺國師琳沁珠克等先年進貢來京在大慈恩寺住坐今奉例發遣回還緣琳沁珠克等先年來京俱有馬匹船隻廩給腳力等項乞為轉行應付等因本部已經題准行移兵部將琳沁珠克等量與應付船隻廩給送還原土本寺住坐外及查得近該禮科左給事中夏昂題為應制陳言修省事內一件遵制命內開教坊司額外樂官并番僧及漢人習番教的俱已奉㫖降革近日輒有奏討復職者不畏國法故違制命如此伏願皇上獨斷乾剛急頒渙號通行各該衙門今後如有希求請託故違制命者務要嚴加懲治以杜將來等因具題該本部議擬覆奏節該奉聖㫖是欽此又經通行欽遵去後今該前因看得國師琳沁珠克先因進貢來京欽留大慈恩寺住坐纍升至法王名號濫叨恩賞實為第一伏遇皇上御極之初因其罪惡深重節該科道官糾劾本部議擬覆奏已經奉有欽依悉宥其罪從輕降革職事發遣原寺住坐中外臣民莫不稱快今欲行取來京本部查無行取番僧國師事例必須創始而行事未有便且四川布政司離京窵逺動經萬里之程使其陸路而來則經由陜西河南等布政司及北直𨽻順德等府若從水路而來則經由湖廣江西山東等布政司及南直𨽻地方所至之處轉相傳報必曰欽取國師赴京驚駭耳目騷擾驛遞勢所必至况當時大慈恩等寺奉㫖并陸續奏留國師番僧人等不下百十餘人未必目今遽乏琳沁珠克一人之用而同時遣回四川陜西等處國師番僧人等多至二百餘人倘或夤緣效尤乘機干進幸門復開殆難杜塞則於皇上初政之清明制命之嚴正不無少損誠非細故伏望皇上俯察愚誠暫寢新命將琳沁珠克免令行取庶可絶小人覬覦之心示天下趨嚮之正實為便益臣等本以庸愚叨承任使偶有所見不敢緘默緣係傳奉事理未敢擅便謹題請㫖止給度一一題為照例查處給度事祠祭清吏司案呈卷查𢎞治元年閏正月內該都察院左都御史馬文升題為振肅風紀禆益治道事奉聖㫖這本所言多切時弊該衙門便看了來說欽此欽遵內一件清僧道以杜逰食切惟我朝定制每府僧道各不過四十名每州各不過三十名每縣各不過二十名今天下一百四十七府二百七十七州一千一百四十五縣共該額設三萬七千九十名成化十二年度僧一十萬成化二十二年度僧二十餘萬以前各年所度僧道不下二十萬共該五十餘萬以一僧一道一年食米六石論之共該米三百六十餘萬可勾京師一年嵗用之數况有不耕而食不蠶而衣且又不當本等差役可謂食之衆而為之不舒矣其軍民壯丁私自披剃而隱於寺觀者不知其幾何民食不足府藏之空職此之由若不通查僧道之數以示再度之禁則逰食之徒何有紀極如蒙乞勑禮部通查天下并在京寺觀共若干處僧道共若干名除額度之數外多若干名如果數多既已關有度牒難以追奪明白具奏不許額外再度僧道直至額數不足之時方許各該有司具結照數起送關給度牒敢有無故再言度僧者許六科十三道官糾劾拏問等因前件本部查得永樂十六年十一月二十七日節該欽奉太宗皇帝聖㫖今後為僧道的府不過四十名州不過三十名縣不過二十名額外不許濫收欽此欽遵續於天順二年五月十五日節該欽奉英宗皇帝聖㫖今後有願為僧者務從有司取勘户內三丁以上年十五以下方許出家如額外有缺許照正統十四年榜例保送赴部考通經典然後給與度牒仍定與則例每十年一次開度許照缺依期來關敢有故違悉發邉衛充軍欽此欽遵又查得成化二年給度過僧道一十三萬二千二百餘名成化十二年十萬三千三百餘名成化二十二年二十二萬四千五百餘名為因十年一度兼且各處納銀賑濟等項多有不查額數不由有司保送一槩請給以此額外增添數將十倍是以軍民之籍日削異端之徒日盛侵奪民食耗費民財其為治道之蠧莫此為甚誠有如都御史馬文升所言者合無准其所奏行移兩京僧道録司并各布政司直𨽻府州縣各邉衛有寺觀去處通查給度過僧道共若干備造文冊送部存照以後各年有為事病故等項追繳度牒者照名開除仍將十年一度之例待乞停止待後各處額數不足之日方許所在官司照依額內名缺起送赴部考中給與度牒再不許內外衙門指以救荒納粟為由奏請給度庶得不致虧損國體僧道官亦不敢貪圖僥幸敢有故違許科道官糾劾拏問等因具題節該奉聖㫖准議欽此已經欽遵通行去後到今數年之間各處文冊少見繳到誠恐無知小人止以十年一度為期不知己有前項禁例以致各處僧道行童互相扇誘輒便預先來京潛住各寺宫觀投禮僧道官住持以圖至期可以夤緣請給一時不免蠶食京師將來米價日漸湧貴未必不由於此查得成化十二年節有奏准預期出榜禁約僧道不許來京搔擾事例理合早為照例查處案呈到部看得天下各處地方災傷數多民不聊生盜賊竊發劫財殺人在在有之中間獲到賊徒多有僧人在內皆因先年給度泛濫所致及查先該錦衣衛指揮朱驥等奏稱奉勑巡捕盜賊今為盜之人多係各處無藉僧徒晝則沿街乞食夜則相聚劫掠得贓即分各行逺遁雖有巡捕人員無從追捕等因奏行都察院出榜禁約此為明驗况天下僧道額數不過三萬有餘而成化年間所度已該三十五萬有餘此非天地别生一種之人不過出於軍民匠籍之家即今天下軍衛有司工役衙門軍多缺伍匠多缺役里甲籍冊日見凋耗皆由此等之徒躲重投輕捨此入彼若不早為限量將恐天下之人皆流而為僧道之歸其為貽患不可勝言合無本部查照先次奏准事理及纍朝奉有欽依事例通行天下司府州縣掌印官督屬查勘原先給度過僧道數目見在若干事故等項若干比與欽定額數有無多少務照先次奏准事理造冊繳報除額數尚多去處外果有額數不足去處許待豐年有收之日徑自具奏本部查照成化十二年奏准給度事例另行奏請定奪施行仍要通行禁約各處寺觀僧道行童不許指以請給為由預先來京攪擾各該關津把截去處嚴加盤詰阻當仍行錦衣衛五城巡視監察御史嚴督各兵馬司僧道録司逐一挨查各處寺觀不許容留在外僧道行童在內潛住取具住持人員不致扶同容隱結狀繳報違者坐贓問罪無度牒之人發回原籍當差京城內外官員軍民之家亦不許容留僧俗混雜有壞風俗事發一體究治其有內外衙門及僧道人員或假救荒等項為由妄行奏擾者仍聽科道官指實參劾問罪緣係照例查處給度事理未敢擅便𢎞治七年六月初二日題次日奉聖㫖是欽此科舉一一為科舉事儀制清吏司案呈照得𢎞治八年八月又該天下開科鄉試已經具題通行照例舉行外及𢎞治九年例該本部會試查得上年入場舉人將及四千比之往年漸有加增及近因試卷數多添請同考官員所據事體日增而供給之費如舊不免靠損順天府大興宛平二縣人民案呈到部今將酌量一應應該增添事宜逐一預為議擬緣係科舉事理未敢擅便開坐謹題請㫖本月十九日具題次日奉聖㫖是都准行欽此計開一照得順天府鄉試所用供給錢糧等項米麥户部放支牲口等件直𨽻各府定數供辦本府止供紙劄及一應買辦等項遇有不敷亦從借辦應用尚且逐年負纍小民窘迫不堪緣鄉試係順天府合直𨽻各府生員人等考試不過二千餘人如此供給於理為宜禮部會試乃合應天順天二府并浙江等十三布政司舉人考試將及四千視前幾倍而所用供給亦止賴於順天并直𨽻各府其間人數多寡敻不相同而預備供給與之無異及用度不足却又一切取給於在京兩縣之民百方驅迫幹辦不前蓋供給既已因人而日增則錢糧亦合隨時而異處若不量為加添鋪行愈纍貧乏深為不便即今各處開科鄉試合無本部行移浙江江西福建湖廣四川河南山東陜西山西九布政司并應天府於本處供給科舉餘剩錢糧內各扣除銀浙江江西湖廣福建四川各一百兩山東山西陜西河南應天府各八十兩俱責付本處司府朝覲官吏於𢎞治八年十二月內齎送到部轉發順天府收貯除米糧柴炭刋字人匠照舊支辦猪羊量减派納若有不足并其餘一應紙劄果品酒醋油麵等項應用物件臨期本府選委公正堂上官審取殷實鋪户照依年例量為增添支價兩平買辦如此則衆輕易舉京民不至於靠損錢糧稍裕供給亦不至於窘迫矣一照得試院自天順八年重修以來纍經建議蓋造板舍以防風火之虞實為永便今板舍四千間已完但有一二處未曽添蓋房屋臨期仍用蘆席搭蓬晝夜加意防守尚為未便如場內望髙樓三座俱用蘆席搭蓋埋腳不堅有風之日軍士不敢在上兼每樓合用軍士二三十人亦要供給有費無益合無行移工部照依應天府并各布政司試院於中止蓋樓房一間四角望髙樓俱不必用臨時止用軍士二三十人四面觀看最為省便及至公堂前原蓋小捲蓬一間因其窄小不堪擺列席面及容供事人役在內臨時却於兩傍搭蓋大席蓬二間并謄録所原蓋房屋數少亦於天井內搭蓋大席蓬一座并彌封對讀受卷三所內亦有席搭蓬屋緣此等處所晝夜常有人在內謄録及各供所事俱用燈燭倘遇風起之時人心驚惶十分不便兼且嵗用搭蓬工料錢糧不為不費合將至公堂前舊蓋小捲蓬一間拆去另蓋大捲蓬三間謄録所天井內周圍照依地方四面蓋造通連小房向明開窗以便謄録及各所量蓋小房數間如此則雖小費而有大益暫勞而有永寧矣一試院內原設受卷彌封謄録對讀四所合用執事官員查得正統年間入場舉人不過千名尚用京官一十五員景泰年間入場舉人不及三千名亦用吏部聽選府州縣官一十七員近年入場舉人增多將及四千乃止用官一十三員分管不敷難免差誤深為不便合無查照前例量為斟酌於彌封謄録對讀三所各添官一員待至會試之期行移吏部照例揀選官一十六員分管前事如此庶得繁簡制事之中可免差錯誤人之弊矣一謄録等項合用生員常例除順天府學不用外將本府所屬各州縣學不分廩增生員盡數起送赴部通不過五百餘名轉發試院內分撥謄録受卷彌封對讀四所供事但近年入場舉人日漸加增試卷日多前項生員分理不敷至於謄録一所用人尤多每年借用各處送到嵗貢生員近年又復奏准借用國子監生二百名緣此等生員俱係出學日久年紀漸大之人又見不係本等應辦事務往往不肯用心故意錯亂謄寫深為誤事况要朝入暮出謄寫不多不惟難於關防抑且反致耽閣尤為不便合無行移北直𨽻提調學校監察御史預期於直𨽻府州縣有鄰近順天府地方者就各學內再行揀選已冠能書生員二百名通前共七百名起送赴部分撥謄録等項應用如此則事得早完既可省供給之費人非借用亦可免出入之防矣辭職疏一𢎞治六年六月二十九日該吏部等衙門尚書等官耿裕等題節該奉聖㫖倪嶽升禮部尚書欽此臣聞命戰惕揣分驚慚竊念臣本以凡庸叨承任使侍經講幄佐政禮曹糜祿有年茫無寸補忽復蒙恩於九重遽爾厠班於八座寵榮荐及蹇劣奚堪况久參禮樂之司亦素忝寅清之訓方切滿盈之懼益增鰥曠之憂冒昧控辭無所逃罪仰惟聖明臨御賢俊滿朝如臣之愚誠未足數伏望皇上俯順愚忱亟寢成命容臣照舊供職以圖補報别選其人以任斯職實為幸甚干冒天威不勝隕越之至辭職疏二一為乞恩辭免重任事臣由進士纍蒙聖恩改南京兵部尚書參贊守備機務至𢎞治十三年七月初六日准吏部咨節該本部等衙門題奉聖㫖倪嶽改吏部尚書太子少保仍舊欽此欽遵備咨到臣除已離任前來於八月二十六日到京朝見隨將原奉勑書親齎進繳訖竊念吏部首六曹實為崇髙之任尚書聨八座豈容叨冒而居况夫倡率士風必須秉法之正加以甄敘流品尤資知人之明茍徒與世浮沈寧不為時鄙薄一貽物議永玷朝行是以仰承召命之下頒俯覺隱憂之中切緣臣學惟守已才非濟時長三部而幸踰七年領庶政而茫無寸補允宜罷斥得荷保全敢望渙恩逺垂寵録豈獨滿盈之可懼實為負粟之是慙謹攄激切之情用申控避之請伏望聖明收回成命改任貞賢俾退服于舊班庶少慰于輿望臣干冒天威無任悚懼俟命之至論西北備邉事宜狀一臣惟論天下之事當審乎理之所必然與勢之所必至當擇乎古人之所已效與今日之所可行固不必肆夸大之言以流於欺誕亦不必矜一已之識而耻於雷同斯事有可成而非徒空言之為貴也往嵗酋長瑪拉噶猖獗犯順竊入河套窺伺延綏時被寇鈔既而阿勒楚爾博勒呼竒木嘉色稜之衆踵姦效尤蟠結據伏數年之間大為邉患蓋緣河套之中水草甘肥易於駐劄而腹裏之地道路曠逺難於守禦是以轄於榆林者若孤山寧塞安邉定邉諸路轄於寧夏者若花馬池興武髙橋萌城諸路皆其入寇之所迤東則延安綏德鄜州諸路迤西則環慶平涼固原諸路皆其騷略之處擁衆鼓行長驅深入逺者逾千里近者不下數十百里男婦悉被其虜畜蓄為之一空村邑荒涼疆埸擾動然而沿邉諸將賢否不齊或嬰城以自守或擁兵以自衛輕佻者以無謀而挫衄怯懦者以無勇而退避既不能折其前鋒又不能邀其歸路所以任其源源而來恣其洋洋而去遂使之進獲重利退無後憂取於我者得衣食之原屢起盜心處於彼者得窟穴之固遂無去志而彼勢之不輯者日甚一日邉患之不寧者嵗復一嵗於今矣乃者上厪九重之憂特施九伐之討既簡精兵以出復命大將以行宜其大肆勦除庶乎少酬委託也奈何四年三舉一無寸功或髙卧而歸或安行以返乃析圭擔爵以優遊於朝行輦帛輿金以充牣於私室且其軍旅一動輒報捷音賜豫濫施官爵輕授然究其實則殺傷我之士卒悉泯而弗聞掇拾彼之器械則虛以呈數甚至濫殺被掠之平民妄稱酋長之首級未嘗致其敗北輒以奔竄而遁為言未嘗有所斬獲輒以鈎搭而去為解及夫功籍所載賞格所加者非私家之子弟即權門之厮養而骨委戰塵血膏野草者非什伍之卒即征行之民誰復知之良可悼也此大失乎人心後焉致其死力哉况夫京營之兵素為冗怯平居不習夫被堅執鋭之勞有事安取其斬馘執俘之用臨陳退縮反隳邉兵之功望敵奔潰久為北人所侮此宜留鎮京師以杜根本顧乃輕於出禦以瀆天威所謂千鈞之努不以鼷鼠發機者是固不可輕發而亦焉保其必中哉蓋此意也且延綏邉也而去京師逺宣府大同亦邉也而去京師近於彼既有門庭之喻則此當為陛楯之嚴矣頃以兵部建議遂於宣府出兵五千大同出兵一萬併力以援延綏而不計其相去既逺往返不時人心厭於轉移馬力罷於奔軼况聲東擊西敵人之常批亢搗虛兵家之算精鋭既盡而西老弱乃留於北萬一此或有警彼未可離首尾受敵逺近俱患亦豈計之得乎臣又聞之石城十仞湯池百步帶甲百萬而無粟弗能守也故軍旅之用糧食為先今延綏之地兵馬屯聚芻粟之費日賴資給乃以山西河南之民任飛芻挽粟之役仰關而餉徒步千里夫運而妻供父挽而子荷道路愁怨井落空虛幸而至也束芻百錢斗米倍直不幸遇賊身已虜矣他尚何計然輸將之不足則有輕齎輕齎之不足則有預徴嗚呼水旱不可先知豐歉未能逆卜而預徴也者豈宜然哉乃至立權宜之法則令民輸芻粟以補官然媚權貴私親故者或出空牒而授之而倉庾無升合之入立開中之法則令民輸芻粟而給鹽然恃豪右専請託者率占虛名而鬻之而商賈費倍蓰之利故官級日濫鹽法日阻而邉儲所由以不充也又朝廷出帑藏以給邉者嵗為銀數十萬山西河南之民輸輕齎於邉者嵗亦不下數十萬銀日積而多則銀益賤粟日散而少則粟益貴矣而不知者遂於養兵之中寓其養狙之智或以茶鹽或以銀布名為准折糧價實侵尅軍儲故朝廷有糜廩之虞士卒無飽食之日至於兵馬所經例須應付平居之時一日之數人米一升馬草一束此其常也追逐所過一日之間或一二堡或三四城豈能俱給哉而典守者隂懷竊取之計巧為影射之謀凡其經歷之方悉開支給之數背公以營私罔上而病下莫此為甚者也由是觀之賊勢張而無彌之之道兵力敝而無養之之實徒委西顧之憂於陛下誰果為之盡心者乎及乎採之建白者之䇿察之論議者之言則又往往不同紛紛不一故夫據指掌之圖肆胸臆之見者率謂復受降之故險守東勝之舊城則東西之聲援可通彼此之犄角易制是非不善也第二城之廢棄既久地形之險易不知况欲復地於河北以為之守必須稱兵於塞外以為之助然以孤逺之軍涉於荒漠之地輜重為纍饋餉為艱彼或佯為遁逃潛肆邀伏或抄掠於前躡襲於後曠日持久露行野宿人心驚駭軍食乏絶進不可得而城退不可得而歸萬無所成一敗塗地必矣其有懷敵愾之心馳伊吾之志者率謂統十萬之衆裹半月之糧奮楊威武掃蕩烽烟使河套為之一空邉陲為之永靖是非不善也然帝王之兵以全取勝孫吳之法以逸待勞今欲鼓勇前行窮搜逺擊乘危而履險徼幸於萬一運糧逺隨則重不及事提兵深入則孤不可援况其間地方千里綿亘無際既無城郭之居亦無委積之守彼或往來遷徙以罷我於馳驅或掩襲衝􅊳以撓我之困憊酋長安望於成擒中國復至於大創失坐勝之機蹈覆沒之轍必矣至有欲圖大舉以建竒功者謂必東剪建州之衆北除朵顔之徒乘勝而西遂平河套夫祖宗之於建州朵顔諸衛不過羈縻之以固吾圉耳今若是將使戎狄競至生心藩籬為之頓壞遺孽既不可盡邉釁於是益多是果何知誠為無䇿甚者至謂昔以東勝不可守既已棄東勝今之延綏不易守不若棄延綏則兵民可以息肩關陜得以安枕夫一民尺土皆受之於天於祖宗不可忽也今若是將向之失東勝故今日之害萃於延綏而關陜為之騷動今而棄延綏則他日之害鍾於關陜而京師為之震驚賊逾近而莫支禍愈大而難救此實寡謀故爾大謬也嗚呼此倡彼和牢不可移甲是乙非卒莫能合成功既鮮髙談奚取焉臣所尤不滿者徒以白面之書生謬司兵戎之大計以甕中之小見騁筆下之浮辭謂詢謀為無益則棄人言而不顧謂専斷為無傷則執己意而不回處置乖方指揮失義若向之圖復西戎既為茍且之舉以損威而失信近之議制南夷復倡隄備之說以啓釁而示怯既違居中制外之權且昧以大字小之體推是以往其他可知徒使下以弛於兵機上以隳於國紀又皆此輩侮文之過重貽後時噬臍之悔者也故以臣論之不若即古人已用而有成及今日可行而未盡者舉而措之其為力也少比而論之其致功也多曰重將權以一統制而責成功曰增城堡廣斥堠以保衆而疑賊曰募民壯去客兵以彌患而省費曰明賞罰嚴間牒以立兵紀而覘賊情曰實屯田復漕運以足兵食而紓民力凡是數者聽其言若迂疏而不切求其效或萬全而可冀惟在行之以誠要之以久何患酋長之不逺遁邉境之不又安也臣叨居侍從不勝區區犬馬之誠昧死百拜具以備邉事宜條列上聞伏惟陛下留神裁擇焉天下幸甚其一所謂重將權以一統制而責成功者蓋以兵勢患在不合將臣患在無權昔郭子儀潰於相州雖以九節度之師無所為力曹武穆下江南副將以下皆能制其死命成敗之跡蓋可監矣今總兵之官參戎之將自關以西不下數十職位相等委任略同動有相抗之心舉無相下之意一遇警急有所調發或妄報烽燧於境內以規免或遙申文移於軍前以逗留欲望此可以召彼彼可以援此豈不難哉又况制於監臨之人寖成掣肘之患頭目既多號令不一或戰守之異謀或前却之異向將既不能専制下亦何所據依哉而舉動輒稟於廟算往返不免於依違是以勇者未至於致身以效力知者未至於竭忠以效謀此皆任將鮮専一之權戡亂乏責成之實故也臣愚以為榆林之地當河套之衝東去山西白溝營九百九十餘里西去寧夏花馬池營五百九十餘里而花馬池興武髙橋三路通不過三四百里東西所止道路適均今榆林雖已貯兵而寧夏尚非所統猶不兔於偏滯不舉之弊是以榆林之守近稱得人敵避而西遂寇寧夏為今之計宜於榆林建置總府延綏寧夏皆得節制則臂指相屬而得以施運動之力犬牙相錯而得以立闔闢之勢蓋東扼延綏之喉襟西拊寧夏之肩項而守之得其地矣於是遴選知勇兼資威望夙著仁義自守誠慎不欺者懸以大將之印授之總制之權閫外之事悉以付之而不為之中制監督之任悉為罷之而不使之牽制蓋有如漢用韓信足以聳三軍之視聽而非時之諂諛幸進之徒也如宋用王德用足以褫四夷之魂魄而非時之猾詐避事之徒也而任之得其人矣尤必要之久而緩其近功求其大而略其小過推赤心以委託使無前顧却慮之疑則其奮厲以建功敢不至乎秉乾綱以駕御使無飛揚跋扈之患則其忠順以報國敢不盡乎由是號令久而益章威望久而益震上下相諳心力不二故蓄鋭以伺隙則戰勝而守固矣西北之邉隱然倚為長城而敵之進退吾皆得以制之彼亦豈敢無故侵侮以自取剪滅之禍也哉其二所謂增城堡廣斥堠以保衆而疑賊者蓋以實效所以濟務虛聲所以懾敵昔虞詡之在武都日增兵竈示之以强卒破羌衆李牧之在鴈門不事捕虜惟謹烽堠示之以怯亦無亡失兵家之算各有攸宜今延綏之地東起府谷孤山西抵鴈門保安不過二十五六寨而止寧夏寧塞抵於靈州千户所不過四五營而止逺者百有餘里近者亦不下六七十里城郭窵逺居民星散屯兵雖有其地保衆則非所賴又况二邉墩臺相離三二十里加之道路迂曲傳報不捷若今花馬池烽火必歷興武髙橋轉往迤南萌城不下七八百里比及火至賊已出境是以當夫人民在田畜牧遍野敵騎􅊳至一空無遺往往皆然可為太息臣愚以為當於閒暇之時相度民居之便或百十餘家則築一大城或五六十家則築一小堡城堡之中民自為守少於此者徙以附焉更於空隙之地擇其險阻之宜或可如遼東立柵築牆以為屏翰或可如宣府大同斬崖掘塹以為陷穽至於墩臺亦宜增廣或取直使近或添置令密冦兵將至即相傳報人畜之類輒入收保堅壁清野使無所得且使敵心驚疑進退皇惑但見城堡聨絡詎能窺我實虛人畜入保既不得剽掠之利城堡掎角又恐有邀截之虞如是而敵敢於深入以為邉患者未之有也其三所謂募民壯去客兵以彌患而省費者蓋以兵屯聚則有仰給之費兵遷徙則有供億之勞故三代漢唐以來皆籍民為兵番上遞休其數雖多贍養亦薄所以維持萬㝢而威服四夷者用此道也近代籍天下之民以為長征之兵遂至困天下之力以事養兵之役若今延綏之兵二萬二千而騎兵精勇者僅七千人寧夏之兵至二萬三千而騎兵精勇者僅六千人則坐食冗費者不啻倍之矣農夫之力安得不竭餽運之卒安得不疲乎往者因其戰守不足復調甘州之兵一萬六千蘭縣之兵五千六百以戍延綏復調莊浪之兵三千涼州之兵三千以戍寧夏而遊擊之兵一萬六千則又往來乎其間夫客兵所在來則紛紛歸則纍纍日供芻糧嵗費賞犒烽烟未睹於一清軍廩每至於告乏職此故也臣愚以為城堡之中兵固有常守矣平居之民則家使出一兵焉然必三十乃用五十則休侵漁有禁使無所苦更番有期使無所憚仍稍加之廩餼必大得其歡心於是及其强鋭則教習而雜於行伍之正卒或有疾癘則罷遣而復於畎畝之閒民是其物力資産既切於已父母妻子復繫其心用以禦戎必自致力然今山西陜西非無民壯但勾補或破其家役使致妨其業編之尺籍遂同世軍今復僉㸃恐成咨怨盍若於已役者勞而罷之未役者賞以來之明之以大信示之以大仁守禦止在於本境征調不至於逺行民知效勞之日有限歸閒之日無窮則亦何所畏而不從乎且關陜之民勇悍純實出於天性稍加簡練悉為精兵况其生長村疃熟於採捕徑弩藥矢尤其所長守禦之具此不可缺臣又聞比嵗用兵荐罹饑饉延綏之民逃竄終南或開私礦以採銀或販私茶以賈利殺人劫財肆無忌憚此實內患豈獨外防亟宜簡命信實之臣厚立賞募之格赦其既往之失開其自新之途應命而至輒加優恤沿邉城堡分𨽻以居房屋器用官為周給量撥閒田使自耕食凡百科斂悉與蠲除誘之以利結之以恩但令訓習使充守禦既祛腹心之虞且足邉鄙之用二法既行數十萬之兵可指日而集矣夫民兵既集客兵可罷興師不妄擾乎老弱之民糧餽不濫及於無用之卒內焉而仰給無所費外焉而供億無所勞其為利便益可知矣其四所謂明賞罰嚴間牒以立兵紀而覘賊情者蓋以人君以恩威馭將帥於內將帥以賞罰馭士卒於外故軍政行而大功集也我祖宗之時名帥大將不為少矣其間纍樹勳業者或僅加其勳號或止增其食祿賞雖薄而人心知感者命皆出於朝廷而非希冀之可致也及乎少誤軍機者或削奪之必加或誅戮之不赦罰雖重而人心不怨者命皆斷於朝廷而非譖毁之可移也若昔宋藝祖之於曹武穆一劍之付肅然秋霜於王全斌一裘之賜熙然春陽是以江南不足平西蜀不足定豈偶然者近者毁譽不出於至公命討或由於人力冒功希進者纍叨世及之爵喪師僨事者不蒙失機之誅是以由近及逺上行下效三軍之中數萬之衆權要親昵者功未成而先賞罪雖著而不罰孤寒寡援者功髙而後録罪薄而先誅以恩則無可懷以威則無可畏兵紀於是不立邉功何由可成乎又况守邉之要覘邏為先茍得其術敵情靡遁故曰明君賢將動而勝人成功出於衆者先知也先知者不可取於鬼神不可象於事不可驗於度必取於人知敵情者也往嵗沿邉所用覘邏之人以夜為日視險如夷或逺探賊營或深入賊壘遺灰行跡無所不推神出鬼歿迥莫能測是以敵人畏之而不敢近牧邉人恃之而得以先知當時奬擢有加酬賞亦厚誠有以也近之所用徒有虛名敵將至而不知敵已出而方覺甚者或妄言以希功或冥行而被虜既不知敵人情實則緩急何以枝梧也哉臣愚以為凡今邉將之功過宜秉賞罰之大權左右皆曰有功弗聽而賞必採乎群言左右皆曰有罪弗聽而罰必稽乎輿論使人徼幸者不得以妄求敗律者不至於茍免於是申飭沿邉之將一體賞罰之公書上有功必以其實孥戮有罪勿徇乎情使人人喜於建功而重於犯法則姦宄無所容績緒有所稽矣尤必遴選知勇之人以司間諜之事申明酬賞之令以待覘邏之功禮勞既殊於衆探伺必異於今敵之動靜既可以先知我之戰守亦可以預計或劫營於彼以勞其佚或堅壁於此以避其强則禦敵得坐制之䇿先人有奪人之功矣故曰令之以文齊之以武是謂必取明賞罰之謂也又曰知彼知己勝乃不殆嚴間諜之謂也其五所謂實屯田復漕運以足兵食而紓民力者蓋以有百頃之閒田則足以牧馬千駟而不知費聚千駟之馬而輸百頃之芻則其費百倍此理易曉也今天下軍衛雖有屯田率事虛文無補於用關陜一道漕河久廢芻粟之費陸運尤艱故民力雖已大竭而邉儲卒以弗豐有由然也臣嘗考之宋臣歐陽修之言曰前世用兵者未嘗不先營田趙充國攻西羌議者爭欲出擊而充國思全勝之䇿能忍以待其弊至追詔罷兵而治屯田田於極邉以游兵而防寇鈔曹操屯兵許下時强敵四面以今視之疑其旦夕戰爭不暇然用棗祗韓浩之計數置田官募民而田近許之地嵗得數百萬石其勢艱而難田莫如充國迫急而不暇田莫如曹操然皆勉焉不以迂緩而不田者知地利之博而可紓民勞也又曰今為西計者皆患漕河之不通但未求之耳秦漢隋唐其都在雍則天下之物皆可至西也山川地形非有變易於古其路皆在昔人可行今日胡為而不行漢初嵗漕山東粟數十萬石是時運路未修其後武帝益修渭河至漕百萬餘石隋文帝時沿水為倉轉相運致關東汾晉之粟皆至渭南唐裴耀卿又尋隋跡於三門東西置倉開山十八里為陸運以避其險卒泝河入渭當時嵗運不減二三百萬石其後劉晏遵耀卿之路悉漕江淮之米以實關西後世言能經財利而善漕運者耀卿與晏為首焉臣愚以為關西之地廣衍饒沃第因人罹兵凶而流移地多廢棄而荒穢餉兵之民苦於重役坐食之卒耻於為農故人力不勤地力不盡惟此時為然也今宜變而通之使皆自食其力盡驅在邉之兵民耕於沿邉之空地牛具粟種官為貸之嵗田之入什一取之則游手之人無所容久廢之地無不墾矣尤必推任習田之吏倣佛勸農之官優其課最誘之作勞則人之力田者衆而吏之效職者多田利數倍嵗榖不可勝用也茍以外寇侵軼為虞則當如李牧之謹烽火以料敵趙充國之用游兵以防敵則耕穫自如而敵不能為吾患矣至於漕運尤若易行今關陜所需皆山西河南所給而三方之地俱近黃河其間雖有三門析津龍門之險然皆漢唐糧餉由此而通即今鹽船木筏往來無滯且以今户部所計山西米豆必令運貯榆林及保德州縣諸倉河南米豆必令運貯潼關衛及陜州諸倉其諸州衛地皆瀕河可通舟楫踵往古故跡而行免當今陸運之害公私之利奚啻萬萬也况今河道當潼關之北數十里接連渭河可通陜西及鳳翔鞏昌渭河西流數十里接連洛河可通延安及北上源可通邉堡渭河西流三百餘里接連涇河可通慶陽又龍門之上舊有小河徑通延綏倘加修濬必可行舟此宜簡命水部之臣示以必行之意相度地形按求古跡某處無險可以水運某處避險可以陸運某處可以立倉以備倒運某處可以造船以備裝運淤塞悉加導滌漕河務在疏通毋憚一時之勞而失永久之利如是則不但三方之困有可紓雖四方之物無不可致者矣夫屯田既核其實漕運亦復於古土無曠民國有餘財陛下欲有所為隨所意指惟轉移而用之耳豈遽至區區一方之警而上下狼顧失措以深憂財用之不足如今日者乎青溪漫稿卷十三
