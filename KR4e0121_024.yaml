body:
  text: 青谿漫稿巻二十四明倪岳撰傳劉將軍傳将軍諱安字宗岱姓劉氏其先河南光州固始人曽大父寳元季仕為河南行樞宻院副使國初歸附授武畧将軍大父興洪武末嗣為武徳將軍武昌右䕶衛後所正千户宣徳間改徐州左衛既老子政嗣將軍之父也正統間政卒將軍嗣仍𨽻於徐將軍性疎曠爽朗敦義好禮事親以孝稱信於朋友樂交接賢士大夫居官餘三十年當國家承平之日韜畧之識雖出軰行而無所於試獨折節從儒生談論古今上下賢否成敗之迹故其在官能惠愛於下一祛當時豢養朘削之弊所處雖約視人之急則致力惟恐後其族姻閭社之貧不能存者輙賑貸之婚䘮之不能舉者悉為周給俾不失時正統已巳口北隆慶庠生王肜携家避兵來徐無所依泊聞而憫之亟館榖焉尋失偶為擇良配肜明經學即命子弟從之逰既而津遣卒業太學後拜徳化縣令嘗與徐庠生申英善書札之費悉出將軍一日有碭山之行假乘馬而斃皇恐請償將軍笑謂曰獨不聞車馬共敝無憾乎奚其償後入太學仕為廣宗典史卒貧甚既歸其䘮復經紀其家常語人曰英子女吾子女等耳他日成立室家之托吾當任之成化丙戌歳且歉有司軍廩不時給什伍困乏將軍出所藏麥種二百餘斛散給其屬衆頼全濟嘗搆一軒幽篁芳樹有泉石之勝榜曰覧翠薦紳士過徐者必延置其中觴詠彌日迄無惰容甲午之春指揮李洪者㑹飲軒中愛其白石盆池諦視久之將軍心知之適李督漕之京未與也未幾李道卒乃太息曰此季子之於徐君也吾固心許之其可倍乎遂遣置其柩前人髙其行乙未春即引年乞休致其僚属偕詣部使者請留許之竟以是年八月卒得年六十有三葬之城南銀山之陰配王氏封宜人先卒子男二曰顯嘗逰郡庠攻進士業兩試弗偶今嗣其職曰頴孫男二曰貢曰質貢尤英特方在童子即能敦行孝弟其世澤葢未艾云論曰太常博士張君稷甞言劉將軍在武籍而行義卓卓不下古人傳有之君子義以為質禮以行之遜以出之信以成之夷考其行盖無流蕩矜傲之習而有誠䔍之美豈其好義本於天性而親賢樂學又足以増益之歟余聞彭城之俗率多任俠節氣好尚賔逰若将軍者固其傑然者耶予平生不識劉将軍而聞之太常者如此故為之作傳率以太常之言實之使太常之言可信則是傳為不浮矣黎文僖公傳南京禮部尚書致仕華容黎公先生之卒訃至京師上悼惜賜祭于家者再命有司治塟事諡曰文僖其孤戸部主事民表奔䘮南歸俾岳述公事行為傳以備家乘之末念自天順癸未之秋公方在塲屋司考校岳幸以書經登第忝門生之列及入翰林復獲從公後辱教愛者久於公之沒無能為役其敢以不敏辭按状公諱淳字太樸姓黎氏號樸菴學者稱為樸菴先生世為岳之華容人本姓楊曽祖諱元勲出繼姑氏遂從其姓祖諱仕禎考諱斌宣徳中舉楷書為寧縣丞有惠政民建祠祀之自祖以下皆以公貴贈南京禮部尚書妣皆夫人公生有異質自㓜即肆力于學侍父宦㳺與兄資深相師友長入邑庠補愽士弟子員景泰丙子舉湖廣鄉薦明年天順丁丑賜進士及第第一人拜翰林脩撰辛巳預脩大明一統志成有金幣之賜癸未同考禮部㑹試憲廟登極紀元乙酉充經筵講官丙戌九載秩滿進左春坊左諭徳丁亥脩英廟實録成進左庶子宴賚有加辛卯乞歸省有寳鏹之賜甲午考順天鄉試丁酉脩續通鑑綱目成進少詹事兼侍讀戊戌今上毓徳青宫出閣進學日侍講讀廷試充讀巻官擢吏部右侍郎丙午改南京吏部丁未九載秩滿進左侍郎加正二品禄今上登極擢南京工部尚書尋改禮部辛亥以末疾懇乞致仕優詔許之仍賜誥追贈其先盖異數也壬子以建儲恩進階資徳大夫正治上卿至是卒公性耿介與俗寡合居官㢘慎守法不為茍同初入翰林有言官被謫者即抵書當道請救之考鄉試時有試巻甚竒公喜得人及後二塲巻入輙不類公移文外簾使勾稽墨巻果謄録生截巻以為所親地者公具發其姦而卒置初巻于首乃名士馬中錫也丁酉鄉試録多舛謬擿數十條以聞事下禮官集議行之抵諸提調考試官於法在吏部請謁不行人有行檢不飭者雖所愛不為掩庇下至胥𨽻亦嚴憚焉時貴用事勢方熾衆皆趨之公獨不與通問先是凡有内降明日所司必廷奏補夲盖虞姦也或以奏補大頻欲止勿奏者公曰此舊典不可廢衆韙公言已而卒罷廷奏而公亦南遷矣在禮部疏陳正風俗革姦弊數事上采納行之平生篤於孝義痛二親早背四時祀享務盡誠敬兄嫂繼卒撫其孤民獻及女如已出處二弟沾滄極友愛公歸省過臨清適鄉人董副使廷圭䘮其妻而廷圭方使邉公即舁其柩歸葬焉太僕余卿孟亨卒貧無以葬公倡諸鄉宦合衆賻以舉其䘮鄉吏鄧禄嘗以銀一錠寓公禄死子㓜公藏之十年俟其子長歸之所居第恒置扄鐍不通餽遺處僚友之間委曲傾盡或有過必面折不少恕然意亦無他人皆信其誠患習俗日侈躬持儉約昏䘮宴㑹率有常則日食不設兼味泊如也家庭化之妾媵而下布素蕭然不異寒士人以為難邑有黄洋陂淫潦病渉即捐貲築隄其長四十丈民免於患公嗜讀書極於贍博為詩文豐裕典則字亦遒整所著龍峯集若干巻輯録本朝諸試録六百四十巻藏于家公善教人尤好汲引後進及門之士登甲科躋顯仕者累累有之胥史嚮學者公亦親為考課癸卯鄉選登薦者四人其一遂舉進士前此未有也諸子督教有法民表登甲辰進士民牧庚戌進士民獻亦領鄉薦皆出庭訓焉配金氏有淑行累封至淑人卒贈夫人子六長民牧次民表民衷金出次民安國子生民俊民信側出女四荆州府學生張永宣鄉貢士程鶚縣學生羅熺其壻也一在室孫二循紀章女一公生於永樂癸卯十月二十九日卒以𢎞治壬子四月十又八日夀七十墓黄湖山之原嗚呼昔我先考府君自翰林積官至南京禮部尚書致仕及賜諡也亦曰文僖於公始終若相符者岳於是重有感焉矧公名徳雅望位極八座法當立傳國史岳也何足以知之姑以主事君之託謹撰次如右且附著之亦庸以識岳之私云封太安人鮑母吳氏傳太安人吳氏乃贈户部主事歙邑鮑公希軾之配今南京禮部主客主事楠之母也其先歙西溪南人十世祖耨齋先生登宋乙榜進士為福州文學子孫遂以儒世其家衣冠之盛甲于州里考斯謐母程氏生安人性質柔慧服勤姆教父母鍾愛之希軾年當擇配祖双楓先生必輝及父庭晦為之徧訪諸名族久之未得忽媒氏傳至庚帖曰此溪南吳氏女也双楓喜曰昔耨齋甞歸女孫於吾宗岩府君生徽州教授子壽府君與父争死賊難遂以慈孝表吾棠越里詩禮之族他無以易矣乃通媒妁成禮宗黨咸宜之安人沉静寡言克謹婦職事祖姑及舅姑咸得其懽心内佐家政勤勞夙夜米鹽錢榖日用之費小大均一無吝無侈有不足至脱簮珥以充合族上下皆推其賢希軾有弟四人庭幃之奉賔祭之需率身先諸娣服食之用分給必周撫其子女恩義兼至安人生子一即楠慈孝尤切希軾商逰四方或經歳始歸每躬課所業不少假借出學於外必令久之乃歸省故楠學日有成登成化甲辰進士拜戸部主事時希軾已即世乃迎安人就養官邸猶日事紡績不輟朝夕恒諭以居官㢘勤之道楠或杖人於公所歸必詰其故對曰是嘗盗粮者法當扺罪憫其所得升斗耳故杖而釋之安人曰汝不能使人不為盗顧欲以釋盗為賢乎其明睿盖如此𢎞治辛亥以楠秩滿三載得受勑封為太安人未幾思歸曰吾止一子今幸有孫吾撫愛有加渠必善事我吾其携之以歸乎未幾孫卒楠恐傷安人心請于朝得改今署迎至官圖以慰安之然居常鬱鬱不樂曰吾姑八十有六吾母九十有二日薄衰暮詎宜久違耶吾将歸矣楠請留至再輙潸然曰吾年五十始得孫今復失之顧何以為情至相持而泣楠知不可強遂具舟楫奉送於家安人有二壻汪仁鄭倫則謀之楠曰安人以今年二月十日壽登七十曷徴諸文詞以致頌乎楠不可乃具列事行詣予請曰楠不肖不能保厥子以傷吾母心不敢侈為歌頌以重拂其意顧吾母慈徳之懿則不可使之無聞也願賜一言表著之庶少慰吾子若壻之私予聞而嘉嘆不已乃為次第之而為之傳云論曰外言不入于梱内言不出於梱房閣之秀固非外之人所得聞也然前之若鄒孟氏後之若晉陶氏之母率因其子之賢有聞于時而垂範於後然則安人慈懿夙著顧不以楠而顯乎雖然詩自闗雎麟趾之化行而江漢汝墳之逺靡不漸被矧徽為南畿文獻之邦列聖深仁厚澤之所及雖周盛時蔑是過也夫然故詩禮之族婉淑之德有若安人者出焉是豈無所自哉是豈無所自哉保竹公小傳公字廷佐姓盧氏保竹其别號也世居姑蘇以閭右徙實京師占籍應天之江寧家焉公為人脩髯廣頥兩頰如丹容儀秀偉頎然玊立韻度凝逺器識不凡少有大志慷慨負氣節性狷介不茍與時合博極羣書靡不精貫甫成童羣大夫以俊秀選補郡庠弟子員中景泰癸酉京闈鄉試登天順丁丑黎淳榜進士第視政戸部嘗奉使大同福建所至纎毫無染庚辰拜兵部武庫主事武庫職百司𨽻役人得並縁為利弊公聞而鄙之既上即遜避不預其事恒主清理天下戎伍以故偉有氷蘖聲劉文安公定之嘗以文贈公有曰武庫職劇要朝士多有事不容不干之得因以為勢㷔居武庫者如欲自為地其利源亦莫能究也某於勢與利獨淡寂無所見譏於士大夫自大司馬以下莫不嘉焉辛巳北酋冦陜西勢甚猖獗上命大司馬馬公懐寧侯孫公率六師徃討之未及行改命都憲王公宏於是遴選廷臣之有幹局者徃調腹裏士馬以益西兵公首奉勑以徃比至河南簡閱馬歩精鋭者得萬人及措置軍装以給将行謂統帥不可不重而難其人藩臬咸以都指揮林盛材勇可任第鷙猛難制分檄召之果固辭且出不遜語公正色責之曰朝廷所以髙官厚禄以蓄汝軰者正欲今日冀以禦侮也汝臨事畏難若此皇上官汝禄汝者何哉勿多言予第知劾正其罪耳盛聞之股慄奉命時衛輝守禦千戸楊英亦以黠驁為公所制方在遣中公慮其合謀縱軍士為暴復申明軍約給榜曉諭所至秋毫無犯民不知有兵至陜西總戎軰見其士馬精壮御之嚴而有㤙咸嘖嘖嘆賞凱還王公入為大司馬知公可任遇有邉報戎務必與之商確而後行如團五軍三千神機為十二營以至退冗兵禁私役皆委公綜理公亦持正不阿權貴歛避請託不行事克以濟秩滿得賜勑封父愛竹翁如其官母張妻顧俱安人丁亥超拜武選郎中公杜倖門革宿弊武銓以清能聲大著時尚書白公既平荆襄回蒞部事益委任公而當道有欲以大壩功邀厚賞者分執不從竟如常議由是􅋦之己丑春有詔凡方面缺許在廷大臣㑹薦遂薦公可任叅議盖擠之耳諸大臣皆謂公未宜遽補外争之不可得乃以閩藩左叅議處焉公受命即徃時閩地大饑所在饑民攘竊巨室粟以茍朝夕建寧尤甚久之有已巳遺蘖倡之嘯聚為盗廵撫滕都憲昭委公分守公撫安賑濟招徠流移殆數萬人惟政和浦城山谿險阻盗據之為巢穴有司莫得其要領巨室乗之謂必勦之以兵公斥曰此饑寒所廹詎宜爾耶乃擇所部善星數者二人命之曰汝為予遍歴山溪間宻㢘之有所得必重賞泄機有罰無貸二人承命以徃䟦渉山溪遇一村嫗誘而問焉嫗不能隠指示諸賊所居二人過其廬賊見術士不之疑託以問卜各吐情實二人假禍福以諭之諸賊色變具得其情状以歸公知其為變非本意也乃輿入政和浦城山中直抵賊巢面諭之許以不死俾之立約期以豐年償所攘粟衆乃散去復陰遣人捕得賊酋余文興等餘二十人械繫郡獄斃之一方以寧廵按左御史鈺手書奨公有曰設施措置特逹有為保地方以無虞活千萬之生命衆以為然壬辰愛竹翁捐館公天性至孝訃聞棄官東歸撫柩悲號絶而復甦毁瘠骨立襄事畢結廬墓側朝夕哀慟不輟忽有五色芝二十餘本産於墓之左右逺邇傳聞以為孝感所致有司以聞詔旌其門乙未服闋即家起為浙藩叅議遂迎母夫人就養朝夕公暇躬奉甘㫖以適其志夜必率妻孥候寝所俟安寝始退以為常佳時則具酒肴稱觴為壽或效嬰兒歌舞以樂其心極歡乃罷復有五色芝一本産於公署叢竹之傍亦孝所致也嘗分守浙東東陽邑民杜春與道士某偽立逋劵誣良民逼索之反以告公公攝至因其辭色有異疑之乃各幽一室俾不相通首召春問曰汝貸錢與若人劵書何紙所冩春曰開化紙命左右取紙示曰是也公收之幽於原所又召道士問曰汝與杜春貸錢與若人劵書何紙所冩道士曰姚黄紙命左右取紙示之曰是也公亦收之幽於原所人莫測其故少頃復取二人面訊之曰汝二人貸錢與人諒必相同何所云劵紙不一非詐而何乃出紙示之彼此相顧失色扣首服罪良民獲直人服其明又廵三衢聞開化江山邑民為處盗所掠公躬歴二邑廣詢父老備知山川險易脩舉隘口砦堡立保甲相救之法復諭逺近募人捕盗開示賞格果於處之龍泉悉獲諸盗自是盗不敢踰境矣至常山邑有要地曰迎恩埠頭乃吳越閩楚之所必由况地臨溪水壁立懸絶居民咸取汲於斯有司舊疊石為道以便行汲歳久頺圯至冬道皆凝氷徃來者稍失足則罹顛躓之患公一見曰是亦王政之所當為者遂鳩工市材甃石為梁人甚便焉属邑歳均徭必經藩司編理既定則榜示于衆俾知所應何役其費幾何所司不久輙匿榜而更張之郷民弗及詳因得罔而取諸民民皆含忿莫敢發公知其然乃創置闗防由帖命里老率徭户躬審之已乃書之由帖唱名而給俾有所據其弊乃革時海水溢沿海邑岸皆被衝齧而海塩為甚民不能田檄公治之公躬履斥鹵之地不避風日督属修築民免於患大司馬項在位時嘗忤權貴既去怒未已復搆成大獄奏遣中官徃訊之嘉興之人懼罹無辜公力與辯析事多末减丁酉冬陞右叅政督理粮儲公既受敕即諄切戒諭期盡祛倉庾里書出納之弊所司凛然畏服明年春正月母夫人棄榮養而公去官矣扶柩合塟于愛竹翁復廬墓側家罹囬禄舊業蕩然亦無所顧癸卯服闋改授湖廣時桑植土官争職相殺戮刼印以迯積二十餘年不能詰公即與臬副躬詣其地備歴險阻擒其渠魁将寘於法司獄者不謹使得逸去然自是畏懾不復敢肆惡矣尋陞右布政使進左布政使公立法嚴門庭肅清吏胥無以售其姦民以事至頃刻不留雖僚友所請亦謝不從時或怨而毁之亦不計其介如此有中貴奉命使武當需索無已民不堪公力拒之多所裁省當路者滋不悦矣公嘗嘆曰吾久勞於外年且至吾其休哉遂致仕歸則𢎞治改元戊申三月也公官一以仁民愛物為心所至下必被其惠尤重刑獄慮有抑枉乃於公暇編輯祥刑集覧一書梓行以為司刑者式故公去位而民思之不置焉既歸即杜門寡出交㳺中有同時相契者或一過從談笑為樂非知已不屑與接勝日時肩輿徃先隴盤桓櫟山之間躬課農事盡日忘返郡舉郷飲京兆重公名徳請為上賔亦却不徃初公有弟四人熈泰和皥相處極友愛厚泰皥相繼卒公極力營塟與人言及輙流涕晚年惟熈和尚存且皆讀書喜吟詠朝夕懽聚恩義兼篤嘗語之曰吾䝉㤙旌門曰孝所當率厲勉行仁義以無忝休命二弟佩服惟謹諸妹既嫁或寡而居或貧而歸均為贍給俾不失所公初娶夫人顧氏贈監察御史淇縣教諭敬之女以淑徳相生子一早夭乆未得嗣以熈之子裕為之後為之撫敎加切再娶夫人湯氏東甌襄武王之女三娶夫人翁氏孝陵衛皇親指揮使闕之女復育熈之少子以為子惟先夫人顧氏一女允真㓜淑惠通書史公與夫人鍾愛之而先少保文僖府君與公垂丱㳺庠序世契惟篤因以女歸岳今則已矣惜哉岳無似素承誨愛至有今日違逺左右徒切懐慕今公夀登七袠十二月除夕前二日誕辰也縻於職守無能奉觴為壽乃於公暇掇拾見聞述為保竹公小傳一通附諸頌夀詩文之後以備家乗之所登載用傳示子若孫者期紹續世徳云哀辭哀王器之辭器之名璒姓王氏世為太原之岢嵐名家自大父徙京師始占籍順天之大興父静􅒍先生遂以書經起家領薦于鄉有司分敎名郡璒與兄玶皆佩家庭之訓先後登第璒以天順甲申進士入翰林為庶吉士明年冬拜南京戸部主事受命之際適静􅒍獻績天曹母孟卧病客寓璒自惟無舍去之義朝夕憂之然以君命之重不可違越五月始克就道憂心煩亂不知所從因以得疾甫抵任而沒年始三十時成化丙戌五月也初天順間予就師授書京師之士推學書者徃徃稱璒然猶未相識及予為萬全學生適静􅒍主其教璒與玶皆領薦家居得與之徃來叩其中淵然親之怡然與之處乆之而侃侃然有切磋之益矣甲申春遂與璒同㑹試登第為庶吉士與余同授業故知璒者惟余為最深也璒性淳雅朴實有至性與人言必先道義皆鑿鑿能行事父母盡孝道觀其所以死可知也既仕始從事古文辭質魯而氣鋭晝夜不衰大有所進及授官乃司國用之職嘗曰東南之民坐此致困吾思有以報今日作養之㤙顧力所至何如耳此其志也予亦嘗戲之曰有南來稱好王主事者必子矣璒亦以為然嗚呼璒今其死矣父母兄弟之心固痛其不得親湯藥視手足面目而死又恨璒不逺仕去父母兄弟則無離憂或者其不死也嗚呼死生命也璒在父母兄弟之側使命必死雖善其湯藥調其飲食亦不可得而生也且璒善人其必全體而歸矣然予之所以哀之者哀其才可以有為而位不加於人志可以有施而澤不及於時其仁可以有後而胤嗣無以繼其傳嗚呼璒其已矣九泉之下将無以瞑其目矣予安得而不哀之乎故作辭而遺之玶以寫予之哀云繄余友之道䘮兮失邦家之俊良何上天之不弔兮使飲恨於無疆始仕轍之南還兮愍離憂之遑遑驅車而感茲遥赴兮遵潞渚兮以行軫親疾之未瘳兮瞀容形以彷徨陟岵屺而反頋兮涕隕軾以汪浪豈輕外而憚逺兮固親舎之在望心不怡而長徃兮揮刄刳於柔膓将脩職而抗行兮期因時以顯明将素志之不失兮敷佳惠於一方嗟欝欝之不釋兮終偃蹇而用傷汨年歳之不與兮羗溘然以流亡惟靈魂之欲歸兮固逍遥而北翔神杳杳其無所託兮因西風而飄揚嗟狐死而首丘兮鳥飛返於故鄉𦕈不知其所止兮豈余哀之可忘志不得伸兮才不得張伯道中絶兮子淵逄殃覧前代之皆然兮抑天道之靡常瀝余情以陳辭兮又何怨乎彼蒼嗚呼哀哉兮詞不及而情長華母顧孺人哀辭成化己丑之冬余南歸省墓于杭道過無錫時則其邑人華烱字文熙者過余行舟訪焉觀其儀度閒雅風韻超邁而尚文好賢之心尤篤余甚嘉之越五載癸巳秋文熙復致書于余曰烱罪逆深重貽禍先妣乃以壬辰奄棄菽水之養竊惟先妣姓顧氏為邑名家子性至孝父母鍾愛焉及歸于吾父時葺翁事舅姑以孝處妯娌以和相夫子以道御媵妾以恩年雖老而不倦於女紅家雖裕而不侈於服食宗姻鄉黨咸稱其賢比歳辛夘有祖妣之喪先妣毁戚深切囙以成疾遂至於不起得年六十有七嗚呼傷哉烱不肖頼先妣之賢以育以撫以底于成而弗克終養徒抱無涯之痛烱自惟嘗一拜行塵於錫山之下獲辱知待幸憐而錫之一言以發懿徳之幽光敢再拜泣血以請余惟時葺翁之裕族亢宗樂善好予而無内顧之憂者固其賢内子佽助之力歟諸子之讀書秉禮體仁質義而無紈綺之習者固其賢母氏訓育之功歟至於閫閾斬斬無少踰越家庭穆穆無或拂戾又其賢主母維持而撫摩之者歟然則華氏之有頼於孺人者深矣故其年齡既髙福履亦盛當桑榆之遲暮睹蘭桂之秀茁奉養怡愉夀考令終則夫所以食報於天者斯亦弗爽已今而懿範不作閨門興哀者豈不以時葺翁将遂失其所相諸子将遂失其所恃而侍御𨽻僕者将遂失其所以為恩者乎於是乎不能以無哀也矣余用申其意以為之辭以遺之文熈以釋其悲思焉辭曰嗟悲風之隕蕙兮庭諼萎其不芳羌淑人之遐棄兮豈其時之所當曰理漫衍而不可詰兮謂數膠臈而不可明惟善類之寡祐兮恐天道之茫茫睠夀考之維祺兮又多福之在躬子性森以成列兮蘭桂繽其在行顧室家之所宗兮㫖甘進以多方層軒䆳宇静且閒兮日欣欣而樂康死生人事之常兮理與数固有所窮乃溘然以長辭兮𦕈泉臺之永藏夫既以姑養兮亦遂以姑亡矢相從於地下兮或精神之所通亶其心之所安兮抑深慰於孝誠慨鼓盆以悲歌兮慘含戚而不忘懐丸熊之慈誨兮心寃結而摧傷固情之不可以已兮洟泪從以汪浪謇靈魂之欲來兮乘清氣而廽翔焱髙舉而逺逝兮歸白雲之故鄉生則為賢兮沒則有光嗚呼淑人已矣兮名百䙫而彌章誄程襄毅公誄有序成化己亥之秋南京兵部尚書兼大理卿新安程公卒訃聞特贈太子少保賜諡襄毅遣使者治葬命有司再祭於家公子春坊諭徳克勤匍匐南歸以書來赴嗚呼惟先大夫與公仕同朝交最乆老成寥寥相繼淪謝感舊懐親抱痛何極而不肖之於克勤進同年官同僚交誼益篤况嘗獲拜瞻光霽於堂下稔聞功徳之詳所宜累引懿行以昭示于後重以筆硯荒鈍莫能稱述是懼然襄事有期奔吊無及茍遂隠黙将焉致情謹摭所知撰次為誄庸寓之克勤以竊附古者六辭之末誄曰猗歟襄毅襲休遐祖于周顯名程伯休父亦曰忠壮廟食一土族姓斯繁芳烈世舉國史屢編家乗載譜猗歟襄毅起于北方其氣則直其性則剛直不可回剛不可屈道義所加矢激山屹藝閑道洽日淬月磨僉曰彚征遂踐甲科秉此剛直立于諌坡封章屢飛士論孔多國有大蠧志竊武功皇誥六師逺狩于戎公曰止哉嗚呼弗從皇輿既留敵氣如蓬羽檄内馳兵車外攻四郊之壘西北其衝公徃當之擐甲枕弓豎将小衂䑕竄乞容公起乗之乃摧賊鋒景皇在御皇輿來復豈無間言㤙義深篤敬天一章聞者悚服乃叅外政于彼遼陽姦憲肆苛穽民於量公立碎之苛政以攘遼人允懐曷其能忘家難遄歸悲動行路誠孝格天芝産于墓載駕軺車于蜀之藩文事烝烝武畧桓桓黒虎三㨗于松于潘入覲從容遷秩頻繁乃長僕御乃總臺憲乃撫于遼承宜便殿東夷潜搆兩酋交煽公擿其姦偽制以獻急使伐謀我圉維晏邉将肆貪我伍失所外臺有言公斷維果姦憲詆公有唱斯和使㢘弗右公遷遂左滁山醉翁其樂亦頗肅肅邦刑匪公孰可乃召還公登于秋臺幽枉洞逹誣偽刪裁載罹内䘏益疚于哀兵事日嚴起佐司馬奏牘山積公乃閑暇廟算如神多出公者都掌有蠻盗兵潢池皇赫斯怒孰總朕師文武維公僉曰是宜晉長兵曹授鉞以馳惟貴惟雲曰蜀曰楚豈無蕃將亦有禁旅是擇是從陳戎耀武洸洸其徒﨣﨣于征龍背雲矗豹尾霄峥白羽一揮川頺山傾羣醜傴僂哀呼傖儜猱跳蝟縮莫我敢嬰乃鏺大壩擾我太平奏凱來歸棘卿荐擢予幣與金在牽在榼嫉言如吠公度惟擴乆勞於外疾疢斯作功成自退公識之卓惟皇眷公再䟽再却乃顧南都付以留槖居後四年克壮大猷上有沛澤下有歌謳公志既倦公歸莫留璽書在道圖書在舟新安之墟爰有晴洲公歸伊何其樂優㳺其樂幾何遽以訃告百僚興嗟九重増悼贈諡之崇㤙命有誥塟祭之隆䘏典有詔曰哀曰榮終始之耀嗚呼襄毅望重廟廊威懾蠻夷勲歸旂常國有蓍龜世有麟凰天不憖遺云胡弗傷徳業所基維後之昌雝雝鳯雛振羽玊堂學行聿脩為時之望流風雖逺世澤其長練溪湯湯南山蒼蒼有巍者封襄毅之藏太史銘之彌永其光祭文祭陳思悦文嗚呼子兮陳門之英惟資頴㧞兮粤惟天成頼諸父以家誨兮學業漸精遂携之以北上兮羗日進於髙明期飽經以飫史兮立身揚名爰亢厥宗兮為邦家之榮嗚呼天如不欲子之亨逹兮亦當畀之遐齡夫何不弔兮竟一疾而弗興吾儕從子諸父㳺兮獲為子之友生得頼以輔正兮疑資以商評嗟麗澤之見及兮盖寒暑之屢更奄忽若此兮何悲苦之可勝發引有期兮輀車戒行撫棺長號兮涕泗其零式奠道左兮聊抒我情子如有知兮飲此兕罇嗚呼子魂去兮返親庭風蕭蕭兮天𡨕𡨕祭戸部署員外郎事主事年友周徳囦文嗚呼徳囦生而為英死而為靈渺焉何之夀夭之元予奪之根昩昩何知宜壽其躬乃夭而終伊誰之為胡予之厚遄奪其有理莫之推天乎命耶抑未定耶斯其可悲嗚呼徳囦明誠敏識清方粹直制行之宜玊質天葩炳燿光華文章之竒賢科既登官資屢升歉以自持㤙誥輝煌親闈顯揚禄飬孔時驥馳而蹶木榮而折迄不可支嗚呼徳囦奄忽淪亡聞者䀌傷亦駭而疑父哭弟呼妻泣兒呱聲慘形羸匍匐徃弔曷勝哀悼泫然涕洟輤車戒行窆于新塋明發其期一觴斯潔千古之訣惟永其思祭祖塋文某叨承遺澤竊官于朝瞻望塋封久乖展掃况族姻之既逺将荒翳以罙深慨夫木本水源之思殊切風雨霜露之感兹以請命歸省獲拜𤣥堂荒翳既除牲牢以薦尚兾尊靈之妥永綿來嗣之休八月二十二日戌時生子母氏遽亡九月二十二日告亡妻盧夫人文母徳劬勞君已偹嘗子方分娩君遂傾逝痛切我心嗚呼柰何子今彌月祗見祠堂名曰應麟因昔之夣成君遺意嗚呼君其陰佑庸玊于成惟後在茲惟祀在茲君其念哉祭大司㓂林公文閩山秀鍾實生鉅公泮庭有訓禮經是宗乃掇名科乃歴諌闥力所圖回功歸獻納擿姦疾惡竒禍乃嬰元老之援天子之明或佐青坊或教國學居之悠悠視之漠漠英皇復辟起公憲臺凛然風采秋霜春雷始賑南畿繼鎮北塞公以疾辭駕言于邁逺謝榮禄養高林泉天子念公南臺復遷不苛以煩惟明而恕衆所依歸上所倚注曰此秋曹匪公孰宜召公于南邦憲是司民以不寃法亦弗弛公之寛仁相我天子天不憖遺公館忽捐當宁震悼朝野惜焉逺歸其䘮載録其後錫諡加贈寵䘏惟厚所嗟公者盛徳不長氷檗雅操圭璋令望進退雍容夷險不易清風永存古人之匹臨棺洒泣匪為公悲薄奠致情申之以詞祭豐城侯李孟剛文碩大之資英敏之識恭和自将忠謹益飭桓桓妙年克纘世勲好賢好學有武有文蚤沐皇休簡司禁旅載長神機六師振舉軍務勞勩或爽節宣志可有為命則尼焉協守南畿㤙便優養云胡弗救一夕長徃當宁悼惜偏禆興嗟靈輀來歸恤典有加况我與公斯文之好敬潔此觴陳辭以弔祭大司徒楊先生文繄先生之毓秀鍾華岳之精靈蚤搜羅乎羣籍遂窮研乎羲經擢首選於鄉薦炳闗西之文星親善教於南雍忘旅迹之伶俜既登元於春榜復繼魁于大廷及乎列職翰林簮筆史局綸閣儲養經帷講讀南宫校藝允頼甄録横金衣緋寵光煜煜或歴憲臺守兖于東民兵五千聿纘武功或兼青坊侍講惟舊仁義之陳日新月懋亶國用之所託在經理之得人惟公才之優裕宜眷命之用申乃出佐乎民曺藹政譽之日新具十事以為請曰保邦而䘏民從耕于郊秉耒惟勤從幸于學乃相明禋國有大禮公罔不親建偉績於三朝端所守之一敬惟敦行乎舊章豈屈抑於權幸故低回兩階而後遷方悠然安之於義命厥有喬擢正位司徒更税定賦疲困以甦黄河運河寔便轉輸公請復之孰沮良圖欲實帑金欲増廐芻公力止之孰聞嘉謨惟皇眷公遂進公保世路鮮合歸計冝早䟽再請而益堅惜公力之未老仰宸頋之彌隆頒龍章於天表肇輿𨽻與官廪荷鴻恩之浩渺望威鳳之髙翔嘆冥鴻以孤矯公歸幾何公樂則優于園于池或嘯或謳子孫杖屨童僕田疇享家庭之孝養何必山林乎逺遊民厄歲飢爰軫公憂抑鬰莫伸疾疢曷瘳忽雲雷之震迅更風雨之蕭颼羌人驚而物駭倐地慘而天愁正寢令終夫孰可侔嗚呼異哉於惟先生聖賢之學經綸之才立朝侃侃植行嵬嵬髙論可式勁節不回蓋其徳誠足以亷貪而立懦而其功奚止於經國而阜財慨老成之凋喪重朝野之悲哀當宁興嗟䘏典殊異有祭有葬有贈有諡皇華銜命恩典咸偹斯文之榮重泉之賁矧有佳雛厚徳所致玉署繼顯科名世嗣冥漠永辭心復何繫岳年家之子世姻之義幸親炙乎教言念所自於童穉每悵怏於久違痛訃報之忽至徒西望而一慟竟莫遂於奔視懐薄奠以抒誠謹緘辭而逺致嗟執紼之無由惟臨風而洒淚嗚呼哀哉祭妹文嗚呼吾妹何傾逝之奄忽耶汝疾幾歲日望平復門墻伊邇走醫問卜憂念靡忘候問相續彼蒼何為乃奪之速匍匐而來拊汝以哭嘆汝之生徳容如玉嗟汝之性聰惠明淑父憐孤女加意愛育長而有歸年家令族舅姑待汝勝己骨肉良人有官日享天禄他人視汝心無不足正宜安閒以迓遐福方亨遽止理莫可燭嗚呼痛哉我母棄背汝方二齡疾病纒綿形體伶仃頼外祖母長養有成中遭家難荐罹震驚跋渉畏途心神靡寧厥既有家娠育稠疊若子若女娟秀可悦或逾歲年或僅旬月一疾不救心力俱竭酷毒莫伸遂爾中絶所幸良人桂籍知名冀登髙第偕被恩榮中值蹉跌愁苦交幷雖兹顯宦卒鬰其情凡此數者致疾之由勸諭莫回膏肓難瘳伊數使然豈在短修呼天長號抑又何尤嗚呼痛哉我復思之天佑善人嗟汝在日克孝於親奉養舅姑益敬益勤在陜七年靡間昏晨御下不妬樛木之仁處衆則和煦然如春所守儉約于家于身所事豊潔于祀與賔衆口稱賢繄孰與倫敬兄愛弟禮義尤重我或欠安汝輙有夢手足之恩休戚所共善人早亡云胡弗慟翼翼新堂慰汝安處今我來斯不復見汝百恨填胸口不能語一奠永訣涕泪如雨嗚呼哀哉嗚呼痛哉祭湖廣左布政使致仕外父保竹盧公文惟公之操如氷之清惟公之徳如金之精才學優贍器識深沉修髯欲飄兩頰微頳自逺望之偉觀崢嶸吳中白下靈秀所生蚤游京校時之俊英鄉榜騰踏甲科軒轟授職戎曹赫燁有聲乃奉皇宣徃遴西兵邊患既袪武功告成迨典選部持銓秉衡姦弊悉除逺邇知名遂膺薦擢藩叅之榮偉績在閩政和浦城歸憂于家純孝有旌載佐兩浙復蒞楚荆敭歴三省政譽播盈引年而歸負郭課耕蕭然髙舉盡濯塵纓天胡弗弔神遊閬瀛惟我先公㓜締交情曩各未娶已訂婚盟不鄙不肖為公館甥公愛公女如玉如璚撫我教我㤙義實并事徃人亡徒抱憂惸昨公七旬擬介壽觥逺不可即詩巻寄呈公視而樂胡疾遽嬰遣子徃視如我親行曽幾何時訃音來京南望長號心掉魂驚我承公教叨授春卿公乎知乎泪雨如傾公柩將歸櫟山故塋執紼無由愁緒日縈敬将一奠潔我粢盛瀝血陳詞以引㣲誠嗚呼哀哉嗚呼痛哉告祖塋文某欽承上命來典南銓仕於故鄉獲奉丘壟實惟人子至願世所罕遂者也况嗣子霦亦䝉㤙例得入南監宦業可繼此皆祖宗蔭庇致兹榮幸履任云初祗謁封塋懐念恩德不勝感慰謹以牲醴庶羞用伸奠獻祭妹夫楊知㣲員外文嗚呼知㣲遽止兹耶以君之志逺大自期以君之才無不可為宦雖進而未達位已陟而猶卑奄忽若是斯其可悲高堂老母深閨孤嫠二難飲恨於終養百年應悔於結褵萬事無成一夢莫追驚逺訃之來報亦将信而将疑感同胞之舊誼愴涕泪之共垂聊緘詞而一奠庶少慰於遐思祭閣老彭文思公文學贍才通行修望隆早魁春闈之選獨歩詞苑之雄經帷著仁義啓沃之益史局秉春秋予奪之公偉青宫之良輔繼黄閣之清風忽抱痾而南歸惠蒼生其未終胡奄逝之相及實震悼於淵𠂻恤典載頒恩禮益崇某等託交有素慟惜無窮遥寄情於一奠徒悵望乎長空祠堂成奉遷神主告四代考妣文岳奉恩命來典南銓官於故鄉實頼先世餘慶所及不勝感慕但緣先人故居狭隘族處已繁乃營新第於兹以庇風雨竊惟以禮奉先是不可後謹遵法制首建祠堂用修祀事属兹膳完祭器亦偹爰卜吉日奉安神主伯考坦菴府君伯妣孺人沈氏亡妻贈夫人盧氏以次升祔謹以牲醴時羞恭伸奠獻伏惟尊靈以妥以歆以佑我後人惟永無窮祭徐州衛指揮使致仕蘓公文惟公忠厚之資孝弟之行處已以誠交友以敬爰自京衞來莅彭城上悦下安藹然政聲甫爾六旬辭榮潔己未食之報以付諸子諸子克家有武有文惟公之教勉勉循循惟我與公姻黨之舊公之處我契誼尤厚昔我南來公病始痊勉强欵留累日周旋别後幾時遽以訃告感念交游豈勝哀悼方期獻績親拜几筵奉命叅贊此意缺然我有菲辭已表公墓緘辭徃奠用表中愫祭杭州祖塋文仰惟體魄所託越在錢塘嗟我後人實承逺䕃道里懸隔䕶守乏人比聞封域之或有侵逼亦恐斧斤之或至震驚省咎益深瞻戀徒切憶自成化己丑之冬嘗因乞恩歸覲獲遂展拜歲月逾邁蓋三十三年頃司南銓圖便省謁旋轉叅贊奉召入朝展轉蹉跎竟弗克遂每一興念良疚於懐兹值仲弟工部郎中阜奉使於浙俾之修飭塋垣培植封樹恭修奠獻汛掃荒蕪庶代親行少伸情懇稽曠之罪将無所逃伏惟尊靈俯垂鍳察青谿漫稿巻二十四
