body:
  text: 青谿漫稿巻十八明倪岳撰序送冡宰錢先生致仕榮歸詩序成化己亥冬南京吏部左侍郎雲間錢先生奉表入賀聖壽於京師既陛見即具疏乞骸骨南歸上眷顧舊學嘉其彊徤未遽聴其去以先生辭情懇切乃優詔許之特晉本部尚書予誥追贈其先復賜勅及寳鏹三千緡給驛以還皆曠典也已而援例得遣子峘入太學因過南都留數日始行南都縉紳士歆艶嘆慕以為聖天子貴老敬賢之心如此其至也莫不奔走致賀至於讌㑹之盛祖餞之逺冠盖如雲車馬塞途可謂焜耀於今日而傳播於後世者初不在漢疏傅唐楊尹之下於戯休哉所嘗游于先生之門者復各賦詩以頌千載之盛遇而道一時之别懐厥既成巻授簡于岳以序岳惟先生以正統己未擢第進士入翰林時先君尚書大人亦在榜中官相聨居相比而又同為江南産也締交之厚且密孰能愈之岳生也晚自為童子無一日不侍先生側獲親炙教益獨深天順癸未先生主考南宫幸不以淺陋見黜得從考試登第竊官翰林沭造就之徳亦久顧年家子在門生列者惟岳為然則於是行方自以蕪謭為媿思勉致一言為先生壽况辱諸縉紳之命而又將安諉乎岳不敏不敢逺舉前代之事以溷先生之聴竊惟我國家優禮舊臣圖任老成之義視昔有加何則自我髙祖創業文廟繼統之後列聖臨御之日時則有若西蜀蹇公泰和王公鉛山王公蕭山魏公率以才徳老成當逾七望八之年居大冡宰之位天下之士望餘光而景賢範者未嘗以為衰而朝廷之上勤倚注而極眷念者又惟恐其去葢以一身而繫於上下之望者如此其重也故方其在位也或以疾告朝廷輒優免朝謁毎朔望一入覲慰問勤惓賜予旁午蹇王皆如此其有疑議須咨决者上至親御宸翰遣近臣就而問焉蹇公時如此及其卒不可留而去也雖曠嵗逾紀上猶眷念不置至遣行人存問錫賚益厚魏公如此此皆前代所無而出自淵衷超越古昔其禮遇之至何如哉是以當時不獨諸公上弼君徳下總庶政鞠躬盡瘁至忘其老而凡為臣者觀感興起孰不益思攄忠効職以圖報稱於萬一哉嗟夫老成既逺典刑具存兹幸先生歸神閒體和養道毓徳優㳺林泉之間歌詠太平之樂所以化導鄉人及其子孫者宜無所不至而後生晚進之士得大人君子為之依歸飭學厲行以思繼美於盛世使治化益隆風俗益厚不亦大有裨於世道也耶矧夫聖天子尤篤意於甘盤之舊恒信之如卜筮倚之如鑑衡豈無大政事大議論之當詢者乎或者龍章北來星軺南邁求先生之廬而請焉而先生百嵗期頤五福攸萃又或者皇華遣行恩命疊至就先生而問焉是皆有必然而可俟者也故敢具書于羣言之右以著見今日禮文之盛云興武周氏族譜序古者因生以賜姓以得姓者為祖下及百世而此姓不改則其子孫共相連屬為之族雖支分𣲖别益逺益繁然尋其流可以知其源尋其支可以知其本則有譜牒存焉譜牒存而統系明恩義洽因其所自出而下推之逺者不疎微者不絶由緦功以及乎無服者斬然具存也統系不已明乎因其所自出而上推之為吾親之所從始為吾族之所從始由乎一本而不至於塗人者藹然不敢忘也恩義不已洽乎故曰觀乎譜而後孝弟之心生焉後世譜牒不修風俗益薄或有之以貧賤而斥或無之以富貴而合甚者至親相視恩禮蔑如益可嘅矣南京興武千戸周君鐸以其族譜圖示予而告曰周氏本臨川士族後遷豐城之鄉塘居焉先曽大父廣淵在元至治間攜家渡淮聲問不通族人遂不知其所終孰意傳緒至鐸居淮北者且四世矣比因漕事抵豐城訪諸族人之存者皆貿貿然疑之及出譜相校乃知曽大父之後固在也始大合族姓敘昭穆相歡聚為樂迄今徃來不衰由是而益知譜之所繫於人大矣周氏之譜雖莫知其所由始然譜始於允襲傳八世至廣淵乃渡淮而北因從征伐屯守淮西子鐵老代無嗣季子祐生之子旺代之克樹戎績授職百户旺卒其子代之以功進千户佐漕有聲知名公卿間則鐸也去允襲盖十一世矣夫廣淵之去其族迄今且百五十年亦既失其所在雖有仁厚之族其不相視為塗人者㡬希幸此譜之存而後離者復合疎者復親盖因流而得源即支以逹本初若㕘錯迂逺而難考徐而視之有綱有條脈絡貫通雖其派别之繁而本之所自出則一耳嗚呼方其初也為淮北之武胄為江右之士族判然不相關今則為族伯叔為族兄弟恩禮相及功緦相加所謂孝弟之心油然以生不繫於兹譜也哉譜嘗燬于火十世孫伯張大尹因其舊圖修復之再輯於十二世孫士肅士倫徵士呉先生為之序廣淵之後惟鐵老祐生見譜中鐸乃自序其親以下若子若弟若弟之子若孫各系於其世庸以補其所缺為周氏全譜以傳屬予序之俾後有徵焉贈上元大尹王君至善赴官序徃予識王君至善於表兄定襄伯郭惟賢所喜其言議謇謇出人意表雖惟賢世貴介亦知以此重之後君以明經登成化辛丑進士試政駕部時予方起家艱北來而君奉大司馬檄督舟而南所至有聲于是益喜君之能以經學飭吏事不獨其有文也是年冬謁選拜官授應天府上元令上元予父母之邦也比年旱澇民貧甚將不堪其生嗷嗷然思得賢令宰以撫之不啻赤子之待哺也而今屈君以徃又安得不為吾邑之民喜耶君將行詢予以邑之所當舉置者予無以告也重以同邑諸君之請殆不容以終默已嗚呼天下分郡邑之政以為職者多矣其親民者莫若令則民之疾苦毒害之切非令將誰告也而可忽哉夫謂之親民者其必勾稽於徃牒推擿其宿蠧家視而户閱之然後可以知其孰為富孰為貧孰為窮而無告而善而惡也而後因人以行吾之政故民之所好好之民之所惡惡之斯謂之民之父母非能知之而能同其好惡也哉然則親之者非特勢位之相近而實恩意之相接也豈惟是耳財賦之弗親則貪者得以肆其欺案牘之弗親則猾者得以乘其隙刑獄之弗親則豪右者得以行其姦若是者皆足以為民病也而其所從來久矣惟君一鏟而新之可乎雖然上元畿内赤縣之一也自昔國家之政恒加厚於畿内之民固將培植基本以示極於四方也而今或不然矣夫其不然者豈政之過歟行其政者之過也且京令之秩加天下諸邑之令一等則固厚於令矣豈厚於令者乃薄於其民乎哉盖惟其能親者而後有以厚之也固於君之行望之矣矧夫君故閩南望族自大父官京師宦學相承久矣而君青年偉質雅志問學又足以繼之自拜官來日詢諸老於為縣者思以阜厚吾民其志皆可嘉也然則予果何以為君贈耶嗚呼勉哉兹行尚毋厭於親民也贈大司徒翁公致仕序户部尚書莆田翁公以豐碩之學𢎞敏之才受知列聖進大司徒賛禆國用上下賴之邇以年逾六袠衰病日侵乃具疏懇乞休致上方篤於倚任而又重違其意遂優詔賜允特進秩為太子少保予勅給驛以歸且月有廪食之奉嵗有力役之供恩禮優蕃寔出異數聖天子優老尊賢于是為至而公之始終盛福亦無以加也行有日公卿大夫莫不出祖都城之東衣冠坌集車馬雜遝視漢疏傅之歸若有過焉維時翰林侍講焦君孟陽感公知愛之深而惜公違逺之别乃裒詞林諸作以申贈意遣岳為之序岳筮仕之初已聞公直亮忠毅事我英皇雖暫出外藩而巋然為時之望未嘗少屈也及夫迴翔憲臺遂總國儲敭厯中外餘四十年清徳雅量有古大臣之風後生晚進方藉公以為儀刑規範而公遽歸矣嗟夫天道有消長之理君子宜明進退之時宜進而退則有先時之失宜退而進則有後時之譏古之人所以自處者於此恒慎焉今公之竭誠殫忠以事乎上者亦已久矣老境駸尋故鄉遼邈慨然而興功成名遂身退之想三抗疏而後得請則朝廷之所以待公可謂極于恩而公之所以自處者可謂適其時㝠鴻髙舉人可望而不可及矣於乎休哉雖然昔有宋叅政趙公槩致仕居睢陽十五年猶以憂國愛君為事集古今諫諍為諫林一百二十巻奏之賜詔褒奬富文忠公弼雖居家而朝廷有大利害知無不言然則身江湖而心廊廟二公固非果於忘世者而公之惓惓忠愛又豈獨後於二公也哉矧夫天下之士顒望于公者眉壽台耇為國蓍龜猶足以佐朝廷而福天下者將無窮焉而豈於公之去而遽止耶岳又聞之莆為八閩文獻之邦士之出而效用於時項背相望然其仕之尊顯者若為方岳為臺憲為卿佐寔皆始于公而後繼之者益盛公之髙風令躅敷遺一鄉之士則夫髙年峻爵茂綏寵命以為天下重輕者繼自今豈無後公而起者乎岳既為莆之人士喜而又將為國家方來賀也詩且盈巻車容既張岳雖無似願負雲罕以為先驅云順天府鄉試録序聖天子紀元成化之十有九年秋八月己巳實維天下鄉舉試士之期順天府舉故事以聞詔臣岳臣越徃司府試維時考業之精禁弊之嚴去取之式多寡之等一遵成憲而夙夜祗厲以求得人之意有加焉爰自戊辰入院越十有九日丙戌而事始竣乃取百三十五人之名氏邑里萃為一錄將以登之天府而凡執事之臣為提調則臣倫臣海為同考則臣祥臣倫臣瑭臣輔臣瑋臣暠臣謙臣旋為監試則臣欽臣俊凡中式之文為義為論為表為策一以附之録成臣得以職事僣序其首惟天純佑一徳我國家恭膺景命以御九有一惟文教用興治平餘百年于兹臣嘗有以仰窺而竊論之盖養士也以學校一其依歸而不誘於他岐以經學一其心術而不惑於異說待士也以科目一其出處而不壞於捷徑以庶官一其任使而不間於憸人風化既同士習專定以故豪儁瓌傑之材項背相望而出于以輔成大一統之治者莫盛於斯夫所以養之待之者豈惟前乎此為然哉聖明在御彛典益敦盖雖億千萬年惟一道也顧士之所以對揚之者何如耳是故一則純二三則雜一則吉二三則㐫諸君子將為純臣乎則必有以去其偏駁之行將為吉士乎則必有以去其險陂之徳俾夫豐功偉績震耀一時斯實我國家無疆之休若昔商先正有言惟尹躬暨湯咸有一徳克享天心者盖不得專美於前矣可不勉哉敢以此一言用相告焉秋榜同年譜序成化癸卯順天府鄉試取士百三十有五人明年㑹試禮部登甲榜以起者十有七人就一榜而去者十有二人餘則卒業太學以需後試既而胥念曰自鄉舉里選之制廢為治者師其遺意取士於有司而登用之然京師之所取四方之士多與焉非若諸藩僅取之一鄉一里而已然則吾儕幸同捷於有司而今日之踪跡猶未大相異者不及斯時一敘平生驩他之日宦游之轍不之東則之西將莫之底定求一聚首或不可輙得其有不至視為途之人者㡬希矧同年之契有兄弟之義於兹忽焉則友道益薄而有司簡拔期待之意亦孤矣乃相率醵錢為期集費惟有幹局者主之即孟夏之良㑹焉復聮巨帙書姓字邑里齒行家世附以他日宦厯所至者為一巻題之曰秋榜同年譜俾各録一通藏于家前此所未有也㑹已持以謁予請言以弁諸首予嘗聞何休氏之說春秋盖曰同心為善善必成故同則成異則敗者天下之事皆然也然則諸君之昉為斯㑹也其亦出於同然否乎夫昔之歌鹿鳴以讌固有以見其跡之同而今之歌伐木以㑹則將以考其心之同也諸君頃與計偕聨翩髙舉崇階峻級可攝而升所以建功業於國家而流惠澤於天下者於是乎始始而同終而異君子不為也故誠信相孚如車之馭則志無不同勤敏相協如耕之偶則力無不同不惟徳業有以相勸而過失亦可以相規必求夫同底於善以無忝乎薦名之書此則今日之㑹之意所以為可嘉也已雖然予有告焉昔宋熙寧元豐之間士大夫論天下賢者必曰君實景仁盖二公用捨大節皆不謀而同至於立朝建議其言若出一人相先後如左右手及論鍾律一事則反復相非終身不能相一然後知二公非茍於同者諸君同於為善尚以二公為師他若所謂平居慕恱酒食握手出肺肝自以為生死不相背負一旦臨小利害比反眼若不相識者無乃異乎抑亦非君子之所欲聞也予忝司考校於諸君有一日之長請以是言掲諸譜冀相與同勉焉贈江西吉水縣知縣顧君赴官序天順己夘秋先公文僖府君奉命主考順天鄉闈試時業禮經者多失燕禮莫敢適之義獨所取第一巻文理咸備及條荅時務尤詳贍先公喜曰此必學識老成之士既而登名薦書則九峰顧先生如綸也先生蚤游應天郡庠文名之盛超出儕類屢屈有司始膺貢卒業太學而先生髮且種種矣衆方惜其濡滯宦途氣或少餒也而詞鋒英英奪雋於三千人中振拔以出可謂竒矣比余雖幼心竊識之後先生由分教括蒼進韓王府教授引年東歸復以其學教成其子景昌亦領成化戊子南畿鄉薦人益歆慕先生家學之盛如此今年朝廷軫念元元特重守令之職乃詔遴選學行優贍者以充其任景昌得在選中試居優等拜江西吉水縣尹過余告别且需教言余惟先生之所抱負使得志以行將何所不至而欝而弗克以伸僅取一魁解少振其文學之名而抒其褎然髙舉之志卒老於師席無以見諸設施豈造物者果忌其名而故為是以困抑之歟今景昌由特選以起固異乎常調時人以為華且得江右大邑而理之不獨道路之相邇舟楫之相及可以安先生於祿養而先生平日之所欲大展底藴以致康濟斯民之功者將不於其子乎一驗之也哉雖然吉水在江右號為文獻之邦比屋事詩書起科第列朝著者相望也則其民之所濡染於耳目聞見之餘者固皆惟徳之覿而匪刑之覿也然則為之長者必得文學之士以師帥之而景昌負其世家之學以徃因其俗以施諸政顧不宜哉抑余聞之禮曰詩云豈弟君子民之父母豈以强教之弟以說安之樂而無荒有禮而親威莊而安孝慈而敬使民有父之尊有母之親如此而后可以為民父母矣此古帝王之世臨民者之所行而景昌之所得於家庭之學者也顧今之為政者忽之宜民之未底於安也景昌推而行之以慰吉人之心以承先生之志以無忝乎選任之命不亦韙歟茍曰何必讀書然後為學此則學者之所惡也非吉人之所樂聞也景昌其慎之哉贈徐州同守程君赴官序予友宫諭篁墩程先生謂予曰族孫楚英其先與予同出梁鎮西將軍開府儀同三司忠壯公後自新安篁墩遷浮梁之景徳家焉楚英少居邑庠長入太學累上秋闈弗利先尚書少保襄毅公甚器之今謁選吏部得同知徐州幸子一言以教予媿無以復也姑告之曰惟事事乃其有備有備無患徐之為郡當汴泗交流之間實要害之地成化戊戌以來率春而旱秋而雨淫潦弗時洩汴泗壅匯田畝蕩然民且墊溺棄老鬻幼以茍旦夕者可憫也去嵗亢旱特甚水脈就涸吕梁百步之間㡬不能舟田且無所獲民之生理亦殆矣然有司不聞拯禦之策齊民不賭賑恤之惠者何耶夫九年之水七年之旱堯湯之世之所不能免徒以備素具而民弗困耳今君之往適春日載陽之期膏雨弗浹來牟未墾憂民之飢者可不預為之食乎雨暘之數嗇之於前必豐於後憂民之溺者可不預為之援乎迹其所已然而致慮於將然故必圖回於未然而不可徼幸於其必不然者以為安也昔蘇文忠公之守徐時河决曹村泛濫之患㡬敗徐城公築長隄禦之城完而民亦安因請調來嵗夫増築故城為木岸以虞水之再至朝廷從之故其功之在徐者至今思焉豈非以其預為之備而患不能以及之耶然則民曰饑矣吾其食之民曰溺矣吾其援之不饑不溺以置之飽食安土之域者惟君之備之者何如耳故公廉以端其本勤敏以逹諸用早夜孳孳考求乎古人之所已行經畫乎今日之所當盡長顧却慮事為之計而物為之防必使時無水旱之虞而民不知有饑溺之患則備之之善者然也茍事至而後圖之雖有及焉亦晚矣夫同知部上佐得與守長參校政事短長利病者也故予之所望於楚英者如此嗚呼可不勉哉贈禮部右侍郎艾君致仕序禮部右侍郎掌光祿寺事襄陽艾君天錫以疾上疏乞歸上重君才器可任且年未至優詔不允不逾月再上疏乞歸辭益加切乃許之凡寺之属役者合辭請勉留君而君即治裝以行矣於是僚佐諸君徵予言以贈君之歸以致其惓惓不忍捨之意予嘗聞君之言曰先曽大父以前元都鎮撫入國朝仍食其祿於襄陽傳子及孫俱隱不仕至吾始由庠序領薦而起登天順庚辰進士授河南道監察御史進光祿寺卿佐以至今官二十六七年間三荷恩封進貤於祖復得遣一子入太學為上舍生授官有日吾以儒生致位三品與被寵榮如此於分足矣矧年逾六十精神向衰不於斯時决去而昧昧焉貪冐以居豈吾心之所樂哉於戱處盛滿之日而知止足之戒者從古以為難故自召公求去之後代不數人往往士大夫侈為美談遂使疏傅楊尹之事赫赫在人耳目者千載一日也盖明殆辱之㡬者謂之智逺榮望之累者謂之仁决進退之義者謂之勇備是三者君其賢逺於人也哉君之歸于鄉某丘某水所以遂其釣遊之樂者可想矣然君之容體和適言議精辯少壯者猶有所未及惜無其人反復告諭以留之而卒聽其去也雖然昔趙公槩致仕居睢陽十五年猶以憂國愛君為事富公弼雖居家而朝廷有大利害知無不言君歸矣其尚無忘斯世也哉因書以為祖道之贈送大宗伯劉君歸省還蜀序太子少保禮部尚書掌太常寺事涪陵劉君凌雲具疏言某官京師去蜀㡬萬里違曠先人丘隴者今且二十年既荷恩命推及父祖而弗克燎黃墓道以侈榮遇烏鳥之情不能已已乞賜假展省少慰其私敢昧死以請上特允之賜寳鏹三十緡為道里費給官舟以行皆殊典也於是太常諸僚佐設祖帳都門之外以餞君之歸畀予一言張大之君以葩經登景泰甲戌進士拜驗封主事厯員外郎轉文選郎中擢太常少卿陞禮部左侍郎進尚書加太子少保八遷而位極乎人臣可謂顯矣君之為人和厚易直寛裕有容不與物忤而人亦樂親之其於德可謂厚矣君之儀觀瓌傑音吐鴻暢在銓衡具藻鑑之明居奉常著寅清之譽以故寵擢荐臻錫予優渥其於職可謂舉矣仰惟聖天子事天之誠奉先之孝超邁古昔而如君者方以厚德舉於其職位尊而望隆職親而地近首禮樂之司負天人之託盖不可一日而輕去者也顧兹展省而歸固己顯膺夫綸綍之命則夫式遄其來尚思畢殫其股肱心膂之力也哉夫奉常以典禮為職而禮莫先於孝君之孝遂於顯親者如此故其移於事君者盖不可以不篤念之也雖然古之太常與六曹同幕謂之尚書裏行君今日之所居盖其職矣然愷之論議正大敞之孝友諷諫皆劉氏之彦有聲於太常者也君紹續休聞茂建偉績所以召至和而禆盛治者殆將與夷䕫埒也又何二子之足讓哉北轅有期尚當拭目以伺鏡川楊氏具慶圖詩序粤稽古昔盖有以日月若連璧五星如貫珠為瑞于天有以殊本連理之柯同榮異壟之禾為瑞于地皆天地至和之氣薫蒸於兩間而致然也故其瑞之所徵則為聖天子在位致治熙皥於是竒祥異瑞出焉而非徒也夫物之瑞固為天地至和之氣之所致而人則天地至和之氣之所委得氣之中且正者惟人則然矧夫執經論道為聖天子侍從之臣佐成熙皥之治者則其和氣交暢所以感應召致者宜何如也此予於鏡川楊先生與其配丁夫人之具慶謂非瑞之徵于人者可乎先生起家進士入翰林累進少詹事兼侍講學士夫人自封孺人累進恭人迺者成化壬寅孟秋望後二日先生壽届六十及今丙午仲春望後七日夫人之壽亦届六十矣緋袍翠翟交輝於堂陛之上童顔鶴髮相映乎杖屨之間以弟則府丞維貞編脩惟立進士維徳駢侍乎尊爼之傍以子則郎中志仁貢士志道迭舞於階戺之下噦然而鳳凰鳴鏘然而律吕諧壽域偕躋福履咸茂衆美姁媮休嘉訢合父父子子夫夫婦婦兄兄弟弟肅如也穆如也慶具於一家聲動乎一時顧其為瑞孰能加諸抑余聞之先生之家嘗有同根之竹連理之榆重瓣之梅並蒂之榴禎祥之先見固己不一書矣藴之久則發益大乃於今日㑹萃於先生之身而丕顯其瑞如此豈偶然哉於戱日月星辰麗乎天草木麗乎地聨輝競榮非不足以夸史册之美談也於世教奚資焉惟先生之清徳正學為朝廷之華夫人之婦道母儀為閨閫之望其卓識曠往牒之前聞其至行貽後葉之令範誠可謂立乎兩間叅為三才如書所稱稽古人之徳稽謀自天者非先生當之其誰耶所以資乎世教何等也然非盛世至治之澤煦育汪濊崇文右儒之典宣昭優渥盖亦弗克臻兹也則其瑞之所徵不亦大乎今先生日近九重之光夫人日享五鼎之奉心愉體適志樂顔怡齊驅於耄耋之境共迓乎悠久之福殆無難也矧其子姓羣從之賢忠孝友弟之行順承服養之禮又足以培衍而増益之哉内之而瑞于家外之而瑞于國四海之逺幅貟之廣欽髙風而景賢躅者皇多有之又將瑞于天下矣豈不有以彰我聖天子熙皥之治於無窮哉郎中君命工繪圖徵諸縉紳之詩即夫人懸帨之旦奉以為二親壽不鄙㑭序其上誼弗可辭謹以是復盖將執筆太史之後登諸瑞檢云贈楊州府推官陳君還治序天下國家之大禮樂刑政皆所以治乎民者也然古昔聖人率以刑為重葢以刑者侀也一成而不可變者也可不重歟嘗觀夫易聖人以通天下之志以定天下之業以斷天下之疑者也然六十四卦之中言刑者五噬嗑賁豐旅言其明猶所謂明于五刑象刑惟明之意也中孚言其信猶所謂獄成而孚輸而孚之意也其惓惓于刑者如此其至矣夫刑民命之死生國命之短長恒繫也故非明則無以得乎民之情非信則無以服乎民之心如是則刑不可得而平刑不可得而平則民不可得而治矣其如天下國家何哉故君子必有以逹乎易之理而後可以通乎刑之用不可誣也富順陳君惟敬蚤以俊秀游邑庠從博士授經獨有得于羲文周孔以及乎程朱之說遂以之取解蜀藩為第一人八舉進士禮部弗偶就選銓曹擢揚州府推官推官以刑為職一郡之所取平而赴愬者也君操行端潔處己寛裕湛然不滓如一鑑之懸確然有守如四時之行葢推其所學於平日者以修職而臨民以决獄而聽訟徃徃於兩造之際片言而决雖有得罪而去者亦無憾焉豈非所謂惟明克允者如此乎政事之暇危坐一室復以所學教成其子亦皆修飭行檢敦事學問以是經游庠序者三人可以見其家學之盛矣夫政事必本諸學問譬之有源之水其流無窮有本之木其榮莫遏君之以儒學而飭吏事既能使一郡無寃民矣兹以敭厯之久且逾三載奏績銓曹遂書上最而部使者復推其以為列郡冠賢聲籍籍洋溢都下他日進躋崇階以司天下之刑獄將使天下無寃民者於君有望焉尚寳司卿寳應仲君惟聲為予道君之賢需言以為還治之贈遂不辭而為之書壽憇菴李先生詩序成化丙午十二月二十有九日封翰林編修憇菴李先生壽屇七十維時其子賓之適以侍講學士滿三載復拜推恩之典進封先生如賓之官於是寮宷諸君子以先生壽祉荐臻寵命駢至莫不歆艶其盛相率賦詩頌之得近體律三十有六章聨書鉅軸將即是日奉以為先生壽湖南謝太常伯寛寫為之圖宛然一時朝廷錫命之榮家庭介壽之樂縉紳交游揖遜酬酢之美足以侈今傳後也謂余於賓之同年而進辱愛於先生者久虛其上方俾序以弁余不敢當亦不可辭也李氏本西平忠武王晟之後世家長沙之茶陵代有顯宦若雲陽先生初者尤以節義重于時至文祥府君始以戎籍徙寓京師迨今四世餘百年矣先生生而醇篤嗜學博貫經史兼通隂陽地理諸子之說喜吟咏精行楷尤善大書魁偉可至數尺波磔遒勁得歐顔遺意景泰初嘗獻所撰書法論召試禮部大為宗伯胡忠安公之所鑒賞即疏其運筆精熟以聞偶雜他疏中竟不獲報而罷胡嗟惋久之先生亦不屑也天性孝友授徒以養二親父處士公寢疾躬侍湯藥無頃刻離側如是者餘十年母夫人忽中風痰湧咽中縷縷不絶輙與其弟行潤甫交口吸取之連三晝夜不少休人以為難行潤積官至金吾百戸先生與之處友愛甚至姊贅而寡養之終身為婚嫁其孤子女者數人教諸子嚴而有法賓之以文學職侍從名重海内猶朝夕警厲弗置少子東溟雖甚愛必勉使務學平日未嘗親斗稱問市賈憐恤窮困不計無有冬月有丐者袒泣河側即馳取綿襦予之與人交一於誠信闤闠勢利之流絶不與接遇大夫士相知者一觴一咏情意周洽暇則坐憇菴中弟勸兄酬白首輝映子姓侍側雍雍如也盖有古人之風焉夫以先生之才之徳使少試於用其必典司帝制潤色皇猷以致位於通顯顧乃歛而弗施攻苦茹淡翛然韋布若將終身豈天固小否先生於前而將以大成其子於後也耶然若或抑之實則揚之若或屈之實則直之故今日之榮名壽考悠久盛大進而未已借使先生之力足以自致亦未必遽底於斯也嗟夫長松古栢挺拔於風饕雪虐之餘及其閱世踰紀聳壑昻霄具特立之體秉後凋之操視夫桃李之華早發先萎蒲栁之質易生先零者豈可同日語哉推諸先生殆近是矣詩亦有之樂只君子天子命之樂只君子福祿申之請誦是於賓墀之次以為羣玉先驅云贈戸部右侍郎呉君歸省詩序閩漳浦呉君道本既拜戸部右侍郎奉勅總理京儲之明年適先皇帝尊上聖母尊號推尊尊老老之典遂超常格得受誥追贈其大父雲谷父友松皆如其官母封孺人凌加封太淑人君仰荷恩命慶忭無已然居常獨念自成化丁酉之嵗起外艱入朝且今十有三年而太淑人壽亦八十一矣思一省覲邈不可得茲既叨遇殊典思燎黃以告先世之墓用昭休命於無窮者益惓惓也迺以今年孟春之吉齋沐具疏以請事下所司猶以君方奉綸命負重託經國阜民之任若不可以暫輟者上特詔允之且錫道里費給驛舟以行君踴躍拜命治裝南歸同升之士之在朝者醵餞於都門之外酒既行有執爵而起者曰呉君荐承異數皆非他人所能及者曷歌詠其事以附四牡之後以章千載一時之遇可乎衆曰唯乃合交游之彦賦詩贈之謂予宜執筆為之序不敢辭進而言曰人臣奔走王事而不得養其親故人君於燕饗之際敘其情以閔其勞此四牡之詩所由以作也今即其詩考之有曰不遑將母又曰將母來諗而疊山先生以謂聖人以孝治天下聞有以養母來告者安得不俞其請乎夫人臣方意於公義之重而不敢言人君乃即其私恩之切而為之言於是公私可以兼致而忠孝為之兩立此非泰和之世烏能以與於斯今太淑人以八袠之年垂白在堂祿養就豐命服有耀而道本違逺之餘名位日崇委任日重誠不可以一時捨之而去故十載之間俛効勞勩亦不敢一言以及乎私然將母之情展轉于其中者抑豈以一日而忘之哉洪惟聖天子逺法虞周懋隆孝治一聞有言煥然賜允是則君之自處可謂先公而後私朝廷之處君可謂先恩而後義矣謂非千載一時之遇可乎雖然先儒有云君之於臣能體悉之如此則臣之所以報上者當何如哉古人事君得以展布四體而死生以之者亦以人君感之盡其道也聖天子體君之情俞㫖亟頒於所謂弗遑者君既遂其歸榮矣則夫式遄其來以圖報塞於所謂靡盬者其可弗念之也邪昔君以明毛氏學取髙第於斯義也講之熟矣聊因諸君子之意引而申之以致望焉詩凡若干首贈大宗伯劉公致仕榮歸序聖天子嗣大厯服之初肇禮百神格于上下維時涪陵劉公凌雲以太子少保禮部尚書寅相祀事天意潛孚聖心昭恱眷顧于公益用優渥未㡬公以足疾在告具疏乞歸田里上不許命醫遣使時往問賚公拜恩感激勉起視事而疾弗遄愈至是疏凡五上辭益懇切上挽留加篤而公志卒不可奪也乃優詔許之俾得乘傳以歸復命有司月有廪既以備贍養嵗有夫𨽻以備使令殊典荐頒縉紳歆慕以為此誠千載一時之遇也於乎休哉公行有日所與為寮属者若禮部侍郎丁公輩相率祖餞于城東之館酒既行坐有諗於予者曰人臣委質事君視吾力之所及公之足疾㣲恙春而劇秋而瘥其常耳非若衰憊之餘力不足以任事而强焉以居者比此公之未宜去者一也古者七十致仕過則貪不及則矯公年未六十翩然乞歸無乃矯俗之過歟此公之未宜去者二也孔子曰君使臣以禮臣事君以忠朝廷之於公五䟽而五留之所謂克慎禮儀方切委任勉修職務不允休致者惓惓聖諭之中可謂待之有禮矣公獨不能勉竭一日之忠若古人之鞠躬盡瘁者以圖報塞而必遂其私决一去之為果哉此公之未宜去者三也予聞而嘆曰子之言然抑獨不思公之所存盖有出於三者之外乎夫世之仕者重内而輕外以得失為忻戚故俛仰一時茍且以就功名之㑹其能以盈滿為懼止足為戒土苴富貴浮雲軒冕者㡬何人哉今公不待年至而遽乞骸骨以歸視諸在内者重則在外者甚輕也其賢逺於人何如耶繼自今將使士皆厲難進易退之節以為髙朝廷皆得耿介不貪之才以為用盖自公之歸而倡焉其於世教豈曰小補而奚必於公之留也昔宋龎莊敏公藉請老或謂公精力克壯主上注意方厚何引去之堅公曰必待精力不支明主厭棄然後去是不得已豈止足之謂耶錢宣靖公若水亦謂士不足以自重盖未嘗有秉節髙邁不貪名勢能全進退之道以感動人主者即以母老請解機務章再上乃許時以急流勇退稱之二公之髙致公其有焉矧世之仕者以官為家退則無所於歸公所居涪陵為程伊川黄山谷諸賢游咏之地有荔圃鉄匱八景之勝先隴之在朝陽者前有峭峰可眺下有嘉園可備祀也别墅之名麻堆者有泉可溉有茶果蔬圃可採以擷也舍之側有三然之亭江之南北有别業者四嬉遊可以娯暮齒耕釣可以供卒嵗也公亦見夫不欲歸者夢想舊故恍然如遺不早歸者迫逐衰晚頽然靡及此公欲歸之果其將樂以終身乎昔唐白居易退處洛下竹木臺榭日與酒徒琴侣詩客遊著醉吟先生傳賦詩千餘篇宋范景仁既致仕徑行入蜀歸至成都日與鄉人樂飲遂遊峩眉青城山下巫峽出荆門作詩二百五篇二公之髙致公其有焉矛於是而有以見朝廷之處公也厚始終之恩足以為人臣勸公之自處也决髙尚之志足以為後進法鴻飛㝠㝠可望而不可及矣於乎休哉酒盡欲别執筆惘然青谿漫稿巻十八
