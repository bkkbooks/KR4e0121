body:
  text: 青溪漫稿卷二十二明倪嶽撰墓表文林郎四川道監察御史張君墓表成化乙巳閏四月二十九日監察御史張君世用卒於南薰客舍豫既與諸友往哭之其孤立將扶柩歸葬乃奉君同年友中書舍人楊一清所為狀蹐門請文以表諸墓惟君自正統丁邜充邑庠弟子員至成化戊子始克舉于鄉遂登壬辰進士拜太常博士簡授四川道監察御史歷官才十有四年雖一再遷不過七品得年四十有九而已平日所抱負自視當如何卒亦不能究厥施豈非命耶君幼頴敏讀書過目成誦學易於鄉先生深有造詣年十七試藝京闈弗利督學憲臣恆竒其文以魁解期之文名燁然起淮揚間然往試輒北蓋久而後捷云君負才識有幹局初試政戶部協理軍儲給賞河南潼關有功官軍因事裁畫時稱其能為博士有事郊廟禮度間習每以郊恩膺白銀文幣之賜為御史巡視光祿不刻不縱出按福建鋤惡植善風裁凛凛聼獄明决庭無留訟審録重刑多所平反嘗奏黜閩帥之不職者上從之一道肅然閩故多文獻憲節所至訪求先賢遺跡存問其子若孫多作興而振起之尤以重學校敦風化為首務登覽山川感今懷古不廢吟咏時以勞勩得疾猶强起巡歷弗敢自逸及瓜之日案牒一清然亦未始以才辨自雄既抵京師疾小愈忿時之冒進者多名器淆冗即具疏率同列論之朝廷嘉納焉甲辰地震京師君復欲條舉時政之弊者以聞會疾作乃已自是雖歸卧床褥乃心王事未嘗少置每與人言政事得失人才賢否上下古今治與亂有不當詞色俱厲氣勃勃不平如是者雖經日不厭人勸之亦不止以是疾益劇今年春上疏乞歸事下吏部未及覆可而君卒矣君性至孝能事其親疾且殆獨呼其子曰吾死不足恨獨吾二親七十在堂不及終養所恨者此耳君明爽徑直遇人無賢不肖皆歡然無間而胸中了不可混至與朋友處所論與事是是非非輒靣加詰難不為退言故久而益信視義所在必竭力赴之不復顧忌周窮賑急恆恐不及兩任皆清要然未嘗增拓故業服食儉朴如未仕時惟於賔客之奉輒致盈腆觴酌笑歌必盡其情及其持憲嚴肅雖至親亦不可干以私眀易學有經指授者輒能取科第為詩文㫖意超逸格律深穩而於辨識體裁評别髙下皆出人意表識者亦以君為知言所著有竹西稿凡若干卷藏於家君諱稷世用其字别號竹西居士世居揚之寶應孝義鄉曾大父谷成大父仲仁父彥明以君貴封太常博士母鄭封孺人配孺人許氏户部檢校文誠之女子一曰立敏而知學女二適古文陸全其幼在室其生為正統丁巳二月五日葬以卒之年某月某日墓在某之原君之中表弟尚寶司卿仲君惟馨豫友也故君之交於豫亦深以平日所聞於惟馨稽之於狀其行誼表表可書以傳者蓋多矣惜余不能以盡之也若君者豈非慷慨不羣之士也耶君子謂君之志極髙才極贍使大所遇其所建立豈不偉歟而年不待之也悲哉是為表安成王處士墓表處士諱緝字紹熙姓王氏其先撫之金溪人始祖德載李唐時刺史吉州按歷安成南里之金田愛其地勝因家焉傳至十六世孫曰鳯儀生文源文源生命仁命仁生敏忠則處士之髙曾祖考也處士生而警敏氣豪邁有志事功家素饒於資甫弱冠即出商逰荆嶽間遂寓居華容之板橋拓産益盛每得一美味必寓歸二親度未及嘗不以入口嵗時供饋者往來相望於道每歸省於家克勤子職二親安焉嘗謂其配劉曰經營在外以供甘㫖吾之事也朝夕供養不違親志汝其任之故處士久處於外無內顧憂亦劉之能相之也成化甲午有司選充萬石長處士歸督賦有方催科無擾有逋負而貧者輒為代輸故上足公稅下逺私怨人皆賢之壬寅楚民大饑處士應詔輸榖七百斛華容陳尹將舉章服榮身之令處士曰某不敢當必不得已願移吾父陳稱賞欲成其志而二親相繼卒矣奔喪歸號痛幾絶葬祭一以禮𢎞治戊申楚又饑處士輸榖視壬寅倍之時知縣梁澤欲循例授以散官處士曰公家急難有財者輸委臣子職也况所輸者楚地之産敢以此冒寵乎力辭不受梁歎服焉時逺近居民恃以舉㸑者數百家流徙日過其門傾所有濟之不少吝賴以存活者甚衆既而以寓居卑隘將事營拓由是蒙惠者悉來趍役不約而同落成之日仍計功以償人尤感德戶部侍郎劉公大夏程公萬里布政使王公儼邑人也聞而嘉之皆為詩文以紀𢎞治壬子甲寅嵗復連歉處士復出白金一百六十兩糴榖以賑視壬寅不啻倍蓰矣邑有板橋官道東西二橋嵗久傾圯行者病涉處士獨任修葺蓋捐資數百金知縣聞君嘉其義親詣賞勞仍令儒學教諭舒圭為文立石以識至今名之曰安成王處士橋人有急難告乏者周給恐後貸者貧不能償輒焚其劵好禮接賢士過逄觴酌必盡歡乃罷待鄉黨處鄰里曲盡恩意丙辰嵗以久客於外浩然思歸即日趣裝以行逺近送者遮道至垂泣不忍捨抵家不旬日即嬰疾以十月既望競卒人皆謂得正首丘實隂德之報非偶然也其生為正統庚申二月望後二日享年五十有七葬以某月某日墓在某山之原配劉氏有淑行生子一君珮能世其業女一裕真孫男二長朝彥補縣學生次朝用孫女二葬有期日君珮走南都懇于大司成劉公奉其族兄刑部郎中懋中所述狀來請豫文表諸墓上之石劉公其邑顯者懋中族子姓其言處士之賢宜信不誣乃為按狀序次之而為之表曰昔漢卜式以田畜為事方漢事胸奴願輸家財助邉復持錢二十萬與河南太守以助貧民當時北邉有釁西河嵗惡富豪皆爭匿財惟式尤欲助費故朝廷獨尊顯式以風百姓而史亦稱其拔於芻牧亦曩時版築飯牛之朋至與倪寬並列亦賢矣哉夫世之擅利以厚殖忍物而吝豫者何限若式所行誠不可以多得今觀處士雖於客寓之逺不異鄉邑之厚捐資賑貸至再至三惟急於施而遂隱其迹獨有其實而亟辭其名則式之崇階顯爵率繇於此不已泰乎其於處士之所存宜非所能及矣語曰不謀其利不計其功處士有焉故豫特論著之以為來者勸云是為表明故承事郎順軒錢君墓表南京少司空徐公公肅抵書於豫曰吾錢氏之甥奉不幸以疾卒其子奎將卜吉以葬既得里姻李司成為志其藏敢乞一言表諸墓道以示久逺謹礱石以俟豫惟司空之請切而勤司成之志核而信乃受而序次之以為之表曰君諱奉字思孝姓錢氏别號順軒系出吳越武肅王之後有諱邁者仕宋守通州子亨父從建炎南渡家常熟之奚浦常熟之錢相傳自亨父始至諱本忠者後遷祿園以仲子衡貴贈吏部稽勳主事自是族聚而居甲於一邑子伯璵隱德弗耀生子景豫少頴敏年僅二十三而沒則君之曾祖祖父也母徐氏贈副都御史同邑敏叔之女景豫沒時君僅三齡實惟母氏撫育保護劬心瘁力君亦早慧有志繼述卓然樹立老成慎重鄉長者咸器之錢氏族大而繁競以豐阜稱君方幼孤弗任勞勩處乎其間若無所事事者而故産開拓田園之闢輪奐之美日盛而月增人咸謂景豫之後為有人矣君性孝友喪父時祖母周尚無恙奉養甚偹及沒喪葬亦盡禮痛父早世言及輒悲建祠堂以奉四時之祭竭誠殫慮務於精潔事母承顔養志克盡子職極力顯揚母節有司具以疏聞成化初有詔旌表其門君慨然曰吾無以報國乃捐粟千斛以資賑貸得授承事郎從六品散官君真實無僞義理昭融而不事表襮應事接物咸得其宜人有不平者多就質君一言而决靡不信服雖處富足而儉於自奉至於義舉則汲汲恐後祖墓頽圯時加修葺龎趙寡姑恆迎養於家姻䣊之親與閭里之賢者困躓則扶植之患難則拯濟之以至施善藥以己人之疾者給槥以葬人之死者捐衣食以豫人之饑寒者修輿梁道路之病人之行者蓋不遺餘力焉邑嘗發民濬黃泗浦之淤區畫供餉君獨任之其行義蓋如此君年四十即不入城市惟以治生教子為事諸子讀書飭行克亢厥家家僮千指各授以業外內斬斬賔友過從禮意欵洽士大夫咸樂親之以𢎞治乙邜九月十四日卒臨終惟以老母為念不及其他距生為正統壬戌三月五日得夀五十有四而已初配龔氏先卒繼陳氏子男八奎壁翼軫婁參星亢奎義官翼國子生女三孫男三儼侃偉女八葬以卒之明年正月晦日墓在來鳯里涸岡之原以龔氏祔嗟乎自古世家巨族衣冠纍葉益隆而弗替雖祖考積善之基深厚而不拔亦其子孫多賢繼承之不乏而後能然耳故古之論世族者嘗謂敝化奢麗萬世同流蓋怙侈滅義者將由惡終而惟德惟義惟以永年固其理也惟錢氏自吳越有國以來五百餘年于茲子孫散處天下者夥矣而吳中之錢獨盛若思孝君又其表表者然其所以稱賢于時則惟以孝義之行勤儉之德泊然以居豐亨裕大之業所謂世俗驕侈之習一鏟而去之譬之喬木之植其本既固其枝幹柯葉日蓊鬱而暢逹者由於培之者之有道故也錢氏之澤其有涯哉故豫因徐公之請嘉思孝之行有可書者遂大書而揭之以為世家之子孫告俾亦知所式焉是為表墓志銘江西永豐縣儒學教諭楊先生墓志銘成化庚子九月一日教諭楊先生卒嶽走哭之惟先生少與先考文僖府君為同忩友先考無恙時嘗為之作傳為著朋友相知之誼故叙述加詳蓋曰先生諱逹景通其字楊其姓也山西平陽之臨汾者其世族應天之江寧則國初之所遷也諱伯林其祖純篤端厚為邑耆宿為鄉飲上賔諱彥用者其父也先生事彥用及母范克盡子職沒能葬以禮兄執役京師事其嫂尤謹且為嫁其女如已女其孝友之行也宣德丁未從大理胡公槩所選拔俾游京校學日益進為詩文有竒思知名公卿間卒業太學大司成重其賢同舍者推讓之及門授經之士多所造就雖侯門世胄之子亦各成其材為時名臣其修之已而及之人者也既久為場屋困年益長乃自太學援例而起俯就校官之選景泰乙亥始得司訓溫之永嘉居九載德孚教明士子懷服守宰以下亦知尊禮去之日人不忍捨以績最進秩永豐教諭其教永豐如永嘉未幾即謝事歸則其小試於仕者也夫進不偶於有司仕不竟其所負位不稱其德落落才賢齟齬以沒固其命也春秋七十有一永樂庚寅十二月二十五日其生也配某氏有淑行曰宗錫曰天錫京庠生其子也都城之南鳯西鄉之原其墓卒之年某月日其葬也銘曰修髯豐頥有偉於儀韞珍其竒出也後時卒尼于施伊後之遺山東東昌府臨清縣知縣顧公墓志銘成化十八年六月十六日知縣顧公卒于臨清廨宇越十有二日甲子訃至京師其弟僖聞之泣走告余相向哭盡哀已乃問故曰望之夕既飯而浴出宿外寢比曙卒有所中遽卒嗚呼痛哉明日僖奔公喪俾豫為銘以葬公豫妻母弟辱愛最深往來京師日輒主豫家情好深䔍也去年春公自滕始遷嘗墜馬傷足在告者數月豫心憂之九月豫入朝道臨清見公于東嶽祠歡聚信宿公戲擲杖以行示豫無恙期以十月上任别來屢以書問之又數詢諸南來者聞公初政之詳不獨喜其足疾之瘳也豈意其遽至是哉公諱俊字廷秀别號肅庵姓顧氏世為蘇之吳縣人曾大父某大父至善封中書舍人考諱謙禮部精膳主事妣安人朱氏公生而聰頴凝重精膳卒時甫成童哀毁盡禮煢然如老成人安人嘗遘疾頻殆公奉湯藥惟謹夜輒焚香籲天乞以身代疾尋已甚稱之少長從同邑嚴教諭翰授朱氏詩大有造詣兩舉秋闈弗偶成化改元詔求遺才縣尹田某首以公薦天曹試在優等試事冬曺亞卿博羅李公優以客禮庚寅拜兗州府鄒縣丞綜理馬政邑羣長輩素豪猾每刻民以自植馬耗不能償民日益困殆兩病之公下車首擲其姦惡者懲之其弊大袪律已亷公吏民畏服未朞月償耗馬千餘匹邑不知擾時方迎母就養尋卒於官即日奉柩南歸民上章乞留者再格於例弗果起復調滕縣滕於兗為巨邑素號難治邑有守禦千戶所所官軍恃其驕悍視有司每挾其短長而制之去官之日率閉關攘奪輜重以為利習為故常民茹其虐莫敢誰何公始上邑有盜劫人李百戶者方職警捕既受盜賄而縱之顧執邑民誣以掠其財公聞而奮身往直之李大以為恨乃脅其長將交搆公以禍公密詢其平日所為不法事聞之朝下藩臬亷得實悉置諸法别選其良者以蒞所事蓋數十年之蠧一舉而去之民胥慶焉壬辰山東饑巡撫都憲牟公推公能俾易粟東南就饑者所在而賑之民賴全活者衆德府奏建宫室藩臬檄公董其工二年始畢武城縣尹缺復命公署其事所至藉藉有聲部使者交章薦其賢辛丑三月天曹以臨清重鎮當南北之衝往往為邑者非貪則暴迄無善政茲非審擇其人不可乃特疏舉公超拜臨清知縣為丞蓋未九載人以為非公固不足以致此也時邑令缺久事叢脞不治使軺往來坌集需掊百出民亦貿貿無所赴訴公至率五更即出視事退食公堂不及私室迄暮乃休剖决如流獄無淹繫比民苦供億使檄至隨所欲悉取於民民益不堪公皆預為區畫以待民不預焉至如首新學宫作興士類鋤强植善周窮濟乏他善政尤多民方如赤子煦煦之得慈母而公不起矣惜哉公性至孝處諸兄弟極友愛仲兄廣東僉憲廷望有文名雅愛重公公自幼從之逰家學所得尤深精膳公既沒家漸落公克自勤厲折莭事學與今狀元吳元博繡衣林朝信諸公游處故能切磋有成精膳公子四人偉俊傑僖皆挺挺振拔而公尤傑然以出者也配吳繼張子一曰某早夭以正統丁巳六月一日生得年四十有六卒以無嗣嗚呼痛哉公墓在邑西陽寶山祖塋之側葬以卒之年某月某日云銘曰宜嗣而絶方進乃止彼賢則然孰主張是鳯羽中鎩梟音髙翔茫茫者天嗚呼何傷噫大明故翰林院侍讀學士贈學士諡文僖張公合葬墓志銘正統己巳秋北冦犯順擾我邉圉英廟赫怒親率六師以征時內閣重臣扈蹕者二人皆宿德重望上所簡命者其一則姑蘇張先生也師次土木敗績先生死之實是嵗八月之望得年五十有五而已嗚呼痛哉既而朝廷録死事之臣特贈先生翰林院學士階奉議大夫賜諡文僖遣官即其家以祭録其二子恩至渥也後三十七年為成化已巳其季子太僕寺丞翔奉先生繼室太宜人宋之喪歸金陵鳯臺鄉西顧村祖塋之原啓其先配孺人王之竁以祔始具先生衣冠神主合窆焉謂嶽忝通家之義俾一言以銘諸幽嶽惟先少保文僖公以正統已未及第入翰林時內閣楊文貞文敏文恪三公謂之曰汝同庠張先生士謙文章德行為時之望汝其朝夕相切劘可也先生登進士已二十有五年方為翰林修撰所居既相邇日往還益密每論文講學鑿鑿不妄先公敬服焉嶽自為童子時恆為嶽言之而老成典刑逺矣嗚呼惜哉按狀先生諱益字某别號蠢菴其先吳人洪武初徙閭右實京師遂為應天之江寧人幼而聰頴儀觀豐碩讀書過目輒成誦甫成童下筆為文辭咄咄過人稍長入游應天郡庠登永樂乙未進士以精鍾王學授中書舍人受敕命贈考豫如先生官母倪妻王皆封孺人宣德初預修文廟仁廟實録成賜白金綵幣進大理左評事正統初預修宣廟實録成賜白金綵幣進翰林修撰九載進侍讀學士侍講經筵尋召入文淵閣參决機務日見委任特賜金帶錦繡衣以寵之明年而先生遇禍矣先生先配孺人王監察御史同庠賔之女淑德克相稱於閨門具於先生所撰志其卒為正統庚申六月望日享年四十有五後以翔貴加贈宜人繼配宋封太宜人貞順自將一節靡忒撫諸子女不異所生其卒為成化甲辰正月三日享年七十有三先生䔍於孝友七嵗喪父賴母倪守節以教育之倪性嚴先生承順無違供養亦偹撫弟晋極有恩義庭無間言先生於書無所不讀文章豐縟坦易類其為人居安朴儉雖貴顯不異儒生詞翰名一時四方求者坌集得片紙隻字什襲以去所著文集凡若干卷藏於家嗚呼先生碩學雅度足以經濟邦家表儀朝著然弗䆒厥施竒禍中沮遂使從容廊廟之賢往當疆埸搶攘之事忠義所激竟以身殉嗟亦烈矣先生有男子二人長􅀈以䕃授鴻臚序班進中書舍人大理左評事直文華殿卒次翔亦以䕃補國子生授四川簡縣知縣進今官有亷能聲女子四人長適都察院進士鄒和次適鄉進士周宗次適太僕寺卿朱奎皆王出也又次適武學生謝賔宋出也孫男三弼麒麟孫女三長適章丘縣丞假璟次適錦衣千戶焦裕次適內閣中書舍人劉棨曾孫女一尚幼惟昔出京校官翰林者惟先生與先公才二人耳及朝廷賜先公諡適與先生同殆亦非偶然也矧嶽又嘗與翔同講學於是銘也其敢以不文辭銘曰先生之文海澄山崇先生之德天和日融先生之節抱義死忠鳯臺之原龍江之東衣冠儼然兩淑挾從歸兮故鄉乘雲馭風用世弗竟裕後則豐揭潜琢辭以詔無窮大明故榮祿大夫後軍都督府都督同知陳公墓志銘榮祿大夫同知後軍都督府事陳公奉命鎮守通州威德兼著盜賊屛跡居民安堵行旅晏然上下倚之為重在鎮三十年如一日以老乞歸罷鎮者七年為成化乙已二月丁邜卒於京師之第家嗣珦以訃聞上甚悼惜遣官諭祭工部營墳以葬復命珦嗣公舊職為指揮同知蒞事南京錦衣衛蓋異數也葬有期乃奉中書舍人黃璨所述事狀謁豫請銘諸幽先少保文僖府君官翰林時常與公往還余因得拜公每瞻其容止之彊毅聼其論議之嚴重恆竊識之而今則已矣惜哉按狀公諱逵字𢎞道姓陳氏世為應天六合人大父晟自小校起從髙廟定天下纍功至袁州衛指揮同知坐事落職卒於京父啓坐纍謫戍大寧從文廟靖內難復纍功至忠義左衛指揮同知守遵化有功進階懷逺將軍子孫世襲還京師以卒宣德丙午公襲父職為指揮同知仍蒞忠義庚戌奉命督造黃船于南京景泰改元庚午大司馬遴選充中軍營把總五月以薦進署都指揮僉事坐五軍左掖營時承已已兵變之後通州密邇京師地大且重往往盜賊竊發厪廟堂之憂適鎮守員缺僉謂宜得知勇有為者始勝其任於是大司馬以公名聞遂進實授都指揮僉事奉敕往鎮兼督天津諸衛地方壬辰有白金文綺之賜天順改元丁丑英廟復辟賜勑奬諭有克效勤勞之語且有金幣之賜戊寅録其纍捕强盜功進都指揮同知庚辰上念公久效勞勩特賜白金十五兩綵假二表裏鎧胄弓矢各一辛巳録其纍捕劫殺兵馬范質等强盜薛英等及越城叛賊之黨都督哈哈等三十餘起授以流官誥命成化丙戌今上即位之初重公舊臣益隆委任復録其自壬午迄今前後所捕強盜六十餘起計二百一十五名功績惟懋遂進擢榮祿大夫後軍都督府都督同知領鎮如故時以直𨽻各衛京操馬匹往來馳突飼牧不時以致瘦損遂命兵部同總兵官遴選精兵二萬官給馬仗令回各衛以便飼牧其天津通州七衛者則勑公提督訓練云庚寅八月久雨水溢天津以北河堤衝决水利分泄舟行維阻朝廷憂之特命都督歐信工部侍郎李顒同公督京營并順天等處軍民夫役築塞公同心協謀工賴以濟壬辰上念公久勞於外特遣中貴以大紅織金蠎龍紵絲紗羅衣各一襲馳至通州賜之人嘖嘖稱嘆以為朝廷優禮勳舊如此之至然亦公之忠勤足以迓承之也己亥公以年至乞休疏上者再上重違其意允之至是卒距生為永樂辛邜十月十有二日春秋七十有五先配夫人林氏錦衣指揮某之女繼配夫人王氏左軍都督某之女側室四人子男八人珦琇琦瑋璨玹璟璥孫男七人孫女六人曾孫男一人以卒之年七月某日葬於城北昌平之原從先兆也公儀觀魁傑外和內嚴忠孝之誠端一無間與朋友交信義懇切靣折人過不為茍合蚤喪父賴母撫鞠遣從里社師讀書精敏不懈舉動如成人母慮其以勤致疾恆泣止之公抱持膝下亦泣曰兒奉獲慈訓不墜先業即陳氏之澤逺矣脫或縱逸何以自立聞者竒之處諸兄弟皆䔍恩義其在忠義居僚友間和而不隨多所規正有豪卒恃其狡獪挾持官吏者公即重繩以法衆服其能祭酒李忠文公冡宰王文端公皆公先執友公恆侍請益二公亦喜公日騖於進惓惓啓迪既領黃船事告别以行皆以亷公勉之故公於道路所經常廪之外一無所受至於鳩工庀才繕度有法事易集而人不擾及抵儀真壩官吏弗謹舟有損者懼得罪思夤緣賂公以祈免公盛怒斥之明日諭之曰汝之不謹罪不可宥然亦誤耳苐修治之尚懲其後也莫不感悅服公之明比還二公聞之躍然曰陳氏有子矣景泰初北冦陸梁為邉患少保于公為大司馬與公語大悅資其贊畫故一嵗三薦而位益崇時論惟允其鎮通州以敦風化正民俗為首務前政務為姑息事積不治公一矯之以嚴信賞必罰逺邇畏服時境內多盜公慎擇才勇之士分督悍卒踪蹟捕治有所獲即置諸法由是一道肅清民至於今思之所鎮當水陸之衝公卿大夫之賢薦紳韋布之士日往來其間公未嘗不曲為欵納咸盡其情故公之賢聲亦藉然於時罷鎮家居手不釋卷見古忠義之士擊莭慷慨惜不與之相上下遇奸惡輩怒氣勃勃思唾其靣善善惡惡蓋天性然也䔍於故舊有所匱乏賙貸惟恐後諸子森然玉立莫不修飭行檢無貴富習人固知公義方之教如此卒之日猶呼諸子訓之曰吾自幼至老荷國厚恩誓竭心力以稱任使猶懼無以自塞爾珦其服勤職業諸子亦恪恭朝夕庶乎無忝於前人言訖翛然而逝於此亦可以見公之所存矣噫方今朝廷內修外攘經理邉圉思得方叔召虎之臣宣力四方以佐戎辟而如公老成忠實日就凋謝不亦重可惜哉故為之銘曰陳氏之先載仆載興有偉榮祿克纘以承﨣﨣帥桓三以薦升節鎮通州閫寄是膺威名聿昭姦宄畢懲皇曰休哉鍚豫頻仍宜進而止德望彌增豈不大施斂其才能繄後之貽子孫繩繩昌平之封如丘如陵太史銘斯百世其徴大明故奉政大夫修正庶尹南京尚寶司卿白君墓志銘南京尚寶司卿白君既上八日以前户部郎中秩得通理滿九載即解任獻績馳赴闕下未及入覲竟以疾卒於南薰坊之寓舍鄉友工部毛員外珵經紀其喪以歸既歸將葬其子金復緘其邑人朱昱所述狀抵書於君僚友吳主事彥華俾來請銘君豫成化己丑考禮部會試所取士惜羣早世銘烏可辭按君諱玢字宗璞姓白氏其先本洛陽人當宋南渡時有諱繼升者始遷於常占籍武進因家焉曰明逺均寶守中君髙曾祖也考希原以君貴贈承德郎户部主事加贈奉直大夫戶部員外郎妣錢氏初贈安人加贈宜人君生而聰敏少喪父母落落無所依遂挾書往金陵之句曲山寄跡朱陽館從黃冠師游忽感悟自奮乃之京師學於翰林編修徐先生文式及今閣老大宗伯徐先生之門久之大有所得補府庠博士弟子員益刻厲問學竟以書經領成化戊子鄉試明年試禮部賜進士出身觀政都察院授戶部浙江司主事主納通州軍儲以勞疾賜告歸抵家踰年復起轉貴州司主事主納內庫銀絹壬辰奉勑給賞遼東邉軍往時銀積羡餘所司多所侵匿君悉歸之官癸巳南京公幹遂勘理浙江諸路鹽鈔時權貴私索纍數十萬商人大沮君極力裁革人稱便焉比還升本司員外郎甲午夏持節充副使往湖襄封王及妃有所賜豫悉辭不受升陜西司郎中癸邜朝廷以運舟稽緩命君催督首責香藥綱運之為奸弊者其徒斂避事賴以濟山陜歉荒人相食議舉納粟之令他如僧道度牒生員入監各以差等入銀以實官帑其所出納皆君主之人稱亷公未幾遂有南京尚寶之命君體素瘠而才識豐贍遇事立辦談議風生故為時所推許性孝友自傷蚤失怙恃因名其讀書之軒曰思親示終慕之意事諸兄敬愛處友和易持身謹慤人未嘗見其過初在鄉里或嫉其新進君謙以處之既仕貴顯益置不校人多其有容嘗買婢見其有戚容問之知其官人女也既養以為女擇良以配之兄姊老分俸以贍姪鎧為郡庠生即捐俸金入官俾得援例補南京國子生其行義多類此君起孤寒矻矻嗜學無所慕乎其外既仕久始買宅于興仁坊之西凡祖遺業悉與兄姊居之既進列卿復得南畿密邇鄉邑乃於興仁之第築圃鑿池種竹構小軒三楹榜曰隔塵且曰吾得釋去繁劇將營莬裘計焉豈意遽止是耶惜哉君生於宣德庚戌四月十三日卒於成化丙午四月六日得年五十有七而已配髙氏纍封宜人子一即金補郡庠廪生積學有文能世其業輯君平生之作有逺行稿思親軒稿若干卷藏於家其葬以某年某月某日其墓在邑某鄉之原銘曰其體則癯其才則豐噫始之困而仕之通期進于崇而遽以終我辭銘之昭揭無窮大明故驃騎將軍錦衣衛掌衛事都指揮使朱公墓志銘𢎞治庚戌十二月朔上視牲南郊公職侍衛得佩刀翼輦以行走趨過勞比暮疾作越十又五日夜漏下二鼓遽卒所與為僚屬及族里親舊駭愕奔視相與嗟咨灑泣朝之公卿大夫亦皆吊祭相屬傷善人之奄忽也訃聞上悼惜遣禮部諭祭命工部治墳以葬蓋特恩云葬且有日其孤宸奉公之友田侍御所述狀泣請余銘以掩諸幽按狀公諱驥字尚德姓朱氏世為京邑大興下馬社右族至曾祖大始因子貴贈武德將軍管軍正千户妣郭贈宜人祖喜洪武中起家儀衛司積功至錦衣衛右所正千戶卒考鏞嗣未幾亦卒俱以公貴追贈驃騎將軍都指揮使祖妣張妣丁俱贈夫人公生而氣質龎厚性寬大不喜刻核甫成童即從栝蒼潘流清習儒生業長益嗜讀書喜學問樂與學士大夫游痛蚤失怙事母極孝養既嗣職掌所事公勤明敏藉然有聲同列久更事皆讓不及也嘗使湖浙一毫不茍取少保兵部尚書于公方在重位名知人有女婉淑為擇佳偶聞公賢乃以妻焉天順改元丁丑遂坐纍謫戍威逺資産蕩析公不以為意知者賢之甲申蒙恩召還任成化丙戌以兵部薦擢指揮僉事佐理衛事戊子畿內盜不時發敕公提督官校捕緝時以五城職巡邏者率玩愒怠事乃命吏部偕公遴選去留擇才以充不拘故常而公復摘發渠惡逺近肅然辛邜民饑攘奪以茍朝夕所司逮捕得斗粟者輒坐死犴狴至不能容公爭曰此窮民非得已者其情可憫也獄上多從末减有妖人真惠者僞為書以誘惑同類多不道語事覺逮繫數十百人皆當死公曰可罪者獨惠耳餘愚民何辜事聞惠竟坐死餘釋戍邉有衛卒從公者當畨休聞其鄰偶以妖書傳觀者亟告公期因詗發得賞公斥曰此妄耳取書焚之滅其迹仍遣卒歸諭其父老始大驚悟散去先是公在謫北冦入邊因從總兵官髙陽伯往禦之就陳斬獲酋長巴圖王以歸至是兵部論功進世襲指揮同知戊戌進指揮使命掌衛事尋進都指揮僉事甲辰上察公忠實可任特敕兼理機務公小心慎密未嘗妄興一事亦未嘗輒因事奏遣官校使外上下安焉冬進都指揮同知前後所積擒捕功甚夥公有所奏列率推諸官校以故從公蒞事者多纍階至顯官而公不與也丙午上嘉公勞勩特詔褒奬進都指揮使仍掌衛事纍荷繡春刀綵幣寶鏹時新珍味及續綱目諸書御製連環諸詩之賜每進講經筵輒得入侍與宴嵗南郊大祀輒蒙賜蠎龍衣以為常公在位久恩眷優渥委任甚至公亦端確有守不為勢利怵嘗奉命撻忤㫖者或誣公用小杖上怒命中使詰責數四公具以實對卒不易自持甚謹而待人極恕諸屬中有可用者維持與進任之不疑凡有重獄茍可以求其生者必為之盡心焉邇以兵部遴選軍政大司馬獨奏疏稱公老成得體敦厚不刻時以為得其實云公生於宣德庚戌八月二十四日得夀六十又一配于氏封夫人以淑德相少保公女也子男四長即宸次宏中書舍人于出次完翰林院四夷館秀才次宥尚幼側室劉出女一嫁義勇右衛指揮同知王軏側室王出孫女二墓在下馬社原葬以卒之明年二月某日嗚呼世之仕者以得喪為欣戚萎薾奪氣揮霍動色轉移俄頃耳甚則陵轢扇毒取快一時其為人賢不肖何如邪公窮之在謫逹之在朝其內其外終始弗渝寵任隆赫處之泊如也書有之無依勢作威無倚法以削寬而有制從容以和公於此蓋無愧焉余知公惟素是固可書以銘矣銘曰德厚而寬亦信以端惟時則賢退無所絀進有可述惟賢則然功也弗矜寵也懼盈益慎以䖍宜茂遐福奄茲不祿胡奪其年恤典優崇噫孰與同有命自天我撮其槩琢石以載于公之阡南京前軍都督府掌府事定襄伯郭公墓志銘公諱嵩字惟賢姓郭氏其先鳯陽臨淮世家始祖某追封汾陽伯髙祖陸曾祖英國初從髙廟起淮甸纍功至武定侯追封營國公諡威襄祖鈺追封定襄伯父碔尚寶司丞季父登由勳衛進爵定襄伯追封定襄侯諡忠武先是忠武公乏嗣以公器識不凡具名上聞請以為後制可景泰間拜散騎舍人侍衛禁中成化壬辰忠武公薨遂嗣伯爵癸巳命分督五軍營尋奉命持節充正使册封沂陽王于荆州乙未命往北直𨽻山東河南印録馬匹丙申再奉命持節充正使册封趙王妃于彰德丁酉上以南京根本地新江戰艦尤保障要務也乃命公掌南京前軍都督府事專督操江戊戌春痰疾遽作薨於官舍守偹重臣以聞上震悼輟視朝一日遣官諭祭者再工部營葬事給舟歸其家皆殊典也公資性明逹軀幹魁偉自幼喜讀書好吟詠樂交接賢士大夫忠武公文武兼資名重海內然性剛介少許可既以公為嗣愛養偹至擇名師訓誨日督課如儒生不少假貸公亦克承其志益加奮勵藉然稱賢於時其在宿衛日近寵光乃痛斥紈綺習謹飭益至既嗣爵日俯焉思所報塞兩使王藩以禮自持凡所賜豫悉辭弗受比蒞馬政一清宿弊上下稱之訓練營卒咸有方略寬嚴適中人無怨言以戰艦行故事非其實及兵事當舉廢者為六條疏請行之生平䔍於孝友諸伯叔母無嗣者咸迎養於家待宗䣊以和馭卑下以惠嵗時祠享合族助奠恩禮藹然嘗念尚寶公忠武公所遺詩文甚富乃搜輯成編為聮珠録若干卷夀梓以傳其善行可書者率此類人方期公逺到必將有為於時以弗沗厥世而遽止於此惜㦲距生為正統丙辰七月一日薨以戊戌正月二日得年四十有三夫人孫氏太傅會昌侯繼宗弟錦衣都指揮使顯宗女也有賢行先公卒子男一曰參聘李氏豐城候男之女女一在室參以卒之年某月某日葬公江寧聚寶山祖塋之原乃奉其姻友都督府都事王逹所為狀泣請豫銘豫固其姻黨也為之銘曰皇明開基羣賢彚起赫赫威襄元祀載紀忠武繼作樹功自已世勳王家宜莫與比古亦有言必復其始公實承之以續以似胡然遽傾孰秉茲理方俾之通乃尼而止聚寶之原川流山峙歸妥於斯何千萬祀東臯處士錢君墓志銘先少保文僖府君與故南京吏部尚書贈太子少保諡文通遺菴錢公同年入翰林契誼惟篤嶽為童子時即獲侍公几杖深辱教愛且嘗接交公之諸子惟時二季某某皆績學英發不幸相繼淪逝獨公伯子景髙甫承公命歸綜家政卓然老成稱賢于時豈意方哭公之訃曽幾何時而景髙亦復長往其子啓宏初掇髙第甫享榮養而遽爾捐棄不亦可痛也哉啓宏將奔喪歸襄大事謂豫世交且厚乃衰杖蹐門泣請為銘以掩諸幽乃談其所自述狀而為之序曰景髙諱岡姓錢氏景髙其字也别號東臯世家淞之華亭東郭至文通公徙郭東三里汀居焉曾大父南梁府君妣許氏大父永思府君妣趙氏皆以公貴贈資善大夫南京吏部尚書妣贈夫人景髙公冢子母封夫人莊氏生景髙幼岐嶷異常兒長從司訓李敬之授春秋日騖於進景泰初侍親官翰林大比嵗將歸就試公謂曰汝脫羈於官孰可任家事乎于是歸而杜門不出惟以葺産課農為事或勸之仕不應曰父命也公仕日顯撫按重臣至淞者必過其門景髙蕭然韋布不事干謁或有所詬應對鑿鑿必據於理識者韙之二弟學日有成景髙喜曰此足以紀先業矣資給偹至及疾竭力醫療沒為營葬與人言及輒慟二妹幼為擇佳壻歸之甲戌嵗饑盜入其家語之曰汝豈樂為是㦲迫於饑寒耳遺以粟帛盜即改行為善至相率來謝時有富翁以槖物寓景髙所不數月有回祿之變為救護得存翁商歸度已煨燼矣及完壁付之其人感激欲分其半以謝力拒絶焉成化丙戌公自東廣奉詔歸閒乃建迎薰同善二堂以為娛侍之所凡事先意順承無所違咈嘗有疾晝夜侍湯樂衣不解帶疾已乃止癸巳公奉詔復起南京翰林載轉吏部每嵗三月值公夀旦必率諸子往致稱觴之敬人嘉其孝庚子公歸榮於家所以娛侍之者益至莊夫人病疽危甚每夜禱於北辰祈以身代遂愈𢎞治改元戊申公以髙夀終景髙時已六十哀毁踰節棺殮喪葬務遵於禮景髙事親孝與諸幼弟處友愛彌䔍交友誠信不欺倜儻有為識見超卓人有不平者得其一言即解殖産雖豐然以勤儉自處不事華靡尤急於義嘗輸粟關中以資賑貸獲膺冠帶之命至於宗族鄉黨之有貧乏者周贍恐後婚喪不能舉必為給助逋負不能償必折其劵聞啓宏登進士即致書勉以厲節慎行無沗所生蓋名家詩禮之教其所承傳固如此爾啓宏觀政禮部得朝夕相處喜其學行端飭且晉膺華秩以馳恩於親諒非逺者而景髙不之待也惜哉其生以宣德己酉三月三日卒以𢎞治癸丑八月二十七日春秋六十又五配袁氏淑德克相子四人啓宏啓寅國子生啓容郡庠生啓賔女一人孫九人文綬文曄文組文暐文曜文昞文恬女三人葬以卒之明年某月某日墓在某之原銘曰喬木之室其本孔碩允茂其植雪幹霜柯輪囷婆娑卒隱于阿材羡弗售復厄於夀以䕃其後我斯銘之用昭於時永寧于茲姚仲武墓志銘嗚呼此豫表兄仲武君之墓豫母黨止君一人而今復已矣痛㦲今年春君客京師病氣疾聞豫奉命南來遂欲附舟而還時方五月炎暑乃求巨艦處之及舁至潞渚即昏聵不復能飲食行及漷縣益殆囑豫為治後事適豫弟員外阜尚送豫行俾過其所為之經紀復遣人夜馳至河西務訪醫購木以俟既至即延醫與論脉藥所宜不一二劑即解自後漸能飲食豫日令人護視已乃平復如常惟肌肉未充腴耳比渡淮君過豫舟謝曰此真賴子復生豫因丁寧以寬裕自處無更為怒氣所攻庶免後虞君亦以為然抵家不數日猶以家務縈心疾復作醫誤投以補劑乃更困殆踰於昔豫聞之急諭醫以前藥之功乃復一劑而安及八月既望豫考績將赴京過君告别聞君日三飯為之喜甚計必全愈豈意别後疾復作醫且誤下之遂以十月十日卒於家豫歸及淮陽始聞君訃嗚呼痛㦲君諱桓字仲武姓姚氏其先杭之錢塘世家國初徙閭右實京師乃有籍于應天之上元祖友直倜儻好義有名於時殖産饒裕資纍萬金妣王氏生子女二人女為先母夫人子則君之考諱愷字秉和妣陳氏生君子女五人兄相早卒姊若妹皆有歸獨遺君在齠齓時祖考沒既久家纍罹鬱攸之變日益衰替賴君卓然自立如老成人力幹蠱以為養拓復故業既圖而新之復别購屋以居君負材局處事不茍往來京師樂交接賢士大夫名公巨卿率愛重君有事恆託為料理君亦為之竭盡心力迄無所失以是君遂有聞於縉紳間四方之商於江湖者恆願納交於君性孝友早喪母念及輒悲事父克盡子職雖逺客於外嵗時供餽之具偹為儲蓄未嘗少乏二姊寡居收養於家日夕所供莫不充贍與人交篤於信義臨財取豫惟義是視周貧濟急汲汲恐後卒之日姻䣊交游靡不惜之君初娶再娶皆吳氏生子一曰璁女一三娶何氏生子一曰環女二璁既長授室遽遘疾而卒君以是重傷中抱亦不可療嗚呼痛哉昔在正統初先母夫人既歸先少保府君外祖妣王夫人實來視於官邸因留久之而豫不肖獲蒙撫育有成至景泰初先府君歸省始同還南都遂與君兄弟同游鄉校兩族多故淪謝相仍幸嵗時一接見君得叙情欵近嘗謂君疾既良已宜謝逺逰以自適况豫守官於南朝夕聚處為樂亦足矣豈意遽至是哉君之生為正統辛酉九月四日其卒為𢎞治丙辰十月十日得年五十又六而已君祖考以下皆葬之大山之原或云墓地不吉故子孫多不壽今乃改卜地於長岡山之原以卒之年十二月十一日葬焉惟君之克振家聲再隆世業善行炳炳不可使之無聞于後顧知君莫豫若者乃為叙而銘之銘曰易仆為興故業聿增匪才曷能孝義著稱芳聞四騰匪賢曷氶疾厄侵凌子父相仍彼蒼瞢瞢新塋可憑惟後之繩百世是徴青溪漫稿卷二十二
