body:
  text: 青谿漫稿巻二明倪岳撰七言古詩墨梅嵗華欲宴嚴氷霜山林萬木皆摧傷天意獨爾儲孤芳根柯屈鐵何堅剛冰花競發先春陽傲睨六雪紛廻翔珠璣錯落生夜光天風習習飄清香姑射仙人整靚粧鉛華净洗曵素裳江妃緩歩鳴珮璫縞袂輕舉聲鏗鏘翠禽飛來月色凉玊笛吹斷空徬徨舉桮澆我鐵石腸浩歌一曲天茫茫蘆雁秋霖初霽水滿湖西風颯颯吹黄蘆垂楊嫋嫋葉已枯沿堤尚帶烟糢糊沙洲薄暮多黍菰畢羅之患應絶無隨陽有鳥羣相呼食兮宿兮真足娯謝惠菊八月秋高天宇清東籬菊綻黄金英感君惠我紛數莖根連宿土何敷榮為愛晩節風霜更妍華不肯青春爭閒來移植臨軒楹晴忩對坐逸興生有時憑闌詩欲成幽香馥馥供吟情有時歌嘯清樽傾佳色粲粲堦前呈夕餐落英聞屈平古來不獨陶淵明何當過我解我酲與君同結嵗寒盟題鶴仙為諸鍊師湘江水深流不竭湘山雲間還峍屼黄鶴樓頭鐵笛聲一聲吹落長空月主人獨倚䦨干望仰見一鶴西南翔上有仙人醉不醒也知倒盡瑶池觴瑶池宴罷日色晩跨鶴歸來不知遠霞裾行逐天風長放浪人間會須返相逢相别君莫愁遲當携爾登瀛洲攬衣上鶴復飛去但見湘山寂寂江悠悠赤壁圖歌武昌東來古赤壁摩空斷岸涵清秋下有長江一萬頃朝宗到海無囘流曹瞞昔此振戎旅虎視呉會期全收舳艫千里付烟燼未必黄葢多竒謀從來勝負非人力自是東風惟便周坡仙豪放乆無匹明時左謫來黄州遠尋赤壁極清賞夜棹一葉之扁舟匏尊獨與二客共迎波擊槳還夷猶共指遺蹤弔千古山川鬱鬱如含羞沉沙折㦸自銷滅覇業荒凉土一丘異代興亡已飄忽寓形宇内真蜉蝣浮生過眼倐萬變人苦不樂將何求洞簫吹殘江月小扣舷歌罷聲啾啾霜葉飛紅暮烟紫潛蛟起舞孀姬愁欲挾飛仙不可得但覺兩腋風颼颼臨臯歸來從雪堂斗酒鱸魚追舊遊酒酣就睡客已去老鶴一聲魂夣幽囘首那堪復陳迹惟有二賦人間留玊堂退食見圖畫飄然使我懐前修招黄鶴兮乘翠蚪憑虚浩浩凌斗牛吁嗟風景賦中識欲繼茲賞知誰儔閒來翹首騁長望乾坤蒼莽東南浮嗚呼坡仙去矣不可作江流無盡長悠悠夣仙吟羅明仲夣中得碧潭夜浸珊瑚冷之句因足成之我昔夣到蓬萊宫三山對峙滄海東玊樓十二接天上地位不與塵寰通蕭蕭亦有緑髪者羣居豈獨黄眉翁我揖仙翁問寶訣喜我骨相非凡庸招我驂鸞跨白鶴神遊八極乘長風飄飄䨇袖凌雲起霞裾星佩聲瑽瑢振羽扶桑倐萬里凌絶倒影衝鴻濛才經弱水已璚島忽歴太華仍崆峒人間雖有八駿足奔騰何處追竒蹤興倦歸來動觴酌落日送盡西山紅仙城迢迢拂衣入繡褥坐我青芙蓉紅蓮萬炬光奪目雲忩霧閣相玲瓏金光分遺萬年草沆瀣瀉落琉璃鍾氷盤異饌雜麟脯琅璈雅樂卑絲桐謂我飯我絶佳味斫鱠欲取靈鼇供舟人深入破烟水漁竿一掣驚蛟龍碧潭夜浸珊瑚冷銀絲削出鱗甲空酒酣大嚼發真趣竦身長嘯聲如鐘耳邊授我鍊藥説還丹有術輕㕘同崑崙瑶樹亦可折何必遠遊尋赤松我拜仙翁謝嘉惠誓將脱屣長相從鄰雞喔喔忽驚覺滿庭落葉霜華濃起望瀛洲不可見悵然極目孤飛鴻輓棠谿處士肅菴江先生子純同年進士誅茅結屋臨棠谿閉户讀書人未知雄才不復為世用致君有術嗟無時壯志空然成白首獨與棠谿作賔友有酒可酌詩可吟脱落煩覊肯輕受神遊何處招不還西風薤露歌聲殘魂去棠谿谿月白魂返棠谿谿水寒廿年葬骨黄甘道隴樹凄迷多宿草青雲不負舊衣冠白靣孤兒致身早我歌為君重慘神古來豪傑多沉淪埋光鏟采老丘壑千載悠悠知幾人春閨怨憶妾與君初見時烏雲挽髻横娥眉嬋娟恩義兩相得偕老有願天應知年來何事輕離别君向江南妾江北夣魂常逐暮雲飛音書久與秋鴻絶清明三月見春殘深閨猶自怯春寒臨粧漸覺鉛華改閉户誰憐花鳥闌脉脉愁來心欲死空向春風怨羅綺沉沉簾幙易黄昏月光獨照紗忩裏年年見月缺復圓獨怨夫君去不還尋君欲抱琵琶去一曲相思和淚彈題湖山雨意圖五月廿日題時久無雨湖雲欲雨濕不飛千山萬山烟霧迷翻崖擁壑忽已暝白日半没青天低糢糊亂壓雲夣澤掩映乾坤漸昏黑浦溆爭投漁子舟嵐光净鎖幽人宅雷輷電走風更豪彷彿捲去簷頭茅幽人驚起不敢睡耳邊但覺蒼龍號蒼龍變化鼓餘勇瞥起直上驚洶涌山木微茫猿狖啼虹霓明滅蛟鼉恐霹靂列缺乘雲來連峰峭壁皆崩摧青𠖇浩蕩不可測沉沉一鏡當中開魚蝦帶去半空落水天頃刻皆囘薄勢凌五嶽自崢嶸忽轉孤巖已㝠寞影響奔騰雨意深須臾過眼氣蕭森定知四海沾濡意足慰三農渴望心秖今炎炎苦天旱退食披圖發長嘆誰解為霖振槁枯空對遺編讀雲漢晩泊魏家灣月夕大風有盗賊之驚舟中戒嚴至旦乃解魏家灣頭水清淺十里長堤栁如綫舟行且止不須牽明月已照長堤前狂風俄然動坤軸雪浪雲濤互奔逐灣頭有客輕遠人彎弓縱矢誇入神滿目荒烟轉愁棘鏗鍧金鼓傳呼急共判相與坐天明已喜平安及曉晴人生得失豈足計奈此驚憂非客意恨不乘風一夜歸船頭畫鷁長如飛古木寒鴉為錫山王敏行空山古木烟霧迷髙枝直與浮雲齊垂蘿落落綰晴黛寒竹蕭蕭含晩凄好鳥飛來喜相托爭向夕陽深處棲風霜不厭老幽谷羽翼自可凌秋蜺空憐返哺起深思正爾月明聞夜啼題秋江歸棹圖落日未落懸林梢西風蘆荻秋蕭騷秋江水淺石齒齒古堤楊柳凌雲髙三老長年何促速百丈牽船過林麓布㠶無恙晩初收急篙撐向前村宿家住前村深復深翩然誰識歸來心脱身風浪老亦足放跡雲山何處尋君不見陶潛松菊荒蕪久張翰蓴鱸果何有鄉思方濃宦味輕㝠鴻一去空翹首此圖不辨陶與張呉淞遠矣更柴桑我生竊禄愧無補時望白雲懐故鄉題胡馬圖大磧飛沙白於雪北風怒號海冰裂髯胡把控正愁寒地上騏驎汗成血騏驎元出洼水中朝刷天河暮崆峒飄飄四駿盡龍種風神各異筋骨同紫燕飛兔思騰踏走狗蒼鷹氣蕭颯雄姿自足畵圖傳竒材豈與駑駘合一匹雖瘦標格存試出還空冀北羣伏櫪誰能保終惠行邊猶解䇿髙勛可憐共飽沙塲草無由一騁千里道天涯霜露莽蕭條秪恐驊騮易衰老髯胡髯胡不敢騎好從重譯獻彤墀玊臺閶闔閲清峻却看黄帕葢鞍時三鷥圖新荷織風翠如剪屬玊孤鳴水波巻何時舊侣䨇飛來並逐滄浪弄清淺羽雪經春猶未消頂絲颺日輕飄飄窺魚來往思無限髙潔不受漁人招君不見畫圖彷彿差相儗千古長憐魯文子賀英國張公射㨗歌文皇報功銘太常異姓獨數河間王上公茅土傳無疆矯矯孫子承其芳文韜武略衆所臧中朝注倚麟鳳祥先皇召見七寶床尋常雨露沾濡滂我皇繼統御明堂熈熈民物歸虞唐豈以盛治忘豫防簡閲戎備心皇皇維時四月天艶陽勅開射圃西苑傍黄屋左纛臨中央虎賁貔貅侍兩廂旌旗巻雲白日黄金鼔殷地晴雷鏜諸侯劍佩紛以蹌裝束繡帽雲錦裳雕弓韔服矢插房拱翼趨進仍雁行惟公年少思奮攘况復第一爵序當揮鞭縱轡意氣揚蹴踏神駿驚髙驤瞥若掣電流晶光手中白羽鳴秋霜參連破的相鏗鏘飛鳥退伏兔走藏應弦落彀非蹶張却笑一箭空穿楊衆目愕顧風囘颺懽呼振耳聲洋洋後來繼者誰頡頏鵬鵾斥鷃難為翔天顔有喜寵命將勞宴特賜流霞觴更有寶鏹來上方明日恩詔傳貂璫内帑蕃錫禮數章黄金腰帶蟠龍香擎出里巷增輝煌受之百拜喜欲狂眼前紈綺惟膏粱惟公令望如圭璋巧力小試詎足量胸藏甲兵十萬强風雲千載逢明良天生老將登巖廊隱然與時為津梁威名震懾戎與羌天山大定四海康由基仁貴何足長我歌雖短意則詳慶源已擬後寖昌河間之水通天潢千秋萬嵗同湯湯御隄烟栁東風二月千門曉紫禁暄妍暖雲繞玊河隄畔赤欄橋髙栁依依得春早柔條裊娜百尺垂蘸水㸃破青玻璃晴烟一抹鎻深碧曉色正與春相宜暖風忽聽黄鸝囀入望糢糊迷近遠鮫綃帳薄疑未收翡翠簾輕不堪捲日高忽覺散浮隂無限韶華連上林紛紛萬卉足生意自是皇家雨露深喜雨詩都門二月東風早布穀聲聲弄清曉農作將興土脉融田翁屈指春多少黄塵飛揚白晝昏暖日漸烈天無雲商巖何人慰渴望為我一洗枯槁根兀坐書齋深歎息忽聽新雷起西極霡霂微施造化權空濛已謝沾濡力起來細數簷頭聲隨風潤物如有情東郊多稼足生意上林芳樹抽繁榮萬彚生成藉時雨優渥今看遽如許擊節長歌雲漢詩閔雨憂勤荷明主田家喜雨歌韶華蕩漾三月天緑楊枝上嘘晴烟田家望雨心正渴鳴鳩數聲風颯然墨雲低覆塍頭樹好雨彌空下如注潤物潛看霡霂流及時溥謝甘霖布宿麥芃芃穂漸黄新荷簌簌初抽秧總為朝來一犁足坐令終嵗成豐穰豐穰有兆懽聲作擊壤長歌物咸若四海均沾造化功題詩為紀田家樂冬雨嘆近山茫茫遠山黒萬里乾坤同一色忩前亂脚雨如麻忩裏孤踪淚成血嵗云暮矣三日雪冰凝初晴地猶裂不堪兩日雨經宵一㸃一聲心寸折新墳已築髙嵯峨舊墳猶作荒坡陀長鑱欲出泥没脛對此踟蹰將奈何青松初長三尺過買栽遠自南山阿一時委積不復數㕑奴失喜炊薪多年來苦恨窮愁續把巻煢然不能讀寒燈冷雨愁轉長忍聽東鄰夜深哭曉起鄰翁來致辭丈人雖苦何足知誰家葬母水盈坎臘月庚申從𦵏師己亥十二月予宿墓所躬築先曾祖以下諸塜兼手植松檜百餘本於墓道之旁兩日為雨所阻既不敢登壠又小樹移自遠地生意蕭然坐成愁嘆忽有工人來云此庚申日也𦵏者甚衆苦於冒雨幾弗克襄事且嘆慕先君之盛福云予因憶向亦幾用此日幸不為𦵏師所誤語畢漫記於此䨇鳳行壽李裕之秀才父母金烏刷羽扶桑曉蜃閣龍樓海天杳眼中指㸃望蓬萊波心一㸃青山小蓬萊壽翁鬚髪蒼霞裾獨速揺璚璫手持雲笈控朱鶴來訪李耳長生堂為言仙李蟠根久丹實輪囷大於斗上有髙巢䨇鳳凰相對如賓復如友老雄文采光陸離朝陽噦噦呼其雌並飲瑶池飽玊液聨步瑶階餐玊芝莫道春流緑如剪已見蓬萊水清淺莫道蟠桃幾度花不把繁華掛䨇眼閒來共憇丹山梧夣遊圓嶠仍方壺逍遥忘却老將至慰意更有二靈雛大雛已負冲霄志覽德將為太平瑞小雛羽翼亦已成相逐相隨閲清世壽翁語罷呼麯生冰絃醉弄南薫聲夜凉如洗不知暑寶婺正映弧南明忽傳翁姥佳期共泥椷擬致長生頌仙軿望盡鶴飛遥聊向尊前咏䨇鳳喜雨謡辛丑之嵗自春徂夏亢陽不雨流河不通水脉幾絶農事弗修漕綱且沮遍禱羣祀天意弗答乃五月九日癸未始雨達旦未止也喜而忘寐因效里謡一章寒芒萬丈飛天鋒東西交射層霄中歲暮十二月廿二日夜有天鋒見十數莖火雲盤礡不肯散焰光時作燒天紅自後恒有火灾人皆夜夜防之六鰲屓屭撼坤軸二月十日地大震却送江南三月風一春皆大風喧豗捲塵蔽白日咫尺浮翳成昏䝉恒有霾翳兩丸黒白互盪激十日始憐后羿功三月四月間日間毎有黒氣如丸相盪且多相逢盡道水脉涸巢湖有路行人通人自江北來者云巢湖乾人自湖中行如陸地云髙田低田總如赭踏車不救秧苖空廟堂祝幣來羣公紛紛走謁緇黄宫癡童呼天口欲裂天亦不聞如耳聾我意天應憫赤子似惡此舉真愚庸片雲不生暑威熾嗟我絶望心力窮五月九日水羊舞忽然雨脚來濛濛夜深蕭颯飛轉急决渠湧壑來神工我知此雨豈人力枯槁振起生意融我不願天能雨豆時有雨豆之異誰解作粥甦疲癃我不願天能雨針時有雨針之異誰解補袞為華蟲但欲此雨滂沱足三日叱咤海若鞭蒼龍河流滔滔通萬漕田疇拍拍酬三農擬效周詩賦雲漢載仰帝德歌年豐戲題素扇短歌君不見秋空月十二闌干照圓缺金波半瀉落蒼茫欲與人間洗炎熱又不見春空雲巻舒重疉成氤氲一片飛來不盈把翛然殿閣生微薫匠意經營削寒玊方寸機關巧裝束雲青月白指掌間伐盡剡籐猶未足我欲揚仁風置之懐袖中乘時致身貴有用乾坤闔闢誰為功赤日遲遲駐南陸却憶閭閻苦蒸溽咫尺一動揺引領望清肅雲有隂月有隂巻舒圓缺皆天心安得春雲秋月十萬里盡令四海除煩襟送劉時雍赴閩藩參政新栁初黄新水緑兩槳如飛片帆速使君欲發須少留聽我離歌寫中曲與君結交二十春重是同年兄弟親玊堂退直共書史金闕趨朝聨佩紳我慚迂朽百無用君向戎曹轉增重白靣書生乆議兵赭衣將士皆知頌指揮籌䇿功業多一官濡滯如君何閩粤分藩信小試金緋燁燁皆恩波海道澄清藉賢守亦是同袍舊時友時同年姜用貞為汀守善捕盗有聲烽烟不試瘴烟銷君往臨之復何有喜君雅識毫髪精喜君雅操氷霜清獨憐君今别我去千里萬里難為情短歌易盡斜陽暮執手踟蹰立中路男兒壯志輕别離極目青雲渺鵷鷺分題得西湖送張亞參公實還浙西湖清湖波萬頃㴠空明鳶魚鷗鷺自出沒芙蓉楊栁交敷榮豐樂樓前畫船裏散滿豐年絃管聲李相遺功存六井蘇守新隄直如綆善政應垂千載名豈為遊歌樂風景使君清操西湖同使君作宦西湖東十年惠澤被民物湖水迢迢寧有窮來朝曾踏湖邊雪歸去重看湖上月好挽天河一問津星槎早與西湖别八月四日五鼓大雷雨達旦感之因題白宗璞户部畫龍八月四日秋始分霹靂忽送千山雲星斗無光天地黑須臾雨捲銀河渾似驚神龍起揮霍夭矯中霄露頭角眼光掣電滅復明鼻息轟雷止還作鱗蟲變化龍獨靈下上碧落蟠滄瀛有時奮迅雨寰宇坐令四海歌秋成我聞秦關旱未已安得甘霖遍千里擬續坡翁起伏龍何必呉縑寫形似題九馬圖穆王八駿名天下此馬雄瓌豈其亞渥洼夜墮房星精神物應隨牝龍化纎離騄駬少為貴三十六蹄更堪詫想當閶闔闢清曉霓旌隊引鑾和駕朝囘初遣脱金覊呈了曽看覆黄帕天廐深嚴日正長奚官出牧乘閒暇晴隄水滿栁隂森芳草䝉茸猶可藉長嘶深浴各有適俊骨竒姿本無價祇今承平息邊燧戎壘征鞍不須跨長嗟健步何由騁騏驥駑駘等衰謝王良伯樂會有合足下風雲生叱咤追電終輕萬里程直歴蓬瀛蹴嵩華送忩友趙景芳以鄉進士出宰商河君不見鸞刀出冶新發硎鋒芒揮霍孰敢嬰庖丁購得寶如玊十牛一日無完形又不見輕車載舝初發軔駿馬翩翩駕雙靷乘風攬轡隨所之萬里亨途在俄瞬趙君夙負冰玊姿凌雲早折蟾宫枝尋常不遇若有待四十作宰元非遲牛刀小試君休惜一叚堅剛在操執剖决何妨及隠㣲肯綮仍期剸繁劇名駒伏軛歴太行欲行未行猶自傷一朝推轂伯樂手却看馳騁趨康莊遠到從今亦何有明日商河獨翹首驅車在道劍横腰且醉都門一尊酒題胡騎縱獵圖四首清霜落盡塞草黄驚飛山鵲東南翔飄然棲息自有適海天一色秋茫茫紫袍白馬者誰子玊鞭半綰青絲韁自遠望之重太息雖有矰繳安能將黄沙漠漠吹西風髙原草樹交深叢嗟哉狡兔自三窟失身何處潜其蹤獵人手挽明月弓追逐更騁胡青驄眼中得喪君莫訝歸來欲慰君庖充野濶天空雲影孤白沙淺水經霜枯聨翩何䖏起䨇雁稻粱謀遠思江湖忽然見此蚪髯胡雕弓滿控金僕姑何當健翮快髙舉莫遣朔風吹緑蕪胡兒匹馬明𤣥霜臂韝正立孤鷹蒼舉頭䨇影夕陽外野鴨相呼雲水鄉蒼鷹欲奮鴨驚逝披圖不覺增慨慷天生萬物貴得所同類相殘徒自傷題唐子華枯木為曰川學士傳君好畵欲成癖長縑巨軸堆滿家江南鍾沈動連幅更有呉興唐子華子華筆力獨蒼古參天老木紛如麻雲中蛟龍怒且攫海底珊瑚欹復斜大者時聞撼風雨小者恍若迷烟霞柔柯蔽空積蒼翠老幹礙日爭槎牙根蟠怪石起突兀谿流斗谷隨低窪初疑三軍罷遠獵旌旄十里猶毶㲚又疑八月渡河漢彷彿博望初廻槎呉興公子墨妙者往往落筆人驚誇松雪齋中脱見此亦且退避相咨嗟蕭條異代感陳迹至寶鄭重誰能加還君此巻掛君壁一掃凡品真塗鴉雨中題徐州蘇指揮湘江暮雨竹孤舟夜聽蕭蕭雨兩岸垂楊翠如許恍訝湘江暮雨中只欠鉤輈鷓鴣語舡囱偶爾披新圖長汀短渚相縈紆琅玕一望渺無際淋漓尚覺烟糢糊髙者凌空鳳將起下者垂垂采鸞尾更憶湘君過九疑羽葆參差亂雲裏明朝放棹徐州洪不須局促仍推蓬赤壁江中地遠近問訊彭城蘇長公題白紙扇缺月飛從東海來呉刀斫破氷蟾胎寒光迸人不敢近星斗錯落雲中開老夫拾得不盈把一夜凉風滿天下成化辛卯六月苦雨浹旬民以大困感今懐昨良用惻然因扺掌放歌聊以泄激烈之悲耳詩云乎哉去年六月足霖雨頑雲蔽天長不收官衢水淖車馬絶野樹巢空魚鼈遊直沽南北混海道畿甸遠邇同川流秋來百錢一斗粟民飢更着寒無裘昨日已鬻乳下兒今日又殺田中牛嗷嗷僅博一飽耳轉眼亦復填深溝鬱塞那堪沴仍作北邙棄骨成髙丘掩骼埋胔有遺令嗟嗟守牧誰為謀乘軺賑貸出旁午宵旰乃爾勞宸猷即今皇皇民稍蘇麥已秀實禾欲抽上下鼓舞望豐稔飽暖已判歌有秋如何六月雨不止連綿恐欲傷田疇豈但羣蛾蠧麥穗亦復有耳生禾頭奔馳徒費雨師力淋漓不解農夫憂早寒暮熱人重困兒童往往成悲謳端居對食不下咽天意豈與斯民仇奸人猾吏試一殛亦足以見天所尤何須連年病赤子尫羸佝僂誰當瘳我願天公放白日照耀四海袪煩愁蠶得帛兮田得粟樂以卒嵗心悠悠小臣無能竊君禄却把大筆歌天休時有早寒晚熱人死至七八月之謡傅曰川曰會雁行待漏像圖限韻短歌君家兄弟知名早渝川地靈到今好才看連璧産荆山又聞䨇鳳鳴周鎬金榜䇿名次第書彤墀峻級逡廵造伯也乆繫翰苑銜季兮仍占中書考褒鄂空傳侈舊圖軾轍誰傳入新草不用麒麟列髙閣總謂驊騮在馳道㸃染丘壑意轉妍脱落山林迹俱掃更喜閒官共儒素亦幸清時際熈皥聨珮同趨曉漏遲揮毫直對朝陽杲螭頭晴雲明象服雉尾香烟瞻翠葆百年華萼相光輝千載詩書互探討英標傑峙衡霍峻勁氣雄翻江漢浩錦繡盤旋五色腸珠璣錯落三軍纛文采差差已外弸華腴燁燁仍中抱當年殷鼎重鹽梅今日舜衣資大藻從來特行乃國琛孰若二難為世寶乆知芝蘭合競秀亦許松柏宜同老青雲有路已連升白首無渝矢相保陳汝玊安江樓詩次沈時昜司空韻長江如塹䕶天府十萬水軍盡羆虎樓船自有壁壘固鯨鰐總無窟穴阻髙皇開基親定亂列聖纘圖猶重武昨日中丞猶奉詔到處先驅争負弩已聞號令随玊節便訝風威生繡斧帳前戈甲喜森森座上衣冠驚楚楚舊操戰艦控中流新建危樓當水滸帆檣夐爾出霄漢波浪恬然靜風雨秪縁彈壓息烽燧却任喧闐動簫鼓范老元知富甲兵謝公豈謂躭歌舞還聞什伍精訓練亦望尋常詢疾苦入朝有日期大拜留取清風繼房杜送楊應寧赴南京太常去年曾醉囘仙衙禮寺幽閴多名花北來忽此春欲暮顛風滿目惟塵沙始知良會不易得漫爾逢人時歎嗟楊君别我去南省占此佳勝樂亦賖君家京口本隣壤丹陽郭外人將車金陵佳麗古所重聖祖創業今京華奉常清卿縉紳表詞苑相承俱大家多君文采繼芳躅斯地因人尤可嘉鍾山秀色在庭户日髙方始聞朝鴉品題隨意徧花鳥瀟洒豈直凌烟霞宦途優游此其㝡口不能語心常誇送君復動故園想敝廬遠市無喧譁過門珍重一枉駕青谿咫尺天之涯青谿漫稿巻二
