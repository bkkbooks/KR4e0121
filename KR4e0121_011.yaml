body:
  text: 青溪漫稿卷十一明倪嶽撰奏議禮儀一一為禮儀事勑諭禮部朕惟古者天子九廟而祖功宗德百世不祧其他則以次祧遷有常制焉恭惟我太祖髙皇帝混一區宇肇正綱常追祀德懿熙仁四祖同殿異位情文具稱列聖相承昭穆有序至于皇祖考英宗睿皇帝九廟已備兹者皇考繼天凝道誠明仁敬崇文肅武宏德聖孝純皇帝山陵將畢升祔有期當定祧遷之制矧惟皇妣孝穆慈慧恭恪莊僖崇天承聖皇太后祔葬畢日宜有奉享神主之禮爾禮部其會文武大臣并詹事府國子監翰林院堂上左右春坊及科道掌印官詳稽古制斟酌情文議處來聞務遵典禮足垂萬世用成朕尊祖敬親之大孝欽哉故諭欽此欽遵會同太傅兼太子太師英國公等官張懋等議得禮必緣情而立義事當據古以證今謹按成周之制天子七廟三昭三穆與太祖之廟而七文王武王為宗不在數中故為九廟蓋以后稷為始祖文武為世室皆百世不遷其餘則以次而祧前乎周則商以契為祖而湯與三宗百世不遷後乎周則宋以僖祖為祖而太祖與太宗百世不遷彼時僖祖祧遷雖曰迭有異議而大儒程頥朱熹皆以奉僖祖為祖為得禮之正而合於人心之同所謂有其舉之莫之敢廢者也國朝太祖髙皇帝肇建丕圖追祀四祖逮至英宗睿皇帝龍馭上賔遂備九廟在當時則德祖尊為髙祖以上蓋無可推之親在今日則德祖尊為始祖以下固有可祧之主洪惟太祖髙皇帝太宗文皇帝功德隆盛如周文武萬世不祧懿祖而下以次遞遷實惟古制今伏遇憲宗純皇帝升祔之日所有懿祖皇帝神主義當奉祧仍於太廟寢殿之後略倣古者夾室之意别建一殿九室以事奉藏况古有祫祭謂合祧廟與未祧之主於太祖之廟而祭之故謂之祫祫者合也今亦宜於嵗暮享祭之日奉迎懿祖皇帝神主仍居舊位以享祫祭之禮則每嵗一祭視古三年一祫於禮有加近該欽天監選到成化二十三年十二月二十四日憲宗純皇帝神主升祔太廟後殿未及營建合無暫請懿祖皇帝神主安奉于德祖皇帝室內以伺後殿之成此即所謂毁廟之主藏於太祖之廟於義亦安又按周禮春官大司樂之職歌中吕舞大濩以享先妣謂姜嫄也是帝嚳之妃后稷之母故特立廟以祭之至宋則元德懿德二皇太后俱有别廟之享章獻章懿二皇太后遂有奉慈之建每嵗五享四時薦新上食並同太廟兹者恭遇孝穆慈慧恭恪莊僖崇天承聖皇太后祔葬茂陵所有神主宜於奉先殿傍近宫室改為别廟以禮安奉嵗時祭享悉如太廟奉先殿之儀仍乞勑奉遷官於祔葬畢日暫奉神主于茂陵獻殿以伺二十四日憲宗純皇帝祔享太廟禮畢然後啓行於二十六日文武百官各具素服出城奉迎自大明門進入就赴别廟安奉如儀以是參稽乎情文庶幾咸合乎典禮緣係節該欽奉勑㫖會官議處來聞事理未敢擅便定奪謹題請㫖成化二十三年十一月二十一日於西角門題奏本月二十三日奉聖㫖是奉先殿旁近無宫室堪改别廟恁還再議來說欽此欽遵成化二十三年十一月二十六日禮部會官議擬題奉聖㫖你每既考論明白准議欽此欽遵後於奉先殿之東别闢門改一殿仍扁曰奉慈殿以奉神主云祀典一一為裨補名教事禮科抄出禮科右給事中張九功題臣惟孔子之道與天地相為悠久述六經以教萬世其功無窮是以有國者莫不尊崇而奉祀之以報其功於萬一當時及門弟子得正派而分餘波者皆得與焉後世儒者有能踐履真實學術純正希蹤前哲有功來學者亦得以從祀於廟廡用表當時崇儒重道之意此典於名教所關甚大豈可茍哉臣嘗觀國學及郡縣學從祀儒先有當黜者而後之真儒有當入者若蘭陵伯荀况言或近於黃老術實雜於申韓身託黃歇不羞悖亂之人學傳李斯遂基坑焚之禍以性為惡以禮為僞以堯舜為矯飾以子思孟軻為亂天下者是以程子譏其甚偏駁而朱子書為蘭陵令乃係之以楚以深鄙之也扶風伯馬融髠徙穢士糟粕陋儒黨附梁冀害忠良而不顧自比毛遂甘輕賤而不羞既失於西第之作頌何補於東觀之校書髙堂絳帳沈酣女樂逞豪門驕奢之風破純儒莊士之矩是以當時正直羞稱而深見斥於趙岐也偃師伯王弼唱和何鄧祖述老莊遺落世事以萬物為天下之粗迹崇尚虛無謂六經為聖人之糟粕清談之弊流蕩人心傷敗風俗卒使人國家隨以淪喪而不可救者此輩也成都伯揚雄以善惡混論性學識舛錯以安漢公比伊周志向昏諛雕蟲之技於道何關覆醬之物於世何補貪生畏死寧免投閣之嘲臣事新室難逃逆節之黨是以朱子莽大夫之筆大書為綱昭垂後世也之數子學失大本身虧大節有玷名教得罪聖門昔龜山楊時建議斥王安石不使配享孔廟而今之儒臣亦有欲黜揚雄輩者夫如是則此數子豈宜列諸從祀哉臣觀今之儒臣禮部左侍郎兼翰林院學士文清公河東薛瑄篤志好學於道有見貴真知實踐之益黜矯僞浮靡之病入仕與人同而為國則不同講學與人同而為己則不同述文與人同而為道則不同接人處事與人同而忠信嚴正則不同河汾文集固其英華讀書一録實為根本立德立言考諸此録綽有明驗是蓋濓洛之流波覃懷之步武人所共知也昔洪武宣德年間嘗增董仲舒吳澄入從祀矣今薛瑄無愧二子可不列諸從祀哉恭惟皇帝陛下講求聖學以孔子之道治天下必於此辨其真僞别其純駁而使斯人知所向背取舍庶有以正人心明道化而無失如䝉乞勑禮部進與內閣大臣定議於可黜者黜之可入者入之則孔廟清名教正而斯文幸甚等因具題𢎞治元年七月二十四日奉聖㫖這本所言禮部會各部都察院通政司大理寺詹事府國子監翰林院春坊科道官詳議來說欽此欽遵抄出到部會議間又於禮科抄出詹事府少詹事兼翰林院侍講學士程敏政奏為考正祀典事臣聞古聖王之治天下必以祀典為重所以崇德報功而垂世教淑人心也故有功德於一時者一時祀之更代則已有功德於一方者一方祀之踰境則已然猶欲以勸一時範一方而不敢輕議也况先師孔子有功德於天下於萬世天下祀之萬世祀之則其廟庭之間侑食之人豈可茍焉而已必得文與行兼名與實副有功於聖門而無疵於公議者庶足以稱崇德報功之意若侑食者非其人則豈惟先師臨之神不顧歆將使典模範者莫知所教為弟子者莫知所學世教不明人心不淑通乎天下而施及後世其為關繫豈特一時一方之可比哉邇者言官欲黜文廟從祀諸賢之有罪者詔禮部集議臣愚亦在預議之列疑其所言尚有未盡而議者相持憚於改作臣考之於書揆之於心不敢妄為異同謹畫一條陳上瀆聖覽伏乞皇上丕顯文謨主張斯道仍下禮部通行集議采而行之一洗前代相習之陋永為百世可遵之典使世教有興起之益人心得趨向之公其於治道未為無補一唐貞觀二十一年始以左丘明等二十二人從祀孔子廟庭蓋當是時聖學不明議者無識拘於舊注疏謂釋奠先師如詩有毛公禮有髙堂生書有伏生之類遂以専門訓詁之學為得聖道之傳而併及馬融等行之至今誠不可不考其行之得失與義之可否而釐正於大明有道之世也臣考歷代正史馬融初應鄧隲之召為祕書歷官南郡太守以貪濁免官髠徙朔方自刺不殊又不拘儒者之節前授生徒後列女樂為梁冀草奏殺忠臣李固作西第頌以美冀為正直所羞即是觀之則衆醜備於一身五經為之掃地後世乃以其空言目為經師使侑坐於孔子之庭臣不知其何說也劉向初以獻賦進喜誦神仙方術嘗上言黃金可成鑄作不驗下吏當死其兄陽城侯救之獲免所著洪範五行傳最為舛駁使箕子經世之微言流為隂陽術家之小技賈逵以獻頌為郎不修小節専一傅會圖䜟以致貴顯蓋左道亂政之人也王弼與何晏倡為清談所注易専祖老莊而范寧追究晉室之亂以為王何之罪深於桀紂何休則止有春秋解詁一書黜周王魯又注風角等書班之於孝經論語蓋異端邪說之流也戴聖為九江太守治行多不法懼何武劾之而自免後為博士毁武於朝及子賔客為盜繫獄而武平心決之得不死則又造謝不慙先儒謂聖禮家之宗而身為贓吏子為賊徒可為世鑒王肅在魏以女適司馬昭當是時昭篡魏之勢已成肅為世臣封蘭陵侯官至中領軍乃坐觀成敗及毋丘儉文欽起兵討賊肅又為司馬師畫䇿以濟其惡若好人佞已乃其過之小者杜預所著亦止有左氏經傳集解其大節亦無可稱如守襄陽則數饋遺洛中貴要語人曰懼其為害耳非以求益也伐吳之際因斫癭之譏盡殺江陵之人以吏則不亷以將則不義凡此諸人其於名教得罪非小而議者謂能守其遺經轉相授受以待後之學者不為無功臣竊以為不然夫守其遺經若左丘明公羊髙榖梁赤之於春秋伏勝孔安國之於書毛萇之於詩髙堂生之於儀禮后蒼之於禮記杜子春之於周禮可以當之蓋秦火之後惟易以卜筮僅存而餘經非此九人則幾乎熄矣此其功之不可泯者以之從祀可也若融等又不過訓詁此九人所傳者耳况其書行于唐故唐姑以備經師之數祀之今當理學大明之後易用程朱詩用朱子書用蔡氏春秋用胡氏又何取於漢魏以來駁而不正之人使安享天下之祀哉夫所以祀之者非徒使學者誦其詩讀其書亦將論其人而使之尚友也臣恐學者習其訓詁之人於身心未必有補而考其奸諂淫邪貪墨怪妄之迹將自甘于效尤之地曰先賢亦若此哉其禍儒害道將有不可勝言者矣至於鄭衆盧植鄭𤣥服䖍范寧五人雖若無過然其所行亦未能以窺聖門所著亦未能以發聖學若五人者得預從祀則漢唐以來當預者尚多臣愚乞將戴聖劉向賈逵馬融何休王肅王弼杜預八人褫爵罷祀鄭衆盧植鄭𤣥服䖍范寧五人各祀于其鄉后蒼在漢初說禮數萬言號后氏曲臺記戴聖等皆受其業蓋今禮記之書非后氏則不復傳於世矣乞加封爵與左丘明等一體從祀則僞儒免欺世之名賢者受専門之祀而情文兩得矣一孔子弟子見于家語自顔回之下七十六人家語之書出于孔氏當得其實而司馬遷史記所載多公伯寮秦冉顔何三人文翁成都廟壁所畫又多蘧瑗林放申棖三人先儒謂後人以所見增益殆未可據臣考宋邢昺論語注疏申棖孔子弟子在家語作申續史記作申黨其實一人也今廟庭從祀申棖封文登侯在東廡申黨封淄川侯在西廡重復無稽一至於此且公伯寮訴子路以沮孔子乃聖門之蟊螣而孔子稱瑗為夫子决非及門之士林放雖嘗問禮然家語史記邢昺注疏朱子集注俱不載諸弟子之列秦冉顔何疑亦為字畫相近之誤如申棖申黨但不可考耳臣愚以為申棖申黨位號宜存其一公伯寮秦冉顔何蘧瑗林放五人既不載于家語七十子之數宜罷其祀若瑗林二人不可無祀則乞祀瑗于衛祀放于魯或祔祭于本處鄉賢祠仍其舊爵以見優崇賢者之意亦庶乎名實相符而不舛于禮也一洪武二十九年行人司司副楊砥建議請黜揚雄進董仲舒太祖髙皇帝嘉納其言而行之主張斯道以淑人心可謂大矣然荀况揚雄實相伯仲而况以性為惡以禮為僞以子思孟子為亂天下以子張子夏子游為賤儒故程子有荀卿過多揚雄過少之說今言者欲併黜况之祀宜也然臣竊以為漢儒莫若董仲舒唐儒莫若韓愈而尚有可議者一人文中子王通是也通之言行先儒之論已多大約以為僭經而不得比于董韓云爾臣請斷之以程朱之說程子曰王通隱德君子論其粹處殆非荀揚所及若續經之類皆非其作然則程子豈私于通哉正因其言之粹者而知其非僭經之人耳朱子曰文中子論治體處髙似仲舒而本領不及爽似仲舒而純不及又曰韓子原道諸篇若非通所及者然終不免文士之習利達之求若覽觀古今之變措諸事業恐未若通之至懇惻而有條理也至於河汾師道之立出於魏晉佛老之餘逮今人以為盛則通固豪傑之士也今董韓竝列從祀而通不預疑為闕典臣又按宋儒自周子以下九人同列從祀而尚有可議者一人安定胡瑗是也瑗之言行先儒之論已詳大約以為少著述而不得比於濓洛云爾臣亦請斷之以程朱之說程子看詳學制曰宜建尊賢堂以延天下道德之士如胡瑗張載邵雍使學者得以矜式朱子小學書亦備載瑗事以為百世之法臣以為自秦漢以來師道之立未有過瑗者矧程子於瑗之生也欲致其與張邵並居於尊賢之堂其沒也乃不得與張邵竝侑於宣聖之廟其為闕典或有甚焉况宋端平二年議增十賢從祀以瑗為首若以謂瑗無著述之功則元之許衡亦無著述但其身教之懿與瑗相望誠有不可偏廢者臣考之禮有道有德而教于學者死則為樂祖祭于瞽宗鄉先生沒則祭于社若通瑗兩人之師道百世如新得加封爵使與衡同列於學宫最得禮意一自唐宋以來以顔子曽子子思孟子配享坐堂上而顔子之父顔無繇曽子之父曽㸃子思之父孔鯉皆坐廡下臣考之子雖齊聖不先父食而三代之學皆所以明人倫也夫孔子之所以為教與諸弟子之所以為學不過明此而已今乃使子坐於上父坐於下豈禮也哉若以為此乃論傳道之功則自古及今未有外人倫而言道者縱出於後世之尊崇非諸賢之本意臣恐諸賢於冥冥之中必有不安於心而不敢享非禮之祀者臣考之元至順三年嘗封顔無繇為杞國公諡文裕孟子之父孟孫氏亦嘗封邾國公臣愚乞下有司於各處廟學如鄉賢祠之制别立一祠中祀啓聖王以杞國公顔無繇萊蕪侯曽㸃泗水侯孔鯉邾國公孟孫氏配享庶不失以禮尊奉聖賢之意臣又竊觀聖學失傳千五百年至程朱出而後孟氏之統始續則程朱之先亦不可缺况程子之父太中大夫封永年伯程珦首識濓溪周子於屬掾之中薦以自代而又使二子從逰朱子之父韋齊先生追諡獻靖公朱松臨沒之時以朱子託其友籍溪胡氏而得程氏之學珦以不附王安石新法退居於洛松以不附秦檜和議奉祠於閩其歷官行已俱有稱述臣愚乞將永年伯程珦獻靖公朱松從祀啓聖王使學者知道學之傳有開必先明倫之義不為虛文等因開坐具奏本年八月初三日奉聖㫖這本禮部照例會官議欽此欽遵抄出到部會同太子太保吏部尚書王闕等謹按唐太宗貞觀二十一年詔以左丘明卜子夏公羊髙榖梁赤伏勝髙堂生戴聖毛萇孔安國劉向鄭衆杜子春馬融盧植鄭𤣥服子慎何休王肅王弼杜預范寧賈逵二十二人代用其書垂於國胄自今有事於太學並令配享尼父廟堂𤣥宗開元八年始增孔子弟子十哲從祀二十七年追贈顔子以下八十三人為公侯伯爵宋初增修先聖及亞聖十哲塑像七十二賢及經師左丘明等二十一人皆畫像於東西廊之板壁春秋二丁行釋奠之禮皆如舊典真宗大中祥符二年詔封左丘明等皆伯爵神宗元豐七年禮官言荀况揚雄韓愈皆發明聖人之道有益學者請自今春秋釋奠荀况揚雄韓愈並加封爵以世次先後從祀於左丘明等二十一賢之間詔如禮官議洪惟我朝太祖髙皇帝汛掃前朝之陋俗丕顯隆古之文風定鼎金陵之初首即應天府學以為國子監顧其隘陋擇地於雞鳴山下乃以天子學制授諸冬官今考學士宋訥所撰碑文有曰廟在學東亢以層臺大成有門七十二賢有廡自經始以來大駕臨役者不一當時學士宋濓方被知遇任討論之責乃上孔子廟堂議亦欲罷七十二賢之祀罷漢唐諸儒之祀正顔無繇曽㸃孔鯉之祀上皆不從國子助教貝瓊乃作釋奠解末云聞有言于上破貞觀之制者既斥而不用矣余恐其惑人也故辨之至洪武二十九年特從行人司左司副楊砥之請罷黜揚雄從祀成化元年該內閣大臣議奏禮部左侍郎兼翰林院學士薛瑄直躬慕古談道淑徒進無附麗退不慕戀勤學好問可謂文矣歸潔其身可謂清矣是以存蒙聖知沒賜美諡其為皇朝名臣夫何間然然論其於道所得以與朱子諸徒相比並若黃直卿輔廣之親承微言金履祥許謙之推衍緒說尚未知可伯仲其間否也而遽欲從祀竊恐世之君子將以建言者為非愚則諛孰敢附和其說哉故以為瑄可無施行等因奉憲宗純皇帝聖㫖是欽此欽遵今該前因除揚雄先已罷黜從祀薛瑄難以再議外今議得給事中張九功少詹事兼侍講學士程敏政所奏其間考論固為明白但自貞觀肇興祀典以來歷代相承八百五十餘年中間經歷有宋名儒周程張朱數輩一皆尊禮未嘗斥議蓋自周室東遷世入春秋諸侯僣王夷狄猾夏陵遲至於戰國王道不明人心喪失而荀况首明王道推尊孔子况六經之道火于秦黃老于漢佛于魏晉之間而馬融王弼之徒守其遺經専門講授故唐之諸經注疏咸祖其言而今之經傳引用尚多其說蓋語其立身之節不無可貶語其羽翼聖學之功亦有可褒用其言固不可以廢其人大其功則當有以略其過庶幾瑕瑜不至相掩而筌蹄亦豈容盡棄也哉至於孔門弟子若以家語所書為得其實然朱子乃云家語只是王肅編古録雜記其書雖多疵然非王肅所作是則家語之書未必真出於孔氏若夫司馬遷之作史記文翁之刻石室圖乃在漢武帝之時去古未逺未必為無據也今即一圖二書論之公伯寮秦冉顔何司馬遷何據而書蘧瑗林放申棖文翁何據而刻申棖申黨何以知其一人秦冉顔何何以知其字誤歷嵗滋久莫之可考矧夫后蒼雖能明髙堂生之禮然漢以二戴慶普三家立於學官而蒼之禮無聞焉宜乎貞觀不以附於經師之列至於王通河汾之師道雖存而其於聖人之經固不免吳楚僣王之罪胡瑗蘇湖之教條雖立而其於聖人之道亦安望覃懷迓續之功遽欲躋之從祀固未敢以為然也逮若啓聖王叔梁紇泗水侯孔鯉各為廟以祀於闕里者舊矣今欲通祀天下而遂升孟子程朱之父則於禮為太過置無繇㸃鯉於别廟而遂弗克預享孔子萬世之祀則於義為不及况宋儒洪邁容齊隨筆亦云子雖齊聖不先父食特相承既久莫之敢議爾或以荀况馬融王弼戴聖劉向賈逵何休王肅杜預功微過巨疑於可黜殊不知朱子嘗因釋奠申禮部狀內備舉孔鯉孔伋左丘明賈逵公羊髙荀况十哲兩廡諸賢考正位次亦未嘗一言論其非所當祀之意此非慎於闕疑則必志於從厚者也即今南京國子監乃我太祖髙皇帝之所經畫至精至備廟庭之祀除黜揚雄外其他悉從前代之舊是則南京文廟之制天下所當視效者也太祖髙皇帝之神謨聖斷萬世所當遵守者也且生乎千百載之下而欲究明於千百載之上誠為不易或者前代之所去取蓋必有深意存焉今皆不可得而知矣顧欲捨我聖祖崇文之盛典又將安所從乎詩云不愆不忘率由舊章書云監于成憲其永無愆所有文廟祀禮宜從其舊臣等讀書未至康成敢謂髙議之能及所願則學孔子允惟舊貫之可仍緣係從祀重典及節該奉欽依禮部會官詳議來說照例會官議事理未敢擅便定奪謹題請㫖𢎞治元年八月初十日題奏本月十二日奉聖㫖是從祀諸賢都照舊不動欽此欽遵祀典二一為釐正祀典事祠祭清吏司案呈奉本部送禮科抄出太子少保兵部尚書馬文升題載考帝舜紹堯之後肇十有二州封十有二山蓋每州必封表山之髙大者以為一州之鎮如五嶽五鎮之神東封泰山為東嶽在今山東泰安州沂山為東鎮在今青州府臨胊縣南封衡山為南嶽在今湖廣衡山縣會稽山為南鎮在今浙江會稽縣西封華山為西嶽在今陜西華隂縣又封吳山為西鎮在今隴州北封恆山為北嶽在今大同府渾源州又封醫巫閭山為北鎮在今遼東廣寧衛中封嵩山為中嶽在今河南府登封縣又封霍山為中鎮在今山西霍州又封四海四瀆之神東海之神在今萊州府南海之神在今廣東南海縣西海之神在今蒲州北海之神在今懷慶府濟源縣志載以其濟水源通北海故祭於此淮瀆之神在今南陽府泌陽縣江瀆之神在今四川成都府河瀆之神亦在蒲州濟瀆之神亦在濟源縣三代而下歷秦漢隋俱於原封之山致祭至五代失有河北之地宋有天下未能混一北為契丹所有後以白溝河為界所以祭北嶽恆山於真定府曲陽縣俗傳有飛來峯之說不知祭醫巫閭山於何處蓋宋建都於汴而真定在汴京之北是亦不得已權宜之道也逮我太祖髙皇帝膺天眷命應天順人奄有萬方建都金陵視真定逺在京都之北所以因循未曽釐正逮我太宗文皇帝遷都北平而真定却在京都之南當時禮官亦未建明猶祭北嶽於曲陽縣惟北鎮仍祭於廣寧若以為北嶽原在真定則周禮載恆山為并州之鎮在正北我朝一統志亦載恆山在渾源州南二十里即北嶽以此觀之則北嶽當在渾源州為無疑矣今本州北嶽廟跡猶存故老猶能相傳我朝洪武初定嶽鎮海瀆之神封去歷代褒加之帝號真可為萬世之法獨北嶽猶祭於帝都之南非其故封之山誠為缺典臣非禮官考校未真但係國家重事不可不為釐正如䝉乞勑禮部再加詳考如臣所言為是明白具奏行移山西并大同巡撫官員候時年豐稔措置錢糧於渾源州恆山舊趾去處修蓋北嶽之神殿宇務在不侈不隘若舊殿猶存不必從新蓋造止可修葺工完之日有司具奏更乞勑翰林院撰文勒之堅石豎之廟前以垂永久今後凡祭北嶽之神於此行禮庶數百年之缺典得以正於今日而我朝之盛事亦可昭於後世矣等因具題奉聖㫖禮部看了來說欽此欽遵抄出送司考得北嶽祠事録內附載渾源州志一段云恆山在南二十里乃古北嶽也上有嶽廟乃陶唐氏所建至舜時十有一月北巡狩至於北嶽駕詣大茂山谷值大雪岩壑沍寒駕不能進而遙祀之忽嶽廟之右飛一石墜帝前因名曰安王石乃建廟於大茂山又五載復巡狩其石飛於曲陽復建廟於曲陽今州之恆山有觀乃唐武德中道士髙明素所建也其言陶唐建廟帝舜遙祀事屬無稽飛石之說亦出諺語不足為據别無其他碑記可考止有本朝洪武十二年重修古北嶽廟碑一通內載渾源恆山為古北嶽粵自有虞氏受禪嵗十一月北巡狩帝躬行望祀厥後飛石東遷卒建祠於曲陽歷代因之永以為典於是恆山之祠廢不復舉是則北嶽之紀於渾源州者如此及考得禹貢內冀州恆衛既從注云恆水地志出常山郡上曲陽縣恆山北谷在今定州曲陽縣西北恆山也周禮職方氏正北曰并州其山鎮曰恆山今真定府乃禹貢冀州之域周為并州地又爾雅河北恆注云恆山北嶽是也鄭𤣥云在上曲陽縣又文獻通考云漢恆山郡十八縣有上曲陽避文帝諱改曰常山又云定州曲陽縣北嶽常山在焉漢宣帝神爵元年詔太常祠祀五嶽四瀆北嶽常山於上曲陽即常山郡之縣也唐武德貞觀之制祭北嶽恆山於定州蓋至唐復置恆山郡宋初緣舊制亦祭北嶽恆山於定州漢碑不存無所於考唐宋碑刻具載其事則曲陽之祀北嶽實非始於五代之際明矣至於元起朔漠正宜祀於渾源而至元以來代祀北嶽碑記仍在曲陽逮至國朝洪武二年正月內藏庫副使魏士舉首奉太祖髙皇帝之命肇祀北嶽及三年六月降詔正名定祀著為常典列聖繼統有事必告豐碑巨刻林立祠下是則北嶽之著於曲陽縣者如此及考得曲陽縣在隋為恆陽縣恆山在縣西北一百四十里渾源州元初為恆隂縣恆山在州南二十里山南曰陽山北曰隂或者皆指恆山而名未可知也今該前因案呈到部看得北嶽恆山之神祀於曲陽歷漢唐宋以至國朝上下幾二千年未之有改其渾源州雖有恆山亦名北嶽然祀典不聞碑志無考曲禮云凡祭有其廢之莫敢舉也有其舉之莫敢廢也正謂此爾况今恆山實為畿內巨鎮孕靈已久一旦廢此舉彼恐有窒礙所據渾源州恆山既為一方之望古跡間存復有洪武年間重修廟宇但恐年久或至頽敝合無行移山西布政司轉行彼處官司量加修葺春秋告報以時祭祀庶為兩便緣係釐正祀典及奉欽依禮部看了來說事理未敢擅便定奪謹題請㫖𢎞治六年七月二十四日於奉天門題奏二十六日奉聖㫖是欽此祀典三一為正祀典事禮科抄出本科右給事中張九功題仰惟陛下初登大寶郊天告廟又遍及古之聖帝明王嶽鎮海瀆是即大舜類帝禋宗望山川遍羣神之意臣於𢎞治元年二月二十二日欽承上命遣祭北嶽恆山之神臣恐敬不足以接神明誠不足以答聖明有孤陛下懷柔百神之意是以齊明戒懼不敢遑寧也臣惟國之大事在祀與戎祀典不正則神人瀆亂妖誕所由興人心所由不正也故祭必有義君天下者祭古先聖王以其有功德於民也祭日月星辰以其民所瞻仰也祭山嶽河海以其利澤及人也祀典所載惟此族類考之祭法槩可見矣方今聖明御極欲其首正人心必先修明祀典不然則人祭非鬼神姦惑人焄蒿妖誕之說紛起欲天下務民義而正風化也難矣如䝉乞勑禮部通行天下有司除祀典應祭者依例致祭外若神非其地者氣非其類者非有功德於民者非天地之正者悉皆除去勿使惑人務效狄梁公毁淫祀之法推西門豹投妖巫之心凡民間拜天告斗修齊設醮假降邪神妄稱彌勒一切佯修善事扇惑人心者嚴加禁約有犯如律若視為泛常縱容不謹一體治罪於以正人心於以清風俗然朝廷者天下之本欲正其末先正其本臣觀朝廷常祭之外又有釋迦牟尼文佛之祭有三清三境天尊之祭有九天應元雷聲普化天尊之祭有金闕真君之祭有玉闕真君之祭有金闕元君生辰之祭有神父神母之祭宫觀中水官星君諸天諸帝之號之祀不可枚舉凡此皆異端茫昧之說祀典所不載者也夫人之所戴者一天而已漢儒鄭𤣥五天六天之說乖謬不經况此黃冠之徒諸天諸君之號豈不尤為妄誕天有二日且不可豈復有如是之多天哉借曰有之不郊而祭則為瀆瀆固不可也如知其無徒然而祭則為妄妄亦不可也昔秦漢四帝五畤諸神怪荒惑之禱祀非此類乎如䝉乞勑禮部於諸宫觀寺廟中此等不在祀典非禮之祭逐一查出盡行罷去及一切逢七逢九之齊清醮火醮之類通行禁止如此則朝廷正而天下無不正矣臣今與祭祀之事故言及此冒干天聽不勝竦懼之至等因具題該通政司官於奉天門奏奉聖㫖禮部會官稽詳何神立於何代何神有功於國何神澤及生民如今應否祭祀明白來說欽此欽遵會同太傅兼太子太師英國公等官張懋等謹詳古制天子祭天地祭宗廟祭社稷祭天下名山大川祭五祀凡載於祀典者皆有功德垂世如祭法所謂法施於民以死勤事以勞定國能禦大菑能捍大患則祀之非此族類不在祀典故孔子曰非其鬼而祭之諂也又曰淫祀無福而先儒亦曰帝王無妄祭無徼福又曰明於天地之性不可惑以神怪知萬物之情不可罔以非類皆謂此也自秦以降乃多淫祠歷漢至元有因有革逮至國朝太祖髙皇帝即位之三年首詔天下有曰夫禮所以明神人正名分不可以僭差今命依古定制凡嶽鎮海瀆並去前代所封之號止以山水本名稱其神郡縣城隍神號一體改正歷代忠臣烈士亦依當時初封以為實號後世溢美之稱皆與革去用稱朕以禮事神之意其天下神祠無功於民不應祀典者有司毋得致祭欽此欽遵及大明律內一欵凡私家告天拜斗焚燒夜香燃㸃天燈䙝瀆神明者杖八十若僧道修齊設醮而拜奏清詞誄文及祈禳火灾者同罪還俗又一欵凡師巫假降邪神書符呪水扶鸞禱聖自號端公太保師婆及妄稱彌勒佛白蓮社明尊教白雲宗等會一切左道亂正之術或隱藏圖像燒香集衆夜聚曉散佯修善事扇惑人民為首者絞為從者各杖一百流三千里欽此欽遵其所以拯弊俗於千古垂至戒於萬世至深切矣列聖相承恪遵成憲間有因所感應之事而增益祠祭或以萬夀千秋等節而修建齊醮一時行之不察後遂襲以為例因循莫改增置益繁異端之徒轉相鼓扇怪誕相乘矯誣殊甚夫非禮之祭非類之禱近代帝王固不能無然絶地天之通嚴幽明之分在帝舜以為當務之急蓋非聖明之君卓然有見必不能深禁而痛絶之此給事中張九功之言所以深有望於今日者也伏乞聖明敬事天地孝事宗廟嚴事山川百神捨此之外凡有一應齊醮禱祠之類通行革罷不惟屏斥異端之姦亦可節省無益之費該部仍通行天下除應祀神祇照舊致祭外其餘非有功德利澤及民及不經奏勘不合祀典者即係淫祠俱各查考盡行革去僧道修齊設醮師巫假降邪神左道亂正者嚴加禁約敢有故違依律問罪其在京各宫觀寺廟神祇出處不載於正經功澤莫稽其顯跡但係非時遣祭者並皆停免中間有經纍朝崇建難於輒廢亦宜釐正其名號減殺其禮儀庶幾朝廷之上允合乎聖祖以禮事神之心至於祀典之存亦足致乎帝舜至諴感神之妙和氣協應國祚綿長人心以明風俗以正其於治道誠非小補今將查到在京各項祭祀除太倉之神漢夀亭侯關某宋丞相文天祥俱祀典應祭外其餘各寺宫觀神祇應否致祭緣由逐一議擬開坐伏乞聖明裁處緣節該奉欽依禮部會官稽詳明白來說事理未敢擅便定奪謹題請㫖計開釋迦牟尼文佛三清三境天尊謹按傳記西方有佛國曰天竺天竺有五中天竺乃釋迦所生之地後漢明帝時其法始入中國後之宗其教者遂以釋迦為師其曰三世佛者則以釋迦之本性為法身德業為報身并其真身而為三其實本一人耳今乃分為三像而並列之失其指矣唐儒韓愈有曰三代之時天下太平百姓安樂夀考中國未有佛也明帝時始有佛法其後亂亡相繼運祚不長宋齊梁陳以下事佛漸謹年代尤促惟梁武帝捨身施佛其後餓死臺城事佛求福乃更得禍由此觀之佛不足事亦可知矣至於道家以老子為師其所謂三清者蓋倣釋氏三身而為之尤為謬妄宋儒朱熹有曰玉清元始天尊既非老子之法身上清太上老君又非老子之報身設有二像又非與老子為一而老子又自為上清太上老君蓋倣釋氏之失而又失之者也况莊子明言老聃之死則聃亦人鬼爾豈可僣居昊天上帝之上哉由此言之三清三境天尊實無所據况躬親祠醮傾心崇奉如宋徽宗者可謂至矣卒之陷身沙漠覆亡宗社千載之下可為明戒但緣異端佛老之徒轉相模倣惑世誣民歷代因之莫之有廢是以遞年以來凡遇萬夀千秋等節奉欽依修建吉祥好事或遇喪七七修建薦揚好事俱先期一日遣官詣大興隆等寺祭告釋迦牟尼文佛朝天宫祭告三清三境天尊此皆因襲而行不合祀典今議得齊醮既合停止其前項祭告俱各罷免北極中天星主紫微大帝謹按象緯書有曰北極五星在紫微垣中一名天極一名北辰其北第五星名天樞蓋極星之在紫微垣萬神所宗七曜三垣二十八宿衆星所拱為天文之正中又曰紫微大帝之坐天子之常居也即今朝廷宫殿所在乃其象焉國朝正統初年建紫微殿一所於大德觀之東設立大帝之像每遇萬夀聖節正旦冬至俱遣大臣一員祭告今議得日月星辰並曜于天故古有大明祭日夜明祭月幽禜祭星之文祖宗以來每嵗南郊大祀內壇已有星辰壇合祭之禮今乃像之如人稱之為帝以極星之正祠于異端之宫稽之祀典誠無所據所有前項祭祀伏乞罷免九天應元雷聲普化天尊謹按傳記有曰凡隂氣凝聚陽氣在內而不得出則奮擊而為雷霆非如異端所謂龍車石斧鬼鼓火鞭怪誕之難信也雷聲普化天尊者道家以為玉霄一府總司五雷而雷部諸神皆其所主而又託以六月二十四日為天尊示現之日故朝廷嵗以是日遣官詣大德顯靈宫致祭今議得風雲雷雨皆隂陽之妙用鬼神之盛德祖宗以來每嵗南郊大祀外壇已有合祭之禮而八月望後山川壇復有秋報之祭况自二月發聲之後無非雷霆震奮之日顧乃止於六月二十四日於義何取至於像設名稱禮亦無據所有祭告伏乞罷免梓橦帝君謹按圖志英顯王廟在劍州即梓橦神姓張諱亞子其先越嶲人因報母仇徙居劍州之七曲山仕晉戰沒人為立廟唐𤣥宗西狩追命左丞僖宗入蜀封濟順王宋咸平中改封英顯又按文昌六星在北斗魁前為天之六府道家謂上帝命梓橦神掌文昌府事及人間祿籍故元加號為輔元開化文昌司祿宏仁帝君而天下學校亦多立祠以祀之京師舊有廟在北安門外景泰五年闢而新之勑賜文昌宫額嵗以二月初三日為帝君誕生之辰遣官致祭今議得道家謂梓橦以孝德忠仁顯靈於蜀廟食其地於禮為宜祠之京師不合祀典至於文昌之星殊與梓橦無干今乃合而為一誠出傅會所有前項祭祀伏乞罷免仍行天下學校如舊有文昌祠者亦令拆毁祖師三天扶教輔𤣥大法師真君謹按傳記張道陵字輔漢光武十年生於吳之天目山善以符治病桓帝永夀元年於靈峯白日上升百二十嵗唐天寶七年冊贈太師中和四年封三天扶教大法師宋熙寧中加號三天扶教輔元大法師大觀二年冊號正一靖應真君子孫歷代相傳皆有封號逮入國朝仍令傳襲正一嗣教真人之封秩視二品嵗以正月十五日為祖師示現之辰遣官詣大德顯靈宫告祭又按宋邵伯溫聞見録建安二十年曹操破張魯定漢中魯祖陵順帝時客蜀學道鳴鶴山中造作符書惑百姓受其道者輒出五斗米時謂之米賊陵子衡衡子魯以法相付授自號師君其衆曰鬼卒曰祭酒大抵與黃巾相類朝廷不能討就拜魯漢寧太守鎮夷中觀此則陵本非異人而道家祖陵為天師者特因天寶詔稱漢天師而然爾今議得正月十五日乃其生辰自宜其子孫祭于其家所有前項祭祀伏乞罷免大小青龍之神謹按碑記昔有僧名盧自江南來寓西山之尸陀林祕魔巖一日二童子來拜于前盧納之鬻薪供奉雖寒暑無怠時久旱不雨二童子白于盧能限雨期言訖即委身龍潭須臾化二青龍一大一小至期果得甘雨事聞賜盧師號曰感應禪師建寺設像立碑以記其事又别設祠於龍潭之上春秋遣官祭二青龍神國朝宣德中勑建大圓通寺二青龍出現禱之有應於是加以封號至今春秋二時遣順天府官致祭及遇嵗旱遣官祭告蓋因舊傳二龍能致雲雨故纍朝崇奉如此然雖稱二龍其實蛇也蛇有神蛇其名曰蜦亦能致雨今此二蛇西山寺院處處有之略無靈異近者京師連年亢旱纍纍祭告祈禱杳無應驗則此亦非蜦蛇乃凡蛇耳蓋妖由人興久自衰息無足崇奉明矣昔宋祥符中天慶觀有蛇極怪異人以為龍孔道輔以手板擊其首死之其患遂息程明道為上元主簿茅山池有小龍如蜥蜴崇奉以為神物明道捕而脯之使人不惑後亦不聞如何則此二龍之怪誕正此類也所有前項春秋祭告之禮伏乞罷免東嶽泰山之神謹按圖志東嶽者魯之泰山在今山東濟南府泰安州山下有廟自黃帝以來封禪者七十二君唐宋元皆加神以封號曰王曰帝若祀人鬼國朝洪武三年詔去封號稱為東嶽泰山之神有司春秋致祭有事則遣廷臣祭告今京師朝陽門外亦有東嶽廟實自元延祐中𤣥教大宗師張留孫買地為宫奉祀東嶽天齊仁聖帝國朝仍而不廢嵗以三月二十八日及萬夀聖節遣官致祭夫鎮嶽海瀆以其山川靈氣有發生潤澤之功故歷代祀之而泰山在魯封內嵗時已有常祭况每嵗南郊大祀壇八月山川壇俱有合祀之禮所據前項祭告稽之祀典煩瀆無據合當罷免北極佑聖真君謹按傳記北極佑聖真君蓋真武神也真武本元武宋真宗尚道教避聖祖諱改𤣥為真𤣥龜也武蛇也此本北方𤣥武七宿虛危星形似之故因而名後乃以𤣥武為真聖而作龜蛇于下靖康初詔加號助順曰佑聖助順真武靈應真君及考圖志乃云真武為淨樂王太子也生而神靈長而勇猛志除邪魔遇紫虛𤣥君授以道祕東逰遇天神授以寶劍入武當山修煉功成白日飛升奉上帝命往鎮北方被髮跣足建皂纛𤣥旗統攝𤣥武之位此則道家傅會之說殊為誕妄再考國朝御製碑文太祖髙皇帝平定天下兵戈所向神隂祐為多及定鼎金陵乃於雞鳴山建廟以崇祀事載在祀典太宗文皇帝肅靖內難以神有顯相又於京城艮隅並武當山各重建廟宇而兩京嵗時春秋及京師每月朔望各遣官致祭武當山則命內外官員専一在彼提督列聖崇奉之意可謂至矣憲宗純皇帝在位嘗範金為像屢遣內官陳善齎往武當山安奉蓋亦不過承先志以祈神休耳豈期陳善援引左道之人鄧常恩等上則熒惑聖聽糜費內帑下則搔擾道路虐害生民且又奏請重修京城廟宇改號靈明顯佑宫日居其間引進邪術遂使香火之地幾為姦盜之區固非朝廷崇奉之本意使真武有神亦豈其所樂聞哉今議得神既有功於國則纍朝崇奉之禮固不可廢但本以一神而一嵗之間兩京俱有春秋之祭京師復有朔望等祭過於煩瀆合照南京洪武年間以來事例以每年三月三日九月初九日各用素羞遣太常寺官致祭其餘祭禮並行停止其武當山神像之類頻年賫送不無太繁况已有內外官員領勑在彼一應供奉之禮自合責令各官嚴加整辦所有襄陽府縣三年一次額辦給散道士濶白綿布二千四百匹濶白苧布二千四百匹祀神油蠟香炷三萬七千二百八十四斤雖稱送用日久皆係正稅所出即今民力憊敝亦宜量為裁減合行湖廣巡撫巡按官員徑自酌量奏請定奪今後差遣內官鑄送神像等事並乞一例禁革庶幾神祀不替而國用少節矣崇恩真君隆恩真君謹按道家之言有曰崇恩真君姓薩氏諱堅西蜀人在宋徽宗時嘗從虛靖天師張繼先及王侍宸林靈素傳學道法纍有靈驗而隆恩真君則玉樞火府天將王靈官也又嘗從薩真君傳授符法國朝永樂中有杭州道士周思得以靈官之法顯於京師附體降神禱之有應乃於禁城之西建天將廟及祖師殿宣德中改廟為大德觀封薩真人為崇恩真君王靈官為隆恩真君又建一殿崇奉二真君左曰崇恩殿右曰隆恩殿成化初年改觀曰宫加顯靈二字遞年四季更換袍服三年一小焚化十年一大焚化又復易以新製珠玉錦綺所費不資每嵗萬夀聖節正旦冬至及二真君示現之辰皆遣官致祭其崇奉可謂至矣今就其言議之薩真人之法因王靈官而行王靈官之法因周思得而顯而其法之所自皆宋徽宗時林靈素輩之所傳一時傅會之說淺謬如此本無可信况近年附體降神者乃欽發充軍顧玒顧綸之父子其為鄙䙝尤甚往往禱雨祈晴杳無應驗則其怪誕可知但經纍朝創建一時難便廢毁所有前項祭告之禮俱各罷免其四時袍服宜令本宫住持并庫役人等於每年應換之日仍會同道録司掌印官照舊依期更換如法收貯不必焚化永為定例仍乞勑內府各該衙門以後袍服等件不必再行製造如此則國用不至於妄費而邪術亦可以少貶矣金闕上帝玉闕上帝謹按大明一統志福建福州府閩縣南舊有洪恩靈濟宫一所祀二徐真人即今之金闕玉闕二真人也真人五代時徐溫子曰知證封江王曰知諤封饒王嘗提兵平福州福父老戴之圖像以祀宋賜今額又考之御製碑文云太宗文皇帝臨御之十有五年適遘疾弗豫百藥罔效或有言神靈驗者禱之輒應脫然平復於是大新閩地廟宇命有司春秋致祭嵗易時衣給户灑掃又於京師立廟以祀之加封金闕真人玉闕真人十六年又加封金闕真君玉闕真君賜廟額曰洪恩靈濟宫正統初年重新宫宇進號金闕崇福真君玉闕隆福真君成化二十二年重加尊號伯曰九天金闕總督魁神洪恩靈濟慈惠髙明上帝仲曰九天玉闕總督罡神洪恩靈濟仁惠𢎞靜上帝遞年以來每月朔望并萬夀聖節正旦冬至及二真君誕辰俱有祭祀遣官行禮及時食獻新至今不缺四時已有皮辨冠大紅紗羅紵絲織金雲龍朝服近又加以平天冠明黃紗羅紵絲衣服其黃服五年一次更換焚化紅服十年一次更換焚化夫神之世系年代可考如此本非有甚異也先年止因有功於閩廟食一方後以保護太宗文皇帝聖躬故京師有别廟之奉但本處既有春秋二祭而京師一年之間復有前項數次祭祀不無煩瀆且惟皇上帝主宰于天而兄弟並稱上帝其為僣擬可知至於袍服等件在京更換焚化其費已為不資又每每差遣內官前往福建齎送道路搔擾虐害人民不可勝言今議得廟之創建既始于閩則神如有靈固當往來于閩所有福建舊廟祭祀宜仍其舊其京師聖節并朔望等項祭祀及時食獻新俱乞罷免若以有廟無祭為嫌則於二真誕辰各遣本宫住持致祭一次仍乞革去帝號照依永樂年間加封事例止稱真君冠袍仍用本等服色在京者聽令本宫住持廟户人等於每年應換之日會同道録司掌印官依期更換如法收貯不必焚化直待敝壞之日方許奏請更製將不堪者照舊焚化其在福建者亦同此例但遇有敝壞者聽令布政司督屬就彼處置修理以後再不差人前去永為定例所有見在平天冠明黃袍服責付本宫庫內收貯仍行內府各該衙門無得再行製造如此既不失報功之典而祀禮亦不至於煩瀆矣神父聖帝神母元君金闕元君玉闕元君謹按徐仙真録及國朝御製碑文神父神母者即徐二真之父母金闕玉闕元君者蓋其配也宋理宗朝封父齊王為忠武真人母田氏仁夀仙妃配許氏助順仁惠仙妃陶氏善助慈懿仙妃國朝永樂中加封父翊亮真人母淑善仙妃許氏真應仙妃陶氏恭靜仙妃繼又進封其父為真君成化二十二年神父加封髙上神主慈悲聖帝神母加封安寧護國恭靜元君金闕妃天房衛保節靜元君又有妃天房衆母顯佑元君每嵗萬夀聖節正旦冬至俱遣官祭祀而金闕玉闕元君又有誕辰之祭皆因二真君一時禱應之功故推及而崇奉之如此今議得神父徐溫乃五代時吳國之臣専權弒主殊無功德祀以報功豈宜濫及况父母并妃並受隆名稱帝稱君僭擬益甚所有名號乞照永樂年間初封者為正以後增加及一切祭祀俱各革罷京都城隍之神謹按易坎卦有曰王公設險以守其國蓋謂君人者觀坎之象知險之不可陵也故設為城郭溝池以守其國而保其民人傳記謂其制自黃帝始歷代建國必有髙城深隍上以保障宗社朝廷下以衛捍百官萬姓其所繫甚重其為功不小故國朝之制天下府州縣皆有城隍廟之祭京都城隍廟舊在順天府西南纍朝皆加修葺嵗以五月十一日為神之誕辰及萬夀聖節各遣官祭祀夫廟祀城隍之神本非人鬼安得誕辰可謂謬妄况每嵗南郊大祀壇八月山川壇俱有合祭之禮事體已重比與天下府州縣城隍之祭不同所據前項祭告煩瀆無據俱合罷免前件奏奉聖㫖是修建齊醮遣官祭告并東嶽廟真武廟城隍廟靈濟宫祭祀俱照舊二徐真君并其父母妻只仍舊封號新加上帝等號俱革去冠袍等件該衙門換回焚毁今後福建該用冠袍六年差官一換其餘都准擬行欽此青溪漫稿卷十一
