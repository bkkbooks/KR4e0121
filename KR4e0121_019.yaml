body:
  text: 青谿漫稿巻十九明倪岳撰序贈太醫院使仲君南還序太醫院使寳應仲君惟馨以疾乞歸疏聞詔許之且俾疾愈供職如故君治裝戒行所與其子祠祭主事棐為僚者欲予一言以慰其父子暌離之情以逹諸交游不忍遽别之意誼不得辭則諗於衆曰諸君何以為惟馨贈耶或者進曰君少䘮父徳髙府君賴母辛苦守節以育于成伯父太醫院判徳明尤篤意撫教君刻志學問紹其世業以精鍾王學拜中書舍人累遷尚寳卿右通政改授今職兩荷封章推恩其親而母氏之節亦拜旌表之命於是人嘉徳髙有子矣君居嘗自念孱然幼孤幸爾有立復叨祿位躋於顯融皆先世未食之報之所貽者而自入仕途違逺丘壠㡬三十年伯考棄諸孤返塟于鄉亦且二十載縻於職守不獲一展省少抒無涯之感嵗月如逝而顛髮種種矣茲幸蒙恩賜歸吾心之所未償者庶其少塞乎此君之所以去也或者又曰聞君之先自明齋先生當元季起家醫學教授世以軒岐之術惠濟一方至徳明益顯然亦仕止院判耳及君而荐被寵擢五轉官而未艾也生三丈夫子皆頴異長本登𢎞治庚戌進士視政秋曹次棐登成化丁未進士選入翰林為庶吉士授職祠部次相頎然玉立又將繼此而奮諸孫姢秀早知務學仲氏之先所積徳善誠厚然獨於君發之職位之崇子孫之賢一時名宗鉅族可與嫓者亦鮮矣君居嘗自念天休滋至雖召公之賢猶以為懼故盈滿之戒君子之所宜慎也矧知進而不知退則悔吝生焉幸二子為學粗知嚮方敢以是報上恩酬知遇吾其可以少休矣乎盖君明於易之學以教成其子者此君之所以去也予聞而嘆曰前之說者所存之厚後之說者所見之明其賢逺於人何如哉夫君之歸也以其疾予欲沮君之歸也以其道何則昔之人固有盲於目重於聴者然其心思聰明足以濟用不在其耳目之間也君博通儒書識明才敏究心家學夐出儕類經其診切者可以决死生於嵗月之前起阽危於困絶之際以予所聞而知者比比也其所未知者夫豈可數計哉是以上自朝廷貴宦之家若儒士大夫下及窶人鄙巷之輩恒恃君為歸君亦樂於濟物有召即徃雖其疾少艱步履而於所以施其道以全夫人者固無所妨也顧可恝然為自便計而忘朝廷寵待之深士大夫倚望之重也哉此則君盖未可以言去者如此惜予力不足以挽而留之也雖然予則有告焉始君以疾乞歸朝廷弗之違徳意優渥君不可以不知也即其施諸人者以反諸已愈疾而來黾勉供職于以竭保和之功于以廣利濟之惠固君之所當盡者是可果於忘世以决於一去而已哉予於君托交有素不能無望於他日者君其念之尚弗為前二說所惑也京兆于公七十詩序應天府尹致仕錢唐于公景瞻以𢎞治癸丑某月某日壽躋七十予弟工部主事阜其壻也乃徵諸縉紳能言之士胥賦以頌既成巻予厠姻黨之末辱愛有素不敢以蕪陋辭僣為之序惟公在景泰初以先大夫肅愍公有安扶社稷功召拜府軍千戸後為權姦所構坐謫龍門憲廟嗣位首雪其事遂復公官且改文資為武庫貟外厯祠祭郎中南京太僕少卿應天府尹所至有聲雖老於吏事者皆讓不及也盖以聰敏特逹之資承過庭之訓於書無所不讀工詩善書著為文辭明白痛快類其為人蚤年思以儒奮㑹有召命不果繼處憂患益閉門却掃以讀書纂言為事故晚見於用其所建立卓然髙出儕伍惜未究厥施而請老歸矣嘗痛肅愍公之寃未能盡白慷慨累數千言聞者憫之㑹言者亦交章論列其事所司以聞聖天子褒功恤枉特隆恩命贈官賜謚建祠以祭於是公之心始塞聞者韙之夫天地之氣渾淪磅礴流為江河峙為山嶽昭為日星而幽則為鬼神人得是氣以生浩然於胷中者茍能養之以義理充之以學問則至大至剛塞乎天地久且弗餒亨否有不能移威武有不能屈毅然古之大丈夫不惟身名永存而事業所著垂之不朽者孰非是氣之所為也哉昔公當變故之來安命順天未嘗少懾其志雖逺謫窮邊而居約處困未嘗少變其節及乎燕谷回春鴻恩覃澤名位鼎來心志咸適當斯時也方且秉法循理事無茍作霽行潦止身無茍安又曷嘗少易其所守也哉惟其充于中者剛大故其發于外者悠久則夫遐福眉壽日晉月升殆未可涯也否於前而亨於後亦理之所必然歟譬之貞松勁栢霜饕雪虐之餘然後養成其材貫四時厯嵗寒挺然後凋之操其得於天地之氣厚矣若公之壽其非此類已乎請書此於羣言之首庸諗於公固知予言之非謬也贈福建叅政李君赴官序予昔官翰林時嘗識義興李君時亨於兵部東海張汝弼所時東海所交接多一時文人名士而時亨方舉進士癯然列于其間言議不凡予心竒之及仕終兵部主事弗究于用則又惜夫善人之寡祐也頃予來佐禮部復得時亨之弟時望為之属勤慎詳敏廉明公正有時輩所弗及者義興固多賢士若李氏昆季聨芳競爽若此又不可以易而得也予既皆得以周旋接納為幸而與時望處者久所以資予者益深則於時望之别其能忘情也哉且禮部之為属者四主客職四夷諸蕃朝貢之事其人語言不通嗜好不同雖象胥重譯之勞未能盡達茍非精察之才詎足以得其情名號之支離文字之詭異雖反覆審辨之詳未能皆合茍非通敏之識詎足以究其實矧夫溪壑無厭之欲冐昧非分之求茍非强毅之力顧足以節制而懾服之也耶自時望之為主客值聖天子更化之初大賚四海文移山積而又迤北巨酋西域番長更叠入貢奏牘頻繁賞犒絡繹殆無虛月皆出時望之手然内不失朝廷柔逺之道外不失逺人慕義之心一時皆以為難其才識之優裁决之果誠有可重者矣考之主客之設肇自漢成即古典属國之遺意厯代因之或為司蕃大夫葢撫接蕃夷所係甚重故必得名重華夏若何遂者而後可任醖藉如范岫者而後為無忝也若吾時望者顧不足以匹休之也耶邇者福建右叅政有遷擢之命吏部稔聞時望之賢奏補其任行有日所與為僚者相率需言以贈予固喜閩藩之得賢佐而重惜吾屬之失良友也顧將何以為時望告耶雖然予聞之閩為海濱文獻之邦非僻逺荒裔之域其人讀書講道守禮而畏法易於為理以吾時望之才之識之守徃莅于閩推其所已行而逹之於所未行即其難以求其易則夫所以詢乎民之俗而察乎民之心以施諸有政者吾知其恢恢乎有餘力矣將見譽望之隆勃起海嶠間名藩上佐其能久淹時望也哉抑予又聞之時望早年與兄時亨同游邑庠更相師友切劘講求文名日著前後取進士入官郎署有聲于時盖不啻潁濱之于東坡也然則時望之賢固其家學之有自歟予因備述之以復諸君之請且以告之閩之人送大總戎平江陳公總督治河詩序𢎞治癸丑春皇上用廷臣言簡任都御史華容劉公專理河事及秋天乃大雨壞張秋故隄河决而東運道用阻明年河患益甚朝廷憂之復命内官監太監李公總兵官平江伯陳公徃偕劉公綜其役六月望後二日抵其地又越月新鑿月河成運舟通利有詔褒奬焉先是平江公受命將行諸公卿相與飲餞于大司徒之堂衆謂斯役也宜以恤民惜財為本民不可以重困而財不可以浪費弗亟弗徐期于有成而已公亦以為然於是大司馬馬公即席倡七言律詩一章以識斯意衆客属和充然成巻不鄙謂予一言以序久未有以復也邇者復奉勅加公太子太保所以寵綏之者益至而又時方向冬霜降水涸固即工之時也一得之愚或可以少裨於成筭者顧可後乎遂為之言曰河之為中國患久矣考之河渠有書溝洫有志則所以論治河者在漢為詳然率以資灌溉之益不專於漕故瓠子之决徒以丞相食邑所在久而不塞其所係固輕矣我國家建都北京上而宗廟朝廷之奉下而百官萬姓之給皆漕於東南藉運河一水以達京師故河隄决則運舟阻運舟阻則上供缺軍國之計奚賴焉聖天子之所以注意者在是羣工之所以建議者在是固亦宜然哉然建議者言人人殊莫可適從要之非親厯其地而力究其源徒以稽故牒騁臆見而自謂得之吁亦左矣故漢末徵能治河者以百數轉相辨難但崇空語無施行者亦何益于事哉惟公曾大父恭襄侯之在文廟初寔董海舟嵗運百萬石上京師時海溢坍隄岸起揚之海門至鹽城者八百里侯以四十萬卒修之民免於患及罷海漕開濟寧臨清河以通南北侯創淺船嵗運至五百萬石疏清江浦引管家湖水入鴨陳口以達于淮就管家湖築隄長十餘里以便轉牽置移風清江福興新莊四閘以便行舟浚儀真瓜洲二埧湖港之湮鑿徐州吕梁二洪巨石之梗築髙郵昭陽南旺湖隄功用倍昔自是漕餉不乏國用給足迄今㡬百年上下賴之廟食于淮尸祝不廢此固公之家法也及公自總鎮兩廣召理漕事漕卒驩然如赤子之得慈母而公盡心所事濬大通河掘清淮口滌淤導滯通融有法朝廷遂有有光前烈之諭此公之成績也夫然故治河之責自不能舍公而他適而公之欲有所事其可外祖武而他求哉昔周宣王之命仲山甫則曰纉戎祖考命召穆公則曰召公是似穆公之命君牙則又曰迺惟先正舊典時式民之治亂在兹率迺祖考之攸行昭乃辟之有乂其言愈切而責愈重盖所恃於世徳之臣者固如此然則聖天子之命公與士大夫之望公者又何異於此哉雖然取諸人以為善乃所以為善故衆言混淆折之以理頃者建議之言皆下公考驗公尚虛心采納惟善之從幸無謂予自有家法在多言奚為予蹇拙無文不能具述諸公之所以贈公之意姑以前二言者始以此一言終焉公以為何如贈貴州按察副使沈君榮任序𢎞治丙辰正月朔天下諸司㑹朝京師越翼日上命銓憲重臣舉虞周董正黜陟之典綜覈賢否去留有差於是藩臬長佐而下有缺貟者銓部復請選拔内外諸司之賢以充刑部河南司郎中吾郡沈君尚倫遂有貴州提刑副使之擢未㡬陛辭以行諸鄉友之仕于朝者咸出祖餞之城東之館不鄙屬予一言以贈予惟諸君之意豈不以尚倫久厯秋曹聲聞夙著一旦出佐憲臬顧在窮荒萬里外殆非所以處吾尚倫也予則以為不然盖尚倫今茲翹舉其有可賀者三而資望之雄峻道里之遼邈金緋之烜焃不預焉何則鄒孟氏有云父母俱存兄弟無故一樂也尚倫尊翁封君素植徳善為鄉長者母宜人童氏淑徳克相䔍教尚倫顯躋髙科享祿養者十六載再荷推恩之典方以逾七望八之年偕老在堂尚倫亦嘗兩奉使軺獲遂覲省鄉人以為榮則今之拜恩而南復得便道過家稱觴上壽喜溢庭闈歡動閭里盖人子之所至願而不可必得者此其可賀者一也易有云雷電皆至豐君子以折獄致刑又云聖人以順動則刑罰清而民服尚倫自舉辛丑進士入官即拜刑部主事累遷郎中明於照察以為折獄之本决於果斷以成致刑之用一時理官求知尚倫者未易以一二數今徃司外臬殆猶駕輕車於康莊之衢莫之齟齬一方之民命大有賴焉其必順民而動以致其服從也審矣其於職業之脩舉也何有此其可賀者二也傳又有云言忠信行篤敬則蠻貊之邦行矣徃嵗聖天子建立皇儲當詔諭安南求可以充使者擇之羣僚中得吾尚倫首奉綸命以徃忠信之言篤敬之行孚於逺人舉國君臣益敦事大之誠而廉名偉識遂重於海外貴州之域載之職方猶古要荒之地其民雖雜夷羅然服屬中國之教條漸被累朝之徳化學校絃誦與中州齒以尚倫行乎異域而致其敬服若此其於貴陽也何有此其可賀者三也夫孝盡於奉親忠竭於舉職功著於服逺他人兼此者盖鮮矣而尚倫且優為之孰謂尚倫憚於逺涉而若有弗懌者然耶於是在座者連釂三爵以為尚倫贈乃歌嵩髙之三章賡以南山有臺之三章與之抗手而别贈長沙府知府王君赴官序予承命來司南銓首詢南畿士夫之賢者得鄞王君宗玉之為人其在臺端風裁振肅政理通達不矯矯為髙不察察為明嚴而不猛寛而不縱比者清戎畿内夙弊以次而祛兵籍以漸而實吏畏其威民懐其惠予心重之既而秩盈再考最績惟懋亟褒稱之以聞于朝㑹長沙知府以不任繁劇去銓曹求可以當其選者遂以君奏補其職部檄且至束裝告行所與同年而升者若户部郎中胡君璟禮部郎中鄧君應仁相率來請予言以為君贈予當重君之賢喜其翹舉誼不可辭則告之曰予聞長沙為郡彈壓上游控交廣之户牖擬呉蜀之咽喉翼張四隅襟束萬里其士習則好文而尚義其民性則决烈而勁直故習之相近固多問學志節之風而性之所染亦多豪獷桀驁之態往往健訟之日聞而逋賦之嵗積為之長者優柔之政不可以泛而施而馴擾之績不容以易而致也亦宜然哉近者前政已一再易率非過則不及之為患今君以激揚之力推之於豈弟之政先聲所及其不畏威懷惠而相率服從於命令之下者吾弗信也雖然善政不如善教之得民孟軻氏有是言也在宋龜山先生嘗令瀏陽部使者亦以催科不給罪之然其道徳之惠及民深矣此君之所宜取法者也長沙故有嶽麓書院以教四方學者有城南書院則南軒先生講學之地有東萊書院則東萊先生讀書之所是皆名賢遺迹之所在流風餘韻猶有存者焉君往而作興振起之敦禮師儒使居其間以教郡邑之俊秀將見賢者彚興風俗必變因以化導其鄉之人以復昔時所稱人多純朴俗恥不義學者勤於禮耕者勤於力之美由是謹畏以奉法程敦敏以服供輸不梗於下不傲於上翕然湖湘文獻節義之盛則君長沙之治其弗有聞于時矣乎抑予又聞之君之先有仕唐為銀青光禄大夫檢校太子太傅節度明州軍事者子孫遂居于鄞然則家學本於相承而宦業得于世授也久矣故君服膺家庭之訓浹洽見聞之實起而登成化辛丑進士為山東臨邑令為南京河南道監察御史在在有聲盖無忝於先徳焉將來所造詣逺大未可涯也於長沙乎何有贈南京翰林院侍讀學士曽先生致仕榮歸序成化戊戌之春憲宗皇帝臨軒策試進士三百五十人其第一人賜進士及第則泰和曽先生士美也先生早游庠序屢弗偶于有司膺貢以起卒業南雍遂掇巍科魁天下士而先生年已五十有四矣首拜翰林脩撰滿九載擢南京侍讀召脩憲廟實録成進春坊諭徳未㡬遷今官秩滿三載奏績之京而先生自謂年已七十又三日迫衰暮雖精力未憊而禮制不可違也乃具疏乞休即陛見之明日納之銀臺以聞許之且予誥得推恩考妣具如制先生拜恩而還道經南都告别於嘗所徃來於是曹院諸公卿咸出祖龍江之滸盛供張以餞頃之有執爵而言者曰南都諸司職務甚簡而翰林居清髙之地無所事事視諸司為尤簡先生以老成之學居之優㳺文字之樂何所不宜而求去之果邪或者又曰七十致仕固有國之常制而朝廷優重老臣徃徃年雖逾七奏劄屢騰而諭留之㫖亦且惓惓未遽聴也矧先生髙年碩學以大魁名天下四方學者争效尺寸之進不敢以遲暮自餒者未必不以先生為歸至於交㳺之間觴酌之㑹談議橫發神采矍鑠以是而居優閒之秩以為斯文表率又何所不宜而求去之果邪有觧之者曰知足不辱知止不殆雖老氏之言明哲之士恒有取焉故夫知進而不知退知存而不知亡知得而不知喪大易之明戒也先生博學洽聞髙科晚逹敭厯宦途既久諳練世故益熟則所以自處者固已審矣其於職任之重輕功名之去就又何校焉盖深逹夫止足之機克慎乎滿盈之戒故當引年之期即有乞骸之請其視鐘鳴漏盡夜行不休者顧可同日語哉昔宋龎莊敏公籍請老或謂公精力克壯何引去之堅公曰必待精力不支明主厭棄而後去是不得已豈止足之謂邪先生其有見於此乎此先生求去之果而非夫人之所能知也然則先生其賢矣哉㝠鴻矯矯酒盡欲别衆謂予其致一言以為先生贈予不能言聊述所聞以告先生以為何如送吳次翁還朝序江夏有倜儻不羈之士曰吳君次翁者少有竒志侍乃祖大名太守及乃尊上舍君得於家庭之訓讀書績文期以儒奮蚤失怙恃不果進取乃放浪江湖遨逰兩京樂與賢士大夫游平居喜吟咏嗜筆札毎酒酣興發肆意揮洒頃刻而成運筆如飛左右睥睨旁若無人雖王公貴人之前藐如也嘗用馬夏法作山水匠意豪邁如龍騰鳳翥開闔揮霍不可拘束人争寳之然非其志也恒曰此翰墨㳺戱耳胡足尚哉遇名山勝水飄然而徃逰覽登眺盡日忘歸人望之若神仙中人乃號之曰闕仙因亦以自號云頃以知者薦召入直便殿時有所作徃徃稱㫖錫賚有加嘗抗疏辭歸不願禄仕有詔不允尋以塟親故鄉為請許之既襄事已復來南都尋訪舊游留將一載部符絡繹促迫還朝將以春和景明拏舟而北交游者相率崇酒載殽送之龍江之滸酒盡將發乃扣舷而歌曰春風暢和兮芳草芉綿栁條可折兮裊裊晴烟江流浩渺兮魚龍在淵扁舟欲渡兮波浪恬然嗟吾安徃兮蓬萊巔瀛洲弱水兮相後先可望而不可即兮吾其仙懷故人兮離情牽曠良晤兮知何年歌罷欲别客有追而和之者曰送客送客兮江之湄東風皷枻兮畫鷁馳青尊未罄兮倒一巵栁條在手兮牽柔絲子之去兮繫我思望登仙兮此其時渺蓬瀛兮隨所之際風雲兮光陸離嗟故人兮不可遺遲君早辦兮歸來期時予亦在座間聞是歌而嘆焉盖以其有得於古人贈與處之道者矣有感於離合去住之情者矣有合於朋友之誼者矣遂命筆次第之以為送吳次翁還朝序贈南京禮科給事中彭君考最序南京禮科給事中番陽彭君君實秩滿三載將奏績上聞京師寮友户科給事中張君尚寳卿韓君合諸交㳺者相與設祖餞之龍江之上先期謁予一言以為行李贈予承命來典南銓毎咨詢一時才賢因知彭君之在諫垣盖表表者恒喜談而樂道之則於兹請也夫何辭予惟古人之論世家而必擬之以喬木者盖以培植之久條逹之盛以致成材之多故前後之相繼小大之相續而逺近之相符者殆非止於一時一世而已以今彭君觀之不信然哉始君以頴敏之資日務于學博通經史旁及刑名地理之書為詩文典雅清麗有聞于時遂領成化丙午鄉薦登庚戌進士髙第擢授今官履任之初即毅然以言責自任持已方潔抗論綆直不以禍福利害少為屈撓且臨事有經濟才一時政務弛廢輙振起之嘗給賞京衛推剔奸弊人沾實惠時以内帑嵗久弊滋朝廷命官覈實踰數年人率畏憚不以時聞事竟不决君至首具疏劾之事干典藏内臣及官吏輩㡬九百人請悉置于理報可雖以人衆夤縁祈恩宥免然自是夙蠧少戢人知嚴憚矣君在官遇事敢言嘗疏論端大本以脩時政者六救弊安民以囬灾異者五急先務以禦邊患者十皆關軍國之重其他禁僧道之濫度劾中官之怙勢論京尹之逞忿率切中時弊有補于世於乎若君者列職既逺厯官未久而封事屢騰剴切直亮如此良無忝於諫諍之職也哉雖然予聞之君之宦學相承其所由來逺矣盖彭氏之先系出安定王玕之後世居吉州廬陵山口五世孫堯任御史中丞堯之孫應求登宋端拱二年進士第仕至太子中允銀青光禄大夫嘗題崇聖院濂溪先生謂其能覷天巧號南國詩人子思永登天聖丁卯進士終戸部侍郎明道先生婦翁也思永子仲逵神宗時總管饒州路因籍于番芝山之陽家焉仲逵四子長忠敏哲宗時守長沙次忠泰判安福州忠敏五世孫大雅嘉熙間任四川制置使披荆棘冐矢石城重慶以禦利浪蔽䕫峽為蜀之根底朝廷璽書褒之及賜告歸番營莬裘于邑東百里許曰利陽鎮始為利陽鎮彭氏是時番之大姓惟彭黎周張四族而他人不與焉大雅四世孫紹仕元元貞間守福州既休政復去利陽鎮半舍曰隴口治别墅以居紹孫裕判常徳自是兵燹散而復聚裕孫濟川入國朝以書經領洪武四年鄉薦掌湖陽學事濟川孫元逹隠居不仕工詩有畊閑雜稿藏于家元逹孫坤景泰間舉人材授山東鹽運司經厯上章詰僚属贓罪其黨隂中之謫場官未㡬奔厥考喪終制弗起今待封南京禮科給事中即君實父也其家乘之淵永盖培植而條逹之者非一世成材而繼續之者非一人傳緒至君而益大以顯有如此謂非喬木世家其能然哉今君秩方小滿而厥有成績炳炳燁燁振耀于時尚益拓大先業若户部之議論清贍抗言立朝若制置之捍禦疆圉建功全蜀所謂公侯之世必復其始則君他日之所造詣其可涯涘窺也邪君其勉哉予日望之新刋地理四書序新安謝昌子期素明地理之術頃來南都謁予世翰堂首出篁墩程學士所著先塋碑隂記以示其術之精繼出其所自註雪心賦發微囊金三書以示其術之有所本也時予將營樂丘方欲求其人而訪之而雅聞子期名竊以一見為慰因留館穀于家朝夕與論率正而不謬不為僻陋之說視世之假是術以聾瞽愚俗者誠不可同日語也未㡬别予南歸乃需言以序于其所褎輯地理四書之首且告予曰世傳塟書出晉郭景純者其凡二十篇中多後人附㑹之言偏駁不倫惑世滋甚傳用既久人亦莫之覺也至宋西山蔡季通氏始為刪定去其謬妄者為内外八篇元臨川呉草廬氏猶以其擇焉未精復别其不倫者析為雜篇二以附于後由是郭氏舊書始為精善而世俗所傳星卦諸說依倣蕪穢之術一掃無餘金華鄭謐為之註釋反覆辯論尤為明白將使天下後世用是術者無所惑而行是術者不敢欺其有益於仁人孝子者非淺淺也况宋牧堂蔡神與氏實始著為地理發微十六篇其論一本景純而推衍其所未補者尤切遂為傳家之學而唐卜則巍之著雪心賦宋上牢劉謙之著地理囊金亦皆宗主郭氏後之學者遂合四書于一號曰地理集要顧璞書仍二十篇之舊既無所定正而三書皆未訓釋微詞奥義亦無所發明盖兩病焉昌學疎才淺而竊聞于父師之訓敢以一得之愚取三書者字為之釋而句為之解其間考據之必精引用之必切而一毫附㑹之私穿鑿之弊不敢有存焉由是三書之言推之郭氏靡不合者遂以附于西山草廬二大儒考定塟書之後更名之曰地理四書將圖鋟梓以與四方學者共之此昌之志也再拜以請予授而讀之為之嘆曰自有此天地即有此山川人物所謂卜其宅兆而安厝之在上古已然盖仁人孝子不忍死其親欲以求其親體魄之安而已非如後世所謂禍福吉㓙率繫于此遂有暴露其親久而不塟者不仁亦甚矣此皆野師俗巫剽竊璞言以欺世罔利之罪而非其書之過也然自晉迄宋而元而後得二先生者為之芟訛正謬以祛千數百年之大惑可謂難矣子期復能奮乎百世之下訓釋三書以與璞書並傳其用心亦勤矣哉惟是四書前後所得諸大家序說甚富兹將併附于梓予獨嘉子期今日之所從事者遂撮其槩以著于篇端云贈總兵官東寧焦公鎮貴州詩序東寧伯焦公世英頃自京營推掌南京前軍都督府事提督操江訓練有方什五無擾上下安之越三載朝廷下詢訪大將之命諸司難其人久未有應詔者于時南京守備魏國徐公謂公宜膺是選首疏公名以聞適貴州總兵官都督王通以疾去鎮大司馬合廷臣推薦其人代之復謂公宜膺是任遂疏公名以聞詔可即降制諭給旗牌符驗俾馳驛以徃南都諸公卿素重公敦詩說禮愛好斯文今兹荐承僉舉榮荷簡命逺兹中土式是南邦宜圖所以為贈於是大理卿楊公嘗與公同事江上鴻臚卿陳公又與公同學遼左尤相厚善者乃請各賦一詩以繼古詩人美宣王所以命召穆公之意復俾予執筆卜商之後為之序嘗即江漢之詩考之宣王以淮夷弗靖故命召虎徃平之而詩人之意第述其于疆于理來旬來宣式辟四方匪疚匪棘而已卒之以明明天子令聞不已矢其文德洽此四國盖勸之以文徳而不欲極意於武功視世之徼幸邊功窮兵黷武者不可同日而語此龜山先生以為聖主得賢臣而𢎞功業古之人皆然此宣王中興而有得於召虎諸臣之力如此方今聖明臨御海宇寧謐正所謂四方既平時靡有争之時貴州雖曰越在荒服之外蠻夷雜處然自永樂甲午肇建藩臬以來服習聲教比于中州徃者清匀之地苖夷弗靖六師所指不日削平厥既震懾以武功所宜綏柔以文徳惟此時為然然則公之徃鎮其地又豈在於他求哉雖然予嘗聞之矣公之祖襄毅公自正統初握兵鎮遼東累戰沙漠多所擒獲勳績茂著邊圉輯寧英廟復辟之初驛召至京親垂奬諭疏封伯爵錫以誥劵仍俾還鎮以遐壽終公幼侍庭訓從事儒業親賢取友養成徳器故嗣爵之後日承簡任統率禁旅嘗掛印徃鎮甘肅有仁祖山山丹之捷賜勅嘉奬未㡬移鎮寧夏所至克脩武備尤重文事有古儒將風固知貴陽之行殆輕車就熟路而王良造父為之先後耳詩尚有之文武受命召公維翰無曰予小子召公是似肇敏戎公用錫爾祉勉之以先人之業期之以後日之報此國家所望於世臣者固如此惟公其念之哉請遂書此於羣言之右以俟送洗馬梁先生南畿校文還朝序聖天子紀元𢎞治之十有一年嵗在戊午適鄉舉取士之期惟時司經局洗馬梁先生叔厚翰林院侍讀劉先生世衡適奉上命來司南畿考校之事既至即如故事入院荐棘封簾晝夜繙閱殆忘其勞比掲曉逺邇翕然稱曰得人於是南都諸公卿相與醵㑹盛供張於神樂道觀咸以丕顯斯文為二先生賀應天府尹韓公淳夫府丞吕公丕文則以先生事竣還朝宜有言以為之贈猥以見属予惟朝廷設科以言取士盖彷諸虞周敷納以言之遺意其所由來久矣而知言之道從古為難然言者心之所發故求之言語文字之間而可以得其精神心術之妙於是因言以求其人將失之者亦鮮矣姑即予所知者論之日者試事將撤棘太常吕卿秉之袖一巻過予曰此呉中唐生寅所業以赴京闈試持以為贄先生試一鑒定以為何如予受而讀之為古賦二篇為古選為演連珠各若干首辯博之學充贍之氣詞鋒差差殆不可嬰也予大驚喜以為後來之英乃有斯人耶主司得士如此固當以魁解處之下此非予所知已不數日京兆以賢書至亟展閱之其第一名果唐生也乃躍然自慶鄙見之非左而二先生藻鑑之明南畿得人之盛亦於此見之因憶曩者癸丑之嵗予承乏禮部忝知貢舉因得遍閱天下之士之言於三千七百人中得二人焉皆能言之士也時監試二豸史諗予曰二人者孰為優予曰此殆難為伯仲無已則某其一某其次乎請相與試之行且驗焉掲曉之夕視主司所取果與予合乃相視一笑二人者誠天下知名士也夫以言取士乃朝廷求賢圖治之典而人臣以人事君之忠亦惟此乎盡焉誠不可茍也於羣言之淆而思精以擇之得一士焉亦足以自慰矧數千里將命而來而又得夫瓌特非常之才文名之夙著輿論之同歸如此則斯行為不虛矣方叔厚以明經起海南入魁天下士當時主司固以得人為斯文賀也則今日得士而歸其所為忻慰者宜何如邪見諸舊寅姑以予言諗之將見知言之果非難而求言固足以得士也揚州鹺司瑞烏詩序烏以瑞名志非常也莫黒匪烏而有白其雛非常烏也斯謂之瑞歟粤稽古昔乃若國君以之紀元孝子以之名邑詩有爰止之瞻傳有人屋之愛而或者遂謂鳥之靈大者鳳小者烏則烏之重於他鳥亦久矣兩淮都轉運使濟南畢君嘉㑹嘗植槐於㕔事之前有烏來巢其顛今年忽産二雛一白一黒取而蓄之馴擾不驚維揚之人咸以為瑞或曰君廉於守己清白弗易其操其徵則然歟或曰君明以燭理黒白弗混其施其徵則然歟於是相率頌歌之褎輯成巻鄉友貝君珙持以畀予且道之故遂需一言弁其端夫凡物世以為瑞者必有其時得其人而出而後足以為瑞故麟之出於春秋厄於鉏商雖曰非瑞亦可也方今聖明在御徳被萬物生生育育各遂其性烏之為瑞於斯時也固宜畢君起家髙科敭厯顯宦考功著綜覈之明京兆敷豈弟之化迨司國鹺清慎明决富國裕民精强有為則烏之見瑞於斯人也亦宜况夫古之善政固有以孚草木格鳥獸者史册炳然具可稱述然則兹烏之為瑞將表著畢君之政績以與古人嫓美於無窮者豈偶然哉抑昔嘗有賦靈烏以喻賢執政者盖假物託辭以致意焉孰若兹烏駭異乎見聞超軼乎徃牒遂為希世之瑞若此豈無能言之士執筆為賦以揄揚畢君之賢者乎豈但頌歌之而已予雖謇拙尚能拭目以俟引送嚴大純秀才菊花詩巻引金陵嚴純大純少尹南齋先生之子翰林侍書大用之弟也青年志學雅重縉紳間今年春以先生命視兄京師交游者寫黄花為圖且歌咏之以贈其别既成巻属弁一言昔人之於行者或為圖或為詩以贈皆所以狀一時之景物以識不能忘情於離合之㑹之意也今兹大純之行栁色初黄江波始緑正春韶明媚之時而遽有黄華之贈顧安所取也豈將期其晚節之同堅而要嵗寒之弗爽邪亦將望其逺紛葩之浮艷而安澹泊之素守邪抑亦春而徃秋而返固因其行邁而遽儗其遄歸以無曠定省之禮或致違逺之思邪諸君之意則厚矣然大純兄弟素相友愛且俱有能詩聲兹以久别之餘一旦獲聚處之樂塤倡篪和篇聨巻續流光易邁離懷難判大純於此固何以為情也哉昔王維以兄弟在客因時懐親形之於詩至今讀之猶有感焉則夫秋風既髙黄菊且華景物觸目節序驚心懷逺遊之微言起髙堂之深念翩然南轅以慰諸君子今日贈言之意則孝友之誼斯兩盡而無媿矣不亦韙乎予將有冶亭登髙之作遲子歸而和焉尚竚立龍江之濱望子矣秋田姚君廷器小像引吾邑姚君廷器其先自杭徙上元數世矣至君而拓産日裕商于江湖樂友天下之士晚而佚老林泉别號秋田以示樂成之意遂閉門却掃寡與物接勝日則拉一二知已攜壺挈榼或山顛水涯或琳宫梵宇尋幽吊古以自適意泊如也君年四十當倦遊之初嘗命工寫小像以紀嵗月大理夏公季爵方居南臺雅知君名遂為之贊及壽躋七十童顔未凋而顛髮種種矣適朝廷有召民輸粟之命君捐所有輸粟若干石以備賑貸遂膺章服之榮郡舉鄉飲禮為上賓乃復命工寫小像曰吾力田有年兹殆及秋而有成也已噫孰意老之將至耶時人聞而賢之因謁大司冦張公廷璽為贊于其後裝裭成巻属予表兄姚君仲武攜之至京間以示予一展玩間喜其逼真既為數語以識復要諸縉紳之言以詠歌之未㡬君抵書于予曰秋田之像贊詠富矣幸表著之以引其端予惟古之人因年齒之既増則容貌因之而變故為紀年之像俾後有考焉然像以求諸外詎能究其中故胡邦衡云非寫形似之難寫心之精微為難也今觀君之像壯而江湖之逺遊殆天馬之不羈老而丘壑之嘉遯若㝠鴻之矯矯不但模寫其形似而已并其精神而盡得之誠可謂良工矣然君之貌雖因壯與老而或變而君之心則不以壯與老而或渝此則人能知之而良工之筆固不能窮也予聞君忠厚惻怛制行端謹孝于親友于弟讀書好禮輕財重義和於鄉黨惠於宗族周貧濟急如饑渇之於飲食年彌髙徳彌邵少壯如一始終不二此其心術之微豈研硃吮粉之迹所可盡邪裴晉公云一片靈臺丹青莫狀斯信然矣予故掲此於巻之首使後之人欲識君之貌者求諸像欲知君之心者其考之余言哉是為引青谿漫稿巻十九
