body:
  text: 青溪漫稿卷二十明倪嶽撰書答友人下第北歸九月望前一日聞故友某將北歸乃緘書而走告之曰以豫觀所嘗試於有司而為文者其所以黜者有三而命不與焉理或之舛一也詞弗之逹二也紛綸湮鬱美惡並陳如山人食客園蔬野䔩亂列無序而適口者絶少三也若是者豈直命之過哉夫擲之無瑕也舉之無疵也可以上而不可以下可以前而不可以後確乎其弗可移也者蓋望而知其為善聞而知其為美夫孰能下上其手哉於是而猶有利不利焉舉而歸之命也斯信然矣今子之於文其已試者如彼而未試者如此而曰命也命也其可哉豫因子欲進之心而告以勉進之意則所以抑之者固以有申之也夫登於山者中道而或倦焉趨於下而已非一奮屐而往不能極其巔也逰於水者中流而或息焉止於近而已非一鼓棹而前不能窮其涯也則今日之所以䇿厲猛省豈容或後也哉故必戒暇逸之私而攻勤苦之役去昏惰之氣而作明敏之功革因循之繆而益奮激之力絶自滿之失而廣容善之量舍自是之非而效從人之美祛自欺之弊而切責己之誠涵泳聖賢之遺言切磋師友之忠告而熟復父兄之善教朝焉於斯暮焉於斯蚤作而晚輟夙興而夜寐責之强勉之餘積之嵗月之久由是德崇而業廣知類而通逹不至於大成矣乎記曰凡學官先事士先志則子之志不可以不立也又曰時過而後學則勤苦而難成則子之時不可以或失也及可為之時立有為之志及其成也將無施而不利無行而不逹者矣詩曰左之左之君子宜之右之右之君子有之維其有之是以似之夫孰能齟齬於其間哉至是則君子有性焉不謂命矣烏可以小試不獲者芥蒂於中而遽摧其英鋭之鋒也哉子其勉之幸毋以豫言為瀆也抑余又有告焉余言誠瀆矣然子之藥石也能已疾者也彼有以膏梁之言進而欲己子之疾豫恐弗之能瘳也而適以甚之子其慎擇之哉寄慰李士常久不奉晤懷想拳切諒惟士君子讀書見理明白應不以憂寂之故少纍其中抑不知吾兄於此亦一刋落否向者賔之方有鼓盆之戚計吾兄必為之惻然不日聞賔之言竟亦坐此善人寡祐理不可詰而何天之困絶蒙泉者至此極也每與賔之言及未嘗不纍嘆終日也嘗欲作一書奉慰懷事總總詞不足以盡一二輒復中止何則譬之喬木其植根既久且固則其枝蔓暢逹日不可禦已若李氏之宗何以異此夫以纍世功德之懿不可謂非久且固者在今日正暢逹而不可禦之日奈何數年以來其摧折至於如此其亦謂之何哉雖然木之底於成材者雨露之潤澤無幾而氷霜風雪之所摧折者已非一日於是其材大成而置之大用不爽也然則天之於李氏豈非氷霜風雪交至疊加以玉成其後日之材者乎在吾兄勉之而已秋雨新霽逺思飄飄聊此草草以謝疏濶近得伊洛淵源一書奉為間中檢閲肅然與諸君子相對庶幾憂患之心亦可以灑然忘矣如何如何字說王敏字遜之說天順庚辰冬豫侍親寓宣城時則有若王君者枉顧豫於館舍肅然其恭薰然其和豫覩其儀度聆其言議知其為誠篤君子而富於文學者也遂與之為莫逆交又明年壬午豫領薦入官為别幾二載矣今年秋君以事至京師胥晤客邸叙好甚歡頃之過豫言曰豫素欲有請於足下第時有科舉纍未敢言也茲既暇矣敢固以請因而詰之乃曰豫始長父名之以敏既冠賔字之以遜之然少寄跡於戍伍長從事於章句因循嵗月未有為豫發其名字之義者丐一言釋之可乎豫不敢以不文辭為考商書說命篇有曰惟學遜志務時敏厥修乃來則敏而字之以遜之也義本諸此夫驕與怠最害於學者也驕則志盈善不可入怠則志惰功不可進故為學而不謙卑退遜則無以為入門一於謙遜而不務時敏則又不能進步遜則不驕敏則不怠遜而濟以敏厥修所以來也賔父名字之義而有取於此非欲君佩服而力行之乎今君雖𨽻戎伍而事詩書且又虛以受人不驕不盈若深藏之良賈然君之志可謂遜矣自食其力研窮道奧蓋惟日不足焉君之學可謂敏矣然則君之所修蓋有如泉之始逹源源乎其來者德之積也行不萃於厥躬而道之充也得不造於罔覺耶優游自娛俯仰無怍則其所造又可覬量之耶若夫他日掇科躋仕以堯舜君民使道濟當時澤被後世者不過舉此而措之耳則於賔父名字之命抑亦何負之有豫非能言者重君之請庸書此以復且以致望云說字贈張德虛南歸京口有以醫世其家者曰錢宗嗣氏頃被召職醫上方將奉檄北上念母氏垂白在堂義不可挈妻子以行則留以奉其姑既逾年宗嗣日見任用求歸省不可得始以其母之命托諸其內子之兄張咸吉者送之京師宗嗣德咸吉之篤於友愛而不計其勞如此來謂豫曰咸吉吾邑名家子讀書尚義循循然惟幹蠱以養茲乃跋涉數千里之逺遂致吾家固其敦於兄弟之義而於吾心將何以報乎然嘗聞之咸吉以為未之請字將無以尊其名而飭於行也思得大人君子一言以為終身誦倘有以命之則咸吉知所以教而吾之報亦庶乎其塞乎豫曰易有之山上有澤咸君子以虛受人夫咸者感也物皆有相感之道故自君臣上下以至父子夫婦親戚朋友皆情意相感則和順而亨通然而相感之道利在於正不以正則入於惡矣故咸得其正則吉此其名之有取於易者如此豫請因傳易聖人之意而字之以德虛可乎蓋山以虛故能受澤心以虛故能受人此山澤之氣所以相通而人物之情所以相感也故人之於心必當充其本虛之體而擴其有容之量不使一私之或存以至衆理之能受然後有感必通無不出於正而底於吉矣茍以私意實之則必不能以正相感夫何有於吉乎今咸吉之於錢氏之弟所謂情意相感而能得其正者矣尚益虛己以為受善之地則其德之所成詎可量耶咸吉其勉之遂書以為南歸贈錢氏三子字說成化己丑豫展墓於杭道過錫山邑著姓錢君孟津甫訪豫舟中時雪始霽邀豫逰其鄉之小嵩山頭陀寺君諸子皆侍行其幼者特俊爽可愛乃慿肩輿以從執别之際出諸子名若字請豫為之說久未有以復也茲豫復奉命歸省回首舊逰蓋十稔矣况辱君書問勤渠可無一言以謝皋緩之過乎君世家臨安為吳越武肅王之裔讀書好義克承其先其子長曰本字以世立則取有子所謂君子務夲本立而道生之意凡事莫不有夲而時特舉孝弟為言者誠以父母兄弟人之大倫能於此而盡之其大夲立矣故仁道至大而亦以此為行之之始意可知矣然則本之所以處乎家者可不盡夫孝親弟長之道乎况夫孝者所以事君弟者所以事長由是出而為用於時則其所以事君事長之道豈不亦自此而立乎其次曰相字以世瞻則取詩所謂赫赫師尹民具爾瞻之意蓋周太師三公之官相之職也相居尊位為民之所瞻仰則其審於接物平其好惡以盡夫修身刑家治國平天下之道者可不謹乎夫處廟堂之上則凡卑於我者固於此乎瞻處於家庭之間則凡幼於我者亦於此乎瞻蓋必竦然其不可以茍肆也明矣相之所以勉諸己以居乎人所瞻仰之地者其可忽乎又其次曰幹字以世臣詩有之思皇多士生此王國王國克生維周之楨解者曰楨幹也皆為築墻之木橫曰楨直曰幹頌賢才而謂之楨幹者蓋以國恃賢才而立猶墻恃楨幹而立也由是觀之非楨幹而用之則墻必傾非賢才而用之則國不治然則為臣以事君者可不勉之勉之而自置身於賢才之列後日人稱頌之亦猶周公之所以頌文王者以為時多賢才以為之臣挺然國之楨幹也不亦韙乎是則幹之所宜從事者宜何如哉亦惟取法有周之多士茍出而效用俾朝廷獲濟濟之效可也嗚呼孟津之所以名其子與其鄉先生之所以字之者意亦深矣二三子所當交修而不怠者尚因豫言而益勉焉他日錫山之間有以孝弟稱有以賢才舉巍然而為人之所仰傑然而有譽於時必錢氏之子矣夫三子勉之豫日望焉崔恩字承之說淮之大河衛指揮僉事崔君克遜讀書好文樂與儒士大夫游有子曰恩年甫弱冠日教之飭學厲行以承先澤其鄉友銀臺右通政仲君惟馨見而恱之許妻以女克遜以惟馨故識余嘗謁余官舍求以字恩而誨厲之者久未有以復也今年復以漕事來京請之益勤偶讀旱麓之詩而有感焉乃字之曰承之而著其義以告之曰恩為惠為澤而承則受也繼也夫上天之雨露其所以施於物者本於無心而物之所以承乎雨露之澤者亦夲於無心然栽者培之傾者覆之故夫松柏之堅徑蒲栁之脆弱均一發生於雨露之下而敻乎不同如此蓋即物之所受而驗之天之所施雖出於無心之相感然其舒慘豫奪厚薄小大之間固有不可强而致者故曰黃流不注於瓦缶而福澤不降於淫人施之於彼承之於此夫豈偶然也哉崔氏之先以武功起家列職戎衛荐沭寵恩世有爵祿傳緒至恩可謂逺且大矣夫朝廷之恩猶上天雨露之澤也沛乎九重之上而洽乎四海之廣蓋無不被而及之者然其厚薄小大慘舒豫奪之間則必因人以施未嘗茍然同也是則承而受之固在此而不在彼歟譬之松柏之後凋而蒲栁之先零蓋脆弱之質自不足與堅徑之材伍耳豈非並承雨露之澤而所得固自有淺深厚薄於其間哉是則物之所以承之者固必有由來矣不可忽也承之何如德以植其根學以逹其材博聞以暢其識深養以壯其氣磊磊落落以底碩大之用夫然後雨露之澤施之日深培之日厚所以紹續世澤於逺且大者在是矣朝廷之恩抑安能舍是而他適也哉所望於承之者如此尚其勉焉豫日望之題跋題孝友卷後天順壬午余嘗客宣城有朱氏者宣之望族也富而好禮樂接賢士大夫朱氏有四丈夫子其仕為撫軍者曰用忠為博士弟子者曰用輔曰用孚居賈於家而其長則客死淮南者曰用章也用孚嘗過豫請曰兄佐字用輔佑字用孚輔孚之音恆嫌其近也幸為我更之豫辭曰禮不諱嫌名矧音之近者乎用孚請益篤豫乃舉易辭自天佑之吉無不利之義告之而字之曰用吉因遂與之定交焉用吉工筆札喜吟咏是嵗冬與之賡酬凡數十百首長篇短章皆足觀者間出所藏孝友詩卷示豫要題其後豫展而誦之知用章臥病姑蘇時用吉方自北上維揚相距尚數百里用章知病且殆思見其弟而不可得而用吉亦思其兄兩情懸懸孰能與之會哉用吉偶覺心動疑有異即舍所事走姑蘇抵用章客所至之日用章方發書召用吉而不意其遽至相對若夢寐間不覺其疾之頓愈也及回扺維揚疾復作更數醫皆以為不可療用吉遂懇天求以身代卒不獲命以沒臨終猶拳拳於父母兄弟之言略不及私用吉為具衣衾棺槨以殯哀毁甚至人之憫用章之死而嘉用吉之敦睦者咸為詩以慰之而李教授亨遂名之為孝友卷宜也及用吉扶柩還宣祔於祖塋之次而父母皆垂白在堂傷其子之逺死嗣續中絶憂色形焉用吉日與其兄用輔稱觴拜夀承順顔色期樂其志而和其心人皆以為賢用吉之行可為不負李君之所稱矣雖然孝友士君子之常行也近之於日用之所行逺之於堯舜之所以為聖皆此道也世之去仁滅義者方汨於物欲之私其弗孝弗友者亦衆矣用吉於此乃能行衆所不能行者要不可以為難哉用吉尚益勉焉力行而不怠使塞垣朔漠之地以至窮荒遐逖之人其不相視而歸厚寧不益見其賢歟豫與用吉南北之人也交甫旬月而一别已數載今始獲求桃溪謝翰林以下諸公詩以張大其事而贅以是言題印局陸嵩所藏徐武功詩後鄉友陸先生元泰詞翰妙一時以布衣游諸公卿間有重名而仕卒不顯是亦命矣此稿乃先生自太學南歸時武功先生方在翰林為侍講因贈此詩緬懷疇昔嶽以童子侍二先生側獲聞言議而古人不復作矣且詩語有懷家君尚書大人藹然交分之誼前輩風流蓋如此可重矣藁故藏趙戶部孟麟所先生之子嵩求得之持以示嶽莊誦之餘有感於中者多矣嵩方仕有祿位能世其業觀此亦能知所重者先生其有子矣故書以畀之武功詩有云年來離思正紛紛可忍重為送别文張翰風流今復見何蕃行義昔曽聞天街十二多春雪客路三千隔暮雲日下若逢倪侍講煩君為我致殷勤題羅德安集明仲洗馬之曾大父也羅德安集者泰和子理先生之遺文也先生在國初居則負隱君子之操出而成賢二守之名亦韙矣今讀其書足以窺其心術之正見其賢子孫足以占世澤之逺也昔楊文敏公謂先生修諸己施諸人皆當追配古人而今之人知者寡其所感深矣嗚呼百世之下欲知先生者不有賴於是編耶題全未了上人佛印後身卷有一比丘未了號曰一完住報恩大藍若梅檀林中以自在身修無上法得清净門絶塵垢想以如是故逹官長者見是比丘生歡喜心衆相愛敬以是因緣稱其名字遍滿世間時復有人作是念言昔有比丘名曰了元有大居士號曰東坡稱是比丘為佛印師有大智慧以一磨衲視無量世界盡入其中此一衲故永劫不壞應是人者不可思議後於金山說法廣惠衆生是居士者亦復隨喜因聞生悟捨所愛寶是二人者假是語言自相顯見若今未了師亦復如是我聞一性圓通周回生死億千萬劫變化無窮信如是言了元未了前後出世惟一了義因稱之曰佛印後身師人皆生敬信心衆口同聲稱如是言於是未了合掌向豫問如是因恐墮惡業客塵妄想及事理障一切罪根恐因是故豫告未了言我聞如來說第一了義無受想行識無口耳鼻舌身意無聲色香味觸法無色無相不生不滅何有於身身既無有何有前後昔大悲觀世音以無身之身化而為千萬億身以千萬億而歸於一以一歸於無無聞無見以示妙法何有此身是名前後身者即墮妄語我亦復聞觀世音現大神通應以一切身得度者即皆見之而為說法應是了元為大比丘以至未了亦為比丘因所得度而見是身是名無盡義及諸世尊過去未來至于見在亦以一身周流二世雖一佛不見二身而以一身見大金剛力歷千萬劫不壞如大法輪轉轉莊嚴以一相故變出諸相如大法鐘撞撞鳴吼以一聲故散為衆聲如是二師能以一身幻出前後身者亦復如是是名真正覺歷劫無窮盡何必前後身止此兩菩提永遍沙河身身身歸佛道師聞是偈已嘆未曾有再拜作禮而退跋荆公絶句右荆公天童山溪絶句一首思致幽曠有唐人風愛者書之縑素筆法清徑可謂二美矣吾鄉陳君明逺實先世所藏因裝褫成卷屬題其後昔之論者謂公令鄞時行青苖法甚便於民及入相遂欲推之天下竟以為民害聖賢所行良法美意並施而不可者此說其信然歟明逺與兄聖逺皆為令佐郡邑間久其於民情亦稔矣政令之行固有宜於此而不宜於彼者歟此詩正公令鄞時所作故因明逺之請聊與論之恭題宣廟御製後仰惟宣宗皇帝天縱聖明萬機之暇留意文藝一時天葩睿藻垂賜臣工者莫不極古今之妙誠有前代帝王之所不能及者猗歟盛哉時則有若錦衣衛指揮臣李效良起家三衢執藝尚方忠實純謹深沭寵眷前後所賜宸翰甚多其孫臣昶謹録副為册以傳真希世之寶也伏聞憲宗皇帝亦嘗即其家取入禁中展閲纍日後復畀之命之寶藏是則李氏荐承恩賚固非一世矣然則為之子若孫者於此可不百拜什襲保之於無窮也哉其子鄉貢士臣棨出示臣嶽拜觀之餘謹書此以識題盛虞鐘硯卷錫山盛虞舜臣得端溪石硯斫為鐘形置諸端友齊四硯之首請豫一言以識蓋硯之用以端石為貴鐘以象形豈其用之尤貴者乎夫樂以鐘而鳴文以硯而鳴其用正相等耳至其所以鳴則亦惟人之所用之豈必若坡老所記彭蠡之口噌吰鏜􅝅者然後謂之石鐘哉君之歸尚益琢磨他之日大江之南有大叩之而大鳴小叩之而小鳴其必子也夫其必子也夫䇿問鄉問試䇿問三首問堯舜之道載諸方䇿典謨之書莫加焉皆足以垂萬世之明法者也三代有作胥此焉凖其亦有可言者歟然上資乎君道下切於臣職何者為最詳歟我太祖高皇帝定天下之初首以彰善疸惡之政條成大誥三篇復以經傳之義意深長儒先之注釋不一特為總其確論以著於篇名之曰資世通訓用詔後人本末不遺巨細畢舉大聖人之制作固出尋常萬萬也然意指之所託條目之所著可以仰窺而縷析之歟且曰君道而君道之所當事者云幾果堯舜禹湯文武之為君其所行者止於此耶粵稽古昔何者為可見邪抑外此無復可事者邪又曰臣用而臣用之所當戒者云幾果唐虞三代之臣皆必絶乎此邪其所尤切者為何事邪抑外此無所當戒者邪以至論士而獨舉伊尹而下六臣者為士之善然六臣之所以為善者顧何所取後之欲成有用之士者抑何所事諸士子祗服聖訓有年其知所以為士之道審矣則夫於此六臣者其出處之詳優劣之等與夫歸依嚮往之所在殆必有以處也幸以告我庶他日勉修臣職以輔成君道者亦於是乎稽焉問刑以輔治崇古尚焉虞典五等之刑周訓三千之屬不可以有加也然八辟五禁何所施三典三刺何所用耶約法三章與三百五十九章者孰得約法十二條與七千四百八十條者孰失耶我國家有律令有條例付之有司者詳矣然稽之古孰合乎虞周漢唐之制行之今孰得乎輕重煩簡之中耶帝舜欽恤之言穆王哀敬之教不可以不念也然除肉刑定箠令者何所始除斷趾禁鞭背者何所昉耶除誹謗法與除文致之請者孰是下减死詔與立覆奏之制者孰非耶我國家有審録有湔滌行之朝廷者久矣然麗乎原發者何以逭出入之科列於外任者何以覬澡雪之路耶伯夷播刑之功蘇公敬獄之效不可以不重也然長者正人何以名持正守法何以别耶天下無寃民與民自不寃孰優平反遷官與平反辭賞者孰劣耶我國家有刑部都察院有大理寺按察司責之鞫讞者衆矣然觀望風指何以得情罪之實牽合律例何以盡評駁之允耶夫長我王國匪刑曷恃具嚴天威惟刑則然此固不可以不講也願聞所以得刑獄之道問識時務者在俊傑諸士子固其儔也輒舉一二試相與論焉民習或有未純何以一之吏職或有未修何以懲之古有以五術省風俗八計聼吏治者今可行乎選舉淹濫何法可以清經費虛竭何道可以阜古有以三科登俊乂四賦經財實者今可用乎無告之民其拯援何先不急之政其汰格何切古有以六德保罷瘵五要簡官事者今可施乎夫究其理而皆合逹諸政而必通斯善論事者其審量以言亦將以觀用世之學武學公試䇿問二首問周官大司馬凡制軍則軍有將師有帥卒伍有長其數可稽乎小司徒會萬民之卒伍而用之伍兩師旅以起軍旅其制可考乎以至馬牛之所出車乘之所供自畿內以及諸侯之國卿大夫之家其法又可得而聞乎列國兵爭周制漸變齊管仲作內政以寓軍令晉襄公舍二軍以復三軍魯之丘甲楚之六卒其視周之制何如漢有材官羽林而復有南北之軍唐有驃騎車騎而復有折衝之府其視周之制何若夫事必師古而後可久矧兵為事之大者乎其考古制之詳與今制之善庶無沗於善言兵者問兵不貴乎多貴乎精然非訓練有素則亦無由而精且勇也成周四時有振旅茇舍治兵大閲之法漢承秦制三時不講其十月之幸五月之膢猶此意也唐則顯德之習射滍水之講武宋則築講武堂立校試諸軍伎藝格亦猶此意否歟抑行於何時舉於何人歟其詳略之等精勇之效有可得而聞歟請著其說與兵部論快船事宜書竊見南京快船差使第一艱難積年負纍甲餘貧乏每僉一人充當展轉哀告不已一至領船中人之産不久即破蓋緣每差押運官員需索幫錢數多衛所又無餘丁撥補必須顧人撑駕雖有附搭人貨所得不償所費回還之日别無所得能事者得隨有差內臣販賣私鹽少思陪補及至到此被其算帳扣除依舊一空生親見一新僉小甲初頗殷實一年兩差房産隨盡遂為貧户似此夙弊無力可除誠可憫念因循嵗久將成不可救藥之病今因徐貢郎中所奏事件竊為議處條陳上請萬乞俯察愚悃深軫下情一與復奏准行不勝至幸其船每隻雖原設小甲餘丁共二十名其實有名無實反成弊端宜照糧船人數量為增减若得十五名的實親丁駕船庶免欺弊但須亦照糧船事例加與月糧一石方可繫留人心所慮户部以費糧見阻因查江淮濟川二衛馬船夫逃已萬人以上皆係食糧人數以彼擬此不為别費然此亦須夲部併作處分始克有濟若行户部必無可望倘人力既減糧復不給其為負纍愈甚於前矣至於量支租銀一莭猶恐執事逺慮日後買馬支陪或有不足之患以此前次奏內不以為然生亦於此反覆籌之矣緣纍年所積應天府見寄庫租銀二萬一千四百九十三兩三錢七分一釐八毫六絲各府州縣衛所每年大約該納租銀四千九百八十五兩七錢八分九釐三毫今查得𢎞治十一年分已支過買馬租銀二千九十六兩𢎞治十年十一年二年上厰改造快船共五十四隻惟𢎞治十二年告上厰快船三十八隻縱以此多者為率每隻給銀三十兩共不過一千一百四十兩今以十一年買馬已支價銀并十二年上厰船數計之二項大約不過共支銀三千二百三十六兩比之每年租銀之數尚餘有一千七百五十餘兩借使以後年分或有灾傷免徴只以此有徴之年支用所餘之數接續支用亦無不足之患况纍年所積二萬餘兩之數仍舊不動乎此則所謂裒多益寡捐有餘以濟不足船隻易完而差遣之用不乏軍餘稍寬而衛所之用可救在上無纎毫之損在下有永久之益矣伏惟台照不勝􅈤切之至青溪漫稿卷二十
